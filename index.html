/* ── MDR Logo SVG Component ── */
function MDRLogo({size=36}){
  return(
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#5a8fc0" opacity="0.15"/>
      <circle cx="50" cy="50" r="40" fill="#1a1a1a" stroke="#5a8fc0" strokeWidth="2"/>
      {/* Gear teeth */}
      {[0,45,90,135,180,225,270,315].map((angle,i)=>{
        const rad=angle*Math.PI/180;
        const x1=50+34*Math.cos(rad);const y1=50+34*Math.sin(rad);
        const x2=50+42*Math.cos(rad);const y2=50+42*Math.sin(rad);
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#5a8fc0" strokeWidth="6" strokeLinecap="round"/>;
      })}
      <circle cx="50" cy="50" r="28" fill="#1a1a1a" stroke="#5a8fc0" strokeWidth="1.5"/>
      <circle cx="50" cy="50" r="6" fill="#5a8fc0"/>
      {/* Clock hands */}
      <line x1="50" y1="50" x2="50" y2="28" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/>
      <line x1="50" y1="50" x2="62" y2="42" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
      {/* Hour markers */}
      {[0,90,180,270].map((angle,i)=>{
        const rad=angle*Math.PI/180;
        const x1=50+22*Math.cos(rad);const y1=50+22*Math.sin(rad);
        const x2=50+26*Math.cos(rad);const y2=50+26*Math.sin(rad);
        return <line key={`m${i}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#5a8fc0" strokeWidth="2" strokeLinecap="round"/>;
      })}
    </svg>
  );
}

/* ── Database Layer ── */
const db = {
  _h(){return{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,Prefer:"return=representation"};},
  async jobs(userId){const r=await fetch(`${SB_URL}/rest/v1/jobs?user_id=eq.${userId}&select=*&order=created_at.asc`,{headers:this._h()});if(!r.ok)throw new Error("Failed");return await r.json();},
  async todayRpts(ids){if(!ids.length)return[];const t=new Date().toISOString().split("T")[0];const q=ids.map(i=>`"${i}"`).join(",");const r=await fetch(`${SB_URL}/rest/v1/reports?select=id,job_id,status,report_date&report_date=eq.${t}&job_id=in.(${q})`,{headers:this._h()});if(!r.ok)return[];return await r.json();},
  async mkJob(d){const r=await fetch(`${SB_URL}/rest/v1/jobs`,{method:"POST",headers:this._h(),body:JSON.stringify(d)});if(!r.ok){const e=await r.json();throw new Error(e.message||"Failed");}return(await r.json())[0];},
  async ulTpl(uid,jid,blob,ext){const p=`${uid}/${jid}/template.${ext||"pdf"}`;const ct=blob.type||"application/octet-stream";let r=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${p}`,{method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":ct},body:blob});if(!r.ok){r=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${p}`,{method:"PUT",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":ct},body:blob});if(!r.ok)throw new Error("Upload failed");}return p;},
  async mkTpl(d){
    const r=await fetch(`${SB_URL}/rest/v1/templates`,{method:"POST",headers:this._h(),body:JSON.stringify(d)});
    if(r.ok){const txt=await r.text();try{return JSON.parse(txt)[0];}catch(_){return null;}}
    const err=await r.json().catch(()=>({}));
    throw new Error(err.message||"Template save failed");
  },
  async getProfile(userId){const r=await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${userId}&select=*`,{headers:this._h()});if(!r.ok)return null;const d=await r.json();return d[0]||null;},
  async upsertProfile(d){const r=await fetch(`${SB_URL}/rest/v1/profiles`,{method:"POST",headers:{...this._h(),Prefer:"return=representation,resolution=merge-duplicates"},body:JSON.stringify(d)});if(!r.ok)throw new Error("Profile save failed");return(await r.json())[0];},
  async deleteJob(jobId){
    // Delete related templates, reports, then the job itself
    await fetch(`${SB_URL}/rest/v1/templates?job_id=eq.${jobId}`,{method:"DELETE",headers:this._h()});
    await fetch(`${SB_URL}/rest/v1/reports?job_id=eq.${jobId}`,{method:"DELETE",headers:this._h()});
    const r=await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${jobId}`,{method:"DELETE",headers:this._h()});
    if(!r.ok)throw new Error("Delete failed");return true;
  },
  async deleteAccount(userId){
    // Delete jobs, then profile
    await fetch(`${SB_URL}/rest/v1/jobs?user_id=eq.${userId}`,{method:"DELETE",headers:this._h()});
    await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${userId}`,{method:"DELETE",headers:this._h()});
    return true;
  },
  // Save or update a report (works for both working_copy and submitted)
  async saveReport(d){
    // Check if ANY report exists for this job+date (regardless of status)
    const chk=await fetch(`${SB_URL}/rest/v1/reports?select=id,status&job_id=eq.${d.job_id}&report_date=eq.${d.report_date}&limit=1`,{headers:this._h()});
    const existing=chk.ok?await chk.json():[];
    if(existing.length>0){
      // Update existing report
      const r=await fetch(`${SB_URL}/rest/v1/reports?id=eq.${existing[0].id}`,{method:"PATCH",headers:this._h(),body:JSON.stringify({...d,updated_at:new Date().toISOString()})});
      if(!r.ok){const e=await r.json();throw new Error(e.message||"Save failed");}
      return(await r.json())[0];
    }else{
      // Get next report number for this job
      const cntR=await fetch(`${SB_URL}/rest/v1/reports?select=id&job_id=eq.${d.job_id}`,{headers:this._h()});
      const allRpts=cntR.ok?await cntR.json():[];
      d.report_number=allRpts.length+1;
      // Create new report
      const r=await fetch(`${SB_URL}/rest/v1/reports`,{method:"POST",headers:this._h(),body:JSON.stringify(d)});
      if(!r.ok){const e=await r.json();throw new Error(e.message||"Save failed");}
      return(await r.json())[0];
    }
  },
  // Get today's report for a job + date (any status)
  async getReport(jobId,date){
    const r=await fetch(`${SB_URL}/rest/v1/reports?select=*&job_id=eq.${jobId}&report_date=eq.${date}&limit=1`,{headers:this._h()});
    if(!r.ok)return null;
    const d=await r.json();
    return d[0]||null;
  },
  // Update job field_config
  async updateJobFieldConfig(jobId,fieldConfig){
    const r=await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${jobId}`,{method:"PATCH",headers:this._h(),body:JSON.stringify({field_config:fieldConfig})});
    if(!r.ok)throw new Error("Field config update failed");
    return(await r.json())[0];
  },
  // Get the template record for a job
  async getTemplate(jobId){
    const r=await fetch(`${SB_URL}/rest/v1/templates?job_id=eq.${jobId}&select=*&limit=1`,{headers:this._h()});
    if(!r.ok)return null;const d=await r.json();return d[0]||null;
  },
  // Save template page images (rendered from PDF during job creation)
  async saveTemplatePages(userId,jobId,pageImages){
    const paths=[];
    for(let i=0;i<pageImages.length;i++){
      const blob=await(await fetch(pageImages[i])).blob();
      const p=`${userId}/${jobId}/template_page_${i}.jpg`;
      // Use POST first, fall back to PUT (upsert) if file already exists
      let r=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${p}`,{
        method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"image/jpeg"},body:blob
      });
      if(!r.ok){r=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${p}`,{
        method:"PUT",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"image/jpeg"},body:blob
      });}
      paths.push(p);
    }
    return paths;
  },
  // Get template page image URLs
  getTemplatePageUrl(path){
    return `${SB_URL}/storage/v1/object/report-source-docs/${path}`;
  },
  // Fetch inspection requests for user's jobs in a date range
  async getRequests(userId,startDate,endDate){
    const r=await fetch(`${SB_URL}/rest/v1/inspection_requests?user_id=eq.${userId}&requested_date=gte.${startDate}&requested_date=lte.${endDate}&select=*,jobs(name,site_address)&order=requested_date.asc`,{headers:this._h()});
    if(!r.ok)return[];return await r.json();
  },
  // Update an inspection request
  async updateRequest(id,d){
    const r=await fetch(`${SB_URL}/rest/v1/inspection_requests?id=eq.${id}`,{method:"PATCH",headers:this._h(),body:JSON.stringify({...d,updated_at:new Date().toISOString()})});
    if(!r.ok){const e=await r.json();throw new Error(e.message||"Update failed");}
    return(await r.json())[0];
  },
  // Delete an inspection request
  async deleteRequest(id){
    const r=await fetch(`${SB_URL}/rest/v1/inspection_requests?id=eq.${id}`,{method:"DELETE",headers:this._h()});
    if(!r.ok)throw new Error("Delete failed");return true;
  },
};

                <div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>

    {icon:"📋",title:"How Requests Work",body:"When someone opens your calendar link, they pick a job, choose a date, and submit a scheduling request. You see the request on your calendar and can approve or reschedule it. Once confirmed, both sides get a notification.",tip:"Scheduling requests don't automatically create a daily report — you still start your report when you're on site."},

function TrainingCenter({onBack}){
  const [selGuide,setSelGuide]=useState(null);
  const [step,setStep]=useState(0);

  if(selGuide!==null){
    const g=GUIDES[selGuide];
    const s=g.steps[step];
    return(
      <div style={{minHeight:"100vh",background:C.bg,color:C.txt,display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
          <button onClick={()=>{setSelGuide(null);setStep(0);}} style={{background:"none",border:"none",color:C.mut,fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
          <MDRLogo size={28}/>
          <span style={{fontWeight:700,fontSize:17}}>{g.title}</span>
        </div>
        <div style={{display:"flex",gap:4,padding:"16px 20px 8px"}}>
          {g.steps.map((_,i)=>(
            <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?(typeof g.color==="string"?g.color:C.org):C.brd,transition:"background 0.3s"}}/>
          ))}
        </div>
        <div style={{textAlign:"center",fontSize:13,fontWeight:600,color:C.mut,marginBottom:16}}>Step {step+1} of {g.steps.length}</div>
        <div style={{flex:1,overflowY:"auto",padding:"0 20px 20px",maxWidth:600,margin:"0 auto",width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{width:80,height:80,borderRadius:"50%",background:(typeof g.color==="string"?g.color:C.org)+"22",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:36}}>{s.icon}</div>
            <div style={{fontSize:22,fontWeight:700,color:C.txt,marginBottom:12}}>{s.title}</div>
          </div>
          <div style={{fontSize:16,color:C.lt,lineHeight:1.7,marginBottom:16}}>{s.body}</div>
          {s.tip&&(
            <div style={{display:"flex",gap:10,padding:14,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12}}>
              <span style={{fontSize:18,flexShrink:0}}>💡</span>
              <div style={{fontSize:14,color:C.mut,lineHeight:1.5}}>{s.tip}</div>
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:12,padding:"12px 20px 24px",maxWidth:600,margin:"0 auto",width:"100%"}}>
          {step>0&&(
            <button onClick={()=>setStep(step-1)} style={{flex:1,padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,color:C.lt,fontSize:15,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <span style={{fontSize:13}}>‹</span> Previous
            </button>
          )}
          <button onClick={()=>{if(step<g.steps.length-1)setStep(step+1);else{setSelGuide(null);setStep(0);}}} className="btn-o" style={{flex:1,padding:"14px 0",background:typeof g.color==="string"?g.color:C.org,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {step<g.steps.length-1?<>Next <span style={{fontSize:13}}>›</span></>:<>Done <span style={{fontSize:13}}>✓</span></>}
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <span style={{fontWeight:700,fontSize:17}}>Training Center</span>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"20px"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:10}}>🎓</div>
          <div style={{fontSize:22,fontWeight:700,color:C.txt,marginBottom:6}}>Training Center</div>
          <div style={{fontSize:14,color:C.mut,lineHeight:1.5,padding:"0 20px"}}>Step-by-step guides to help you get the most out of My Daily Reports</div>
        </div>
        {GUIDES.map((g,i)=>(
          <button key={i} onClick={()=>{setSelGuide(i);setStep(0);}} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:14,marginBottom:10,cursor:"pointer",textAlign:"left"}}>
            <div style={{width:48,height:48,borderRadius:12,background:(typeof g.color==="string"?g.color:C.org)+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{g.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:600,color:C.txt,marginBottom:3}}>{g.title}</div>
              <div style={{fontSize:13,color:C.mut,lineHeight:1.3}}>{g.sub}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
              <span style={{fontSize:12,color:C.mut}}>{g.steps.length} steps</span>
              <span style={{color:C.mut,fontSize:14}}>›</span>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ── Dashboard ── */
function Dashboard({user, onLogout}){

  const [selJob,setSelJob]=useState(null);
  const [showSet,setShowSet]=useState(false);
  const [showNew,setShowNew]=useState(false);
  const [showDD,setShowDD]=useState(false);

  };
  const load=async()=>{setLoading(true);try{const a=await db.jobs(user.id);setJobs(a);const ids=a.filter(j=>!j.is_archived).map(j=>j.id);if(ids.length)setRpts(await db.todayRpts(ids));const p=await db.getProfile(user.id);if(p?.slug)setProfileSlug(p.slug);await loadRequests();}catch(e){console.error(e);}finally{setLoading(false);}};
  const act=jobs.filter(j=>!j.is_archived);
  const arch=jobs.filter(j=>j.is_archived);
  const top3=act.slice(0,3);
  const stat=(id,sc)=>{if(sc==="as_needed")return"none";const r=rpts.find(r=>r.job_id===id);if(!r)return"due";return r.status==="submitted"?"submitted":"working";};
  const dot=(s)=>{if(s==="none")return null;const c=s==="submitted"?C.ok:s==="working"?C.org:"#ef4444";return<div style={{width:10,height:10,borderRadius:"50%",background:c,flexShrink:0}}/>;};

  const doShare=async()=>{const url=window.location.href;if(navigator.share){try{await navigator.share({title:"My Daily Reports",text:"Voice-to-PDF jobsite reports",url});}catch(e){}}else{try{await navigator.clipboard.writeText(url);alert("Link copied!");}catch(e){alert("Could not copy link.");}}};

  if(showAcct)return<AccountSettings user={user} onBack={()=>setShowAcct(false)} onLogout={onLogout}/>;
  if(showNew)return<CreateJob user={user} onBack={()=>setShowNew(false)} onCreated={()=>{setShowNew(false);load();}}/>;
  if(showArch)return<ArchivedJobs jobs={arch} onBack={()=>setShowArch(false)} onSelect={(j)=>{setSelJob(j);setShowArch(false);}}/>;
  if(showTrain)return<TrainingCenter onBack={()=>setShowTrain(false)}/>;
  if(showFairUse)return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={()=>setShowFairUse(false)} style={{background:"none",border:"none",color:C.mut,fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        <MDRLogo size={28}/>
        <span style={{fontWeight:700,fontSize:17}}>Fair Use Agreement</span>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"24px 20px"}}>
        <div style={{fontSize:14,color:C.lt,lineHeight:1.8}}>
          <p style={{fontWeight:700,fontSize:16,color:C.txt,marginBottom:16}}>My Daily Reports — Fair Use Policy</p>
          <p style={{marginBottom:14}}>My Daily Reports uses AI-powered document parsing to analyze your uploaded templates and detect fillable fields. Each template upload triggers an API call to process your document. To keep the service fast, reliable, and affordable for all users, the following fair use limits apply:</p>
          <p style={{fontWeight:700,color:C.org,marginBottom:8}}>Job Creation Limits</p>
          <p style={{marginBottom:14}}>Each account is intended for use by a single inspector managing their own active projects. Users may create a reasonable number of jobs that reflect actual jobsite and field reporting work. Accounts that create an excessive number of jobs, upload templates in bulk, or appear to be using the parsing service for purposes other than daily field reporting may be subject to rate limiting or account review.</p>
          <p style={{fontWeight:700,color:C.org,marginBottom:8}}>Template Parsing</p>
          <p style={{marginBottom:14}}>The AI template parsing feature is provided to help you set up your report fields quickly. Each template upload counts as one parsing request. Re-uploading the same template for the same job counts as an additional request. Please configure your fields carefully during initial setup to minimize unnecessary re-parsing.</p>
          <p style={{fontWeight:700,color:C.org,marginBottom:8}}>Scheduling Calendar</p>
          <p style={{marginBottom:14}}>The shared scheduling calendar is designed for coordinating jobsite visits between you and your project teams. It is not intended for use as a general-purpose scheduling tool unrelated to jobsite and field reporting work.</p>
          <p style={{fontWeight:700,color:C.org,marginBottom:8}}>What Counts as Fair Use</p>
          <p style={{marginBottom:14}}>Creating jobs for real projects you are actively working on, uploading one template per job, adding your actual project team contacts, and using the calendar for legitimate jobsite scheduling. Normal use of the app as described in the Training Center is always within fair use.</p>
          <p style={{fontWeight:700,color:C.org,marginBottom:8}}>What May Trigger a Review</p>
          <p style={{marginBottom:14}}>Creating dozens of jobs in a short time period, repeatedly re-uploading and re-parsing the same templates, automated or scripted account activity, sharing account credentials, or using the service for purposes outside of jobsite and field reporting.</p>
          <p style={{fontWeight:700,color:C.org,marginBottom:8}}>Enforcement</p>
          <p style={{marginBottom:14}}>We reserve the right to temporarily rate-limit parsing requests, suspend scheduling features, or contact you to discuss your usage if it falls outside of normal patterns. We will always attempt to reach out before taking any action on your account.</p>
          <p style={{color:C.mut,fontSize:12,marginTop:20}}>Last updated: March 2026</p>
        </div>
      </div>
    </div>
  );

  if(selJob)return(
    <JobDetail job={selJob} user={user} onBack={()=>{setSelJob(null);load();}} onDeleted={()=>{setSelJob(null);load();}}/>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt,position:"relative"}} onClick={e=>{if(showSet&&!e.target.closest('[data-s]'))setShowSet(false);if(showDD&&!e.target.closest('[data-d]'))setShowDD(false);}}>
      {/* ── Header: Dropdown (left) | Logo (center) | Settings (right) ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:C.card}} data-s>
        <div style={{justifySelf:"start"}} data-d>
          <button onClick={()=>setShowDD(!showDD)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 12px",background:C.inp,border:`1px solid ${showDD?C.org:C.brd}`,borderRadius:8,cursor:"pointer",color:C.txt}}>
            <span style={{fontSize:13,fontWeight:600,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selJob?selJob.name:"Jobs"}</span>
            <span style={{color:C.mut,fontSize:11,transform:showDD?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
          </button>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:8,justifySelf:"center"}}>
          <MDRLogo size={34}/>
          <span style={{fontWeight:700,fontSize:16,color:C.txt,letterSpacing:-0.3}}>My Daily Reports</span>
        </div>

        <div style={{justifySelf:"end",display:"flex",alignItems:"center",gap:8}}>
          <button onClick={doShare} style={{width:34,height:34,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,color:C.mut}}>↗</button>
          <button onClick={()=>setShowSet(!showSet)} style={{width:34,height:34,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,color:C.mut}}>⚙️</button>
        </div>
      </div>

      {/* Job dropdown */}
      {showDD&&(
        <div style={{position:"absolute",left:16,top:62,background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,marginTop:4,zIndex:90,boxShadow:"0 8px 24px rgba(0,0,0,0.5)",maxHeight:400,overflowY:"auto",minWidth:240}} data-d>
          {act.length===0&&<div style={{padding:16,textAlign:"center",color:C.mut,fontSize:14}}>No active jobs</div>}
          {act.map(j=>{const s=stat(j.id,j.schedule);return(
            <button key={j.id} onClick={()=>{setSelJob(j);setShowDD(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              {dot(s)}<div style={{flex:1}}><div style={{fontSize:15,fontWeight:600,color:C.txt}}>{j.name}</div><span style={{fontSize:11,color:C.mut}}>{SL[j.schedule]||j.schedule}</span></div>
            </button>);})}
        </div>
      )}

      {/* Settings dropdown */}
      {showSet&&(
        <div style={{position:"absolute",top:62,right:16,background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"8px 0",minWidth:220,zIndex:100,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}} data-s>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`}}>
            <div style={{fontWeight:600,fontSize:14,color:C.txt,marginBottom:2}}>{user?.user_metadata?.full_name||"Inspector"}</div>
            <div style={{fontSize:12,color:C.mut}}>{user?.email}</div>
          </div>
          <button onClick={()=>{setShowSet(false);setShowAcct(true);}} style={{width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",color:C.lt,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><span>👤</span> Account Settings</button>
          <button onClick={()=>{setShowSet(false);alert("Notifications coming soon");}} style={{width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",color:C.lt,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><span>🔔</span> Notifications</button>
          <div style={{borderTop:`1px solid ${C.brd}`,margin:"4px 0"}}/>
          <button onClick={()=>{setShowSet(false);onLogout();}} style={{width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",color:"#ef4444",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><span>🚪</span> Sign Out</button>
        </div>
      )}

      <div style={{maxWidth:600,margin:"0 auto",padding:"16px 16px 20px"}}>
        <button className="btn-o" onClick={()=>setShowNew(true)} style={{width:"100%",padding:"14px 0",background:C.org,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",marginBottom:16}}>+ New Job</button>

        {loading&&<p style={{textAlign:"center",color:C.mut,padding:40}}>Loading...</p>}

        {/* ── Job cards — two column grid ── */}
        {!loading&&act.length>0&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {act.map(j=>{const s=stat(j.id,j.schedule);const sc=s==="submitted"?C.ok:s==="working"?C.org:s==="due"?"#ef4444":C.brd;return(
              <button key={j.id} onClick={()=>setSelJob(j)} style={{textAlign:"left",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:14,cursor:"pointer",display:"flex",flexDirection:"column",gap:8,position:"relative",borderTop:`3px solid ${sc}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:36,height:36,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📋</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,color:C.txt,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{j.name}</div>
                  </div>
                  {j.scheduling_enabled&&<span style={{fontSize:14}} title="Scheduling enabled">📅</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:10,fontWeight:600,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:4,padding:"2px 6px",color:C.mut}}>{SL[j.schedule]||j.schedule}</span>
                  {s!=="none"&&<span style={{fontSize:10,fontWeight:700,color:sc}}>{s==="submitted"?"Done":s==="working"?"In Progress":"Due"}</span>}
                </div>
                {j.site_address&&<div style={{fontSize:11,color:C.mut,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{j.site_address}</div>}
              </button>);})}
          </div>
        )}

        {!loading&&act.length===0&&(<div style={{textAlign:"center",padding:"60px 20px",color:C.mut}}><div style={{fontSize:48,marginBottom:16}}>📋</div><p style={{fontSize:16,fontWeight:600,color:C.lt,marginBottom:6}}>No jobs yet</p><p style={{fontSize:14}}>Tap "+ New Job" to create your first project</p></div>)}

        {/* ── Scheduling Calendar (full month) ── */}
        {!loading&&(()=>{
          const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
          const now=new Date();
          const todayStr=now.toLocaleDateString("en-CA",{timeZone:tz});
          const monthLabel=new Date(calYear,calMonth,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
          const firstDay=new Date(calYear,calMonth,1);
          const lastDay=new Date(calYear,calMonth+1,0);
          const startPad=firstDay.getDay();
          const totalDays=lastDay.getDate();
          const cells=[];
          for(let i=0;i<startPad;i++)cells.push(null);
          for(let d=1;d<=totalDays;d++)cells.push(d);
          while(cells.length%7!==0)cells.push(null);
          const slug=profileSlug||user?.user_metadata?.full_name?.toLowerCase().replace(/\s+/g,"-")||"inspector";
          const calURL=`${window.location.origin}${window.location.pathname.replace(/index\.html$/,"").replace(/\/$/,"")}/schedule.html#${slug}`;
          const hasScheduling=act.some(j=>j.scheduling_enabled);
          const dayHeaders=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
          // Build lookup: date string → array of requests
          const reqsByDay={};
          calRequests.forEach(rq=>{if(!reqsByDay[rq.requested_date])reqsByDay[rq.requested_date]=[];reqsByDay[rq.requested_date].push(rq);});
          // Requests for selected day
          const selDayReqs=selCalDay?reqsByDay[selCalDay]||[]:[];
          const prevMonth=()=>{const m=calMonth-1;if(m<0){setCalYear(calYear-1);setCalMonth(11);}else setCalMonth(m);setSelCalDay(null);};
          const nextMonth=()=>{const m=calMonth+1;if(m>11){setCalYear(calYear+1);setCalMonth(0);}else setCalMonth(m);setSelCalDay(null);};
          return(
            <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden",marginBottom:12}}>
              {/* Calendar header with nav */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",borderBottom:`1px solid ${C.brd}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button onClick={prevMonth} style={{background:"none",border:"none",color:C.mut,fontSize:18,cursor:"pointer",padding:"0 4px"}}>‹</button>
                  <span style={{fontWeight:700,fontSize:15,color:C.txt}}>{monthLabel}</span>
                  <button onClick={nextMonth} style={{background:"none",border:"none",color:C.mut,fontSize:18,cursor:"pointer",padding:"0 4px"}}>›</button>
                </div>
                {hasScheduling&&(
                  <button onClick={async()=>{const url=calURL;if(navigator.share){try{await navigator.share({title:"Scheduling Calendar",text:"Request a site visit here:",url});}catch(e){}}else{try{await navigator.clipboard.writeText(url);alert("Calendar link copied!");}catch(e){alert(url);}}}} style={{padding:"6px 12px",fontSize:12,fontWeight:700,borderRadius:6,background:C.blu,border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                    <span>↗</span> Share Calendar
                  </button>
                )}
              </div>
              {/* Day headers */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
                {dayHeaders.map((d,i)=>(
                  <div key={d} style={{padding:"8px 0",textAlign:"center",fontSize:10,fontWeight:700,color:(i===0||i===6)?C.mut+"88":C.mut,textTransform:"uppercase",borderBottom:`1px solid ${C.brd}`}}>{d}</div>
                ))}
              </div>
              {/* Month grid */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
                {cells.map((day,i)=>{
                  if(day===null)return<div key={i} style={{padding:"6px 4px",textAlign:"center"}}/>;
                  const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                  const isToday=ds===todayStr;
                  const isSel=ds===selCalDay;
                  const isWeekend=i%7===0||i%7===6;
                  const dayReqs=reqsByDay[ds]||[];
                  const hasConfirmed=dayReqs.some(r=>r.status==="confirmed");
                  const hasPending=dayReqs.some(r=>r.status==="pending");
                  return(
                    <div key={i} onClick={()=>setSelCalDay(isSel?null:ds)} style={{padding:"4px 2px",textAlign:"center",background:isSel?C.blu+"22":isToday?C.org+"12":"transparent",cursor:"pointer",borderBottom:isSel?`2px solid ${C.blu}`:"2px solid transparent"}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:isToday&&!isSel?C.org:isSel?C.blu:"transparent",color:(isToday&&!isSel)||isSel?"#fff":isWeekend?C.mut:C.lt,fontWeight:isToday||isSel?700:500,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto"}}>{day}</div>
                      {/* Dots for requests */}
                      <div style={{display:"flex",justifyContent:"center",gap:3,marginTop:2,minHeight:6}}>
                        {hasConfirmed&&<div style={{width:5,height:5,borderRadius:"50%",background:"#22c55e"}}/>}
                        {hasPending&&<div style={{width:5,height:5,borderRadius:"50%",background:C.org}}/>}
                      </div>
                    </div>
                  );
                })}
              </div>
              {/* Selected day details */}
              {selCalDay&&(
                <div style={{borderTop:`1px solid ${C.brd}`,padding:"12px 16px"}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:8}}>{new Date(selCalDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
                  {selDayReqs.length===0?(
                    <div style={{fontSize:12,color:C.mut}}>No scheduling requests for this day.</div>
                  ):(
                    selDayReqs.map(rq=>(
                      <div key={rq.id} style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,padding:12,marginBottom:8,position:"relative"}}>
                        {rq.status==="confirmed"&&<div style={{position:"absolute",top:8,right:10,fontSize:16}}>✅</div>}
                        <div style={{fontSize:13,fontWeight:700,color:C.txt}}>{rq.jobs?.name||"Job"}</div>
                        <div style={{fontSize:12,color:C.lt,marginTop:2}}>{rq.inspection_type||"General Visit"} — {rq.requester_name}</div>
                        <div style={{fontSize:11,color:C.mut,marginTop:2}}>{rq.requester_email}{rq.requester_company?` · ${rq.requester_company}`:""}</div>
                        {rq.notes&&<div style={{fontSize:11,color:C.mut,marginTop:4,fontStyle:"italic"}}>{rq.notes}</div>}
                        <div style={{display:"flex",gap:8,marginTop:10}}>
                          {rq.status!=="confirmed"&&(
                            <button onClick={async(e)=>{e.stopPropagation();try{
                              await db.updateRequest(rq.id,{status:"confirmed"});
                              // Send confirmation email to requester
                              if(rq.requester_email){
                                const reqDate=new Date(rq.requested_date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
                                const inspectorName=user?.user_metadata?.full_name||user?.email||"Your inspector";
                                fetch(`${SB_URL}/functions/v1/send-report`,{
                                  method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${SB_KEY}`,apikey:SB_KEY},
                                  body:JSON.stringify({to:[rq.requester_email],subject:`Visit Confirmed — ${rq.jobs?.name||"Job"} on ${reqDate}`,
                                    html_body:`<div style="font-family:-apple-system,sans-serif;max-width:600px;margin:0 auto;"><div style="background:#22c55e;padding:20px 24px;border-radius:8px 8px 0 0;"><h1 style="color:#fff;margin:0;font-size:20px;">Visit Confirmed</h1></div><div style="background:#f9f9f9;padding:24px;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px;"><p style="color:#333;font-size:16px;line-height:1.6;margin:0 0 8px;">Hi ${rq.requester_name||"there"},</p><p style="color:#333;font-size:15px;line-height:1.6;margin:0 0 16px;">Your scheduling request for <strong>${rq.jobs?.name||"the job"}</strong> has been confirmed by ${inspectorName} for <strong>${reqDate}</strong>.</p><p style="color:#555;font-size:14px;margin:0;">Type: ${rq.inspection_type||"General Visit"}</p></div><p style="color:#999;font-size:11px;text-align:center;margin-top:16px;">Sent via My Daily Reports &bull; mydailyreports.com</p></div>`
                                  })
                                }).catch(emailErr=>console.error("Confirmation email error:",emailErr));
                              }
                              await loadRequests();
                            }catch(er){alert("Error: "+er.message);}}} style={{flex:1,padding:"7px 0",fontSize:12,fontWeight:700,borderRadius:6,background:"#22c55e",border:"none",color:"#fff",cursor:"pointer"}}>
                              ✓ Scheduled
                            </button>
                          )}
                          {rq.status==="confirmed"&&(
                            <button onClick={async(e)=>{e.stopPropagation();try{await db.updateRequest(rq.id,{status:"pending"});await loadRequests();}catch(er){alert("Error: "+er.message);}}} style={{flex:1,padding:"7px 0",fontSize:12,fontWeight:700,borderRadius:6,background:C.org,border:"none",color:"#fff",cursor:"pointer"}}>
                              Unschedule
                            </button>
                          )}
                          <button onClick={async(e)=>{e.stopPropagation();if(!confirm("Delete this request?"))return;try{await db.deleteRequest(rq.id);await loadRequests();}catch(er){alert("Error: "+er.message);}}} style={{padding:"7px 12px",fontSize:12,fontWeight:700,borderRadius:6,background:"transparent",border:`1px solid #ef4444`,color:"#ef4444",cursor:"pointer"}}>
                            Delete
                          </button>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              )}
              {/* Bottom status */}
              {!selCalDay&&(
                <div style={{padding:"12px 16px",borderTop:`1px solid ${C.brd}`}}>
                  {calRequests.length>0?(
                    <div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:4,marginRight:10}}><span style={{width:6,height:6,borderRadius:"50%",background:C.org,display:"inline-block"}}/> Pending</span>
                      <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/> Scheduled</span>
                      <span style={{marginLeft:10}}>· {calRequests.length} request{calRequests.length!==1?"s":""} this month</span>
                    </div>
                  ):hasScheduling?(
                    <div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>No scheduling requests this month. Calendar active for {act.filter(j=>j.scheduling_enabled).length} job{act.filter(j=>j.scheduling_enabled).length!==1?"s":""}.</div>
                  ):(
                    <div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>Enable Jobsite Scheduling on a job to let your GC and subs request site visits through your shared calendar.</div>
                  )}
                </div>
              )}
            </div>
          );
        })()}

        {/* ── Bottom tiles — two column ── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
          <button onClick={()=>setShowArch(true)} style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:14,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,textAlign:"center"}}>
            <div style={{width:40,height:40,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📁</div>
            <div><div style={{fontWeight:600,fontSize:13,color:C.txt}}>Archived Jobs</div>{arch.length>0&&<div style={{fontSize:11,color:C.mut}}>{arch.length} job{arch.length!==1?"s":""}</div>}</div>
          </button>
          <button onClick={()=>setShowTrain(true)} style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:14,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,textAlign:"center"}}>
            <div style={{width:40,height:40,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🎓</div>
            <div><div style={{fontWeight:600,fontSize:13,color:C.txt}}>Training Center</div><div style={{fontSize:11,color:C.mut}}>Guides & tips</div></div>
          </button>
        </div>
      </div>

      <div style={{textAlign:"center",padding:"24px 20px 32px",color:C.mut,fontSize:12}}>
        <a href="#" onClick={e=>{e.preventDefault();setShowFairUse(true);}} style={{color:C.mut,textDecoration:"none"}}>Fair Use Agreement</a>
        <br/><br/>
        <a href="#" onClick={e=>{e.preventDefault();alert("Terms coming soon");}} style={{color:C.mut,textDecoration:"none"}}>Terms of Service</a>
        <span style={{margin:"0 8px"}}>•</span>
        <a href="#" onClick={e=>{e.preventDefault();alert("Privacy coming soon");}} style={{color:C.mut,textDecoration:"none"}}>Privacy Policy</a>
      </div>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [authErr,setAuthErr]=useState("");
  const [booting,setBooting]=useState(true);

  useEffect(()=>{
    devLogin().then(u=>{setUser(u);setBooting(false);}).catch(e=>{setAuthErr(e.message);setBooting(false);});
  },[]);

  if(booting)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <MDRLogo size={64}/>
      <div style={{color:C.mut,fontSize:14}}>Signing in...</div>
    </div>
  );
  if(authErr)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:20}}>
      <MDRLogo size={64}/>
      <div style={{color:C.err,fontSize:14,textAlign:"center",maxWidth:400}}>{authErr}</div>
      <button onClick={()=>window.location.reload()} className="btn-o" style={{padding:"12px 24px",background:C.org,border:"none",borderRadius:8,color:"#fff",fontWeight:700,cursor:"pointer"}}>Retry</button>
    </div>
  );
  if(!user)return null;
  return<Dashboard user={user} onLogout={()=>{AUTH_TOKEN=null;DEV_USER=null;window.location.reload();}}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

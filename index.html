        <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:16}}>📝</span>
            <span style={{fontWeight:700,fontSize:14}}>General Notes</span>
          </div>
          <textarea value={generalNotes} onChange={e=>setGeneralNotes(e.target.value)} placeholder="Tap here and use your keyboard mic to dictate..." rows={3} style={{...fs,resize:"vertical",minHeight:70,lineHeight:1.5}}/>
        </div>

        {/* Safety Notes */}
        <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:16}}>🦺</span>
            <span style={{fontWeight:700,fontSize:14}}>Site Safety Observations</span>
          </div>
          <textarea value={safetyNotes} onChange={e=>setSafetyNotes(e.target.value)} placeholder="Safety observations, incidents, precautions..." rows={3} style={{...fs,resize:"vertical",minHeight:70,lineHeight:1.5}}/>
        </div>

      </div>

      {/* Hidden photo input */}
      <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhotoUpload}/>

      {/* Toast */}
      {toast&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:C.card,border:`1px solid ${C.ok}`,borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600,color:C.ok,zIndex:9999}}>{toast}</div>}

      {/* Post-submit overlay */}
      {submitSuccess&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:16,padding:24,maxWidth:400,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>✅</div>
            <div style={{fontSize:18,fontWeight:700,color:C.txt,marginBottom:6}}>Report Submitted</div>
            <div style={{fontSize:13,color:C.mut,marginBottom:20}}>{submitSuccess.pdfFilename}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <button onClick={downloadPdf} style={{width:"100%",padding:"14px 0",background:C.blu,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Download / Share PDF
              </button>
              <button onClick={emailToTeam} disabled={emailing} style={{width:"100%",padding:"14px 0",background:C.org,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:emailing?"default":"pointer",opacity:emailing?0.7:1}}>
                {emailing?"Sending...":"Email to Project Team"}
              </button>
              <button onClick={()=>{setSubmitSuccess(null);onBack();}} style={{width:"100%",padding:"12px 0",background:"transparent",border:`1px solid ${C.brd}`,borderRadius:10,color:C.mut,fontSize:14,fontWeight:600,cursor:"pointer"}}>
                Done
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Bottom bar */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"10px 20px",borderTop:`1px solid ${C.brd}`,background:C.card,zIndex:100}}>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <button onClick={()=>{saveWorking();onBack();}} style={{flex:1,padding:"12px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:14,fontWeight:700,cursor:"pointer"}}>
            Save & Close
          </button>
          <button onClick={viewWorkLog} disabled={viewLoading||submitting||contractors.length===0} style={{flex:1,padding:"12px 0",background:"transparent",border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:14,fontWeight:700,cursor:viewLoading?"default":"pointer",opacity:viewLoading?0.6:1}}>
            {viewLoading?"Loading...":"View Report"}
          </button>
        </div>
        <button onClick={submitWorkLog} disabled={submitting||contractors.length===0} style={{width:"100%",padding:"12px 0",background:contractors.length>0?C.org:C.brd,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:contractors.length>0&&!submitting?"pointer":"default",opacity:submitting?0.7:1}}>
          {submitting?"Generating PDF...":"Submit Report"}
        </button>
      </div>
    </div>
  );
}

/* ── Report Editor ── */
function ReportEditor({job, user, onBack, reportDate}){
  const fc=job.field_config||{editable:[],locked:[]};
  // Deduplicate notes-like fields from existing configs (fix for old jobs with duplicates)
  const NOTES_KW=["notes","observations","comments"];
  const isNotes=(n)=>NOTES_KW.some(k=>(n||"").toLowerCase().includes(k));
  const dedupNotes=(arr)=>{let found=false;return(arr||[]).filter(f=>{if(!isNotes(f.name))return true;if(found)return false;found=true;return true;});};
  const rawEdit=dedupNotes([...(fc.editable||[])]);
  const editHasNotes=rawEdit.some(f=>isNotes(f.name));
  const initEdit=rawEdit;
  // If editable already has a notes field, remove any notes from locked too
  const initLock=editHasNotes?[...(fc.locked||[])].filter(f=>!isNotes(f.name)):dedupNotes([...(fc.locked||[])]);
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  // Use reportDate if editing a specific past date, otherwise always compute fresh "today"
  const getTodayISO=()=>reportDate||new Date().toLocaleDateString("en-CA",{timeZone:tz});
  const todayISO=getTodayISO();
  const todayDisplay=new Date(todayISO+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric",timeZone:tz});

  // Mutable field lists — locked fields can be unlocked/relocked
  const [lockFields,setLockFields]=useState(initLock);
  const [editFields,setEditFields]=useState(initEdit);
  const [showLocked,setShowLocked]=useState(false);
  const [lockEditing,setLockEditing]=useState(false);
  const [lockVals,setLockVals]=useState(()=>{const v={};initLock.forEach(f=>{v[f.name]=f.value||"";});return v;});
  const [loadingDraft,setLoadingDraft]=useState(true);
  const [draftId,setDraftId]=useState(null);

  // Smart date formatter — matches the format from the original template value
  const formatAutoDate=(originalVal)=>{
    const now=new Date();
    const orig=(originalVal||"").trim();
    // "04 February 2026" or "4 February 2026" → day month year (long)
    if(/^\d{1,2}\s+[A-Za-z]+\s+\d{4}$/.test(orig)){
      const padDay=orig.startsWith("0");
      return now.toLocaleDateString("en-US",{day:padDay?"2-digit":"numeric",month:"long",year:"numeric",timeZone:tz}).replace(/^(\w+)\s(\d+),\s(\d+)$/,(_,m,d,y)=>`${padDay?d.padStart(2,"0"):d} ${m} ${y}`);
    }
    // "February 04, 2026" → month day, year
    if(/^[A-Za-z]+\s+\d{1,2},?\s+\d{4}$/.test(orig))return now.toLocaleDateString("en-US",{month:"long",day:"2-digit",year:"numeric",timeZone:tz});
    // "Feb 04, 2026" → short month
    if(/^[A-Za-z]{3}\s+\d{1,2},?\s+\d{4}$/.test(orig))return now.toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric",timeZone:tz});
    // "2026-02-04" → ISO
    if(/^\d{4}-\d{2}-\d{2}$/.test(orig))return now.toLocaleDateString("en-CA",{timeZone:tz});
    // Default: "3/7/2026" US short
    return now.toLocaleDateString("en-US",{timeZone:tz});
  };

  // Editable field values
  const [vals,setVals]=useState(()=>{
    const v={};
    initEdit.forEach(f=>{
      if(f.autoFill==="date")v[f.name]=formatAutoDate(f.originalValue||f.value);
      else if(f.autoFill==="increment")v[f.name]="";
      else if(f.autoFill==="name")v[f.name]=window._mdrUserName||f.value||"";
      else v[f.name]=f.value||"";
    });
    return v;
  });
  const [saving,setSaving]=useState(false);

  // Photo state
  const [photos,setPhotos]=useState([]);
  const [photoLayout,setPhotoLayout]=useState("2"); // "1","2","4"
  const photoRef=useRef(null);

  const [reportStatus,setReportStatus]=useState(null);
  // Load existing report on mount (works for both working_copy and submitted)
  useEffect(()=>{
    (async()=>{
      try{
        const rpt=await db.getReport(job.id,todayISO);
        if(rpt){
          setReportStatus(rpt.status);
          setDraftId(rpt.id);
          if(rpt.content){
            const c=typeof rpt.content==="string"?JSON.parse(rpt.content):rpt.content;
            if(c.vals){
              // Merge saved values but re-apply today's date for auto-date fields (matching original format)
              const merged={...c.vals};
              initEdit.forEach(f=>{if(f.autoFill==="date")merged[f.name]=formatAutoDate(f.originalValue||f.value);if(f.autoFill==="name"&&window._mdrUserName)merged[f.name]=window._mdrUserName;});
              setVals(p=>({...p,...merged}));
            }
            if(c.lockVals)setLockVals(p=>({...p,...c.lockVals}));
            if(c.photos)setPhotos(c.photos);
            if(c.photoLayout)setPhotoLayout(c.photoLayout);
            // Apply notes dedup to restored fields (fixes old drafts saved with duplicates)
            if(c.lockFields){const editHasN=(c.editFields||initEdit).some(f=>isNotes(f.name));setLockFields(editHasN?c.lockFields.filter(f=>!isNotes(f.name)):dedupNotes(c.lockFields));}
            if(c.editFields)setEditFields(dedupNotes(c.editFields));
          }
        }
      }catch(e){console.error("Load report error:",e);}
      finally{setLoadingDraft(false);}
    })();
  },[]);

  const setVal=(name,val)=>setVals(p=>({...p,[name]:val}));
  const setLockVal=(name,val)=>setLockVals(p=>({...p,[name]:val}));

  // Permanently unlock a locked field — moves it to editable
  const unlockField=(name)=>{
    const f=lockFields.find(x=>x.name===name);
    if(!f)return;
    const newLock=lockFields.filter(x=>x.name!==name);
    const newEdit=[...editFields,{name:f.name,value:lockVals[name]||f.value||"",voiceEnabled:false,wasUnlocked:true}];
    setLockFields(newLock);
    setEditFields(newEdit);
    setVals(p=>({...p,[name]:lockVals[name]||f.value||""}));
    // Persist field config change to Supabase
    db.updateJobFieldConfig(job.id,{locked:newLock,editable:newEdit}).then(()=>{
      job.field_config={locked:newLock,editable:newEdit};
    }).catch(e=>console.error("Field config update error:",e));
  };

  // Re-lock an editable field that was previously unlocked
  const relockField=(name)=>{
    const f=editFields.find(x=>x.name===name);
    if(!f)return;
    const val=vals[name]||f.value||"";
    const newEdit=editFields.filter(x=>x.name!==name);
    const restored={name:f.name,value:val};
    const newLock=[...lockFields,restored];
    setEditFields(newEdit);
    setLockFields(newLock);
    setLockVals(p=>({...p,[name]:val}));
    // Remove from editable vals
    setVals(p=>{const n={...p};delete n[name];return n;});
    // Persist field config change to Supabase
    db.updateJobFieldConfig(job.id,{locked:newLock,editable:newEdit}).then(()=>{
      job.field_config={locked:newLock,editable:newEdit};
    }).catch(e=>console.error("Field config update error:",e));
  };

  // Save locked field value changes back to job config
  const saveLockEdits=()=>{
    const updated=lockFields.map(f=>({...f,value:lockVals[f.name]||f.value}));
    setLockFields(updated);
    setLockEditing(false);
    // Persist lock value changes to Supabase
    const newConfig={locked:updated,editable:editFields};
    db.updateJobFieldConfig(job.id,newConfig).then(()=>{
      job.field_config=newConfig;
    }).catch(e=>console.error("Field config update error:",e));
  };

  const handlePhoto=(e)=>{
    const files=Array.from(e.target.files||[]);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{setPhotos(p=>[...p,{id:Date.now()+Math.random(),src:ev.target.result,name:file.name}]);};
      reader.readAsDataURL(file);
    });
    // Reset input so same file can be re-selected
    if(photoRef.current)photoRef.current.value="";
  };

  const saveWorking=async()=>{
    setSaving(true);
    try{
      // Always use fresh date (not stale closure if app was open overnight)
      const saveDate=reportDate||new Date().toLocaleDateString("en-CA",{timeZone:tz});
      const content={vals,lockVals,photos,photoLayout,lockFields,editFields};
      await db.saveReport({
        job_id:job.id,
        user_id:user.id,
        report_date:saveDate,
        status:"working_copy",
        content:JSON.stringify(content),
        updated_at:new Date().toISOString()
      });
      onBack();
    }catch(e){
      console.error("Save error:",e);
      alert("Save failed: "+e.message);
      setSaving(false);
    }
  };

  const [submitting,setSubmitting]=useState(false);
  const [viewLoading,setViewLoading]=useState(false);
  const [viewingReport,setViewingReport]=useState(null); // array of page image data URLs
  const [viewDocxHtml,setViewDocxHtml]=useState(null); // HTML string for DOCX preview
  const [submitSuccess,setSubmitSuccess]=useState(null); // {pdfBlob, pdfFilename, teamEmails} after submit
  const [toast,setToast]=useState("");

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  // Shared: build editable field values only — locked fields are already on the template
  const buildEditableFields=()=>editFields.map(f=>({...f,val:vals[f.name]||""}));

  // Shared: draw fields onto a canvas context (for View Report preview)
  const drawFieldsOnCanvas=(ctx,fields,pageNum,scale,pageH)=>{
    fields.filter(f=>(f.page||1)===pageNum&&f.val&&f.x!=null&&f.y!=null).forEach(f=>{
      const isAutoField=f.autoFill==="date"||f.autoFill==="increment";
      if(!isAutoField&&f.originalValue&&f.val===f.originalValue)return;
      const sz=(f.fontSize||10)*scale;
      ctx.font=sz+"px Helvetica, Arial, sans-serif";
      const drawX=f.x*scale;
      const drawY=f.y*scale+sz;
      // Draw white bg to cover any old template text before writing new value
      if(f.w){
        ctx.fillStyle="#ffffff";
        ctx.fillRect(drawX-1,f.y*scale-1,(f.w||120)*scale+2,(f.h||sz)*scale+2);
      }
      ctx.fillStyle="#000000";
      if(f.multiline&&f.w){
        const maxW=f.w*scale;
        const bullet="\u2022 ";
        const bulletW=ctx.measureText(bullet).width;
        // Split on newlines first, then word-wrap each line
        const rawLines=f.val.split(/\n/).filter(l=>l.trim());
        const lines=[];
        rawLines.forEach(rl=>{
          const hasBullet=rawLines.length>1;
          const prefix=hasBullet?bullet:"";
          const indent=hasBullet?bulletW:0;
          const lineMaxW=maxW-indent;
          const words=rl.trim().split(" ");let cur=prefix;
          words.forEach(w=>{const test=cur?cur+(cur===prefix?"":" ")+w:prefix+w;if(ctx.measureText(test).width>maxW&&cur!==prefix){lines.push(cur);cur=new Array(Math.ceil(indent/ctx.measureText(" ").width)+1).join(" ")+w;}else cur=test;});
          if(cur)lines.push(cur);
        });
        lines.forEach((ln,li)=>{ctx.fillText(ln,drawX,drawY+(li*sz*1.3));});
      }else{
        ctx.fillText(String(f.val),drawX,drawY);
      }
    });
  };

  // View Report — renders original template with pdf.js, overlays field values + notes on canvas
  const viewReport=async()=>{
    setViewLoading(true);
    try{
      const tplRecord=await db.getTemplate(job.id);
      // No template at all — show error
      if(!tplRecord||!tplRecord.storage_path){
        throw new Error("No template found. Upload a template in Job Settings first.");
      }
      // DOCX template — call generate-docx to fill it, then render with mammoth
      const isDocx=tplRecord.file_type&&tplRecord.file_type!=="pdf";
      if(isDocx){
        const allFields=buildEditableFields();
        const fieldValues={};
        allFields.forEach(f=>{if(f.val)fieldValues[f.name]=f.val;});
        // Download template
        let dlResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{
          headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}
        });
        if(dlResp.status===401||dlResp.status===403){
          const refreshed=await authGetSession();
          if(refreshed){dlResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}});}
        }
        if(!dlResp.ok)throw new Error("Could not download template ("+dlResp.status+").");
        const tplBytes=new Uint8Array(await dlResp.arrayBuffer());
        const tplChunks=[];for(let i=0;i<tplBytes.length;i+=8192)tplChunks.push(String.fromCharCode.apply(null,tplBytes.subarray(i,i+8192)));
        const tplB64=btoa(tplChunks.join(""));
        // Call generate-docx to fill template with field values
        const genResp=await fetch(`${SB_URL}/functions/v1/generate-docx`,{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY},
          body:JSON.stringify({docx_base64:tplB64,field_values:fieldValues})
        });
        if(!genResp.ok)throw new Error("Generate preview failed: "+(await genResp.text()));
        const genData=await genResp.json();
        if(genData.error)throw new Error(genData.error);
        // Decode filled DOCX and render with mammoth
        const filledBytes=Uint8Array.from(atob(genData.docx_base64),c=>c.charCodeAt(0));
        if(window.mammoth){
          const result=await window.mammoth.convertToHtml({arrayBuffer:filledBytes.buffer});
          setViewDocxHtml(result.value);
          setViewingReport(["__docx_html__"]);
        }else{
          throw new Error("Document preview library not loaded. Please reload the app.");
        }
        setViewLoading(false);
        return;
      }
      let tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{
        headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}
      });
      // If auth fails, try refreshing the session and retry once
      if(tplResp.status===401||tplResp.status===403){
        const refreshed=await authGetSession();
        if(refreshed){tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}});}
      }
      if(!tplResp.ok)throw new Error("Could not download template ("+tplResp.status+"). Try signing out and back in.");
      const tplBytes=await tplResp.arrayBuffer();
      // Validate PDF magic bytes
      const header=new Uint8Array(tplBytes.slice(0,5));
      const headerStr=String.fromCharCode(...header);
      if(!headerStr.startsWith("%PDF")){
        throw new Error("Template file is not a valid PDF. Please re-upload a PDF template.");
      }
      if(!window.pdfjsLib)throw new Error("PDF viewer not loaded.");
      const allFields=buildEditableFields();
      const pjDoc=await window.pdfjsLib.getDocument({data:tplBytes}).promise;
      const previewPages=[];
      const scale=2;
      for(let pi=1;pi<=pjDoc.numPages;pi++){
        const pg=await pjDoc.getPage(pi);
        const vp=pg.getViewport({scale});
        const cvs=document.createElement("canvas");cvs.width=vp.width;cvs.height=vp.height;
        const ctx=cvs.getContext("2d");
        await pg.render({canvasContext:ctx,viewport:vp}).promise;
        // Draw field values on this page
        const pageH=pg.getViewport({scale:1}).height;
        drawFieldsOnCanvas(ctx,allFields,pi,scale,pageH);
        previewPages.push(cvs.toDataURL("image/jpeg",0.92));
        cvs.width=0;cvs.height=0;
      }
      // Render photos as additional preview pages — paginate to match PDF output
      if(photos.length>0){
        const perPage=photoLayout==="1"?1:photoLayout==="2"?2:4;
        const pgW=612*scale;const pgH=792*scale;
        const bodyW=(612-72)*scale;
        const usableHP=pgH-80*scale;
        // Pre-load all images to get real dimensions
        const loaded=[];
        for(let i=0;i<photos.length;i++){
          try{
            const src=photos[i].src||photos[i];
            const im=new Image();
            await new Promise((res,rej)=>{im.onload=res;im.onerror=rej;im.src=src;});
            loaded.push({im,ratio:im.naturalWidth/im.naturalHeight,isLandscape:im.naturalWidth>=im.naturalHeight});
          }catch(e){loaded.push(null);}
        }
        const validPhotos=loaded.filter(Boolean);
        const newPhotoPage=()=>{
          const cvs=document.createElement("canvas");cvs.width=pgW;cvs.height=pgH;
          const ctx=cvs.getContext("2d");
          ctx.fillStyle="#ffffff";ctx.fillRect(0,0,pgW,pgH);
          ctx.fillStyle="#666666";ctx.font=(12*scale)+"px Helvetica, Arial, sans-serif";
          ctx.fillText("Photos — "+job.name,36*scale,40*scale);
          return {cvs,ctx};
        };
        const drawPhoto=(ctx,p,x,y,maxW,maxH)=>{
          const {im,ratio}=p;
          let imgW,imgH;
          if(ratio>=1){imgW=Math.min(maxW,maxH*ratio);imgH=imgW/ratio;}
          else{imgH=Math.min(maxH,maxW/ratio);imgW=imgH*ratio;}
          ctx.drawImage(im,x+(maxW-imgW)/2,y+(maxH-imgH)/2,imgW,imgH);
        };
        let idx=0;
        while(idx<validPhotos.length){
          if(photoLayout==="1"){
            const {cvs,ctx}=newPhotoPage();
            drawPhoto(ctx,validPhotos[idx],(pgW-Math.min(bodyW,380*scale))/2,60*scale,Math.min(bodyW,380*scale),usableHP-20*scale);
            previewPages.push(cvs.toDataURL("image/jpeg",0.92));cvs.width=0;cvs.height=0;
            idx++;
          }else if(photoLayout==="2"){
            const pair=[validPhotos[idx]];
            if(idx+1<validPhotos.length)pair.push(validPhotos[idx+1]);
            const {cvs,ctx}=newPhotoPage();
            if(pair.length===1){
              drawPhoto(ctx,pair[0],(pgW-Math.min(bodyW,380*scale))/2,60*scale,Math.min(bodyW,380*scale),usableHP-20*scale);
            }else{
              const bothPortrait=!pair[0].isLandscape&&!pair[1].isLandscape;
              if(bothPortrait){
                const colW=(bodyW-12*scale)/2;
                pair.forEach((p,s)=>{
                  drawPhoto(ctx,p,36*scale+s*(colW+12*scale),60*scale,colW,usableHP-20*scale);
                });
              }else{
                const rowH=(usableHP-20*scale-12*scale)/2;
                pair.forEach((p,r)=>{
                  drawPhoto(ctx,p,(pgW-bodyW)/2,60*scale+r*(rowH+12*scale),bodyW,rowH);
                });
              }
            }
            previewPages.push(cvs.toDataURL("image/jpeg",0.92));cvs.width=0;cvs.height=0;
            idx+=pair.length;
          }else{
            // 4 per page — 2x2 grid
            const chunk=validPhotos.slice(idx,idx+4);
            const {cvs,ctx}=newPhotoPage();
            const slotW=(bodyW-12*scale)/2;const slotH=(usableHP-20*scale-12*scale)/2;
            chunk.forEach((p,ci)=>{
              const col=ci%2;const row=Math.floor(ci/2);
              drawPhoto(ctx,p,36*scale+col*(slotW+12*scale),60*scale+row*(slotH+12*scale),slotW,slotH);
            });
            previewPages.push(cvs.toDataURL("image/jpeg",0.92));cvs.width=0;cvs.height=0;
            idx+=chunk.length;
          }
        }
      }
      setViewingReport(previewPages);
    }catch(e){
      console.error("View report error:",e);
      showToast("Error: "+e.message);
    }finally{setViewLoading(false);}
  };

  // Submit Report — generates filled PDF with pdf-lib, uploads, emails, all in one step
  const submitReport=async()=>{
    setSubmitting(true);
    // Always use fresh current date at submit time (not stale closure value)
    const submitDate=reportDate||new Date().toLocaleDateString("en-CA",{timeZone:tz});
    try{
      const {PDFDocument,rgb,StandardFonts}=PDFLib;

      // ── 1. Look up template ──
      const tplRecord=await db.getTemplate(job.id);
      if(!tplRecord||!tplRecord.storage_path)throw new Error("No template found. Upload a template in Job Settings first.");
      let tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{
        headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}
      });
      if(tplResp.status===401||tplResp.status===403){
        const refreshed=await authGetSession();
        if(refreshed){tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}});}
      }
      if(!tplResp.ok)throw new Error("Could not download template ("+tplResp.status+"). Try signing out and back in.");
      const tplBytes=await tplResp.arrayBuffer();
      const isPdfTemplate=tplRecord.file_type==="pdf";
      const isDocxTemplate=tplRecord.file_type==="docx"||tplRecord.file_type==="doc";

      // ── DOCX path: send to edge function for XML editing ──
      if(isDocxTemplate){
        const allFields=buildEditableFields();
        const fieldValues={};
        allFields.forEach(f=>{if(f.val)fieldValues[f.name]=f.val;});
        // Convert template to base64
        const tplUint8=new Uint8Array(tplBytes);
        const tplChunks=[];for(let i=0;i<tplUint8.length;i+=8192)tplChunks.push(String.fromCharCode.apply(null,tplUint8.subarray(i,i+8192)));
        const tplB64=btoa(tplChunks.join(""));
        // Call generate-docx edge function
        const genResp=await fetch(`${SB_URL}/functions/v1/generate-docx`,{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY},
          body:JSON.stringify({docx_base64:tplB64,field_values:fieldValues})
        });
        if(!genResp.ok)throw new Error("Generate DOCX failed: "+(await genResp.text()));
        const genData=await genResp.json();
        if(genData.error)throw new Error(genData.error);
        // Decode the returned filled DOCX
        const filledBytes=Uint8Array.from(atob(genData.docx_base64),c=>c.charCodeAt(0));
        const docxBlob=new Blob([filledBytes],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
        const chunks=[];for(let i=0;i<filledBytes.length;i+=8192)chunks.push(String.fromCharCode.apply(null,filledBytes.subarray(i,i+8192)));
        const docxBase64=btoa(chunks.join(""));
        // Build filename (same logic as PDF path)
        let rptNumber=1;
        try{const cntR=await fetch(`${SB_URL}/rest/v1/reports?select=report_number&job_id=eq.${job.id}&order=report_number.desc&limit=1`,{headers:db._h()});const topR=cntR.ok?await cntR.json():[];if(topR[0]?.report_number){rptNumber=topR[0].report_number+1;}else{const countR=await fetch(`${SB_URL}/rest/v1/reports?select=id&job_id=eq.${job.id}&limit=0`,{headers:{...db._h(),Prefer:"count=exact"}});const total=parseInt(countR.headers.get("content-range")?.split("/")[1]||"0");rptNumber=total+1;}}catch(e){}
        if(draftId){try{const exR=await fetch(`${SB_URL}/rest/v1/reports?select=report_number,report_date&id=eq.${draftId}`,{headers:db._h()});const exD=exR.ok?await exR.json():[];if(exD[0]?.report_number&&exD[0]?.report_date===submitDate)rptNumber=exD[0].report_number;}catch(e){}}
        const conv=job.field_config?.filenameConvention||{};
        const padding=conv.numberPadding||0;
        const rptNum=padding>0?String(rptNumber).padStart(padding,"0"):String(rptNumber);
        const now=new Date();
        const fmtMM=now.toLocaleDateString("en-US",{month:"2-digit",timeZone:tz});
        const fmtDD=now.toLocaleDateString("en-US",{day:"2-digit",timeZone:tz});
        const fmtYYYY=now.toLocaleDateString("en-US",{year:"numeric",timeZone:tz});
        const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
        const monNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const monthIdx=now.toLocaleDateString("en-US",{month:"numeric",timeZone:tz})-1;
        const fmtMonth=monthNames[monthIdx]||"";const fmtMon=monNames[monthIdx]||"";
        const formatDate=(fmt)=>{
          if(!fmt)return"";
          if(/MM|DD|YYYY|Month|Mon/.test(fmt))return fmt.replace(/YYYY/g,fmtYYYY).replace(/MM/g,fmtMM).replace(/DD/g,fmtDD).replace(/Month/g,fmtMonth).replace(/Mon/g,fmtMon);
          const f=fmt.trim();
          if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(f))return now.toLocaleDateString("en-US",{timeZone:tz});
          if(/^\d{4}-\d{2}-\d{2}$/.test(f))return now.toLocaleDateString("en-CA",{timeZone:tz});
          if(/^[A-Za-z]{3}\s+\d{1,2},?\s+\d{4}$/.test(f))return now.toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric",timeZone:tz});
          if(/^[A-Za-z]+\s+\d{1,2},?\s+\d{4}$/.test(f))return now.toLocaleDateString("en-US",{month:"long",day:"2-digit",year:"numeric",timeZone:tz});
          if(/^\d{1,2}\s+[A-Za-z]+\s+\d{4}$/.test(f)){const pd=f.startsWith("0");return now.toLocaleDateString("en-US",{day:pd?"2-digit":"numeric",month:"long",year:"numeric",timeZone:tz}).replace(/^(\w+)\s(\d+),\s(\d+)$/,(_,m,d,y)=>`${pd?d.padStart(2,"0"):d} ${m} ${y}`);}
          if(/^[A-Za-z]{3}\s+\d{1,2}$/.test(f))return fmtMon+" "+fmtDD.replace(/^0/,"");
          if(/^\d{2}-\d{2}-\d{4}$/.test(f))return fmtMM+"-"+fmtDD+"-"+fmtYYYY;
          return now.toLocaleDateString("en-US",{timeZone:tz});
        };
        const fnPattern=conv.pattern||job.report_filename_pattern||job.name||"Report";
        let baseName=fnPattern.replace(/\.[^.]+$/,"");
        baseName=baseName.replace(/\{report_number\}/g,rptNum);
        baseName=baseName.replace(/\{date\}/g,formatDate(conv.dateFormat));
        baseName=baseName.replace(/\{year\}/g,fmtYYYY);
        const docxFilename=baseName+".docx";
        // Save report
        const vals={};const lockVals={};
        allFields.forEach(f=>{if(f.autoFill||f.mode==="edit")vals[f.name]=f.val;else lockVals[f.name]=f.val;});
        const reportContent={vals,lockVals,photos:[],photoLayout:"1",lockFields:[],editFields:allFields};
        await db.saveReport({job_id:job.id,user_id:user.id,report_date:submitDate,status:"submitted",content:JSON.stringify(reportContent),updated_at:new Date().toISOString()});
        const storagePath=`${user.id}/${job.id}/reports/${docxFilename}`;
        let upR=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
          method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/octet-stream"},body:docxBlob
        });
        if(!upR.ok){await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
          method:"PUT",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/octet-stream"},body:docxBlob
        });}
        const userName=user.user_metadata?.full_name||user.email?.split("@")[0]||"Inspector";
        const emailHtml=`<div style="font-family:-apple-system,sans-serif;max-width:600px;"><div style="background:#e8742a;padding:20px 24px;border-radius:8px 8px 0 0;"><h1 style="color:#fff;margin:0;font-size:20px;">My Daily Reports</h1></div><div style="background:#f9f9f9;padding:24px;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px;"><p style="color:#333;font-size:16px;">${userName} has submitted the daily report for <strong>${job.name}</strong> on ${todayDisplay}.</p><p style="color:#555;font-size:14px;">The filled DOCX report is attached.</p></div></div>`;
        const rawTeam=job.team_emails||[];
        const teamEmails=rawTeam.map(m=>typeof m==="string"?m:m.email).filter(Boolean);
        setSubmitSuccess({pdfBlob:docxBlob,pdfFilename:docxFilename,pdfBase64:docxBase64,emailHtml,teamEmails,jobName:job.name,todayDisplay,userName});
        setSubmitting(false);
        return;
      }

      // ── 2. Load template — use copyPages to preserve original visual content ──
      let pdfDoc;let srcDoc=null;
      if(isPdfTemplate){
        srcDoc=await PDFDocument.load(tplBytes,{ignoreEncryption:true});
        pdfDoc=await PDFDocument.create();
        const copiedPages=await pdfDoc.copyPages(srcDoc,srcDoc.getPageIndices());
        copiedPages.forEach(p=>pdfDoc.addPage(p));
      }else{
        pdfDoc=await PDFDocument.create();pdfDoc.addPage([612,792]);
      }
      const font=await pdfDoc.embedFont(StandardFonts.Helvetica);
      const pages=pdfDoc.getPages();

      // ── 3. Build field values ──
      const allFields=buildEditableFields();

      // ── 4. Draw field values onto template ──
      // Skip drawing any value that matches the original template value — copyPages already has it
      allFields.forEach(f=>{
        if(f.x==null||f.y==null||!f.val)return;
        // If value hasn't changed from what's already baked into the PDF, don't redraw it
        // Always redraw auto-date and auto-increment fields (they change every report)
        const isAutoField=f.autoFill==="date"||f.autoFill==="increment";
        if(!isAutoField&&f.originalValue&&f.val===f.originalValue)return;
        const pageIdx=(f.page||1)-1;
        if(pageIdx<0||pageIdx>=pages.length)return;
        const page=pages[pageIdx];const pageH=page.getHeight();
        const sz=f.fontSize||10;const pdfY=pageH-f.y-sz;
        // Cover old template text with white rectangle before writing new value
        if(f.w){
          page.drawRectangle({x:f.x-1,y:pdfY-2,width:(f.w||120)+2,height:(f.h||sz+4),color:rgb(1,1,1)});
        }
        if(f.multiline&&f.w){
          const maxW=f.w;
          const bullet="\u2022 ";
          const bulletW=font.widthOfTextAtSize(bullet,sz);
          // Split on newlines first, then word-wrap each line with bullets
          const rawLines=f.val.split(/\n/).filter(l=>l.trim());
          const lines=[];
          rawLines.forEach(rl=>{
            const hasBullet=rawLines.length>1;
            const prefix=hasBullet?bullet:"";
            const indent=hasBullet?bulletW:0;
            const words=rl.trim().split(" ");let cur=prefix;
            words.forEach(w=>{const test=cur?cur+(cur===prefix?"":" ")+w:prefix+w;const tw=font.widthOfTextAtSize(test,sz);if(tw>maxW&&cur!==prefix){lines.push(cur);cur=" ".repeat(Math.ceil(indent/font.widthOfTextAtSize(" ",sz)))+w;}else cur=test;});
            if(cur)lines.push(cur);
          });
          lines.forEach((ln,i)=>{const ly=pdfY-(i*sz*1.3);if(ly>0)page.drawText(ln,{x:f.x,y:ly,size:sz,font,color:rgb(0,0,0)});});
        }else{
          page.drawText(String(f.val),{x:f.x,y:pdfY,size:sz,font,color:rgb(0,0,0)});
        }
      });

      // ── 5. Remove empty trailing pages (no fields reference them) before adding photos ──
      if(photos.length>0&&srcDoc&&pdfDoc.getPageCount()>1){
        const maxFieldPage=Math.max(...allFields.map(f=>f.page||1),1);
        for(let p=pdfDoc.getPageCount();p>maxFieldPage;p--){pdfDoc.removePage(p-1);}
      }

      // ── 6. Photos on new pages — embed header/footer clips from template onto blank pages ──
      // photoLayout: "1"=1 per page, "2"=2 per page (1 col, 2 rows), "4"=4 per page (2 cols, 2 rows)
      if(photos.length>0){
        const pageW=pages.length>0?pages[0].getWidth():612;
        const pageH=pages.length>0?pages[0].getHeight():792;
        // Determine where header ends and footer starts from field positions (top-left coords)
        const p1Fields=allFields.filter(f=>f.y!=null&&(f.page||1)===1);
        let headerBottomTL=80,footerTopTL=pageH-40; // defaults in top-left coords
        if(p1Fields.length>0){
          headerBottomTL=Math.max(Math.min(...p1Fields.map(f=>f.y))-5,0);
          footerTopTL=Math.min(Math.max(...p1Fields.map(f=>f.y+(f.h||12)))+5,pageH);
        }
        // Convert to PDF coords (bottom-left origin)
        const headerBottomPDF=pageH-headerBottomTL; // PDF y where header ends
        const footerTopPDF=pageH-footerTopTL; // PDF y where footer starts

        // Embed header and footer as clipped regions from the template's first page
        let headerEmbed=null,footerEmbed=null;
        const headerH=pageH-headerBottomPDF>10?(pageH-headerBottomPDF):0;
        const footerH=footerTopPDF>10?footerTopPDF:0;
        if(srcDoc&&headerH>0){
          const srcPage=srcDoc.getPage(0);
          headerEmbed=await pdfDoc.embedPage(srcPage,{left:0,right:pageW,bottom:headerBottomPDF,top:pageH});
        }
        if(srcDoc&&footerH>0){
          const srcPage=srcDoc.getPage(0);
          footerEmbed=await pdfDoc.embedPage(srcPage,{left:0,right:pageW,bottom:0,top:footerTopPDF});
        }

        // Photo area = between header and footer
        const photoAreaTop=headerBottomPDF-5;
        const photoAreaBottom=footerTopPDF+5;
        const usableH=photoAreaTop-photoAreaBottom;

        // Embed all photos first so we know their dimensions
        const embeddedPhotos=[];
        for(let i=0;i<photos.length;i++){
          try{
            const imgData=photos[i].src||photos[i];
            let img;
            if(typeof imgData==="string"&&imgData.startsWith("data:image/png"))img=await pdfDoc.embedPng(imgData);
            else if(typeof imgData==="string")img=await pdfDoc.embedJpg(imgData);
            if(img)embeddedPhotos.push({img,ratio:img.width/img.height,isLandscape:img.width>=img.height});
          }catch(imgErr){console.error("Photo embed error:",imgErr);}
        }

        const perPage=photoLayout==="1"?1:photoLayout==="2"?2:4;
        const bodyW=pageW-72;

        const addPhotoPage=()=>{
          const np=pdfDoc.addPage([pageW,pageH]);
          if(headerEmbed)np.drawPage(headerEmbed,{x:0,y:headerBottomPDF,width:pageW,height:headerH});
          if(footerEmbed)np.drawPage(footerEmbed,{x:0,y:0,width:pageW,height:footerTopPDF});
          return np;
        };

        for(let i=0;i<embeddedPhotos.length;){
          if(photoLayout==="1"){
            // 1 per page — centered
            const pg=addPhotoPage();
            const {img,ratio}=embeddedPhotos[i];
            const maxW=Math.min(bodyW,380);const maxH=usableH-20;
            let imgW,imgH;
            if(ratio>=1){imgW=Math.min(maxW,maxH*ratio);imgH=imgW/ratio;}
            else{imgH=Math.min(maxH,maxW/ratio);imgW=imgH*ratio;}
            pg.drawImage(img,{x:(pageW-imgW)/2,y:photoAreaTop-10-imgH+(usableH-20-imgH)/2,width:imgW,height:imgH});
            i++;
          }else if(photoLayout==="2"){
            // Smart 2-per-page: detect orientation for layout
            const pair=[embeddedPhotos[i]];
            if(i+1<embeddedPhotos.length)pair.push(embeddedPhotos[i+1]);
            const pg=addPhotoPage();
            if(pair.length===1){
              // Single remaining photo — center it
              const {img,ratio}=pair[0];
              const maxW=Math.min(bodyW,380);const maxH=usableH-20;
              let imgW,imgH;
              if(ratio>=1){imgW=Math.min(maxW,maxH*ratio);imgH=imgW/ratio;}
              else{imgH=Math.min(maxH,maxW/ratio);imgW=imgH*ratio;}
              pg.drawImage(img,{x:(pageW-imgW)/2,y:photoAreaTop-10-imgH+(usableH-20-imgH)/2,width:imgW,height:imgH});
            }else{
              // Both portrait → side by side (2 columns, 1 row)
              // Either landscape → stacked vertically (1 column, 2 rows)
              const bothPortrait=!pair[0].isLandscape&&!pair[1].isLandscape;
              if(bothPortrait){
                const colW=(bodyW-12)/2;const slotH=usableH-20;
                pair.forEach((p,s)=>{
                  const {img,ratio}=p;
                  let imgW,imgH;
                  if(ratio>=1){imgW=Math.min(colW,slotH*ratio);imgH=imgW/ratio;}
                  else{imgH=Math.min(slotH,colW/ratio);imgW=imgH*ratio;}
                  const slotX=36+s*(colW+12);
                  const xPos=slotX+(colW-imgW)/2;
                  const yPos=photoAreaTop-10-imgH+(slotH-imgH)/2;
                  pg.drawImage(img,{x:xPos,y:Math.max(yPos,photoAreaBottom),width:imgW,height:imgH});
                });
              }else{
                // Stacked vertically — 2 rows
                const rowH=(usableH-20-12)/2;
                pair.forEach((p,r)=>{
                  const {img,ratio}=p;
                  let imgW,imgH;
                  if(ratio>=1){imgW=Math.min(bodyW,rowH*ratio);imgH=imgW/ratio;}
                  else{imgH=Math.min(rowH,bodyW/ratio);imgW=imgH*ratio;}
                  const rowTop=photoAreaTop-10-(r*(rowH+12));
                  const xPos=(pageW-imgW)/2;
                  const yPos=rowTop-imgH+(rowH-imgH)/2;
                  pg.drawImage(img,{x:xPos,y:Math.max(yPos,photoAreaBottom),width:imgW,height:imgH});
                });
              }
            }
            i+=pair.length;
          }else{
            // 4 per page — 2x2 grid
            const cols=2;const rows=2;
            const chunk=embeddedPhotos.slice(i,i+4);
            const pg=addPhotoPage();
            const slotW=(bodyW-12)/cols;const slotH=(usableH-20-12)/rows;
            chunk.forEach((p,idx)=>{
              const {img,ratio}=p;
              let imgW,imgH;
              if(ratio>=1){imgW=Math.min(slotW,slotH*ratio);imgH=imgW/ratio;}
              else{imgH=Math.min(slotH,slotW/ratio);imgW=imgH*ratio;}
              const col=idx%cols;const row=Math.floor(idx/cols);
              const slotX=36+col*(slotW+12);
              const rowTop=photoAreaTop-10-(row*(slotH+12));
              const xPos=slotX+(slotW-imgW)/2;
              const yPos=rowTop-imgH+(slotH-imgH)/2;
              pg.drawImage(img,{x:xPos,y:Math.max(yPos,photoAreaBottom),width:imgW,height:imgH});
            });
            i+=chunk.length;
          }
        }
      }

      // ── 6. Serialize filled PDF ──
      const filledPdfBytes=await pdfDoc.save();
      const pdfBlob=new Blob([filledPdfBytes],{type:"application/pdf"});
      const uint8=new Uint8Array(filledPdfBytes);
      const chunks=[];for(let i=0;i<uint8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,uint8.subarray(i,i+8192)));
      const pdfBase64=btoa(chunks.join(""));

      // ── 7. Build filename using AI-detected convention ──
      let rptNumber=1;
      try{const cntR=await fetch(`${SB_URL}/rest/v1/reports?select=report_number&job_id=eq.${job.id}&order=report_number.desc&limit=1`,{headers:db._h()});const topR=cntR.ok?await cntR.json():[];if(topR[0]?.report_number){rptNumber=topR[0].report_number+1;}else{const countR=await fetch(`${SB_URL}/rest/v1/reports?select=id&job_id=eq.${job.id}&limit=0`,{headers:{...db._h(),Prefer:"count=exact"}});const total=parseInt(countR.headers.get("content-range")?.split("/")[1]||"0");rptNumber=total+1;}}catch(e){}
      if(draftId){try{const exR=await fetch(`${SB_URL}/rest/v1/reports?select=report_number,report_date&id=eq.${draftId}`,{headers:db._h()});const exD=exR.ok?await exR.json():[];if(exD[0]?.report_number&&exD[0]?.report_date===submitDate)rptNumber=exD[0].report_number;}catch(e){}}
      const conv=job.field_config?.filenameConvention||{};
      const padding=conv.numberPadding||0;
      const rptNum=padding>0?String(rptNumber).padStart(padding,"0"):String(rptNumber);
      // Format today's date according to the AI-detected format
      const now=new Date();
      const fmtMM=now.toLocaleDateString("en-US",{month:"2-digit",timeZone:tz});
      const fmtDD=now.toLocaleDateString("en-US",{day:"2-digit",timeZone:tz});
      const fmtYYYY=now.toLocaleDateString("en-US",{year:"numeric",timeZone:tz});
      const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
      const monNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const monthIdx=now.toLocaleDateString("en-US",{month:"numeric",timeZone:tz})-1;
      const fmtMonth=monthNames[monthIdx]||"";
      const fmtMon=monNames[monthIdx]||"";
      const fmtDay=String(parseInt(fmtDD));
      const formatDate=(fmt)=>{
        if(!fmt)return"";
        // If fmt contains tokens like MM, DD, YYYY, Mon, Month — do token replacement
        if(/MM|DD|YYYY|Month|Mon/.test(fmt)){
          return fmt.replace(/YYYY/g,fmtYYYY).replace(/MM/g,fmtMM).replace(/DD/g,fmtDD).replace(/Month/g,fmtMonth).replace(/Mon/g,fmtMon);
        }
        // Otherwise fmt is a literal date from the template — detect its format and generate today's date
        const f=fmt.trim();
        if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(f))return now.toLocaleDateString("en-US",{timeZone:tz});
        if(/^\d{4}-\d{2}-\d{2}$/.test(f))return now.toLocaleDateString("en-CA",{timeZone:tz});
        if(/^[A-Za-z]{3}\s+\d{1,2},?\s+\d{4}$/.test(f))return now.toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric",timeZone:tz});
        if(/^[A-Za-z]+\s+\d{1,2},?\s+\d{4}$/.test(f))return now.toLocaleDateString("en-US",{month:"long",day:"2-digit",year:"numeric",timeZone:tz});
        if(/^\d{1,2}\s+[A-Za-z]+\s+\d{4}$/.test(f)){const pd=f.startsWith("0");return now.toLocaleDateString("en-US",{day:pd?"2-digit":"numeric",month:"long",year:"numeric",timeZone:tz}).replace(/^(\w+)\s(\d+),\s(\d+)$/,(_,m,d,y)=>`${pd?d.padStart(2,"0"):d} ${m} ${y}`);}
        if(/^[A-Za-z]{3}\s+\d{1,2}$/.test(f))return fmtMon+" "+fmtDD.replace(/^0/,"");
        if(/^\d{2}-\d{2}-\d{4}$/.test(f))return fmtMM+"-"+fmtDD+"-"+fmtYYYY;
        return now.toLocaleDateString("en-US",{timeZone:tz});
      };
      // Build filename from the stored pattern (which the user may have edited)
      const pattern=conv.pattern||job.report_filename_pattern||job.name||"Report";
      let baseName=pattern.replace(/\.[^.]+$/,"");
      baseName=baseName.replace(/\{report_number\}/g,rptNum);
      const dateStr=formatDate(conv.dateFormat);
      baseName=baseName.replace(/\{date\}/g,dateStr);
      baseName=baseName.replace(/\{year\}/g,fmtYYYY);
      const pdfFilename=baseName+".pdf";

      // ── 8. Save report, upload PDF, send email — all at once ──
      const reportContent={vals,lockVals,photos,photoLayout,lockFields,editFields};
      await db.saveReport({
        job_id:job.id,user_id:user.id,report_date:submitDate,status:"submitted",
        content:JSON.stringify(reportContent),updated_at:new Date().toISOString()
      });

      const storagePath=`${user.id}/${job.id}/reports/${pdfFilename}`;
      let upR=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
        method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/pdf"},body:pdfBlob
      });
      if(!upR.ok){await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
        method:"PUT",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/pdf"},body:pdfBlob
      });}

      const userName=user.user_metadata?.full_name||user.email?.split("@")[0]||"Inspector";
      const photoNote=photos.length>0?`<p style="color:#555;font-size:14px;margin:12px 0 0;">${photos.length} site photo${photos.length>1?"s":""} included in the attached PDF.</p>`:"";
      const fieldSummary=editFields.filter(f=>vals[f.name]).map(f=>`<tr><td style="padding:4px 12px 4px 0;color:#888;font-size:13px;white-space:nowrap;">${f.name}</td><td style="padding:4px 0;color:#333;font-size:13px;">${vals[f.name]}</td></tr>`).join("");
      const summaryTable=fieldSummary?`<table style="margin:16px 0;border-collapse:collapse;">${fieldSummary}</table>`:"";
      const emailHtml=`<div style="font-family:-apple-system,sans-serif;max-width:600px;margin:0 auto;"><div style="background:#e8742a;padding:20px 24px;border-radius:8px 8px 0 0;"><h1 style="color:#fff;margin:0;font-size:20px;">My Daily Reports</h1></div><div style="background:#f9f9f9;padding:24px;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px;"><p style="color:#333;font-size:16px;line-height:1.6;margin:0 0 8px;">Hi,</p><p style="color:#333;font-size:15px;line-height:1.6;margin:0 0 16px;">${userName} has submitted the daily field report for <strong>${job.name}</strong> on ${todayDisplay}.</p>${summaryTable}<p style="color:#555;font-size:14px;margin:16px 0 0;">The full PDF report is attached to this email.${photoNote?"":" No site photos were included."}</p>${photoNote}</div><p style="color:#999;font-size:11px;text-align:center;margin-top:16px;">Sent via My Daily Reports &bull; mydailyreports.com</p></div>`;

      // Store PDF info and show post-submit options instead of auto-emailing
      const rawTeam=job.team_emails||[];
      const teamEmails=rawTeam.map(m=>typeof m==="string"?m:m.email).filter(Boolean);
      setSubmitSuccess({pdfBlob,pdfFilename,pdfBase64,emailHtml,teamEmails,jobName:job.name,todayDisplay,userName});
      showToast("Report submitted!");
    }catch(e){
      console.error("Submit error:",e);
      showToast("Submit failed: "+e.message);
    }finally{setSubmitting(false);}
  };

  // Post-submit: Download/save PDF to device
  const downloadPdf=async()=>{
    if(!submitSuccess)return;
    const file=new File([submitSuccess.pdfBlob],submitSuccess.pdfFilename,{type:"application/pdf"});
    // Use Web Share API if available (iOS/Android "Save to Files" or share sheet)
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:submitSuccess.pdfFilename});showToast("PDF shared!");return;}catch(e){if(e.name==="AbortError")return;}
    }
    // Fallback: trigger download
    const url=URL.createObjectURL(submitSuccess.pdfBlob);
    const a=document.createElement("a");a.href=url;a.download=submitSuccess.pdfFilename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("PDF saved!");
  };

  // Post-submit: Email to project team
  const [emailing,setEmailing]=useState(false);
  const emailToTeam=async()=>{
    if(!submitSuccess)return;
    setEmailing(true);
    try{
      const userEmail=user.email;
      const recipients=[...new Set([userEmail,...submitSuccess.teamEmails])].filter(Boolean);
      if(recipients.length===0){showToast("No team emails configured. Add them in Job Settings.");setEmailing(false);return;}
      // Get company name for dynamic sender
      let senderName="My Daily Reports";
      try{const prof=await db.getProfile(user.id);if(prof?.company_name)senderName=prof.company_name;}catch(e){}
      const r=await fetch(`${SB_URL}/functions/v1/send-report`,{
        method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,apikey:SB_KEY},
        body:JSON.stringify({to:recipients,subject:`${submitSuccess.jobName} — Daily Report ${submitSuccess.todayDisplay}`,html_body:submitSuccess.emailHtml,pdf_base64:submitSuccess.pdfBase64,pdf_filename:submitSuccess.pdfFilename,sender_name:senderName})
      });
      if(!r.ok){const errBody=await r.json().catch(()=>({}));throw new Error(errBody.error||`Email send failed (${r.status})`);}
      showToast("Report emailed to "+recipients.length+" recipient"+(recipients.length>1?"s":"")+"!");
    }catch(e){
      console.error("Email error:",e);
      const msg=e.message||"Unknown error";
      if(msg.includes("RESEND_API_KEY"))showToast("Email not configured: Set RESEND_API_KEY in Supabase Edge Function secrets.");
      else if(msg.includes("404")||msg.includes("FunctionNotFound"))showToast("Email function not deployed. Run: npx supabase functions deploy send-report");
      else if(msg.includes("validation_error")||msg.includes("not verified"))showToast("Email domain not verified in Resend. Verify your sending domain at resend.com.");
      else showToast("Email failed: "+msg);
    }finally{setEmailing(false);}
  };

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const layouts=[{k:"1",l:"1 per page"},{k:"2",l:"2 per page (auto)"},{k:"4",l:"4 per page"}];

  if(loadingDraft)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{color:C.mut}}>Loading report...</p></div>);

  // ── View Report Screen (canvas-rendered preview of template + field values) ──
  if(viewingReport){
    const isDocxPreview=viewingReport[0]==="__docx_html__"&&viewDocxHtml;
    return(
      <div style={{minHeight:"100vh",background:C.bg,color:C.txt,display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
          <button onClick={()=>{setViewingReport(null);setViewDocxHtml(null);}} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <MDRLogo size={28}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:17}}>Report Preview</div>
            <div style={{fontSize:12,color:C.mut}}>This is how your report will look</div>
          </div>
        </div>
        <div style={{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch",padding:"12px 16px"}}>
          {isDocxPreview?(
            <div style={{background:"#fff",borderRadius:4,padding:"24px 20px",boxShadow:"0 1px 6px rgba(0,0,0,0.4)",color:"#222",fontSize:14,lineHeight:1.6}} dangerouslySetInnerHTML={{__html:viewDocxHtml}}/>
          ):(
            viewingReport.map((dataUrl,i)=>(
              <div key={i} style={{marginBottom:12,borderRadius:4,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.4)"}}>
                <img src={dataUrl} style={{width:"100%",display:"block"}} alt={"Page "+(i+1)}/>
              </div>
            ))
          )}
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"14px 20px",borderTop:`1px solid ${C.brd}`,background:C.card,zIndex:100,display:"flex",gap:10}}>
          <button onClick={()=>{setViewingReport(null);setViewDocxHtml(null);}} style={{flex:1,padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15,fontWeight:700,cursor:"pointer"}}>
            Back to Editing
          </button>
          <button onClick={()=>{setViewingReport(null);setViewDocxHtml(null);saveWorking();}} disabled={saving} style={{flex:1,padding:"14px 0",background:C.blu,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",opacity:saving?0.5:1}}>
            {saving?"Saving...":"Save & Close"}
          </button>
        </div>
      </div>
    );
  }

  // ── Post-Submit Success Screen — Download or Email options ──
  if(submitSuccess){
    const teamCount=submitSuccess.teamEmails.length;
    const hasTeam=teamCount>0||user.email;
    return(
      <div style={{minHeight:"100vh",background:C.bg,color:C.txt,display:"flex",flexDirection:"column"}}>
        {toast&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:C.card,border:`1px solid ${C.ok}`,borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600,color:C.ok,zIndex:9999}}>{toast}</div>}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
          <MDRLogo size={28}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:17}}>Report Submitted</div>
            <div style={{fontSize:12,color:C.mut}}>{submitSuccess.pdfFilename}</div>
          </div>
        </div>
        <div style={{flex:1,padding:"24px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:C.ok+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>✓</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Report Saved Successfully</div>
            <div style={{fontSize:14,color:C.mut}}>Choose how to deliver your report</div>
          </div>

          <div style={{width:"100%",maxWidth:400,display:"flex",flexDirection:"column",gap:12}}>
            {/* Download to device */}
            <button onClick={downloadPdf} style={{width:"100%",padding:"16px 20px",background:C.blu,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:22}}>⬇</span>
              <div style={{textAlign:"left"}}>
                <div>Download PDF</div>
                <div style={{fontSize:11,fontWeight:400,opacity:0.8}}>Save to your device</div>
              </div>
            </button>

            {/* Email to team */}
            <button onClick={emailToTeam} disabled={emailing} style={{width:"100%",padding:"16px 20px",background:C.org,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:emailing?"default":"pointer",opacity:emailing?0.7:1,display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:22}}>✉</span>
              <div style={{textAlign:"left"}}>
                <div>{emailing?"Sending...":"Email to Project Team"}</div>
                <div style={{fontSize:11,fontWeight:400,opacity:0.8}}>
                  {teamCount>0
                    ?`Send to ${teamCount+1} recipient${teamCount+1>1?"s":""} (you + ${teamCount} team)`
                    :user.email?"Send to "+user.email:"No team emails configured"}
                </div>
              </div>
            </button>

          </div>

          <div style={{width:"100%",maxWidth:400,borderTop:`1px solid ${C.brd}`,paddingTop:16,marginTop:8}}>
            <button onClick={()=>{setSubmitSuccess(null);onBack();}} style={{width:"100%",padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.mut,fontSize:14,fontWeight:600,cursor:"pointer"}}>
              Done — Back to Job
            </button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      {/* Toast */}
      {toast&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:C.card,border:`1px solid ${C.ok}`,borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600,color:C.ok,zIndex:9999}}>{toast}</div>}
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:17}}>{reportStatus==="submitted"?"Submitted Report":"Today's Report"}</div>
          <div style={{fontSize:12,color:C.mut}}>{job.name}</div>
        </div>
        {reportStatus==="submitted"&&<span style={{padding:"4px 10px",fontSize:11,fontWeight:700,borderRadius:6,background:C.ok+"22",color:C.ok}}>Submitted</span>}
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"20px 20px 140px"}}>
        <div style={{fontSize:14,color:C.mut,marginBottom:6,textAlign:"center"}}>{todayDisplay}</div>
        <div style={{fontSize:11,color:C.mut,textAlign:"center",marginBottom:20}}>Editable anytime • {tz.split("/").pop().replace(/_/g," ")}</div>

        {/* ── Locked Fields (collapsible) ── */}
        {lockFields.length>0&&(
          <div style={{marginBottom:16}}>
            <button onClick={()=>setShowLocked(!showLocked)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 16px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:showLocked?"12px 12px 0 0":12,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:16}}>🔒</span>
              <span style={{flex:1,fontWeight:700,fontSize:14,color:C.mut}}>Locked Fields</span>
              <span style={{fontSize:12,color:C.mut,background:C.inp,borderRadius:10,padding:"2px 10px",marginRight:6}}>{lockFields.length}</span>
              <span style={{color:C.mut,fontSize:12,transform:showLocked?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
            </button>
            {showLocked&&(
              <div style={{background:C.card,border:`1px solid ${C.brd}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"8px 16px 14px"}}>

                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
                  {!lockEditing?(
                    <button onClick={()=>setLockEditing(true)} style={{padding:"4px 12px",fontSize:12,fontWeight:700,borderRadius:6,border:`1px solid ${C.brd}`,background:"transparent",color:C.org,cursor:"pointer"}}>Edit</button>
                  ):(

                  )}
                </div>
                {lockFields.map((f,i)=>(
                  <div key={f.name} style={{padding:"8px 0",borderBottom:i<lockFields.length-1?`1px solid ${C.brd}`:"none"}}>

                      <span style={{fontSize:13,color:C.mut}}>{f.name}</span>
                      {!lockEditing&&<span style={{fontSize:13,fontWeight:600,color:C.lt}}>{lockVals[f.name]||f.value||"—"}</span>}
                    </div>
                    {lockEditing&&(
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <input type="text" value={lockVals[f.name]||""} onChange={e=>setLockVal(f.name,e.target.value)} style={{...fs,flex:1,padding:"8px 10px",fontSize:13}}/>
                        <button onClick={()=>unlockField(f.name)} title="Permanently unlock this field" style={{padding:"6px 10px",fontSize:10,fontWeight:700,borderRadius:6,border:`1px solid ${C.org}`,background:"transparent",color:C.org,cursor:"pointer",whiteSpace:"nowrap"}}>Unlock</button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── Editable fields ── */}
        {editFields.length>0&&(
          <div style={{marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:700,color:C.org,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Fill In Today</div>
            {editFields.map(f=>{
              const isAuto=f.autoFill==="date"||f.autoFill==="increment"||f.autoFill==="name";
              return(
                <div key={f.name} style={{marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <label style={{fontSize:13,fontWeight:600,color:C.lt}}>{f.name}</label>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      {f.autoFill==="date"&&<span style={{fontSize:10,fontWeight:700,color:C.blu,background:C.blu+"22",padding:"2px 8px",borderRadius:4}}>AUTO-DATE</span>}
                      {f.autoFill==="increment"&&<span style={{fontSize:10,fontWeight:700,color:C.blu,background:C.blu+"22",padding:"2px 8px",borderRadius:4}}>AUTO-#</span>}
                      {f.autoFill==="name"&&<span style={{fontSize:10,fontWeight:700,color:C.blu,background:C.blu+"22",padding:"2px 8px",borderRadius:4}}>AUTO-NAME</span>}
                      {f.voiceEnabled&&<span style={{fontSize:10,fontWeight:700,color:C.org,background:C.org+"22",padding:"2px 8px",borderRadius:4}}>VOICE</span>}
                      {f.wasUnlocked&&(
                        <button onClick={()=>relockField(f.name)} title="Re-lock this field" style={{padding:"2px 8px",fontSize:10,fontWeight:700,borderRadius:4,border:`1px solid ${C.brd}`,background:"transparent",color:C.mut,cursor:"pointer"}}>🔒 Lock</button>
                      )}
                    </div>
                  </div>
                  {f.voiceEnabled?(
                    <textarea value={vals[f.name]||""} onChange={e=>setVal(f.name,e.target.value)} placeholder="Tap here and use your keyboard mic to dictate..." rows={4} style={{...fs,resize:"vertical",minHeight:80,lineHeight:1.5}}/>
                  ):(
                    <input type="text" value={vals[f.name]||""} onChange={e=>setVal(f.name,e.target.value)} readOnly={isAuto} placeholder={isAuto?"Auto-filled":"Enter value..."} style={{...fs,opacity:isAuto?0.6:1,cursor:isAuto?"default":"text"}}/>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {editFields.length===0&&lockFields.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:C.mut}}>
            <div style={{fontSize:36,marginBottom:12}}>📋</div>
            <p style={{fontSize:15,fontWeight:600,color:C.lt,marginBottom:6}}>No template fields configured</p>
            <p style={{fontSize:13}}>Go back and upload a template in your job settings to get started.</p>
          </div>
        )}

        {/* ── Photos ── */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:C.org,textTransform:"uppercase",letterSpacing:1}}>Photos</div>
            <div style={{display:"flex",gap:4}}>
              {layouts.map(({k,l})=>(
                <button key={k} onClick={()=>setPhotoLayout(k)} style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:4,cursor:"pointer",background:photoLayout===k?C.org:"transparent",border:`1px solid ${photoLayout===k?C.org:C.brd}`,color:photoLayout===k?"#fff":C.mut}}>{l}</button>
              ))}
            </div>
          </div>

          {/* Photo grid */}
          {photos.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:photoLayout==="1"?"1fr":photoLayout==="2"?"1fr 1fr":"1fr 1fr",gap:8,marginBottom:12}}>
              {photos.map(p=>(
                <div key={p.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:`1px solid ${C.brd}`,aspectRatio:photoLayout==="1"?"auto":"1"}}>
                  <img src={p.src} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <button onClick={()=>setPhotos(prev=>prev.filter(x=>x.id!==p.id))} style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",background:"rgba(0,0,0,0.7)",border:"none",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              ))}
            </div>
          )}

          {/* Two photo buttons */}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{photoRef.current.setAttribute("capture","environment");photoRef.current.click();}} style={{flex:1,padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span>📷</span> Take Photo
            </button>
            <button onClick={()=>{photoRef.current.removeAttribute("capture");photoRef.current.click();}} style={{flex:1,padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span>🖼️</span> Library
            </button>
          </div>
          <input ref={photoRef} type="file" accept="image/*" multiple onChange={handlePhoto} style={{display:"none"}}/>
          <div style={{fontSize:11,color:C.mut,marginTop:8}}>Photos will display as {layouts.find(l=>l.k===photoLayout)?.l} in the final PDF</div>
        </div>

      </div>

      {/* Fixed bottom bar */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"12px 20px",borderTop:`1px solid ${C.brd}`,background:C.card,zIndex:100}}>
        <div style={{maxWidth:600,margin:"0 auto",display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",gap:10}}>
            {reportStatus!=="submitted"&&(
              <button onClick={saveWorking} disabled={saving||submitting||viewLoading} style={{flex:1,padding:"12px 0",background:C.blu,border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,cursor:saving?"default":"pointer",opacity:saving?0.6:1}}>
                {saving?"Saving...":"Save Draft"}
              </button>
            )}
            <button onClick={viewReport} disabled={viewLoading||submitting} style={{flex:1,padding:"12px 0",background:"transparent",border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:14,fontWeight:700,cursor:viewLoading?"default":"pointer",opacity:viewLoading?0.6:1}}>
              {viewLoading?"Loading...":"View Report"}
            </button>
          </div>
          <button onClick={submitReport} disabled={submitting||viewLoading} className="btn-o" style={{width:"100%",padding:"12px 0",background:C.org,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:submitting?"default":"pointer",opacity:submitting?0.6:1}}>
            {submitting?"Submitting...":reportStatus==="submitted"?"Update & Resubmit":"Submit Report"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Job Detail (Job Dashboard) ── */
function JobDetail({job, user, onBack, onDeleted}){
  const [jdToast,setJdToast]=useState("");
  const showToast=(msg)=>{setJdToast(msg);setTimeout(()=>setJdToast(""),3000);};
  const [showDel,setShowDel]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [showJobSet,setShowJobSet]=useState(false);
  const [reparsing,setReparsing]=useState(false);
  const reparseTemplate=async()=>{
    setReparsing(true);
    try{
      const tpl=await db.getTemplate(job.id);
      if(!tpl||!tpl.storage_path){showToast("No template found for this job.");return;}
      const tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tpl.storage_path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}});
      if(!tplResp.ok)throw new Error("Could not download template file.");
      const buf=await tplResp.arrayBuffer();
      // Extract real text positions client-side with pdf.js
      const textItems=await extractPdfTextStructure(new Uint8Array(buf));
      const resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${SB_KEY}`,apikey:SB_KEY},body:JSON.stringify({text_items:textItems,file_name:tpl.original_filename||"template.pdf"})});
      if(!resp.ok)throw new Error("AI parsing failed.");
      const parsed=await resp.json();
      if(parsed.error)throw new Error(parsed.error);
      const coords=(f)=>({page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline});
      const editF=(parsed.editable||[]).map(f=>({name:f.name,value:f.value||"",originalValue:f.value||"",voiceEnabled:f.voiceEnabled||false,autoFill:f.autoFill||null,...coords(f)}));
      const lockF=(parsed.locked||[]).map(f=>({name:f.name,value:f.value||"",...coords(f)}));
      const newConfig={editable:editF,locked:lockF};
      await db.updateJobFieldConfig(job.id,newConfig);
      // Update the job object directly so next ReportEditor open picks up new fields
      job.field_config=newConfig;
      showToast("Template re-parsed with updated field positions! Open a report to see the changes.");
    }catch(e){console.error("Reparse error:",e);showToast("Re-parse failed: "+e.message);}
    finally{setReparsing(false);}
  };
  const [rpts,setRpts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showCompleted,setShowCompleted]=useState(false);
  const [showWorking,setShowWorking]=useState(false);
  const [showPhotos,setShowPhotos]=useState(false);
  const [showEditJob,setShowEditJob]=useState(false);
  const [showReport,setShowReport]=useState(false);
  const [showTeam,setShowTeam]=useState(false);
  const [editName,setEditName]=useState(job.name||"");
  const [editAddr,setEditAddr]=useState(job.site_address||"");
  const [editSaving,setEditSaving]=useState(false);
  const [teamMembers,setTeamMembers]=useState((job.team_emails||[]).map(e=>typeof e==="string"?{name:"",email:e}:e));
  const [newMemberName,setNewMemberName]=useState("");
  const [newMemberEmail,setNewMemberEmail]=useState("");
  const [teamSaving,setTeamSaving]=useState(false);
  const [showSchedSet,setShowSchedSet]=useState(false);
  const [schedEnabled,setSchedEnabled]=useState(!!job.scheduling_enabled);
  const [schedSaving,setSchedSaving]=useState(false);
  const [showFieldEdit,setShowFieldEdit]=useState(false);
  const [fieldEditFields,setFieldEditFields]=useState(null); // null=not loaded
  const [fieldEditSaving,setFieldEditSaving]=useState(false);

  const [tplFilename,setTplFilename]=useState(null);
  const loadReports=useCallback(async()=>{
    try{
      const r=await fetch(`${SB_URL}/rest/v1/reports?select=*&job_id=eq.${job.id}&order=report_date.desc`,{headers:db._h()});
      if(r.ok)setRpts(await r.json());
    }catch(e){console.error(e);}
    finally{setLoading(false);}
  },[job.id]);
  const loadTplFilename=useCallback(async()=>{
    try{const t=await db.getTemplate(job.id);if(t&&t.original_filename)setTplFilename(t.original_filename);}catch(e){}
  },[job.id]);

  useEffect(()=>{loadReports();loadTplFilename();},[loadReports,loadTplFilename]);

  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const today=new Date().toLocaleDateString("en-CA",{timeZone:tz});
  const todayRpt=rpts.find(r=>r.report_date===today);
  const submitted=rpts.filter(r=>r.status==="submitted");
  const working=rpts.filter(r=>r.status!=="submitted");
  const nextNum=submitted.length+working.length+1;


  // Track if user has started today's report this session
  const [reportStarted,setReportStarted]=useState(false);
  // Build display filename using stored AI convention — swap tokens for actual values
  const buildReportName=(num,reportDate)=>{
    const conv=job.field_config?.filenameConvention||{};
    const padding=conv.numberPadding||0;
    const padNum=padding>0?String(num).padStart(padding,"0"):String(num);
    const pattern=conv.pattern||job.report_filename_pattern||job.name||"Report";
    let n=pattern.replace(/\.[^.]+$/,"");
    // Swap tokens
    n=n.replace(/\{report_number\}/g,padNum);
    // Parse the date for this report
    const d=reportDate instanceof Date?reportDate:new Date(typeof reportDate==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(reportDate)?(reportDate+"T12:00:00"):(reportDate+"T12:00:00"));
    const mm=d.toLocaleDateString("en-US",{month:"2-digit",timeZone:tz});
    const dd=d.toLocaleDateString("en-US",{day:"2-digit",timeZone:tz});
    const yyyy=d.toLocaleDateString("en-US",{year:"numeric",timeZone:tz});
    const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const monNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const monthIdx=d.toLocaleDateString("en-US",{month:"numeric",timeZone:tz})-1;
    const formatDate=(fmt)=>{
      if(!fmt)return"";
      if(/MM|DD|YYYY|Month|Mon/.test(fmt)){
        return fmt.replace(/YYYY/g,yyyy).replace(/MM/g,mm).replace(/DD/g,dd).replace(/Month/g,monthNames[monthIdx]||"").replace(/Mon/g,monNames[monthIdx]||"");
      }
      // fmt is a literal date from template — detect format and generate this report's date in same format
      const f=fmt.trim();
      if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(f))return d.toLocaleDateString("en-US",{timeZone:tz});
      if(/^\d{4}-\d{2}-\d{2}$/.test(f))return d.toLocaleDateString("en-CA",{timeZone:tz});
      if(/^[A-Za-z]{3}\s+\d{1,2},?\s+\d{4}$/.test(f))return d.toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric",timeZone:tz});
      if(/^[A-Za-z]+\s+\d{1,2},?\s+\d{4}$/.test(f))return d.toLocaleDateString("en-US",{month:"long",day:"2-digit",year:"numeric",timeZone:tz});
      if(/^\d{1,2}\s+[A-Za-z]+\s+\d{4}$/.test(f)){const pd=f.startsWith("0");return d.toLocaleDateString("en-US",{day:pd?"2-digit":"numeric",month:"long",year:"numeric",timeZone:tz}).replace(/^(\w+)\s(\d+),\s(\d+)$/,(_,m,dv,y)=>`${pd?dv.padStart(2,"0"):dv} ${m} ${y}`);}
      if(/^[A-Za-z]{3}\s+\d{1,2}$/.test(f))return monNames[monthIdx]+" "+dd.replace(/^0/,"");
      if(/^\d{2}-\d{2}-\d{4}$/.test(f))return mm+"-"+dd+"-"+yyyy;
      return d.toLocaleDateString("en-US",{timeZone:tz});
    };
    const dateStr=formatDate(conv.dateFormat);
    n=n.replace(/\{date\}/g,dateStr);
    n=n.replace(/\{year\}/g,yyyy);
    return n;
  };

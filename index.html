<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>My Daily Reports</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    input:focus, select:focus, textarea:focus { border-color: #e8742a !important; outline: none; }
    .btn-o:hover:not(:disabled) { background: #d4691f !important; }
    button, input, select, textarea { transition: all 0.2s ease; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const SB_URL = "https://wluvkmpncafugdbunlkw.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsdXZrbXBuY2FmdWdkYnVubGt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU1MTUsImV4cCI6MjA4Nzg4MTUxNX0.HZpQ2xVGpf4EQ0BVDmIEuPqW5T_eNG5OqBNAqT03rH8";
const C = {bg:"#0f0f0f",card:"#1a1a1a",brd:"#333",inp:"#222",org:"#e8742a",orgH:"#d4691f",blu:"#5a8fc0",txt:"#fff",mut:"#888",lt:"#ccc",err:"#ef4444",ok:"#22c55e"};
const DEV_USER = {id:"00000000-0000-0000-0000-000000000001",email:"saltzman.jesse@gmail.com",user_metadata:{full_name:"Jesse Saltzman"}};

const SL={daily_mf:"Daily M-F",daily_7:"Daily 7 Days",weekly:"Weekly",as_needed:"As Needed",custom:"Custom"};

// DB helpers
const db = {
  _h(){return{"Content-Type":"application/json",apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:"return=representation"};},
  async jobs(){const r=await fetch(`${SB_URL}/rest/v1/jobs?select=*&order=created_at.asc`,{headers:this._h()});if(!r.ok)throw new Error("Failed");return await r.json();},
  async todayRpts(ids){if(!ids.length)return[];const t=new Date().toISOString().split("T")[0];const q=ids.map(i=>`"${i}"`).join(",");const r=await fetch(`${SB_URL}/rest/v1/reports?select=id,job_id,status,report_date&report_date=eq.${t}&job_id=in.(${q})`,{headers:this._h()});if(!r.ok)return[];return await r.json();},
  async mkJob(d){const r=await fetch(`${SB_URL}/rest/v1/jobs`,{method:"POST",headers:this._h(),body:JSON.stringify(d)});if(!r.ok){const e=await r.json();throw new Error(e.message||"Failed");}return(await r.json())[0];},
  async ulTpl(uid,jid,f){const ext=f.name.split(".").pop().toLowerCase();const p=`${uid}/${jid}/template.${ext}`;const r=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${p}`,{method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,"Content-Type":f.type||"application/octet-stream"},body:f});if(!r.ok)throw new Error("Upload failed");return p;},
  async mkTpl(d){const r=await fetch(`${SB_URL}/rest/v1/templates`,{method:"POST",headers:this._h(),body:JSON.stringify(d)});if(!r.ok)throw new Error("Template save failed");return(await r.json())[0];},
};

/* ═══ CREATE JOB ═══ */
function CreateJob({user, onBack, onCreated}){
  const [jn,setJn]=useState("");
  const [addr,setAddr]=useState("");
  const [tf,setTf]=useState(null);
  const [sched,setSched]=useState("");
  const [days,setDays]=useState([]);
  const [remOn,setRemOn]=useState(false);
  const [remT,setRemT]=useState("5:00 PM");
  const [remH,setRemH]=useState(2);
  const [schedOn,setSchedOn]=useState(false);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [drag,setDrag]=useState(false);
  const [parsing,setParsing]=useState(false);
  const [editFields,setEditFields]=useState([]);
  const [lockFields,setLockFields]=useState([]);
  const [showLocked,setShowLocked]=useState(false);

  const DS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const TS=["12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM","9:00 PM"];

  const togDay=(d)=>{setSched("custom");setDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);};
  const preset=(p)=>{setSched(p);setDays([]);if(p==="as_needed")setRemOn(false);};
  const effSch=()=>{if(sched==="weekly"||sched==="as_needed")return sched;if(days.length===5&&["Mon","Tue","Wed","Thu","Fri"].every(d=>days.includes(d))&&!days.includes("Sat")&&!days.includes("Sun"))return"daily_mf";if(days.length===7)return"daily_7";if(days.length>0)return"custom";return sched||"daily_mf";};

  const readFileAsBase64=async(f)=>{
    return new Promise((res)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(",")[1]);
      r.readAsDataURL(f);
    });
  };

  const extractDocxText=async(f)=>{
    const zip=await JSZip.loadAsync(f);
    const xml=await zip.file("word/document.xml").async("string");
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,"application/xml");
    const ns="http://schemas.openxmlformats.org/wordprocessingml/2006/main";
    const rows=doc.getElementsByTagNameNS(ns,"tr");
    let text="";
    for(let i=0;i<rows.length;i++){
      const cells=rows[i].getElementsByTagNameNS(ns,"tc");
      const cellTexts=[];
      for(let j=0;j<cells.length;j++){
        const paras=cells[j].getElementsByTagNameNS(ns,"t");
        let ct="";
        for(let k=0;k<paras.length;k++)ct+=paras[k].textContent;
        cellTexts.push(ct.trim());
      }
      text+=cellTexts.join(" | ")+"\n";
    }
    const paras=doc.getElementsByTagNameNS(ns,"p");
    let pText="";
    for(let i=0;i<paras.length;i++){
      const ts=paras[i].getElementsByTagNameNS(ns,"t");
      let line="";
      for(let j=0;j<ts.length;j++)line+=ts[j].textContent;
      if(line.trim())pText+=line.trim()+"\n";
    }
    return"TABLE CONTENT:\n"+text+"\nPARAGRAPH CONTENT:\n"+pText;
  };

  const parseFields=async(f)=>{
    setParsing(true);setErr("");setEditFields([]);setLockFields([]);
    try{
      const isPdf=f.name.toLowerCase().endsWith(".pdf");
      let payload;
      if(isPdf){
        const base64=await readFileAsBase64(f);
        payload={file_base64:base64,file_name:f.name};
      }else{
        const docText=await extractDocxText(f);
        payload={file_text:docText,file_name:f.name};
      }
      const resp=await fetch("https://wluvkmpncafugdbunlkw.supabase.co/functions/v1/parse-template",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY},
        body:JSON.stringify(payload)
      });
      const parsed=await resp.json();
      if(parsed.error)throw new Error(parsed.error);
      setEditFields(parsed.editable||[]);
      setLockFields(parsed.locked||[]);
    }catch(e){
      console.error("Parse error:",e);
      setErr("Could not parse template fields. You can still create the job and configure fields later.");
    }finally{setParsing(false);}
  };

  const doFile=(f)=>{const e=f.name.split(".").pop().toLowerCase();if(!["docx","pdf"].includes(e)){setErr("Only .docx and .pdf");return;}setTf(f);setErr("");parseFields(f);};

  const moveToLocked=(name)=>{const f=editFields.find(x=>x.name===name);if(f){setEditFields(p=>p.filter(x=>x.name!==name));setLockFields(p=>[...p,{...f,autoFill:undefined,voiceEnabled:undefined}]);}};
  const moveToEditable=(name)=>{const f=lockFields.find(x=>x.name===name);if(f){setLockFields(p=>p.filter(x=>x.name!==name));setEditFields(p=>[...p,f]);}};

  const ok=jn.trim()&&(sched||days.length>0);

  const create=async()=>{
    if(!ok)return;setSaving(true);setErr("");
    try{
      const es=effSch();
      const fnPattern=tf?tf.name.replace(/\.[^.]+$/,""):`DR_##__${jn.trim().replace(/\s+/g,"_")}`;
      const job=await db.mkJob({user_id:user.id,name:jn.trim(),site_address:addr.trim()||null,report_filename_pattern:fnPattern,schedule:es,schedule_days:es==="custom"?days:[],reminder_enabled:remOn,reminder_time:remOn?remT:null,reminder_hours_before:remOn?remH:null,scheduling_enabled:schedOn,field_config:{editable:editFields,locked:lockFields}});
      if(tf&&job?.id){const ext=tf.name.split(".").pop().toLowerCase();const sp=await db.ulTpl(user.id,job.id,tf);await db.mkTpl({user_id:user.id,job_id:job.id,name:tf.name,original_filename:tf.name,file_type:ext,storage_path:sp});}
      onCreated();
    }catch(e){setErr(e.message);}finally{setSaving(false);}
  };

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const ls={display:"block",color:C.lt,fontSize:13,fontWeight:600,marginBottom:6};

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.mut,fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        <span style={{fontWeight:700,fontSize:17}}>New Job</span>
      </div>
      <div style={{maxWidth:500,margin:"0 auto",padding:"24px 20px"}}>
        {err&&<div style={{background:"#2d1214",border:"1px solid #5c2023",borderRadius:8,padding:"10px 14px",marginBottom:16,color:C.err,fontSize:13}}>{err}</div>}

        <div style={{marginBottom:20}}><label style={ls}>Job Name *</label><input type="text" placeholder="Oceanside District Office" value={jn} onChange={e=>setJn(e.target.value)} style={fs}/></div>
        <div style={{marginBottom:20}}><label style={ls}>Site Address</label><input type="text" placeholder="2111 Mission Ave, Oceanside CA 92058" value={addr} onChange={e=>setAddr(e.target.value)} style={fs}/></div>

        <div style={{marginBottom:20}}>
          <label style={ls}>Upload Template</label>
          {!tf?(
            <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files.length)doFile(e.dataTransfer.files[0]);}} onClick={()=>document.getElementById("fi").click()}
              style={{border:`2px dashed ${drag?C.org:C.brd}`,borderRadius:12,padding:"32px 20px",textAlign:"center",cursor:"pointer",background:drag?"#1f1a14":C.inp}}>
              <div style={{fontSize:32,marginBottom:8}}>📄</div>
              <p style={{color:C.lt,fontSize:14,fontWeight:600,marginBottom:4}}>Drop your Word or PDF template here</p>
              <p style={{color:C.mut,fontSize:12}}>or tap to browse • .docx or .pdf</p>
              <input id="fi" type="file" accept=".docx,.pdf" style={{display:"none"}} onChange={e=>e.target.files[0]&&doFile(e.target.files[0])}/>
            </div>
          ):(
            <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:24}}>📄</div>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:C.txt}}>{tf.name}</div><div style={{fontSize:12,color:C.mut}}>{(tf.size/1024).toFixed(0)} KB</div></div>
                <button onClick={()=>{setTf(null);setEditFields([]);setLockFields([]);}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18}}>✕</button>
              </div>
            </div>
          )}
        </div>

        {/* FIELD PARSING RESULTS */}
        {parsing&&(
          <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,padding:"20px",marginBottom:20,textAlign:"center"}}>
            <div style={{fontSize:24,marginBottom:8}}>🔍</div>
            <p style={{color:C.lt,fontSize:14,fontWeight:600}}>Analyzing template fields...</p>
            <p style={{color:C.mut,fontSize:12,marginTop:4}}>AI is detecting fillable fields in your document</p>
          </div>
        )}

        {!parsing&&(editFields.length>0||lockFields.length>0)&&(
          <div style={{marginBottom:20}}>
            {/* EDITABLE FIELDS */}
            <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden",marginBottom:10}}>
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:"rgba(232,116,42,0.1)"}}>
                <div style={{fontWeight:700,fontSize:14,color:C.org}}>Editable Fields ({editFields.length})</div>
                <div style={{fontSize:12,color:C.mut,marginTop:2}}>You'll fill these for each report</div>
              </div>
              <div style={{padding:8,maxHeight:200,overflowY:"auto"}}>
                {editFields.map(f=>(
                  <div key={f.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:8,marginBottom:6}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flex:1,flexWrap:"wrap"}}>
                      <span style={{fontSize:14,fontWeight:600,color:C.txt}}>{f.name}</span>
                      {f.autoFill==="date"&&<span style={{fontSize:10,fontWeight:700,background:"rgba(90,143,192,0.2)",color:C.blu,padding:"2px 6px",borderRadius:4}}>Auto-Date</span>}
                      {f.autoFill==="increment"&&<span style={{fontSize:10,fontWeight:700,background:"rgba(90,143,192,0.2)",color:C.blu,padding:"2px 6px",borderRadius:4}}>Auto-#</span>}
                      {f.voiceEnabled&&<span style={{fontSize:10,fontWeight:700,background:"rgba(34,197,94,0.2)",color:C.ok,padding:"2px 6px",borderRadius:4}}>🎤 Voice</span>}
                    </div>
                    <button onClick={()=>moveToLocked(f.name)} style={{background:"none",border:`1px solid ${C.brd}`,borderRadius:6,padding:"4px 8px",color:C.mut,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>→ Lock</button>
                  </div>
                ))}
                {editFields.length===0&&<div style={{padding:12,textAlign:"center",color:C.mut,fontSize:13}}>No editable fields detected</div>}
              </div>
            </div>

            {/* LOCKED FIELDS (collapsible) */}
            <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden"}}>
              <button onClick={()=>setShowLocked(!showLocked)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"none",border:"none",cursor:"pointer"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:C.mut,textAlign:"left"}}>Locked Fields ({lockFields.length})</div>
                  <div style={{fontSize:12,color:C.mut,marginTop:2,textAlign:"left"}}>Same value every report</div>
                </div>
                <span style={{color:C.mut,fontSize:14,transform:showLocked?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
              </button>
              {showLocked&&(
                <div style={{padding:8,borderTop:`1px solid ${C.brd}`,maxHeight:200,overflowY:"auto"}}>
                  {lockFields.map(f=>(
                    <div key={f.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:8,marginBottom:6}}>
                      <div>
                        <span style={{fontSize:14,fontWeight:600,color:C.lt}}>{f.name}</span>
                        {f.value&&<span style={{fontSize:12,color:C.mut,marginLeft:8}}>({f.value})</span>}
                      </div>
                      <button onClick={()=>moveToEditable(f.name)} style={{background:"none",border:`1px solid ${C.brd}`,borderRadius:6,padding:"4px 8px",color:C.mut,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>→ Edit</button>
                    </div>
                  ))}
                  {lockFields.length===0&&<div style={{padding:12,textAlign:"center",color:C.mut,fontSize:13}}>No locked fields</div>}
                </div>
              )}
            </div>
          </div>
        )}

        <div style={{marginBottom:20}}>
          <label style={{...ls,marginBottom:10}}>Report Frequency *</label>
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {DS.map(d=>{const a=days.includes(d);return<button key={d} onClick={()=>togDay(d)} style={{width:44,height:44,borderRadius:"50%",border:a?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:a?C.org:"transparent",color:a?"#fff":C.mut,fontWeight:600,fontSize:12,cursor:"pointer"}}>{d}</button>;})}
          </div>
          <div style={{display:"flex",gap:8}}>
            {[{k:"weekly",l:"Weekly"},{k:"as_needed",l:"As Needed"}].map(({k,l})=><button key={k} onClick={()=>preset(k)} style={{padding:"8px 16px",borderRadius:8,border:sched===k?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:sched===k?C.org:"transparent",color:sched===k?"#fff":C.mut,fontWeight:600,fontSize:13,cursor:"pointer"}}>{l}</button>)}
          </div>
        </div>

        {sched!=="as_needed"&&(sched||days.length>0)&&(
          <div style={{marginBottom:24,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,padding:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:remOn?14:0}}>
              <span style={{fontSize:14,fontWeight:600,color:C.lt}}>Reminders</span>
              <button onClick={()=>setRemOn(!remOn)} style={{width:48,height:28,borderRadius:14,border:"none",cursor:"pointer",background:remOn?C.org:C.brd,position:"relative"}}><div style={{width:22,height:22,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:remOn?23:3,transition:"left 0.2s"}}/></button>
            </div>
            {remOn&&(
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Submit by</label><select value={remT} onChange={e=>setRemT(e.target.value)} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{TS.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
                <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Remind me</label><select value={remH} onChange={e=>setRemH(Number(e.target.value))} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{[1,2,3,4,6].map(h=><option key={h} value={h}>{h} hr{h>1?"s":""} before</option>)}</select></div>
              </div>
            )}
          </div>
        )}

        <div style={{marginBottom:24,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,padding:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:schedOn?14:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>📅</span>
              <span style={{fontSize:14,fontWeight:600,color:C.lt}}>Inspection Scheduling</span>
            </div>
            <button onClick={()=>setSchedOn(!schedOn)} style={{width:48,height:28,borderRadius:14,border:"none",cursor:"pointer",background:schedOn?C.org:C.brd,position:"relative"}}><div style={{width:22,height:22,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:schedOn?23:3,transition:"left 0.2s"}}/></button>
          </div>
          {schedOn&&(
            <div style={{background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,padding:"12px 14px"}}>
              <p style={{fontSize:13,color:C.lt,lineHeight:1.5}}>Let your GC and subs request inspections through a shared calendar.</p>
              <p style={{fontSize:12,color:C.blu,marginTop:8,fontWeight:600}}>You'll set up the calendar link and team contacts on the job dashboard after creating this job.</p>
            </div>
          )}
        </div>

        <button className="btn-o" onClick={create} disabled={!ok||saving} style={{width:"100%",padding:"14px 0",background:ok?C.org:C.brd,border:ok?`1px solid ${C.blu}`:`1px solid ${C.brd}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:ok&&!saving?"pointer":"default",opacity:saving?0.7:1}}>{saving?"Creating...":"Create Job"}</button>
      </div>
    </div>
  );
}

/* ═══ ARCHIVED JOBS (Full Screen) ═══ */
function ArchivedJobs({jobs, onBack, onSelect}){
  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.mut,fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        <span style={{fontWeight:700,fontSize:17}}>Archived Jobs</span>
        <span style={{fontSize:13,color:C.mut,marginLeft:"auto"}}>{jobs.length} job{jobs.length!==1?"s":""}</span>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"20px"}}>
        {jobs.length===0&&(
          <div style={{textAlign:"center",padding:"60px 20px",color:C.mut}}>
            <div style={{fontSize:48,marginBottom:16}}>📁</div>
            <p style={{fontSize:16,fontWeight:600,color:C.lt,marginBottom:6}}>No archived jobs</p>
            <p style={{fontSize:14}}>Completed projects will appear here</p>
          </div>
        )}
        {jobs.map(j=>(
          <button key={j.id} onClick={()=>onSelect(j)} style={{width:"100%",textAlign:"left",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"16px 18px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:20}}>📁</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:16,color:C.txt,marginBottom:4}}>{j.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,fontWeight:600,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:6,padding:"2px 8px",color:C.mut}}>{SL[j.schedule]||j.schedule}</span>
                {j.site_address&&<span style={{fontSize:12,color:C.mut}}>{j.site_address}</span>}
              </div>
            </div>
            <span style={{color:C.mut,fontSize:18}}>›</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══ DASHBOARD ═══ */
function Dashboard({user, onLogout}){
  const [jobs,setJobs]=useState([]);
  const [rpts,setRpts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selJob,setSelJob]=useState(null);
  const [showSet,setShowSet]=useState(false);
  const [showNew,setShowNew]=useState(false);
  const [showDD,setShowDD]=useState(false);
  const [showArch,setShowArch]=useState(false);
  const [showCal,setShowCal]=useState(false);

  useEffect(()=>{load();},[]);
  const load=async()=>{setLoading(true);try{const a=await db.jobs();setJobs(a);const ids=a.filter(j=>!j.is_archived).map(j=>j.id);if(ids.length)setRpts(await db.todayRpts(ids));}catch(e){console.error(e);}finally{setLoading(false);}};
  const act=jobs.filter(j=>!j.is_archived);
  const arch=jobs.filter(j=>j.is_archived);
  const top3=act.slice(0,3);
  const stat=(id,sc)=>{if(sc==="as_needed")return"none";const r=rpts.find(r=>r.job_id===id);if(!r)return"due";return r.status==="submitted"?"submitted":"working";};
  const dot=(s)=>{if(s==="none")return null;const c=s==="submitted"?C.ok:s==="working"?C.org:"#ef4444";return<div style={{width:10,height:10,borderRadius:"50%",background:c,flexShrink:0}}/>;};

  const doShare=async()=>{
    const url=window.location.href;
    const text="My Daily Reports — Voice-to-PDF inspection reports";
    if(navigator.share){try{await navigator.share({title:"My Daily Reports",text,url});}catch(e){}}
    else{try{await navigator.clipboard.writeText(url);alert("Link copied!");}catch(e){alert("Could not copy link.");}}
  };

  // Sub-screens
  if(showNew)return<CreateJob user={user} onBack={()=>setShowNew(false)} onCreated={()=>{setShowNew(false);load();}}/>;
  if(showArch)return<ArchivedJobs jobs={arch} onBack={()=>setShowArch(false)} onSelect={(j)=>{setSelJob(j);setShowArch(false);}}/>;

  if(selJob)return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={()=>setSelJob(null)} style={{background:"none",border:"none",color:C.mut,fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        <div style={{flex:1}}><div style={{fontWeight:700,fontSize:17}}>{selJob.name}</div><div style={{fontSize:12,color:C.mut}}>{SL[selJob.schedule]||selJob.schedule}</div></div>
        <button style={{background:"none",border:"none",color:C.mut,fontSize:18,cursor:"pointer"}}>⚙️</button>
      </div>
      <div style={{maxWidth:600,margin:"40px auto",padding:"0 20px",textAlign:"center"}}>
        <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:24}}>
          <p style={{fontWeight:600,color:C.org,marginBottom:8}}>Job: {selJob.name}</p>
          <p style={{color:C.mut,fontSize:13}}>Job detail view coming next — Today's Report, Working Copies, Submitted Reports.</p>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt,position:"relative"}} onClick={e=>{if(showSet&&!e.target.closest('[data-s]'))setShowSet(false);if(showDD&&!e.target.closest('[data-d]'))setShowDD(false);}}>

      {/* HEADER */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}} data-s>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:8,background:C.org,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,color:"#fff"}}>M</div>
          <span style={{fontWeight:700,fontSize:18}}>My Daily Reports</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={doShare} style={{width:36,height:36,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,color:C.mut}}>↗</button>
          <button onClick={()=>setShowSet(!showSet)} style={{width:36,height:36,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,color:C.mut}}>⚙️</button>
        </div>
      </div>

      {/* SETTINGS DROPDOWN */}
      {showSet&&(
        <div style={{position:"absolute",top:68,right:20,background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"8px 0",minWidth:220,zIndex:100,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}} data-s>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`}}>
            <div style={{fontWeight:600,fontSize:14,color:C.txt,marginBottom:2}}>{user?.user_metadata?.full_name||"Inspector"}</div>
            <div style={{fontSize:12,color:C.mut}}>{user?.email}</div>
          </div>
          <button onClick={()=>{setShowSet(false);alert("Account settings coming soon");}} style={{width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",color:C.lt,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><span>👤</span> Account Settings</button>
          <button onClick={()=>{setShowSet(false);alert("Notifications coming soon");}} style={{width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",color:C.lt,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><span>🔔</span> Notifications</button>
          <button onClick={()=>{setShowCal(!showCal);setShowSet(false);}} style={{width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",color:C.lt,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{display:"flex",alignItems:"center",gap:10}}><span>📅</span> Show Calendar</span>
            <span style={{fontSize:12,color:showCal?C.ok:C.mut,fontWeight:600}}>{showCal?"ON":"OFF"}</span>
          </button>
          <div style={{borderTop:`1px solid ${C.brd}`,margin:"4px 0"}}/>
          <button onClick={()=>{setShowSet(false);onLogout();}} style={{width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",color:"#ef4444",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><span>🚪</span> Sign Out</button>
        </div>
      )}

      {/* JOB DROPDOWN */}
      <div style={{padding:"12px 20px",position:"relative"}} data-d>
        <button onClick={()=>setShowDD(!showDD)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:C.card,border:`1px solid ${showDD?C.org:C.brd}`,borderRadius:10,cursor:"pointer",color:C.txt}}>
          <span style={{fontSize:15,fontWeight:600}}>Select a Job</span>
          <span style={{color:C.mut,fontSize:14,transform:showDD?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
        </button>
        {showDD&&(
          <div style={{position:"absolute",left:20,right:20,top:"100%",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,marginTop:4,zIndex:90,boxShadow:"0 8px 24px rgba(0,0,0,0.5)",maxHeight:400,overflowY:"auto"}}>
            {act.length===0&&<div style={{padding:16,textAlign:"center",color:C.mut,fontSize:14}}>No active jobs</div>}
            {act.map(j=>{const s=stat(j.id,j.schedule);return(
              <button key={j.id} onClick={()=>{setSelJob(j);setShowDD(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
                {dot(s)}<div style={{flex:1}}><div style={{fontSize:15,fontWeight:600,color:C.txt}}>{j.name}</div><span style={{fontSize:11,color:C.mut}}>{SL[j.schedule]||j.schedule}</span></div>
              </button>);})}
          </div>
        )}
      </div>

      {/* MAIN CONTENT */}
      <div style={{maxWidth:600,margin:"0 auto",padding:"0 20px 20px"}}>

        {/* + NEW JOB BUTTON */}
        <button className="btn-o" onClick={()=>setShowNew(true)} style={{width:"100%",padding:"14px 0",background:C.org,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",marginBottom:20}}>+ New Job</button>

        {/* CALENDAR VIEW (all jobs) */}
        {showCal&&(
          <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"20px 18px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span style={{fontSize:20}}>📅</span>
              <span style={{fontWeight:700,fontSize:16,color:C.txt}}>Inspection Calendar</span>
            </div>
            <p style={{fontSize:13,color:C.mut,lineHeight:1.5}}>Calendar view across all jobs coming soon. Enable scheduling on individual jobs to start receiving inspection requests.</p>
          </div>
        )}

        {loading&&<p style={{textAlign:"center",color:C.mut,padding:40}}>Loading...</p>}

        {/* TOP 3 JOB CARDS */}
        {!loading&&top3.map(j=>{const s=stat(j.id,j.schedule);return(
          <button key={j.id} onClick={()=>setSelJob(j)} style={{width:"100%",textAlign:"left",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"16px 18px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
            {dot(s)}<div style={{flex:1}}><div style={{fontWeight:600,fontSize:16,color:C.txt,marginBottom:4}}>{j.name}</div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,fontWeight:600,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:6,padding:"2px 8px",color:C.mut}}>{SL[j.schedule]||j.schedule}</span>{j.site_address&&<span style={{fontSize:12,color:C.mut}}>{j.site_address}</span>}</div></div>
            <span style={{color:C.mut,fontSize:18}}>›</span>
          </button>);})}

        {/* EMPTY STATE */}
        {!loading&&act.length===0&&(
          <div style={{textAlign:"center",padding:"60px 20px",color:C.mut}}>
            <div style={{fontSize:48,marginBottom:16}}>📋</div>
            <p style={{fontSize:16,fontWeight:600,color:C.lt,marginBottom:6}}>No jobs yet</p>
            <p style={{fontSize:14}}>Tap "+ New Job" to create your first project</p>
          </div>
        )}

        {/* ARCHIVED JOBS LINK */}
        <button onClick={()=>setShowArch(true)} style={{width:"100%",padding:"14px 16px",background:"transparent",border:`1px solid ${C.brd}`,borderRadius:8,cursor:"pointer",marginTop:10,marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:600,color:C.mut}}>📁 ARCHIVED JOBS{arch.length>0?` (${arch.length})`:""}</span>
        </button>

        {/* TRAINING CENTER */}
        <div onClick={()=>alert("Training Center coming soon")} style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"16px 18px",marginTop:10,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:40,height:40,borderRadius:10,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🎓</div>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:15,color:C.txt,marginBottom:2}}>Training Center</div><div style={{fontSize:12,color:C.mut}}>Learn how to get the most out of My Daily Reports</div></div>
          <span style={{color:C.mut,fontSize:18}}>›</span>
        </div>
      </div>

      {/* FOOTER */}
      <div style={{textAlign:"center",padding:"24px 20px 32px",color:C.mut,fontSize:12}}>
        <a href="#" onClick={e=>{e.preventDefault();alert("Terms coming soon");}} style={{color:C.mut,textDecoration:"none"}}>Terms of Service</a>
        <span style={{margin:"0 8px"}}>•</span>
        <a href="#" onClick={e=>{e.preventDefault();alert("Privacy coming soon");}} style={{color:C.mut,textDecoration:"none"}}>Privacy Policy</a>
      </div>
    </div>
  );
}

/* ═══ APP — DEV BYPASS ═══ */
function App(){return<Dashboard user={DEV_USER} onLogout={()=>alert("Auth disabled during dev")}/>;}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

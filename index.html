                </div>
              </div>
            </div>

            {/* Save Button */}
            <button className="btn-o" onClick={saveProfile} disabled={saving} style={{width:"100%",padding:"14px 0",background:C.org,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:saving?"default":"pointer",opacity:saving?0.7:1,marginBottom:28}}>
              {saving?"Saving...":"Save Settings"}
            </button>

            {/* Danger Zone */}
            <div style={{marginBottom:28}}>
              <div style={{background:C.card,border:"1px solid #5c2023",borderRadius:12,padding:20}}>
                <div style={{fontWeight:700,fontSize:15,color:C.err,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
                  <span>⚠️</span> Danger Zone
                </div>

                {!showDelete?(
                  <button onClick={()=>setShowDelete(true)} style={{width:"100%",padding:"12px 16px",background:"transparent",border:"1px solid #5c2023",borderRadius:8,color:C.err,fontSize:14,fontWeight:600,cursor:"pointer"}}>
                    Delete My Account
                  </button>
                ):(
                  <div>
                    <div style={{fontSize:13,color:C.err,lineHeight:1.5,marginBottom:12}}>
                      This will permanently delete your account, all jobs, all reports, and all data. This action cannot be undone.
                    </div>
                    <div style={{marginBottom:12}}>
                      <label style={{...ls,color:C.err}}>Type "DELETE MY ACCOUNT" to confirm</label>
                      <input type="text" value={deleteConfirm} onChange={e=>setDeleteConfirm(e.target.value)} placeholder="DELETE MY ACCOUNT" style={{...fs,borderColor:"#5c2023"}}/>
                    </div>
                    <div style={{display:"flex",gap:10}}>
                      <button onClick={()=>{setShowDelete(false);setDeleteConfirm("");}} style={{flex:1,padding:"10px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer"}}>
                        Cancel
                      </button>
                      <button onClick={handleDelete} disabled={deleteConfirm!=="DELETE MY ACCOUNT"} style={{flex:1,padding:"10px 0",background:deleteConfirm==="DELETE MY ACCOUNT"?"#ef4444":C.brd,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:deleteConfirm==="DELETE MY ACCOUNT"?"pointer":"default",opacity:deleteConfirm==="DELETE MY ACCOUNT"?1:0.5}}>
                        Delete Permanently
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Sign Out */}
            <button onClick={onLogout} style={{width:"100%",padding:"14px 16px",background:"transparent",border:`1px solid ${C.brd}`,borderRadius:10,color:C.err,fontSize:15,fontWeight:600,cursor:"pointer",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span>🚪</span> Sign Out
            </button>

            <div style={{textAlign:"center",padding:"12px 0 24px",color:"#444",fontSize:11}}>
              My Daily Reports v1.0 • Built in San Diego, CA
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ── Create Job ── */
function CreateJob({user, onBack, onCreated}){
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const [jn,setJn]=useState("");
  const [addr,setAddr]=useState("");
  const [tf,setTf]=useState(null);
  const [tfBuf,setTfBuf]=useState(null); // cached ArrayBuffer of template file
  const [freqOn,setFreqOn]=useState(false);
  const [sched,setSched]=useState("");
  const [days,setDays]=useState([]);
  const [remOn,setRemOn]=useState(false);
  const [remT,setRemT]=useState("5:00 PM");
  const [remH,setRemH]=useState(2);
  const [schedOn,setSchedOn]=useState(false);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [drag,setDrag]=useState(false);
  const [parsing,setParsing]=useState(false);
  const [fields,setFields]=useState([]); // unified field list: {name, value, mode: "edit"|"lock"|"auto-date"|"auto-num"}

  const DS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const TS=["12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM","9:00 PM"];

  const togDay=(d)=>{setSched("custom");setDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);};
  const preset=(p)=>{setSched(p);setDays([]);if(p==="as_needed")setRemOn(false);};
  const effSch=()=>{if(!freqOn)return"as_needed";if(sched==="weekly"||sched==="as_needed")return sched;if(days.length===5&&["Mon","Tue","Wed","Thu","Fri"].every(d=>days.includes(d))&&!days.includes("Sat")&&!days.includes("Sun"))return"daily_mf";if(days.length===7)return"daily_7";if(days.length>0)return"custom";return sched||"as_needed";};

  const readFileAsBase64=async(f)=>{return new Promise((res)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(f);});};

  const extractDocxText=async(f)=>{
    const zip=await JSZip.loadAsync(f);
    const xml=await zip.file("word/document.xml").async("string");
    const parser=new DOMParser();
    const doc=parser.parseFromString(xml,"application/xml");
    const ns="http://schemas.openxmlformats.org/wordprocessingml/2006/main";
    const rows=doc.getElementsByTagNameNS(ns,"tr");
    let text="";
    for(let i=0;i<rows.length;i++){const cells=rows[i].getElementsByTagNameNS(ns,"tc");const cellTexts=[];for(let j=0;j<cells.length;j++){const paras=cells[j].getElementsByTagNameNS(ns,"t");let ct="";for(let k=0;k<paras.length;k++)ct+=paras[k].textContent;cellTexts.push(ct.trim());}text+=cellTexts.join(" | ")+"\n";}
    const paras=doc.getElementsByTagNameNS(ns,"p");let pText="";
    for(let i=0;i<paras.length;i++){const ts=paras[i].getElementsByTagNameNS(ns,"t");let line="";for(let j=0;j<ts.length;j++)line+=ts[j].textContent;if(line.trim())pText+=line.trim()+"\n";}
    return"TABLE CONTENT:\n"+text+"\nPARAGRAPH CONTENT:\n"+pText;
  };

  const parseFields=async(f)=>{
    setParsing(true);setErr("");setFields([]);
    try{
      const isPdf=f.name.toLowerCase().endsWith(".pdf");
      let payload;
      if(isPdf){const base64=await readFileAsBase64(f);payload={file_base64:base64,file_name:f.name};}
      else{const docText=await extractDocxText(f);payload={file_text:docText,file_name:f.name};}
      const resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY},
        body:JSON.stringify(payload)
      });
      if(!resp.ok){const errText=await resp.text();throw new Error("Parse API "+resp.status+": "+errText);}
      const parsed=await resp.json();
      if(parsed.error)throw new Error(parsed.error);
      // Merge editable + locked into one unified list (preserve coords for PDF fill)
      const all=[];
      (parsed.editable||[]).forEach(f=>{
        let mode="edit";
        if(f.autoFill==="date")mode="auto-date";
        else if(f.autoFill==="increment")mode="auto-num";
        all.push({name:f.name,value:f.value||"",mode,page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline});
      });
      (parsed.locked||[]).forEach(f=>{
        all.push({name:f.name,value:f.value||"",mode:"lock",page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline});
      });
      setFields(all);
    }catch(e){
      console.error("Parse error:",e);
      setErr("Could not parse template fields. You can still create the job and configure fields later.");
    }finally{setParsing(false);}
  };

  const doFile=async(f)=>{const e=f.name.split(".").pop().toLowerCase();if(!["docx","pdf"].includes(e)){setErr("Only .docx and .pdf");return;}setTf(f);setErr("");try{const buf=await f.arrayBuffer();setTfBuf(buf);}catch(bufErr){console.error("File buffer read:",bufErr);}parseFields(f);};

  // Field management
  const setFieldMode=(name,mode)=>{setFields(p=>p.map(f=>f.name===name?{...f,mode}:f));};
  const setFieldValue=(name,val)=>{setFields(p=>p.map(f=>f.name===name?{...f,value:val}:f));};

  // Mode button style helper
  const modeBtn=(fieldName,mode,label,color)=>{
    const active=fields.find(f=>f.name===fieldName)?.mode===mode;
    return(
      <button onClick={()=>setFieldMode(fieldName,mode)} style={{
        padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:4,cursor:"pointer",
        background:active?color:"transparent",
        border:`1px solid ${active?color:C.brd}`,
        color:active?"#fff":(color===C.brd?C.mut:color),
        whiteSpace:"nowrap"
      }}>{label}</button>
    );
  };

  const ok=jn.trim();

  const create=async()=>{
    if(!ok)return;setSaving(true);setErr("");
    try{
      const es=effSch();
      // Store the original uploaded filename (minus extension) exactly as the pattern
      const fnPattern=tf?tf.name.replace(/\.[^.]+$/,""):("DR_01_"+jn.trim().replace(/\s+/g,"_")+"_"+new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric",timeZone:tz}).replace(/\//g,""));
      const coords=(f)=>({page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline});
      const editFields=fields.filter(f=>f.mode==="edit").map(f=>({name:f.name,value:f.value,voiceEnabled:true,...coords(f)}));
      const lockFields=fields.filter(f=>f.mode==="lock").map(f=>({name:f.name,value:f.value,...coords(f)}));
      const autoFields=fields.filter(f=>f.mode==="auto-date"||f.mode==="auto-num").map(f=>({name:f.name,value:f.value,autoFill:f.mode==="auto-date"?"date":"increment",...coords(f)}));
      const job=await db.mkJob({user_id:user.id,name:jn.trim(),site_address:addr.trim()||null,report_filename_pattern:fnPattern,schedule:es,schedule_days:es==="custom"?days:[],reminder_enabled:remOn,reminder_time:remOn?remT:null,reminder_hours_before:remOn?remH:null,scheduling_enabled:schedOn,field_config:{editable:[...editFields,...autoFields],locked:lockFields}});
      if(tf&&job?.id){
        const ext=tf.name.split(".").pop().toLowerCase();
        // Use cached buffer (read once when file was selected) — prevents Safari file-release issues
        const fileBuf=tfBuf||await tf.arrayBuffer();
        const fileBlob=new Blob([fileBuf.slice(0)],{type:tf.type||"application/octet-stream"});
        const sp=await db.ulTpl(user.id,job.id,fileBlob,ext);
        let pagePaths=[];
        // Render PDF pages to images for preview cache (non-blocking)
        if(ext==="pdf"&&window.pdfjsLib){
          try{
            const pjDoc=await window.pdfjsLib.getDocument({data:fileBuf.slice(0)}).promise;
            const imgs=[];
            for(let i=1;i<=pjDoc.numPages;i++){
              const pg=await pjDoc.getPage(i);
              const vp=pg.getViewport({scale:1.5});
              const cvs=document.createElement("canvas");cvs.width=vp.width;cvs.height=vp.height;
              await pg.render({canvasContext:cvs.getContext("2d"),viewport:vp}).promise;
              imgs.push(cvs.toDataURL("image/jpeg",0.85));
              cvs.width=0;cvs.height=0;
            }
            pagePaths=await db.saveTemplatePages(user.id,job.id,imgs);
          }catch(pgErr){console.error("Template page render:",pgErr);}
        }
        const tplData={user_id:user.id,job_id:job.id,name:tf.name,original_filename:tf.name,file_type:ext,storage_path:sp,field_config:fields.length?fields:[]};
        if(pagePaths.length>0)tplData.structure_map={page_images:pagePaths};
        await db.mkTpl(tplData);
      }
      onCreated();
    }catch(e){setErr(e.message);}finally{setSaving(false);}
  };

  // Toggle box component
  const ToggleBox=({icon,label,desc,on,setOn,children})=>(
    <div style={{marginBottom:12,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{icon}</span>
          <span style={{fontSize:14,fontWeight:600,color:C.lt}}>{label}</span>
        </div>
        <button onClick={()=>setOn(!on)} style={{width:48,height:28,borderRadius:14,border:"none",cursor:"pointer",background:on?C.org:C.brd,position:"relative"}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:on?23:3,transition:"left 0.2s"}}/>
        </button>
      </div>
      {on&&<div style={{padding:"0 16px 16px",borderTop:`1px solid ${C.brd}`}}>{desc&&<div style={{fontSize:12,color:C.mut,marginTop:12,marginBottom:12}}>{desc}</div>}{children}</div>}
    </div>
  );

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const ls={display:"block",color:C.lt,fontSize:13,fontWeight:600,marginBottom:6};

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <span style={{fontWeight:700,fontSize:17}}>New Job</span>
      </div>
      <div style={{maxWidth:500,margin:"0 auto",padding:"24px 20px"}}>
        {err&&<div style={{background:"#2d1214",border:"1px solid #5c2023",borderRadius:8,padding:"10px 14px",marginBottom:16,color:C.err,fontSize:13}}>{err}</div>}

        {/* Job Name — required */}
        <div style={{marginBottom:20}}><label style={ls}>Job Name *</label><input type="text" placeholder="Oceanside District Office" value={jn} onChange={e=>setJn(e.target.value)} style={fs}/></div>

        {/* Site Address — optional */}
        <div style={{marginBottom:20}}><label style={ls}>Site Address</label><input type="text" placeholder="2111 Mission Ave, Oceanside CA 92058" value={addr} onChange={e=>setAddr(e.target.value)} style={fs}/></div>

        {/* Upload Template */}
        <div style={{marginBottom:20}}>
          <label style={ls}>Upload Template</label>
          {!tf?(
            <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files.length)doFile(e.dataTransfer.files[0]);}} onClick={()=>document.getElementById("fi").click()}
              style={{border:`2px dashed ${drag?C.org:C.brd}`,borderRadius:12,padding:"32px 20px",textAlign:"center",cursor:"pointer",background:drag?"#1f1a14":C.inp}}>
              <div style={{fontSize:32,marginBottom:8}}>📄</div>
              <p style={{color:C.lt,fontSize:14,fontWeight:600,marginBottom:4}}>Drop your Word or PDF template here</p>
              <p style={{color:C.mut,fontSize:12}}>or tap to browse • .docx or .pdf</p>
              <input id="fi" type="file" accept=".docx,.pdf" style={{display:"none"}} onChange={e=>e.target.files[0]&&doFile(e.target.files[0])}/>
            </div>
          ):(
            <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:24}}>📄</div>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:C.txt}}>{tf.name}</div><div style={{fontSize:12,color:C.mut}}>{(tf.size/1024).toFixed(0)} KB</div></div>
                <button onClick={()=>{setTf(null);setFields([]);}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18}}>✕</button>
              </div>
            </div>
          )}
        </div>

        {/* AI Parsing indicator */}
        {parsing&&(
          <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,padding:"20px",marginBottom:20,textAlign:"center"}}>
            <div style={{fontSize:24,marginBottom:8}}>🔍</div>
            <p style={{color:C.lt,fontSize:14,fontWeight:600}}>Analyzing template fields...</p>
            <p style={{color:C.mut,fontSize:12,marginTop:4}}>AI is detecting fillable fields in your document</p>
          </div>
        )}

        {/* ── Unified Field List ── */}
        {!parsing&&fields.length>0&&(
          <div style={{marginBottom:20}}>
            <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden"}}>
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:"rgba(232,116,42,0.06)"}}>
                <div style={{fontWeight:700,fontSize:14,color:C.org}}>Template Fields ({fields.length})</div>
                <div style={{fontSize:11,color:C.mut,marginTop:3}}>Set each field to Edit, Lock, or Auto-Date. Locked fields keep the same value every report.</div>
              </div>
              <div style={{padding:8,maxHeight:500,overflowY:"auto"}}>
                {fields.map(f=>(
                  <div key={f.name} style={{padding:"10px 12px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:8,marginBottom:6}}>
                    {/* Row 1: Field name + mode buttons */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{fontSize:13,fontWeight:700,color:C.txt,flex:1,marginRight:8}}>{f.name}</span>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        {modeBtn(f.name,"edit","Edit",C.org)}
                        {modeBtn(f.name,"lock","Lock",C.mut)}
                        {modeBtn(f.name,"auto-date","Auto-Date",C.blu)}
                        {modeBtn(f.name,"auto-num","Auto-#",C.blu)}
                      </div>
                    </div>
                    {/* Row 2: Value input — always visible */}
                    {f.mode!=="auto-date"&&f.mode!=="auto-num"&&(
                      <input
                        type="text"
                        value={f.value}
                        onChange={e=>setFieldValue(f.name,e.target.value)}
                        placeholder={f.mode==="lock"?"Set locked value...":"Default value (optional)"}
                        style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:6,color:C.txt,fontSize:13}}
                      />
                    )}
                    {f.mode==="auto-date"&&(
                      <div style={{fontSize:11,color:C.blu,fontStyle:"italic",padding:"4px 0"}}>Will auto-fill today's date on each report</div>
                    )}
                    {f.mode==="auto-num"&&(
                      <div style={{fontSize:11,color:C.blu,fontStyle:"italic",padding:"4px 0"}}>Will auto-increment (1, 2, 3...) on each report</div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── Three Toggle Boxes ── */}

        {/* 1. Jobsite Scheduling */}
        <ToggleBox icon="📅" label="Jobsite Scheduling" on={schedOn} setOn={setSchedOn}>
          <div style={{background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,padding:"12px 14px",marginTop:12}}>
            <p style={{fontSize:13,color:C.lt,lineHeight:1.5}}>Let your GC and subs request site visits through a shared calendar.</p>
            <p style={{fontSize:12,color:C.blu,marginTop:8,fontWeight:600}}>You'll set up the calendar link and team contacts on the job dashboard after creating this job.</p>
          </div>
        </ToggleBox>

        {/* 2. Report Frequency */}
        <ToggleBox icon="📊" label="Report Frequency" on={freqOn} setOn={v=>{setFreqOn(v);if(!v)setRemOn(false);}} desc="Set how often you'll file reports for this job">
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {DS.map(d=>{const a=days.includes(d);return<button key={d} onClick={()=>togDay(d)} style={{width:42,height:42,borderRadius:"50%",border:a?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:a?C.org:"transparent",color:a?"#fff":C.mut,fontWeight:600,fontSize:11,cursor:"pointer"}}>{d}</button>;})}
          </div>
          <div style={{display:"flex",gap:8}}>
            {[{k:"weekly",l:"Weekly"},{k:"as_needed",l:"As Needed"}].map(({k,l})=><button key={k} onClick={()=>preset(k)} style={{padding:"8px 14px",borderRadius:8,border:sched===k?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:sched===k?C.org:"transparent",color:sched===k?"#fff":C.mut,fontWeight:600,fontSize:12,cursor:"pointer"}}>{l}</button>)}
          </div>
        </ToggleBox>

        {/* 3. Reminders — only visible when Report Frequency is on */}
        {freqOn&&(
          <ToggleBox icon="🔔" label="Reminders" on={remOn} setOn={setRemOn} desc="Get reminded before your report is due">
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Submit by</label><select value={remT} onChange={e=>setRemT(e.target.value)} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{TS.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
              <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Remind me</label><select value={remH} onChange={e=>setRemH(Number(e.target.value))} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{[1,2,3,4,6].map(h=><option key={h} value={h}>{h} hr{h>1?"s":""} before</option>)}</select></div>
            </div>
          </ToggleBox>
        )}

        {/* Create Button — only requires job name */}
        <button className="btn-o" onClick={create} disabled={!ok||saving} style={{width:"100%",padding:"14px 0",background:ok?C.org:C.brd,border:ok?`1px solid ${C.blu}`:`1px solid ${C.brd}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:ok&&!saving?"pointer":"default",opacity:saving?0.7:1,marginTop:8}}>{saving?"Creating...":"Create Job"}</button>
      </div>
    </div>
  );
}

/* ── Archived Jobs ── */
function ArchivedJobs({jobs, onBack, onSelect}){
  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <span style={{fontWeight:700,fontSize:17}}>Archived Jobs</span>
        <span style={{fontSize:13,color:C.mut,marginLeft:"auto"}}>{jobs.length} job{jobs.length!==1?"s":""}</span>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"20px"}}>
        {jobs.length===0&&(<div style={{textAlign:"center",padding:"60px 20px",color:C.mut}}><div style={{fontSize:48,marginBottom:16}}>📁</div><p style={{fontSize:16,fontWeight:600,color:C.lt,marginBottom:6}}>No archived jobs</p><p style={{fontSize:14}}>Completed projects will appear here</p></div>)}
        {jobs.map(j=>(
          <button key={j.id} onClick={()=>onSelect(j)} style={{width:"100%",textAlign:"left",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"16px 18px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:20}}>📁</div>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:16,color:C.txt,marginBottom:4}}>{j.name}</div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,fontWeight:600,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:6,padding:"2px 8px",color:C.mut}}>{SL[j.schedule]||j.schedule}</span>{j.site_address&&<span style={{fontSize:12,color:C.mut}}>{j.site_address}</span>}</div></div>
            <span style={{color:C.mut,fontSize:18}}>›</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ── Report Editor ── */
function ReportEditor({job, user, onBack, reportDate}){
  const fc=job.field_config||{editable:[],locked:[]};
  const initEdit=[...(fc.editable||[])];
  const initLock=[...(fc.locked||[])];
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const todayISO=reportDate||new Date().toLocaleDateString("en-CA",{timeZone:tz});
  const todayDisplay=new Date(todayISO+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric",timeZone:tz});

  // Mutable field lists — locked fields can be unlocked/relocked
  const [lockFields,setLockFields]=useState(initLock);
  const [editFields,setEditFields]=useState(initEdit);
  const [showLocked,setShowLocked]=useState(false);
  const [lockEditing,setLockEditing]=useState(false);
  const [lockVals,setLockVals]=useState(()=>{const v={};initLock.forEach(f=>{v[f.name]=f.value||"";});return v;});
  const [loadingDraft,setLoadingDraft]=useState(true);
  const [draftId,setDraftId]=useState(null);

  // Editable field values
  const [vals,setVals]=useState(()=>{
    const v={};
    initEdit.forEach(f=>{
      if(f.autoFill==="date")v[f.name]=new Date().toLocaleDateString("en-US",{timeZone:tz});
      else if(f.autoFill==="increment")v[f.name]="";
      else v[f.name]=f.value||"";
    });
    return v;
  });
  const [notes,setNotes]=useState("");
  const [saving,setSaving]=useState(false);

  // Photo state
  const [photos,setPhotos]=useState([]);
  const [photoLayout,setPhotoLayout]=useState("2"); // "1","2","4"
  const photoRef=useRef(null);

  const [reportStatus,setReportStatus]=useState(null);
  // Load existing report on mount (works for both working_copy and submitted)
  useEffect(()=>{
    (async()=>{
      try{
        const rpt=await db.getReport(job.id,todayISO);
        if(rpt){
          setReportStatus(rpt.status);
          setDraftId(rpt.id);
          if(rpt.content){
            const c=typeof rpt.content==="string"?JSON.parse(rpt.content):rpt.content;
            if(c.vals)setVals(p=>({...p,...c.vals}));
            if(c.lockVals)setLockVals(p=>({...p,...c.lockVals}));
            if(c.notes)setNotes(c.notes);
            if(c.photos)setPhotos(c.photos);
            if(c.photoLayout)setPhotoLayout(c.photoLayout);
            if(c.lockFields)setLockFields(c.lockFields);
            if(c.editFields)setEditFields(c.editFields);
          }
        }
      }catch(e){console.error("Load report error:",e);}
      finally{setLoadingDraft(false);}
    })();
  },[]);

  const setVal=(name,val)=>setVals(p=>({...p,[name]:val}));
  const setLockVal=(name,val)=>setLockVals(p=>({...p,[name]:val}));

  // Permanently unlock a locked field — moves it to editable
  const unlockField=(name)=>{
    const f=lockFields.find(x=>x.name===name);
    if(!f)return;
    const newLock=lockFields.filter(x=>x.name!==name);
    const newEdit=[...editFields,{name:f.name,value:lockVals[name]||f.value||"",voiceEnabled:false,wasUnlocked:true}];
    setLockFields(newLock);
    setEditFields(newEdit);
    setVals(p=>({...p,[name]:lockVals[name]||f.value||""}));
    // Persist field config change to Supabase
    db.updateJobFieldConfig(job.id,{locked:newLock,editable:newEdit}).then(()=>{
      job.field_config={locked:newLock,editable:newEdit};
    }).catch(e=>console.error("Field config update error:",e));
  };

  // Re-lock an editable field that was previously unlocked
  const relockField=(name)=>{
    const f=editFields.find(x=>x.name===name);
    if(!f)return;
    const val=vals[name]||f.value||"";
    const newEdit=editFields.filter(x=>x.name!==name);
    const restored={name:f.name,value:val};
    const newLock=[...lockFields,restored];
    setEditFields(newEdit);
    setLockFields(newLock);
    setLockVals(p=>({...p,[name]:val}));
    // Remove from editable vals
    setVals(p=>{const n={...p};delete n[name];return n;});
    // Persist field config change to Supabase
    db.updateJobFieldConfig(job.id,{locked:newLock,editable:newEdit}).then(()=>{
      job.field_config={locked:newLock,editable:newEdit};
    }).catch(e=>console.error("Field config update error:",e));
  };

  // Save locked field value changes back to job config
  const saveLockEdits=()=>{
    const updated=lockFields.map(f=>({...f,value:lockVals[f.name]||f.value}));
    setLockFields(updated);
    setLockEditing(false);
    // Persist lock value changes to Supabase
    const newConfig={locked:updated,editable:editFields};
    db.updateJobFieldConfig(job.id,newConfig).then(()=>{
      job.field_config=newConfig;
    }).catch(e=>console.error("Field config update error:",e));
  };

  const handlePhoto=(e)=>{
    const files=Array.from(e.target.files||[]);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{setPhotos(p=>[...p,{id:Date.now()+Math.random(),src:ev.target.result,name:file.name}]);};
      reader.readAsDataURL(file);
    });
    // Reset input so same file can be re-selected
    if(photoRef.current)photoRef.current.value="";
  };

  const saveWorking=async()=>{
    setSaving(true);
    try{
      const content={vals,lockVals,notes,photos,photoLayout,lockFields,editFields};
      await db.saveReport({
        job_id:job.id,
        user_id:user.id,
        report_date:todayISO,
        status:"working_copy",
        content:JSON.stringify(content),
        updated_at:new Date().toISOString()
      });
      onBack();
    }catch(e){
      console.error("Save error:",e);
      alert("Save failed: "+e.message);
      setSaving(false);
    }
  };

  const [submitting,setSubmitting]=useState(false);
  const [previewPdf,setPreviewPdf]=useState(null); // {blob, base64, filename}
  const [toast,setToast]=useState("");

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  // Generate the filled PDF + build preview data
  const generatePdf=async()=>{
    setSubmitting(true);
    try{
      const {PDFDocument,rgb,StandardFonts}=PDFLib;

      // ── 1. Look up template ──
      const tplRecord=await db.getTemplate(job.id);
      if(!tplRecord||!tplRecord.storage_path)throw new Error("No template found. Upload a template in Job Settings first.");
      const tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{
        headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}
      });
      if(!tplResp.ok)throw new Error("Could not download template file.");
      const tplBytes=await tplResp.arrayBuffer();
      const tplBytesCopy=tplBytes.slice(0); // Save copy before pdf-lib consumes the buffer
      const isPdfTemplate=tplRecord.file_type==="pdf";

      // ── 2. Load template with pdf-lib ──
      let pdfDoc;
      if(isPdfTemplate){
        pdfDoc=await PDFDocument.load(tplBytes,{ignoreEncryption:true});
      }else{
        pdfDoc=await PDFDocument.create();pdfDoc.addPage([612,792]);
      }
      const font=await pdfDoc.embedFont(StandardFonts.Helvetica);
      const pages=pdfDoc.getPages();

      // ── 3. Build field values ──
      const allFields=[
        ...lockFields.map(f=>({...f,val:lockVals[f.name]||f.value||""})),
        ...editFields.map(f=>({...f,val:vals[f.name]||""}))
      ];

      // ── 4. Draw values onto template ──
      allFields.forEach(f=>{
        if(!f.x||!f.y||!f.val)return;
        const pageIdx=(f.page||1)-1;
        if(pageIdx<0||pageIdx>=pages.length)return;
        const page=pages[pageIdx];const pageH=page.getHeight();
        const sz=f.fontSize||10;const pdfY=pageH-f.y-sz;
        if(f.multiline&&f.w){
          const maxW=f.w;const words=f.val.split(" ");let lines=[];let line="";
          words.forEach(w=>{const test=line?line+" "+w:w;const tw=font.widthOfTextAtSize(test,sz);if(tw>maxW&&line){lines.push(line);line=w;}else line=test;});
          if(line)lines.push(line);
          lines.forEach((ln,i)=>{const ly=pdfY-(i*sz*1.2);if(ly>0)page.drawText(ln,{x:f.x,y:ly,size:sz,font,color:rgb(0,0,0)});});
        }else{
          page.drawText(String(f.val),{x:f.x,y:pdfY,size:sz,font,color:rgb(0,0,0)});
        }
      });

      // ── 5. Photos on new pages ──
      if(photos.length>0){
        const cols=parseInt(photoLayout)||2;
        for(let i=0;i<photos.length;i++){
          try{
            const imgData=photos[i].src||photos[i];
            let img;
            if(typeof imgData==="string"&&imgData.startsWith("data:image/png"))img=await pdfDoc.embedPng(imgData);
            else if(typeof imgData==="string")img=await pdfDoc.embedJpg(imgData);
            if(!img)continue;
            if(i%cols===0){const newPage=pdfDoc.addPage([612,792]);newPage.drawText("Photos — "+job.name,{x:36,y:760,size:12,font,color:rgb(0.4,0.4,0.4)});}
            const pg=pdfDoc.getPages()[pdfDoc.getPageCount()-1];
            const slot=i%cols;const imgW=(612-72-(cols-1)*12)/cols;const imgH=imgW*0.75;
            const xPos=36+slot*(imgW+12);const row=Math.floor((i%(cols*3))/cols);const yPos=720-(row*(imgH+12));
            pg.drawImage(img,{x:xPos,y:yPos-imgH,width:imgW,height:imgH});
          }catch(imgErr){console.error("Photo embed error:",imgErr);}
        }
      }

      // ── 6. Serialize filled PDF ──
      const filledPdfBytes=await pdfDoc.save();
      const pdfBlob=new Blob([filledPdfBytes],{type:"application/pdf"});
      const uint8=new Uint8Array(filledPdfBytes);
      let binary="";for(let i=0;i<uint8.length;i++)binary+=String.fromCharCode(uint8[i]);
      const pdfBase64=btoa(binary);
      // Get correct report number — count existing reports for this job + 1
      let rptNumber=1;
      try{const cntR=await fetch(`${SB_URL}/rest/v1/reports?select=id&job_id=eq.${job.id}`,{headers:db._h()});const allR=cntR.ok?await cntR.json():[];rptNumber=allR.length+1;}catch(e){}
      // If this report already exists (editing), use its existing number
      if(draftId){try{const exR=await fetch(`${SB_URL}/rest/v1/reports?select=report_number&id=eq.${draftId}`,{headers:db._h()});const exD=exR.ok?await exR.json():[];if(exD[0]?.report_number)rptNumber=exD[0].report_number;}catch(e){}}
      const rptNum=String(rptNumber).padStart(2,"0");
      const tzDate=new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric",timeZone:tz}).replace(/\//g,"");
      // Replace the DR number and date in the original filename pattern — don't add or rearrange anything
      let baseName=job.report_filename_pattern||("DR_"+rptNum+"_"+job.name.replace(/\s+/g,"_")+"_"+tzDate);
      baseName=baseName.replace(/\.\w+$/,"");
      // Replace first occurrence of a 2-digit number that looks like a DR sequence (after DR or Dr or dr)
      baseName=baseName.replace(/(DR|Dr|dr)(\D*)(\d{2})/, "$1$2"+rptNum);
      // Replace any 8-digit date pattern (MMDDYYYY) with today's date
      baseName=baseName.replace(/\d{8}/, tzDate);
      const pdfFilename=baseName+".pdf";

      // ── 7. Build preview: load cached template page images, overlay field values as HTML ──
      let templatePageUrls=[];
      let templatePageDims={w:612,h:792};// default letter size in pts
      const cachedPages=tplRecord.structure_map&&tplRecord.structure_map.page_images;
      if(cachedPages&&cachedPages.length>0){
        // Use cached page images from job creation
        templatePageUrls=cachedPages.map(p=>db.getTemplatePageUrl(p)+"?t="+Date.now());
      }else if(isPdfTemplate&&window.pdfjsLib&&tplBytesCopy){
        // Fallback: render template pages on-the-fly with pdf.js for jobs created before caching
        try{
          const pjDoc=await window.pdfjsLib.getDocument({data:tplBytesCopy}).promise;
          const rendered=[];
          for(let pi=1;pi<=pjDoc.numPages;pi++){
            const pg=await pjDoc.getPage(pi);
            const vp=pg.getViewport({scale:1.5});
            const cvs=document.createElement("canvas");cvs.width=vp.width;cvs.height=vp.height;
            await pg.render({canvasContext:cvs.getContext("2d"),viewport:vp}).promise;
            rendered.push(cvs.toDataURL("image/jpeg",0.85));
            cvs.width=0;cvs.height=0;
          }
          templatePageUrls=rendered;
          // Background-cache these images for future use
          if(user?.id&&job?.id){
            db.saveTemplatePages(user.id,job.id,rendered).then(paths=>{
              if(paths.length>0){
                fetch(`${SB_URL}/rest/v1/templates?job_id=eq.${job.id}`,{method:"PATCH",headers:db._h(),body:JSON.stringify({structure_map:{page_images:paths}})}).catch(()=>{});
              }
            }).catch(()=>{});
          }
        }catch(pjErr){console.error("Fallback page render:",pjErr);}
      }
      // Get actual page dimensions from the PDF
      if(pages.length>0){
        templatePageDims={w:pages[0].getWidth(),h:pages[0].getHeight()};
      }

      setPreviewPdf({blob:pdfBlob,base64:pdfBase64,filename:pdfFilename,
        templatePages:templatePageUrls,pageDims:templatePageDims,
        fields:allFields,photoCount:photos.length});
    }catch(e){
      console.error("PDF generation error:",e);
      showToast("Error: "+e.message);
    }finally{setSubmitting(false);}
  };

  // Final submit — save, upload, email
  const confirmSubmit=async()=>{
    if(!previewPdf)return;
    setSubmitting(true);
    try{
      // Save report as submitted
      const reportContent={vals,lockVals,notes,photos,photoLayout,lockFields,editFields};
      await db.saveReport({
        job_id:job.id,user_id:user.id,report_date:todayISO,status:"submitted",
        content:JSON.stringify(reportContent),updated_at:new Date().toISOString()
      });

      // Upload filled PDF to storage
      const storagePath=`${user.id}/${job.id}/reports/${previewPdf.filename}`;
      let upR=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
        method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/pdf"},
        body:previewPdf.blob
      });
      if(!upR.ok){await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
        method:"PUT",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/pdf"},
        body:previewPdf.blob
      });}

      // Build email body
      const userName=user.user_metadata?.full_name||user.email?.split("@")[0]||"Inspector";
      const photoNote=photos.length>0?`<p style="color:#555;font-size:14px;margin:12px 0 0;">${photos.length} site photo${photos.length>1?"s":""} included in the attached PDF.</p>`:"";
      const fieldSummary=editFields.filter(f=>vals[f.name]).map(f=>`<tr><td style="padding:4px 12px 4px 0;color:#888;font-size:13px;white-space:nowrap;">${f.name}</td><td style="padding:4px 0;color:#333;font-size:13px;">${vals[f.name]}</td></tr>`).join("");
      const summaryTable=fieldSummary?`<table style="margin:16px 0;border-collapse:collapse;">${fieldSummary}</table>`:"";
      const emailHtml=`<div style="font-family:-apple-system,sans-serif;max-width:600px;margin:0 auto;"><div style="background:#e8742a;padding:20px 24px;border-radius:8px 8px 0 0;"><h1 style="color:#fff;margin:0;font-size:20px;">My Daily Reports</h1></div><div style="background:#f9f9f9;padding:24px;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px;"><p style="color:#333;font-size:16px;line-height:1.6;margin:0 0 8px;">Hi,</p><p style="color:#333;font-size:15px;line-height:1.6;margin:0 0 16px;">${userName} has submitted the daily field report for <strong>${job.name}</strong> on ${todayDisplay}.</p>${summaryTable}<p style="color:#555;font-size:14px;margin:16px 0 0;">The full PDF report is attached to this email.${photoNote?"":" No site photos were included."}</p>${photoNote}</div><p style="color:#999;font-size:11px;text-align:center;margin-top:16px;">Sent via My Daily Reports &bull; mydailyreports.com</p></div>`;

      // Send email
      const teamEmails=job.team_emails||[];
      const userEmail=user.email;
      const recipients=[...new Set([userEmail,...teamEmails])].filter(Boolean);
      if(recipients.length>0){
        try{
          await fetch(`${SB_URL}/functions/v1/send-report`,{
            method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${SB_KEY}`,apikey:SB_KEY},
            body:JSON.stringify({to:recipients,subject:`${job.name} — Daily Report ${todayDisplay}`,html_body:emailHtml,pdf_base64:previewPdf.base64,pdf_filename:previewPdf.filename})
          });
        }catch(emailErr){console.error("Email send error:",emailErr);}
      }

      showToast("Report submitted!");
      setTimeout(()=>onBack(),1500);
    }catch(e){
      console.error("Submit error:",e);
      showToast("Submit failed: "+e.message);
    }finally{setSubmitting(false);}
  };

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const layouts=[{k:"1",l:"1 per page"},{k:"2",l:"2 side-by-side"},{k:"4",l:"4 per page"}];

  if(loadingDraft)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{color:C.mut}}>Loading report...</p></div>);

  // ── PDF Preview Screen ──
  if(previewPdf){
    const swipeState={sx:0};
    const swipeHandlers={
      onTouchStart:e=>{swipeState.sx=e.touches[0].clientX;},
      onTouchEnd:e=>{if(e.changedTouches[0].clientX-swipeState.sx>80)setPreviewPdf(null);}
    };
    const pd=previewPdf.pageDims||{w:612,h:792};
    const hasPages=previewPdf.templatePages&&previewPdf.templatePages.length>0;
    const renderOverlayPage=(pageNum,imgUrl)=>{
      const fieldsOnPage=(previewPdf.fields||[]).filter(f=>(f.page||1)===pageNum&&f.val&&f.x&&f.y);
      return(
        <div key={pageNum} style={{position:"relative",width:"100%",marginBottom:12,borderRadius:4,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.4)",background:"#fff",aspectRatio:`${pd.w}/${pd.h}`}}>
          {imgUrl&&<img src={imgUrl} style={{width:"100%",height:"100%",display:"block",objectFit:"contain"}} alt={"Page "+pageNum} crossOrigin="anonymous"/>}
          {!imgUrl&&<div style={{width:"100%",height:"100%",background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",color:"#999",fontSize:14}}>Template page {pageNum}</div>}
          {fieldsOnPage.map((f,i)=>{
            const leftPct=(f.x/pd.w)*100;
            const topPct=(f.y/pd.h)*100;
            const fsPct=((f.fontSize||10)/pd.h)*100;
            const maxWPct=f.w?((f.w/pd.w)*100):undefined;
            return(<div key={i} style={{position:"absolute",left:leftPct+"%",top:topPct+"%",fontSize:`min(${fsPct}vw, ${(f.fontSize||10)*1.5}px)`,color:"#000",fontFamily:"Helvetica,Arial,sans-serif",lineHeight:1.2,whiteSpace:f.multiline?"pre-wrap":"nowrap",maxWidth:maxWPct?maxWPct+"%":undefined,overflow:"hidden",pointerEvents:"none"}}>{f.val}</div>);
          })}
        </div>
      );
    };
    // Figure out how many pages the template has
    const pageCount=hasPages?previewPdf.templatePages.length:((previewPdf.fields||[]).reduce((mx,f)=>Math.max(mx,f.page||1),1));

    return(
      <div style={{minHeight:"100vh",background:C.bg,color:C.txt,display:"flex",flexDirection:"column"}} {...swipeHandlers}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
          <button onClick={()=>setPreviewPdf(null)} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <MDRLogo size={28}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:17}}>Review Report</div>
            <div style={{fontSize:12,color:C.mut}}>{previewPdf.filename}</div>
          </div>
        </div>
        <div style={{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch",paddingBottom:90}}>
          <div style={{padding:"12px 16px"}}>
            {Array.from({length:pageCount},(_, i)=>{
              const pgNum=i+1;
              const imgUrl=hasPages&&previewPdf.templatePages[i]?previewPdf.templatePages[i]:null;
              return renderOverlayPage(pgNum,imgUrl);
            })}
            {previewPdf.photoCount>0&&(
              <div style={{background:"#1a1a1a",borderRadius:8,padding:16,marginTop:8,textAlign:"center"}}>
                <span style={{color:C.mut,fontSize:13}}>{previewPdf.photoCount} photo{previewPdf.photoCount>1?"s":""} will be attached</span>
              </div>
            )}
          </div>
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,display:"flex",gap:10,padding:"14px 20px",borderTop:`1px solid ${C.brd}`,background:C.card,zIndex:100}}>
          <button onClick={()=>setPreviewPdf(null)} style={{flex:1,padding:"14px 0",background:"transparent",border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:15,fontWeight:700,cursor:"pointer"}}>
            Go Back & Edit
          </button>
          <button onClick={confirmSubmit} disabled={submitting} className="btn-o" style={{flex:1,padding:"14px 0",background:C.org,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:submitting?"default":"pointer",opacity:submitting?0.6:1}}>
            {submitting?"Sending...":"Submit & Send"}
          </button>
        </div>
        {toast&&<div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:C.card,border:`1px solid ${C.ok}`,borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600,color:C.ok,zIndex:9999}}>{toast}</div>}
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      {/* Toast */}
      {toast&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:C.card,border:`1px solid ${C.ok}`,borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600,color:C.ok,zIndex:9999}}>{toast}</div>}
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:17}}>{reportStatus==="submitted"?"Submitted Report":"Today's Report"}</div>
          <div style={{fontSize:12,color:C.mut}}>{job.name}</div>
        </div>
        {reportStatus==="submitted"&&<span style={{padding:"4px 10px",fontSize:11,fontWeight:700,borderRadius:6,background:C.ok+"22",color:C.ok}}>Submitted</span>}
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"20px"}}>
        <div style={{fontSize:14,color:C.mut,marginBottom:6,textAlign:"center"}}>{todayDisplay}</div>
        <div style={{fontSize:11,color:C.mut,textAlign:"center",marginBottom:20}}>Editable anytime • {tz.split("/").pop().replace(/_/g," ")}</div>

        {/* ── Locked Fields (collapsible) ── */}
        {lockFields.length>0&&(
          <div style={{marginBottom:16}}>
            <button onClick={()=>setShowLocked(!showLocked)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 16px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:showLocked?"12px 12px 0 0":12,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:16}}>🔒</span>
              <span style={{flex:1,fontWeight:700,fontSize:14,color:C.mut}}>Locked Fields</span>
              <span style={{fontSize:12,color:C.mut,background:C.inp,borderRadius:10,padding:"2px 10px",marginRight:6}}>{lockFields.length}</span>
              <span style={{color:C.mut,fontSize:12,transform:showLocked?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
            </button>
            {showLocked&&(
              <div style={{background:C.card,border:`1px solid ${C.brd}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"8px 16px 14px"}}>
                {/* Edit toggle */}
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
                  {!lockEditing?(
                    <button onClick={()=>setLockEditing(true)} style={{padding:"4px 12px",fontSize:12,fontWeight:700,borderRadius:6,border:`1px solid ${C.brd}`,background:"transparent",color:C.org,cursor:"pointer"}}>Edit</button>
                  ):(
                    <button onClick={saveLockEdits} style={{padding:"4px 12px",fontSize:12,fontWeight:700,borderRadius:6,border:`1px solid ${C.ok}`,background:C.ok,color:"#fff",cursor:"pointer"}}>Done</button>
                  )}
                </div>
                {lockFields.map((f,i)=>(
                  <div key={f.name} style={{padding:"8px 0",borderBottom:i<lockFields.length-1?`1px solid ${C.brd}`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:lockEditing?8:0}}>
                      <span style={{fontSize:13,color:C.mut}}>{f.name}</span>
                      {!lockEditing&&<span style={{fontSize:13,fontWeight:600,color:C.lt}}>{lockVals[f.name]||f.value||"—"}</span>}
                    </div>
                    {lockEditing&&(
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <input type="text" value={lockVals[f.name]||""} onChange={e=>setLockVal(f.name,e.target.value)} style={{...fs,flex:1,padding:"8px 10px",fontSize:13}}/>
                        <button onClick={()=>unlockField(f.name)} title="Permanently unlock this field" style={{padding:"6px 10px",fontSize:10,fontWeight:700,borderRadius:6,border:`1px solid ${C.org}`,background:"transparent",color:C.org,cursor:"pointer",whiteSpace:"nowrap"}}>Unlock</button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── Editable fields ── */}
        {editFields.length>0&&(
          <div style={{marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:700,color:C.org,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Fill In Today</div>
            {editFields.map(f=>{
              const isAuto=f.autoFill==="date"||f.autoFill==="increment";
              return(
                <div key={f.name} style={{marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <label style={{fontSize:13,fontWeight:600,color:C.lt}}>{f.name}</label>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      {f.autoFill==="date"&&<span style={{fontSize:10,fontWeight:700,color:C.blu,background:C.blu+"22",padding:"2px 8px",borderRadius:4}}>AUTO-DATE</span>}
                      {f.autoFill==="increment"&&<span style={{fontSize:10,fontWeight:700,color:C.blu,background:C.blu+"22",padding:"2px 8px",borderRadius:4}}>AUTO-#</span>}
                      {f.voiceEnabled&&<span style={{fontSize:10,fontWeight:700,color:C.org,background:C.org+"22",padding:"2px 8px",borderRadius:4}}>VOICE</span>}
                      {f.wasUnlocked&&(
                        <button onClick={()=>relockField(f.name)} title="Re-lock this field" style={{padding:"2px 8px",fontSize:10,fontWeight:700,borderRadius:4,border:`1px solid ${C.brd}`,background:"transparent",color:C.mut,cursor:"pointer"}}>🔒 Lock</button>
                      )}
                    </div>
                  </div>
                  {f.voiceEnabled?(
                    <textarea value={vals[f.name]||""} onChange={e=>setVal(f.name,e.target.value)} placeholder="Tap here and use your keyboard mic to dictate..." rows={4} style={{...fs,resize:"vertical",minHeight:80,lineHeight:1.5}}/>
                  ):(
                    <input type="text" value={vals[f.name]||""} onChange={e=>setVal(f.name,e.target.value)} readOnly={isAuto} placeholder={isAuto?"Auto-filled":"Enter value..."} style={{...fs,opacity:isAuto?0.6:1,cursor:isAuto?"default":"text"}}/>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {editFields.length===0&&lockFields.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:C.mut}}>
            <div style={{fontSize:36,marginBottom:12}}>📋</div>
            <p style={{fontSize:15,fontWeight:600,color:C.lt,marginBottom:6}}>No template fields configured</p>
            <p style={{fontSize:13}}>Go back and upload a template in your job settings to get started.</p>
          </div>
        )}

        {/* ── Notes ── */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:C.org,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Notes</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Tap here and use your keyboard mic to dictate notes throughout the day..." rows={6} style={{...fs,resize:"vertical",minHeight:120,lineHeight:1.6}}/>
          <div style={{fontSize:11,color:C.mut,marginTop:6}}>Use your phone's keyboard microphone to dictate hands-free</div>
        </div>

        {/* ── Photos ── */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:C.org,textTransform:"uppercase",letterSpacing:1}}>Photos</div>
            <div style={{display:"flex",gap:4}}>
              {layouts.map(({k,l})=>(
                <button key={k} onClick={()=>setPhotoLayout(k)} style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:4,cursor:"pointer",background:photoLayout===k?C.org:"transparent",border:`1px solid ${photoLayout===k?C.org:C.brd}`,color:photoLayout===k?"#fff":C.mut}}>{l}</button>
              ))}
            </div>
          </div>

          {/* Photo grid */}
          {photos.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:photoLayout==="1"?"1fr":photoLayout==="2"?"1fr 1fr":"1fr 1fr",gap:8,marginBottom:12}}>
              {photos.map(p=>(
                <div key={p.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:`1px solid ${C.brd}`,aspectRatio:photoLayout==="1"?"auto":"1"}}>
                  <img src={p.src} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <button onClick={()=>setPhotos(prev=>prev.filter(x=>x.id!==p.id))} style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",background:"rgba(0,0,0,0.7)",border:"none",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              ))}
            </div>
          )}

          {/* Two photo buttons */}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{photoRef.current.setAttribute("capture","environment");photoRef.current.click();}} style={{flex:1,padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span>📷</span> Take Photo
            </button>
            <button onClick={()=>{photoRef.current.removeAttribute("capture");photoRef.current.click();}} style={{flex:1,padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span>🖼️</span> Library
            </button>
          </div>
          <input ref={photoRef} type="file" accept="image/*" multiple onChange={handlePhoto} style={{display:"none"}}/>
          <div style={{fontSize:11,color:C.mut,marginTop:8}}>Photos will display as {layouts.find(l=>l.k===photoLayout)?.l} in the final PDF</div>
        </div>

        {/* ── Action buttons ── */}
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          {reportStatus!=="submitted"&&(
            <button onClick={saveWorking} disabled={saving} className="btn-o" style={{flex:1,padding:"14px 0",background:C.blu,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:saving?"default":"pointer",opacity:saving?0.6:1}}>
              {saving?"Saving...":"Save Working Copy"}
            </button>
          )}
          <button onClick={generatePdf} disabled={submitting} className="btn-o" style={{flex:1,padding:"14px 0",background:C.org,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:submitting?"default":"pointer",opacity:submitting?0.6:1}}>
            {submitting?"Generating PDF...":reportStatus==="submitted"?"Update & Resubmit":"Submit Report"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Job Detail (Job Dashboard) ── */
function JobDetail({job, user, onBack, onDeleted}){
  const [showDel,setShowDel]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [showJobSet,setShowJobSet]=useState(false);
  const [rpts,setRpts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showCompleted,setShowCompleted]=useState(false);
  const [showWorking,setShowWorking]=useState(false);
  const [showPhotos,setShowPhotos]=useState(false);
  const [showEditJob,setShowEditJob]=useState(false);
  const [showReport,setShowReport]=useState(false);
  const [showTeam,setShowTeam]=useState(false);
  const [editName,setEditName]=useState(job.name||"");
  const [editAddr,setEditAddr]=useState(job.site_address||"");
  const [editSaving,setEditSaving]=useState(false);
  const [teamEmails,setTeamEmails]=useState(job.team_emails||[]);
  const [newEmail,setNewEmail]=useState("");
  const [teamSaving,setTeamSaving]=useState(false);

  const loadReports=useCallback(async()=>{
    try{
      const r=await fetch(`${SB_URL}/rest/v1/reports?select=*&job_id=eq.${job.id}&order=report_date.desc`,{headers:db._h()});
      if(r.ok)setRpts(await r.json());
    }catch(e){console.error(e);}
    finally{setLoading(false);}
  },[job.id]);

  useEffect(()=>{loadReports();},[loadReports]);

  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const today=new Date().toLocaleDateString("en-CA",{timeZone:tz});
  const todayRpt=rpts.find(r=>r.report_date===today);
  const submitted=rpts.filter(r=>r.status==="submitted");
  const working=rpts.filter(r=>r.status!=="submitted");
  const nextNum=submitted.length+working.length+1;


  // Track if user has started today's report this session
  const [reportStarted,setReportStarted]=useState(false);

  const doDelete=async()=>{
    setDeleting(true);
    try{await db.deleteJob(job.id);onDeleted();}
    catch(e){alert("Delete failed: "+e.message);setDeleting(false);}
  };

  const saveJobEdit=async()=>{
    setEditSaving(true);
    try{
      const r=await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${job.id}`,{method:"PATCH",headers:db._h(),body:JSON.stringify({name:editName.trim(),site_address:editAddr.trim()||null})});
      if(!r.ok)throw new Error("Save failed");
      job.name=editName.trim();job.site_address=editAddr.trim()||null;
      setShowEditJob(false);
    }catch(e){alert(e.message);}
    finally{setEditSaving(false);}
  };

  const [editDate,setEditDate]=useState(null);
  const openReport=(date)=>{setEditDate(date||null);setReportStarted(true);setShowReport(true);};
  const closeReport=()=>{setShowReport(false);setEditDate(null);setLoading(true);loadReports();};

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const ls={display:"block",color:C.lt,fontSize:13,fontWeight:600,marginBottom:6};

  // Collapsible folder
  const Folder=({icon,label,count,color,open,setOpen,children})=>(
    <div style={{marginBottom:12}}>
      <button onClick={()=>setOpen(!open)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"16px 18px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:open?"12px 12px 0 0":12,cursor:"pointer",textAlign:"left"}}>
        <span style={{fontSize:20}}>{icon}</span>
        <span style={{flex:1,fontWeight:700,fontSize:15,color:color||C.txt}}>{label}</span>
        <span style={{fontSize:13,fontWeight:600,color:C.mut,background:C.inp,borderRadius:10,padding:"2px 10px",marginRight:8}}>{count}</span>
        <span style={{color:C.mut,fontSize:14,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
      </button>
      {open&&<div style={{background:C.card,border:`1px solid ${C.brd}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"4px 16px 12px"}}>{children}</div>}
    </div>
  );

  if(showReport)return<ReportEditor job={job} user={user} onBack={closeReport} reportDate={editDate}/>;

  if(loading)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{color:C.mut}}>Loading...</p></div>);

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:17}}>{job.name}</div>
          {job.site_address&&<div style={{fontSize:12,color:C.mut}}>{job.site_address}</div>}
        </div>
        <button onClick={()=>setShowJobSet(!showJobSet)} style={{width:34,height:34,borderRadius:8,background:C.inp,border:`1px solid ${showJobSet?C.org:C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,color:C.mut}}>⚙️</button>
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"20px"}}>

        {/* ── Today's Report ── */}
        <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:20,marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:22}}>📝</span>
              <div>
                <div style={{fontWeight:700,fontSize:16,color:C.txt}}>Today's Report</div>
                <div style={{fontSize:12,color:C.mut}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric",timeZone:tz})}</div>
              </div>
            </div>
            {todayRpt&&(
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:todayRpt.status==="submitted"?C.blu:C.org}}/>
                <span style={{fontSize:12,fontWeight:700,color:todayRpt.status==="submitted"?C.blu:C.org}}>{todayRpt.status==="submitted"?"Submitted":"In Progress"}</span>
              </div>
            )}
          </div>
          {todayRpt?(
            <button onClick={()=>openReport(today)} className="btn-o" style={{width:"100%",padding:"14px 0",background:C.blu,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>
              {todayRpt.status==="submitted"?"Edit Submitted Report":"Continue Editing"}
            </button>
          ):reportStarted?(
            <button onClick={()=>openReport(today)} className="btn-o" style={{width:"100%",padding:"14px 0",background:C.blu,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>
              Continue Editing
            </button>
          ):(
            <button onClick={()=>openReport(today)} className="btn-o" style={{width:"100%",padding:"14px 0",background:C.org,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>
              Start Today's Report
            </button>
          )}
        </div>

        {/* ── Photo Gallery ── */}
        <Folder icon="📸" label="Photos" count={0} color={C.blu} open={showPhotos} setOpen={setShowPhotos}>
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:36,marginBottom:8}}>📷</div>
            <p style={{fontSize:14,fontWeight:600,color:C.lt,marginBottom:4}}>Job Photo Gallery</p>
            <p style={{fontSize:12,color:C.mut,marginBottom:14}}>Store photos for this job to use in future reports</p>
            <button className="btn-o" style={{padding:"10px 24px",background:C.org,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>Take or Upload Photo</button>
          </div>
        </Folder>

        {/* ── Working Copies Folder ── */}
        <Folder icon="✏️" label="Working Copies" count={working.length} color={C.org} open={showWorking} setOpen={setShowWorking}>
          {working.length===0?(
            <div style={{textAlign:"center",padding:"16px 0",color:C.mut,fontSize:13}}>No drafts in progress</div>
          ):(
            working.map((r,i)=>{const wNum=String(r.report_number||1).padStart(2,"0");const wDate=new Date(r.report_date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric",timeZone:tz}).replace(/\//g,"");let rptName=job.report_filename_pattern||("DR_"+wNum+"_"+wDate);rptName=rptName.replace(/\.\w+$/,"").replace(/(DR|Dr|dr)(\D*)(\d{2})/,"$1$2"+wNum).replace(/\d{8}/,wDate);return(
              <button key={r.id} onClick={()=>openReport(r.report_date)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"transparent",border:"none",borderBottom:i<working.length-1?`1px solid ${C.brd}`:"none",cursor:"pointer",textAlign:"left"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:C.org,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:C.lt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rptName} — {new Date(r.report_date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",timeZone:tz})}</div>
                  <div style={{fontSize:11,color:C.mut}}>Last edited {r.updated_at?new Date(r.updated_at).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:tz}):""}</div>
                </div>
                <div style={{color:C.org,fontSize:20,flexShrink:0}}>›</div>
              </button>);})

          )}
        </Folder>

        {/* ── Completed Reports Folder ── */}
        <Folder icon="✅" label="Completed Reports" count={submitted.length} color={C.ok} open={showCompleted} setOpen={setShowCompleted}>
          {submitted.length===0?(
            <div style={{textAlign:"center",padding:"16px 0",color:C.mut,fontSize:13}}>No submitted reports yet</div>
          ):(
            submitted.map((r,i)=>{
              const rptDate=new Date(r.report_date+"T12:00:00").toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric",timeZone:tz}).replace(/\//g,"");
              const rptNum=String(r.report_number||i+1).padStart(2,"0");
              let rptName=job.report_filename_pattern||("DR_"+rptNum+"_"+rptDate);
              rptName=rptName.replace(/\.\w+$/,"").replace(/(DR|Dr|dr)(\D*)(\d{2})/,"$1$2"+rptNum).replace(/\d{8}/,rptDate);
              return(
              <button key={r.id} onClick={()=>openReport(r.report_date)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",marginBottom:i<submitted.length-1?0:0,borderBottom:i<submitted.length-1?`1px solid ${C.brd}`:"none",background:"transparent",border:"none",borderBottomWidth:i<submitted.length-1?1:0,borderBottomStyle:"solid",borderBottomColor:C.brd,cursor:"pointer",textAlign:"left"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:C.ok,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:C.lt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rptName}</div>
                  <div style={{fontSize:12,color:C.mut,marginTop:2}}>{new Date(r.report_date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",timeZone:tz})} — Submitted {r.updated_at?new Date(r.updated_at).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit",timeZone:tz}):""}</div>
                </div>
                <div style={{color:C.blu,fontSize:20,flexShrink:0}}>›</div>
              </button>
            );})
          )}
        </Folder>

        {/* ── Edit Job (inline) ── */}
        {showEditJob&&(
          <div style={{background:C.card,border:`1px solid ${C.org}`,borderRadius:12,padding:20,marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:15,color:C.org,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
              <span>✏️</span> Edit Job
            </div>
            <div style={{marginBottom:16}}><label style={ls}>Job Name *</label><input type="text" value={editName} onChange={e=>setEditName(e.target.value)} style={fs}/></div>
            <div style={{marginBottom:16}}><label style={ls}>Site Address</label><input type="text" value={editAddr} onChange={e=>setEditAddr(e.target.value)} style={fs}/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowEditJob(false)} style={{flex:1,padding:"12px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={saveJobEdit} disabled={editSaving||!editName.trim()} className="btn-o" style={{flex:1,padding:"12px 0",background:editName.trim()?C.org:C.brd,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:editName.trim()&&!editSaving?"pointer":"default",opacity:editSaving?0.6:1}}>
                {editSaving?"Saving...":"Save Changes"}
              </button>
            </div>
          </div>
        )}

        {/* ── Project Team (inline) ── */}
        {showTeam&&(
          <div style={{background:C.card,border:`1px solid ${C.blu}`,borderRadius:12,padding:20,marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:15,color:C.blu,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
              <span>👥</span> Project Team
            </div>
            <div style={{fontSize:12,color:C.mut,marginBottom:16,lineHeight:1.5}}>These people will receive an email with the report attached when you tap Submit Report.</div>
            {teamEmails.map((email,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<teamEmails.length-1?`1px solid ${C.brd}`:"none"}}>
                <div style={{width:32,height:32,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>📧</div>
                <span style={{flex:1,fontSize:14,color:C.lt,wordBreak:"break-all"}}>{email}</span>
                <button onClick={()=>{const updated=teamEmails.filter((_,j)=>j!==i);setTeamEmails(updated);}} style={{background:"none",border:"none",color:C.err,cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <input type="email" value={newEmail} onChange={e=>setNewEmail(e.target.value)} placeholder="name@company.com" onKeyDown={e=>{if(e.key==="Enter"&&newEmail.trim()&&newEmail.includes("@")){setTeamEmails(p=>[...p,newEmail.trim()]);setNewEmail("");}}} style={{flex:1,padding:"10px 12px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:14}}/>
              <button onClick={()=>{if(newEmail.trim()&&newEmail.includes("@")){setTeamEmails(p=>[...p,newEmail.trim()]);setNewEmail("");}}} style={{padding:"10px 16px",background:C.blu,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>
            </div>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button onClick={()=>setShowTeam(false)} style={{flex:1,padding:"12px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={async()=>{setTeamSaving(true);try{await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${job.id}`,{method:"PATCH",headers:db._h(),body:JSON.stringify({team_emails:teamEmails})});job.team_emails=teamEmails;setShowTeam(false);}catch(e){alert("Save failed: "+e.message);}finally{setTeamSaving(false);}}} disabled={teamSaving} className="btn-o" style={{flex:1,padding:"12px 0",background:C.blu,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:teamSaving?"default":"pointer",opacity:teamSaving?0.6:1}}>
                {teamSaving?"Saving...":"Save Team"}
              </button>
            </div>
          </div>
        )}

        {/* ── Job Settings Panel ── */}
        {showJobSet&&(
          <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden",marginBottom:16}}>
            <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.brd}`,background:"rgba(232,116,42,0.06)"}}>
              <div style={{fontWeight:700,fontSize:15,color:C.org}}>Job Settings</div>
            </div>
            <button onClick={()=>{setShowEditJob(!showEditJob);setEditName(job.name);setEditAddr(job.site_address||"");}} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 18px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:16}}>✏️</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>Edit Job Details</span>
            </button>
            <button onClick={()=>setShowTeam(!showTeam)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"14px 18px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>👥</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>Project Team</span>
              </div>
              <span style={{fontSize:11,color:C.mut,background:C.inp,borderRadius:10,padding:"2px 8px"}}>{teamEmails.length}</span>
            </button>
            <button onClick={()=>alert("Edit field config coming soon")} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 18px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:16}}>📋</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>Edit Template Fields</span>
            </button>
            <button onClick={()=>alert("Jobsite scheduling calendar setup coming soon. Once enabled, your GC and subs can request site visits through a shared link.")} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"14px 18px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>📅</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>Jobsite Scheduling</span>
              </div>
              <span style={{fontSize:11,color:job.scheduling_enabled?C.ok:C.mut,fontWeight:600}}>{job.scheduling_enabled?"ON":"OFF"}</span>
            </button>
            <div style={{padding:"14px 18px",borderTop:`1px solid #5c2023`}}>
              {!showDel?(
                <button onClick={()=>setShowDel(true)} style={{width:"100%",padding:"10px 16px",background:"transparent",border:"1px solid #5c2023",borderRadius:8,color:C.err,fontSize:13,fontWeight:600,cursor:"pointer"}}>Delete This Job</button>
              ):(
                <div>
                  <p style={{fontSize:12,color:C.err,lineHeight:1.5,marginBottom:10}}>Permanently delete "{job.name}" and all its reports, templates, and data. Cannot be undone.</p>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setShowDel(false)} style={{flex:1,padding:"10px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.lt,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                    <button onClick={doDelete} disabled={deleting} style={{flex:1,padding:"10px 0",background:"#ef4444",border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:deleting?"default":"pointer",opacity:deleting?0.6:1}}>
                      {deleting?"Deleting...":"Delete Permanently"}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    {icon:"📝",title:"Notes Throughout the Day",body:"The real power is taking notes throughout the day as things happen. Open your report, tap into the notes field, hit the mic, and narrate what you're seeing. Close the app, come back later, and your notes are right where you left them. Add more whenever you need to.",tip:"This is the core time-saver — instead of writing everything up at the end of the day, you capture it in real-time while you're on site."},

    {icon:"📁",title:"Download to Files",body:"When submitting, you choose whether to download the PDF directly to your phone or computer's files. The file is named using the naming convention you set during job creation.",tip:"Report numbering is sequential based on actual submissions — DR#1, DR#2, DR#3 — not based on calendar days. If you work Monday, Tuesday, and Friday, those are DR#1, DR#2, DR#3."},
    {icon:"📧",title:"Email Export",body:"You can also choose to email the report on submit. Enter the recipients and the PDF is attached automatically. Great for sending reports directly to your project team or client.",tip:"You can set default email recipients during job setup so you don't have to type them every time."},
    {icon:"🔄",title:"Re-Download or Resend",body:"Every submitted report lives in your Completed Reports folder on the job dashboard. You can re-download the PDF or resend it via email anytime. No need to regenerate anything — the PDF is already saved.",tip:null},

    {icon:"🗑️",title:"Delete a Job",body:"If you need to permanently remove a job and all its reports, open the job dashboard, tap the gear icon, and scroll to \"Delete This Job\". You'll have to confirm before anything is deleted. This cannot be undone.",tip:null},

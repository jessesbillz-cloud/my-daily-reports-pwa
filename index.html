<!DOCTYPE html>
<html lang="en">
<head>

  <script type="text/babel">
    const { useState, useEffect } = React;

       CONFIG

    const SUPABASE_URL = "https://wluvkmpncafugdbunlkw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsdXZrbXBuY2FmdWdkYnVubGt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU1MTUsImV4cCI6MjA4Nzg4MTUxNX0.HZpQ2xVGpf4EQ0BVDmIEuPqW5T_eNG5OqBNAqT03rH8";

    const C = {
      bg: "#0f0f0f",
      card: "#1a1a1a",

    };

    /* ─────────────────────────────────────────────
       SUPABASE AUTH CLIENT
    ─────────────────────────────────────────────── */
    const supabase = {
      _headers() {
        const h = {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        };
        const session = JSON.parse(localStorage.getItem("mdr_session") || "null");
        if (session?.access_token) {
          h.Authorization = `Bearer ${session.access_token}`;
        }
        return h;
      },

      async signUp(email, password, fullName) {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
          method: "POST",
          headers: this._headers(),
          body: JSON.stringify({ email, password, data: { full_name: fullName } }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message || data.msg || "Signup failed");
        if (data.access_token) {
          localStorage.setItem("mdr_session", JSON.stringify(data));
        }
        return data;
      },

      async signIn(email, password) {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: "POST",
          headers: this._headers(),
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error_description || data.msg || "Login failed");
        if (data.access_token) {
          localStorage.setItem("mdr_session", JSON.stringify(data));
        }
        return data;
      },

      async getUser() {
        const session = JSON.parse(localStorage.getItem("mdr_session") || "null");
        if (!session?.access_token) return null;
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: this._headers(),
        });
        if (!res.ok) {
          localStorage.removeItem("mdr_session");
          return null;
        }
        return await res.json();
      },

      async signOut() {
        const session = JSON.parse(localStorage.getItem("mdr_session") || "null");
        if (session?.access_token) {
          await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
            method: "POST",
            headers: this._headers(),
          }).catch(() => {});
        }
        localStorage.removeItem("mdr_session");
      },

      async refreshSession() {
        const session = JSON.parse(localStorage.getItem("mdr_session") || "null");
        if (!session?.refresh_token) return null;
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            apikey: SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ refresh_token: session.refresh_token }),
        });
        const data = await res.json();
        if (data.access_token) {
          localStorage.setItem("mdr_session", JSON.stringify(data));
          return data;
        }
        localStorage.removeItem("mdr_session");
        return null;
      },
    };


    /* ─────────────────────────────────────────────
       SUPABASE DATA HELPERS
    ─────────────────────────────────────────────── */
    const db = {
      _headers() {
        const h = {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          Prefer: "return=representation",
        };
        const session = JSON.parse(localStorage.getItem("mdr_session") || "null");
        if (session?.access_token) h.Authorization = `Bearer ${session.access_token}`;
        return h;
      },

      async getJobs() {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/jobs?select=*&order=created_at.asc`,
          { headers: this._headers() }
        );
        if (!res.ok) throw new Error("Failed to load jobs");
        return await res.json();
      },

      async getTodaysReports(jobIds) {
        if (!jobIds.length) return [];
        const today = new Date().toISOString().split("T")[0];
        const ids = jobIds.map(id => `"${id}"`).join(",");
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/reports?select=id,job_id,status,report_date&report_date=eq.${today}&job_id=in.(${ids})`,
          { headers: this._headers() }
        );
        if (!res.ok) return [];
        return await res.json();
      },
    };

    /* ─────────────────────────────────────────────
       SCHEDULE LABELS
    ─────────────────────────────────────────────── */
    const SCHEDULE_LABELS = {
      daily_mf: "Daily M-F",
      daily_7: "Daily 7 Days",
      weekly: "Weekly",
      as_needed: "As Needed",
      custom: "Custom",
    };

    /* ─────────────────────────────────────────────
       DASHBOARD — Section 2
    ─────────────────────────────────────────────── */
    function Dashboard({ user, onLogout }) {
      const [tab, setTab] = useState("jobs"); // "jobs" or "archive"
      const [jobs, setJobs] = useState([]);
      const [todaysReports, setTodaysReports] = useState([]);
      const [loadingJobs, setLoadingJobs] = useState(true);
      const [selectedJob, setSelectedJob] = useState(null);
      const [showSettings, setShowSettings] = useState(false);

      // Load jobs from Supabase
      useEffect(() => {
        loadJobs();
      }, []);

      const loadJobs = async () => {
        setLoadingJobs(true);
        try {
          const allJobs = await db.getJobs();
          setJobs(allJobs);
          // Get today's reports for status dots
          const activeIds = allJobs.filter(j => !j.is_archived).map(j => j.id);
          if (activeIds.length) {
            const reports = await db.getTodaysReports(activeIds);
            setTodaysReports(reports);
          }
        } catch (e) {
          console.error("Failed to load jobs:", e);
        } finally {
          setLoadingJobs(false);
        }
      };

      const activeJobs = jobs.filter(j => !j.is_archived);
      const archivedJobs = jobs.filter(j => j.is_archived);
      const displayJobs = tab === "jobs" ? activeJobs : archivedJobs;

      // Check if a job has a submitted report today
      const getJobStatus = (jobId, schedule) => {
        if (schedule === "as_needed") return "none";
        const report = todaysReports.find(r => r.job_id === jobId);
        if (!report) return "due"; // red
        if (report.status === "submitted") return "submitted"; // green
        return "working"; // orange — working copy exists
      };

      const statusDot = (status) => {
        if (status === "none") return null;
        const color = status === "submitted" ? C.success : status === "working" ? C.orange : "#ef4444";
        return (
          <div style={{
            width: 10, height: 10, borderRadius: "50%",
            background: color, flexShrink: 0,
          }} />
        );
      };

      // TODO: Section 3 will handle job detail view
      // For now, clicking a job just shows a placeholder
      if (selectedJob) {
        return (
          <div style={{ minHeight: "100vh", background: C.bg, color: C.text }}>
            {/* Header */}
            <div style={{
              display: "flex", alignItems: "center", gap: 12,
              padding: "16px 20px",
              borderBottom: `1px solid ${C.border}`,
              background: C.card,
            }}>
              <button onClick={() => setSelectedJob(null)} style={{
                background: "none", border: "none", color: C.muted,
                fontSize: 22, cursor: "pointer", padding: 0, lineHeight: 1,
              }}>←</button>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 17 }}>{selectedJob.name}</div>
                <div style={{ fontSize: 12, color: C.muted }}>
                  {SCHEDULE_LABELS[selectedJob.schedule] || selectedJob.schedule}
                </div>
              </div>
              <button style={{
                background: "none", border: "none",
                color: C.muted, fontSize: 18, cursor: "pointer",
              }}>⚙️</button>
            </div>

            {/* Placeholder for Section 4 — Job Detail View */}
            <div style={{
              maxWidth: 600, margin: "40px auto", padding: "0 20px", textAlign: "center",
            }}>
              <div style={{
                background: C.card, border: `1px solid ${C.border}`,
                borderRadius: 12, padding: 24,
              }}>
                <p style={{ fontWeight: 600, color: C.orange, marginBottom: 8 }}>
                  ✓ Section 2 Complete — Dashboard is working
                </p>
                <p style={{ color: C.muted, fontSize: 13 }}>
                  Section 3 will add job creation. Section 4 will build the 3-section layout here (Today's Report / Working Copies / Submitted Reports).
                </p>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: "100vh", background: C.bg, color: C.text, position: "relative" }}
          onClick={(e) => {
            // Close settings dropdown when clicking outside
            if (showSettings && !e.target.closest('[data-settings]')) setShowSettings(false);
          }}
        >
          {/* Header */}
          <div style={{
            display: "flex", alignItems: "center", justifyContent: "space-between",
            padding: "16px 20px",
            borderBottom: `1px solid ${C.border}`,
            background: C.card, position: "relative",
          }} data-settings>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              <div style={{
                width: 36, height: 36, borderRadius: 8,
                background: C.orange,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontWeight: 700, fontSize: 16, color: "#fff",
              }}>M</div>
              <span style={{ fontWeight: 700, fontSize: 18 }}>My Daily Reports</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button
                onClick={() => setShowSettings(!showSettings)}
                style={{
                  width: 36, height: 36, borderRadius: 8,
                  background: C.input, border: `1px solid ${C.border}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  cursor: "pointer", fontSize: 16, color: C.muted,
                }}
              >⚙️</button>
            </div>
          </div>

          {/* User Settings Dropdown */}
          {showSettings && (
            <div style={{
              position: "absolute", top: 68, right: 20,
              background: C.card, border: `1px solid ${C.border}`,
              borderRadius: 12, padding: "8px 0",
              minWidth: 220, zIndex: 100,
              boxShadow: "0 8px 24px rgba(0,0,0,0.5)",
            }}>
              {/* User info */}
              <div style={{
                padding: "12px 16px", borderBottom: `1px solid ${C.border}`,
              }}>
                <div style={{ fontWeight: 600, fontSize: 14, color: C.text, marginBottom: 2 }}>
                  {user?.user_metadata?.full_name || "Inspector"}
                </div>
                <div style={{ fontSize: 12, color: C.muted }}>{user?.email}</div>
              </div>

              {/* Menu items */}
              <button onClick={() => { setShowSettings(false); alert("Account settings coming soon"); }} style={{
                width: "100%", padding: "12px 16px", background: "none", border: "none",
                textAlign: "left", color: C.light, fontSize: 14, cursor: "pointer",
                display: "flex", alignItems: "center", gap: 10,
              }}>
                <span style={{ fontSize: 16 }}>👤</span> Account Settings
              </button>
              <button onClick={() => { setShowSettings(false); alert("Notification settings coming soon"); }} style={{

            borderBottom: `1px solid ${C.border}`,
            padding: "0 20px",

            {["jobs", "archive"].map((t) => (
              <button
                key={t}

                style={{

                  background: "transparent", border: "none",

                  fontWeight: 600, fontSize: 14,
                  cursor: "pointer",
                }}
              >{t === "jobs" ? "Jobs" : "Archive"}</button>
            ))}
          </div>

          {/* Body */}
          <div style={{ maxWidth: 600, margin: "0 auto", padding: "20px" }}>

            {/* + New Job button */}
            {tab === "jobs" && (
              <button
                className="btn-orange"
                onClick={() => {
                  // TODO: Section 3 will open job creation wizard
                  alert("Job creation coming in Section 3");
                }}
                style={{
                  width: "100%", padding: "14px 0",
                  background: C.orange, border: `1px solid ${C.blue}`,
                  borderRadius: 10, color: "#fff",
                  fontSize: 16, fontWeight: 700,
                  cursor: "pointer", marginBottom: 20,
                }}
              >+ New Job</button>
            )}

            {/* Loading */}
            {loadingJobs && (
              <p style={{ textAlign: "center", color: C.muted, padding: 40 }}>
                Loading jobs...
              </p>
            )}

            {/* Empty state */}
            {!loadingJobs && displayJobs.length === 0 && (
              <div style={{
                textAlign: "center", padding: "60px 20px",
                color: C.muted,
              }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>
                  {tab === "jobs" ? "📋" : "📦"}
                </div>
                <p style={{ fontSize: 16, fontWeight: 600, color: C.light, marginBottom: 6 }}>
                  {tab === "jobs" ? "No jobs yet" : "No archived jobs"}
                </p>
                <p style={{ fontSize: 14 }}>
                  {tab === "jobs"
                    ? "Tap \"+ New Job\" to create your first project"
                    : "Completed projects will appear here"
                  }
                </p>
              </div>
            )}

            {/* Job cards */}
            {!loadingJobs && displayJobs.map((job) => {
              const status = getJobStatus(job.id, job.schedule);
              return (
                <button
                  key={job.id}
                  onClick={() => setSelectedJob(job)}
                  style={{
                    width: "100%", textAlign: "left",
                    background: C.card, border: `1px solid ${C.border}`,
                    borderRadius: 12, padding: "16px 18px",
                    marginBottom: 10, cursor: "pointer",
                    display: "flex", alignItems: "center", gap: 14,
                  }}
                >
                  {/* Status dot */}
                  {statusDot(status)}

                  {/* Job info */}
                  <div style={{ flex: 1 }}>
                    <div style={{
                      fontWeight: 600, fontSize: 16, color: C.text,
                      marginBottom: 4,
                    }}>{job.name}</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{
                        fontSize: 11, fontWeight: 600,
                        background: C.input, border: `1px solid ${C.border}`,
                        borderRadius: 6, padding: "2px 8px",
                        color: C.muted,
                      }}>
                        {SCHEDULE_LABELS[job.schedule] || job.schedule}
                      </span>
                      {job.site_address && (
                        <span style={{ fontSize: 12, color: C.muted }}>
                          {job.site_address}
                        </span>
                      )}
                    </div>
                  </div>

                  {/* Chevron */}
                  <span style={{ color: C.muted, fontSize: 18 }}>›</span>
                </button>
              );
            })}

            {/* Training Center */}
            {tab === "jobs" && (
              <div
                onClick={() => {
                  // TODO: Link to training content
                  alert("Training Center coming soon");
                }}
                style={{
                  background: C.card, border: `1px solid ${C.border}`,
                  borderRadius: 12, padding: "16px 18px",
                  marginTop: 20, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 14,
                }}
              >
                <div style={{
                  width: 40, height: 40, borderRadius: 10,
                  background: C.input, border: `1px solid ${C.border}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 20, flexShrink: 0,
                }}>🎓</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 15, color: C.text, marginBottom: 2 }}>
                    Training Center
                  </div>
                  <div style={{ fontSize: 12, color: C.muted }}>
                    Learn how to get the most out of My Daily Reports
                  </div>
                </div>
                <span style={{ color: C.muted, fontSize: 18 }}>›</span>
              </div>
            )}
          </div>

          {/* Legal footer */}
          <div style={{
            textAlign: "center", padding: "24px 20px 32px",
            color: C.muted, fontSize: 12,
          }}>
            <a href="#" onClick={(e) => { e.preventDefault(); alert("Terms of Service coming soon"); }}
              style={{ color: C.muted, textDecoration: "none" }}
            >Terms of Service</a>
            <span style={{ margin: "0 8px" }}>•</span>
            <a href="#" onClick={(e) => { e.preventDefault(); alert("Privacy Policy coming soon"); }}
              style={{ color: C.muted, textDecoration: "none" }}
            >Privacy Policy</a>
          </div>
        </div>
      );
    }


    /* ─────────────────────────────────────────────
       AUTH SCREEN
    ─────────────────────────────────────────────── */
    function App() {
      const [mode, setMode] = useState("login");
      const [fullName, setFullName] = useState("");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [showPassword, setShowPassword] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [message, setMessage] = useState("");
      const [user, setUser] = useState(null);
      const [checkingSession, setCheckingSession] = useState(true);

      // Persistent login check
      useEffect(() => {
        (async () => {
          try {
            let u = await supabase.getUser();
            if (!u) {
              const refreshed = await supabase.refreshSession();
              if (refreshed) u = await supabase.getUser();
            }
            if (u?.id) setUser(u);
          } catch (e) {
            console.error("Session check failed:", e);
          } finally {
            setCheckingSession(false);
          }
        })();
      }, []);

      const handleSubmit = async () => {
        setError("");
        setMessage("");
        if (mode === "signup" && !fullName.trim()) { setError("Enter your full name"); return; }
        if (!email || !password) { setError("Enter your email and password"); return; }
        if (password.length < 6) { setError("Password must be at least 6 characters"); return; }
        setLoading(true);
        try {
          if (mode === "signup") {
            const data = await supabase.signUp(email, password, fullName.trim());
            if (data.access_token) {
              const u = await supabase.getUser();
              if (u?.id) { setUser(u); return; }
            }
            setMessage("Account created! Check your email to confirm, then come back and sign in.");
            setMode("login");
            setPassword("");
          } else {
            await supabase.signIn(email, password);
            const u = await supabase.getUser();
            if (u?.id) setUser(u);
          }
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const handleLogout = async () => {
        await supabase.signOut();
        setUser(null);
        setEmail("");
        setPassword("");
      };

      // Loading splash
      if (checkingSession) {
        return (
          <div style={{
            minHeight: "100vh", background: C.bg,
            display: "flex", alignItems: "center", justifyContent: "center",
            color: C.muted, fontSize: 15,
          }}>
            <div style={{ textAlign: "center" }}>
              <div style={{
                width: 48, height: 48, borderRadius: 12,
                background: C.orange,
                display: "flex", alignItems: "center", justifyContent: "center",
                margin: "0 auto 16px", fontSize: 22, fontWeight: 700, color: "#fff",
              }}>M</div>
              Loading...
            </div>
          </div>
        );
      }

      // Logged in
      if (user) return <Dashboard user={user} onLogout={handleLogout} />;

      // Auth form
      return (
        <div style={{
          minHeight: "100vh", background: C.bg,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: 20,
        }}>
          <div style={{
            width: "100%", maxWidth: 420,
            background: C.card,
            border: `1px solid ${C.border}`,
            borderRadius: 16, padding: 32,
          }}>
            {/* Logo placeholder */}
            <div style={{
              width: 48, height: 48, borderRadius: 12,
              background: C.orange,
              display: "flex", alignItems: "center", justifyContent: "center",
              margin: "0 auto 20px", fontSize: 22, fontWeight: 700, color: "#fff",
            }}>M</div>

            {/* Title */}
            <h1 style={{
              textAlign: "center", color: C.text,
              fontSize: 24, fontWeight: 700, margin: "0 0 6px",
            }}>My Daily Reports</h1>
            <p style={{
              textAlign: "center", color: C.muted,
              fontSize: 14, margin: "0 0 28px",
            }}>{mode === "login" ? "Sign in to access your reports and templates" : "Create your account to get started"}</p>

            {/* Tab toggle */}
            <div style={{
              display: "flex", background: C.input,
              borderRadius: 10, padding: 3, marginBottom: 24,
            }}>
              {["login", "signup"].map((m) => (
                <button
                  key={m}
                  onClick={() => { setMode(m); setError(""); setMessage(""); }}
                  style={{
                    flex: 1, padding: "10px 0",
                    border: "none", borderRadius: 8,
                    cursor: "pointer", fontSize: 14, fontWeight: 600,
                    background: mode === m ? C.orange : "transparent",
                    color: mode === m ? "#fff" : C.muted,
                  }}
                >{m === "login" ? "Login" : "Sign Up"}</button>
              ))}
            </div>

            {/* Error */}
            {error && (
              <div style={{
                background: "#2d1214", border: "1px solid #5c2023",
                borderRadius: 8, padding: "10px 14px",
                marginBottom: 16, color: C.error, fontSize: 13,
              }}>{error}</div>
            )}

            {/* Success message */}
            {message && (
              <div style={{
                background: "#0f2918", border: "1px solid #1a4a2a",
                borderRadius: 8, padding: "10px 14px",
                marginBottom: 16, color: C.success, fontSize: 13,
              }}>{message}</div>
            )}

            {/* Full Name — signup only */}
            {mode === "signup" && (
              <div style={{ marginBottom: 16 }}>
                <label style={{
                  display: "block", color: C.light,
                  fontSize: 13, fontWeight: 600, marginBottom: 6,
                }}>Full Name</label>
                <input
                  type="text"
                  placeholder="Jesse Saltzman"
                  value={fullName}
                  onChange={(e) => setFullName(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && handleSubmit()}
                  style={{
                    width: "100%", padding: "12px 14px",
                    background: C.input, border: `1px solid ${C.border}`,
                    borderRadius: 10, color: C.text, fontSize: 15,
                  }}
                />
              </div>
            )}

            {/* Email */}
            <div style={{ marginBottom: 16 }}>
              <label style={{
                display: "block", color: C.light,
                fontSize: 13, fontWeight: 600, marginBottom: 6,
              }}>Email</label>
              <input
                type="email"
                placeholder="you@example.com"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && handleSubmit()}
                style={{
                  width: "100%", padding: "12px 14px",
                  background: C.input, border: `1px solid ${C.border}`,
                  borderRadius: 10, color: C.text, fontSize: 15,
                }}
              />
            </div>

            {/* Password */}
            <div style={{ marginBottom: 24 }}>
              <label style={{
                display: "block", color: C.light,
                fontSize: 13, fontWeight: 600, marginBottom: 6,
              }}>Password</label>
              <div style={{ position: "relative" }}>
                <input
                  type={showPassword ? "text" : "password"}
                  placeholder="••••••••"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && handleSubmit()}
                  style={{
                    width: "100%", padding: "12px 48px 12px 14px",
                    background: C.input, border: `1px solid ${C.border}`,
                    borderRadius: 10, color: C.text, fontSize: 15,
                  }}
                />
                <button
                  type="button"
                  onClick={() => setShowPassword(!showPassword)}
                  style={{
                    position: "absolute", right: 12, top: "50%",
                    transform: "translateY(-50%)",
                    background: "none", border: "none",
                    color: C.muted, cursor: "pointer",
                    fontSize: 18, padding: 0, lineHeight: 1,
                  }}
                >{showPassword ? "🙈" : "👁"}</button>
              </div>
            </div>

            {/* Submit */}
            <button
              className="btn-orange"
              onClick={handleSubmit}
              disabled={loading}
              style={{
                width: "100%", padding: "14px 0",
                background: C.orange,
                border: `1px solid ${C.blue}`,
                borderRadius: 10, color: "#fff",
                fontSize: 16, fontWeight: 700,
                cursor: loading ? "wait" : "pointer",
                opacity: loading ? 0.7 : 1,
              }}
            >{loading ? "Please wait..." : mode === "login" ? "Sign In" : "Create Account"}</button>

            {/* Forgot password */}
            {mode === "login" && (
              <p style={{
                textAlign: "center", marginTop: 16, marginBottom: 0,
                color: C.muted, fontSize: 13,
              }}>
                <span
                  style={{ cursor: "pointer", color: C.blue }}
                  onClick={() => setMessage("Password reset coming soon.")}
                >Forgot your password?</span>
              </p>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

// Extract real text positions from PDF using pdf.js getTextContent()
// Returns array of {str, x, y, w, h, page, fontSize} in top-left origin coordinates
async function extractPdfTextStructure(pdfData){
  if(!window.pdfjsLib)throw new Error("pdf.js not loaded");
  // Always work on a copy so the caller's buffer isn't detached
  const safeCopy=new Uint8Array(pdfData instanceof ArrayBuffer?new Uint8Array(pdfData):pdfData);
  const doc=await window.pdfjsLib.getDocument({data:safeCopy}).promise;
  const allItems=[];
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const vp=page.getViewport({scale:1});
    const pageH=vp.height;
    const tc=await page.getTextContent();
    tc.items.forEach(item=>{
      if(!item.str||!item.str.trim())return;
      const tx=item.transform;
      const x=tx[4];
      const yBottom=tx[5];
      const fontSize=Math.round(Math.max(Math.abs(tx[0]),Math.abs(tx[3]))*10)/10||10;
      const y=pageH-yBottom-fontSize; // top-left origin, top of text
      const w=item.width||(item.str.length*fontSize*0.6); // estimate if missing
      const h=item.height||fontSize;
      allItems.push({str:item.str.trim(),x:Math.round(x*100)/100,y:Math.round(y*100)/100,w:Math.round(w*100)/100,h:Math.round(h*100)/100,page:p,fontSize:Math.round(fontSize*10)/10});
    });
  }
  return allItems;
}

// Auth helper — check for existing session (refresh token in Supabase cookie/localStorage)
async function authGetSession(){
  const stored=localStorage.getItem("mdr_session");
  if(!stored)return null;
  try{
    const session=JSON.parse(stored);
    // Try to refresh the token
    const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`,{
      method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
      body:JSON.stringify({refresh_token:session.refresh_token})
    });
    const d=await r.json();
    if(d.access_token){
      AUTH_TOKEN=d.access_token;
      localStorage.setItem("mdr_session",JSON.stringify({refresh_token:d.refresh_token}));
      return {id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{}};
    }
  }catch(e){}
  localStorage.removeItem("mdr_session");
  return null;
}

// Save session for persistence
function authSaveSession(refreshToken){
  if(refreshToken)localStorage.setItem("mdr_session",JSON.stringify({refresh_token:refreshToken}));
}

// Sign in and save session
async function authSignInAndSave(email,password){
  const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
    method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
    body:JSON.stringify({email,password})
  });
  const d=await r.json();
  if(d.access_token){
    AUTH_TOKEN=d.access_token;
    authSaveSession(d.refresh_token);
    return {id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{}};
  }
  throw new Error(d.error_description||d.msg||d.error||"Invalid email or password");
}

// Sign up and save session
async function authSignUpAndSave(email,password,fullName){
  const r=await fetch(`${SB_URL}/auth/v1/signup`,{
    method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
    body:JSON.stringify({email,password,data:{full_name:fullName}})
  });
  const d=await r.json();
  if(d.access_token){
    AUTH_TOKEN=d.access_token;
    authSaveSession(d.refresh_token);
    return {id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{full_name:fullName}};
  }
  if(d.id&&!d.access_token){
    throw new Error("CHECK_EMAIL");
  }
  throw new Error(d.error_description||d.msg||d.error||"Signup failed");
}

function authLogout(){
  AUTH_TOKEN=null;
  localStorage.removeItem("mdr_session");
}

/* ── Create Job ── */
function CreateJob({user, onBack, onCreated}){
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const [jn,setJn]=useState("");
  const [addr,setAddr]=useState("");
  const [tf,setTf]=useState(null);
  const [tfB64,setTfB64]=useState(null); // cached base64 string of template file (survives iOS Safari GC)
  const [freqOn,setFreqOn]=useState(false);
  const [sched,setSched]=useState("");
  const [days,setDays]=useState([]);
  const [remOn,setRemOn]=useState(false);
  const [remT,setRemT]=useState("5:00 PM");
  const [remH,setRemH]=useState(2);
  const [schedOn,setSchedOn]=useState(false);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [drag,setDrag]=useState(false);
  const [parsing,setParsing]=useState(false);
  const [fields,setFields]=useState([]); // unified field list: {name, value, mode: "edit"|"lock"|"auto-date"|"auto-num"}
  const [savedTpls,setSavedTpls]=useState([]); // user's saved/reusable templates
  const [loadingSaved,setLoadingSaved]=useState(true);
  const [showSaved,setShowSaved]=useState(false);
  const [usedSavedId,setUsedSavedId]=useState(null); // id of saved template being used
  const [reportTitle,setReportTitle]=useState(""); // editable report title (for saved template reuse)
  const [fnConvention,setFnConvention]=useState(null); // AI-detected: {pattern, dateFormat, numberPadding}
  const [savingTpl,setSavingTpl]=useState(false);
  const [tplSaved,setTplSaved]=useState(false); // whether current parse was saved
  const [jobType,setJobType]=useState("template"); // "template" or "worklog"
  const trackParseAttempt=()=>{};

  // Load saved templates on mount
  useEffect(()=>{
    db.getSavedTemplates(user.id).then(t=>{setSavedTpls(t);setLoadingSaved(false);}).catch(()=>setLoadingSaved(false));
  },[user.id]);

  const DS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const TS=["12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM","9:00 PM"];

  const togDay=(d)=>{setSched("custom");setDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);};
  const preset=(p)=>{setSched(p);setDays([]);if(p==="as_needed")setRemOn(false);};
  const effSch=()=>{if(!freqOn)return"as_needed";if(sched==="weekly"||sched==="as_needed")return sched;if(days.length===5&&["Mon","Tue","Wed","Thu","Fri"].every(d=>days.includes(d))&&!days.includes("Sat")&&!days.includes("Sun"))return"daily_mf";if(days.length===7)return"daily_7";if(days.length>0)return"custom";return sched||"as_needed";};

  const readFileAsBase64=async(f)=>{return new Promise((res)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(f);});};

  const parseFields=async(buf,fileName)=>{
    setParsing(true);setErr("");setFields([]);
    trackParseAttempt(fileName);
    try{
      // Step 1: Extract real text positions client-side with pdf.js
      console.log("[parseFields] Step 1: extracting text from PDF...");
      const textItems=await extractPdfTextStructure(new Uint8Array(buf));
      console.log("[parseFields] Extracted",textItems.length,"text items");
      // Step 2: Send text items (not base64 PDF) to edge function for semantic mapping
      const payload={text_items:textItems,file_name:fileName};
      console.log("[parseFields] Step 2: calling edge function, payload size:",JSON.stringify(payload).length);
      const resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY},
        body:JSON.stringify(payload)
      });
      console.log("[parseFields] Edge function responded:",resp.status);
      if(!resp.ok){const errText=await resp.text();console.error("[parseFields] Error body:",errText);throw new Error("Parse API "+resp.status+": "+errText);}
      const parsed=await resp.json();
      console.log("[parseFields] Parsed result keys:",Object.keys(parsed));
      if(parsed.error)throw new Error(parsed.error);
      // Merge editable + locked into one unified list (preserve coords for PDF fill)
      const all=[];const seenNames=new Set();
      const NOTES_KW=["notes","observations","comments"];
      const isNotesField=(n)=>NOTES_KW.some(k=>(n||"").toLowerCase().includes(k));
      let notesAdded=false;
      const addUnique=(f,mode)=>{
        const key=(f.name||"").toLowerCase().trim();
        if(seenNames.has(key))return;
        // Only allow ONE notes-like field (first one wins)
        if(isNotesField(f.name)){if(notesAdded)return;notesAdded=true;}
        seenNames.add(key);
        all.push({name:f.name,value:f.value||"",mode,page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline,voiceEnabled:f.voiceEnabled});
      };
      (parsed.editable||[]).forEach(f=>{
        let mode="edit";
        if(f.autoFill==="date")mode="auto-date";
        else if(f.autoFill==="increment")mode="auto-num";
        addUnique(f,mode);
      });
      (parsed.locked||[]).forEach(f=>{addUnique(f,"lock");});
      setFields(all);
      // Store AI-detected filename convention (dateFormat, numberPadding) for auto-numbering
      if(parsed.filenameConvention)setFnConvention(parsed.filenameConvention);
    }catch(e){
      console.error("Parse error:",e);
      setErr("Could not parse template fields. You can still create the job and configure fields later.");
    }finally{setParsing(false);}
  };

  // Parse DOCX template — sends raw file to edge function for XML extraction + AI analysis
  const parseDocxFields=async(buf,fileName)=>{
    setParsing(true);setErr("");setFields([]);
    trackParseAttempt(fileName);
    try{
      // Convert ArrayBuffer to base64
      const bytes=new Uint8Array(buf);
      let binary="";for(let i=0;i<bytes.length;i++)binary+=String.fromCharCode(bytes[i]);
      const b64=btoa(binary);
      const resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY},
        body:JSON.stringify({docx_base64:b64,file_name:fileName})
      });
      if(!resp.ok){const errText=await resp.text();throw new Error("Parse API "+resp.status+": "+errText);}
      const parsed=await resp.json();
      if(parsed.error)throw new Error(parsed.error);
      // Same merge logic as PDF path
      const all=[];const seenNames=new Set();
      const NOTES_KW=["notes","observations","comments"];
      const isNotesField=(n)=>NOTES_KW.some(k=>(n||"").toLowerCase().includes(k));
      let notesAdded=false;
      const addUnique=(f,mode)=>{
        const key=(f.name||"").toLowerCase().trim();
        if(seenNames.has(key))return;
        if(isNotesField(f.name)){if(notesAdded)return;notesAdded=true;}
        seenNames.add(key);
        all.push({name:f.name,value:f.value||"",mode,page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline,voiceEnabled:f.voiceEnabled});
      };
      (parsed.editable||[]).forEach(f=>{
        let mode="edit";
        if(f.autoFill==="date")mode="auto-date";
        else if(f.autoFill==="increment")mode="auto-num";
        addUnique(f,mode);
      });
      (parsed.locked||[]).forEach(f=>{addUnique(f,"lock");});
      setFields(all);
      if(parsed.filenameConvention)setFnConvention(parsed.filenameConvention);
    }catch(e){
      console.error("DOCX parse error:",e);
      setErr("Could not parse DOCX fields: "+e.message);
    }finally{setParsing(false);}
  };

  const ALLOWED_EXTS=["pdf","docx","doc","jpg","jpeg","png"];
  const doFile=async(f)=>{
    const e=f.name.split(".").pop().toLowerCase();
    if(!ALLOWED_EXTS.includes(e)){setErr("Accepted formats: PDF, DOCX, JPG, PNG");return;}
    setTf(f);setErr("");setUsedSavedId(null);setReportTitle(f.name.replace(/\.[^.]+$/,""));setFnConvention(null);setTplSaved(false);
    try{
      const buf=await f.arrayBuffer();
      // Store as base64 string — immune to iOS Safari releasing the file buffer
      const u8=new Uint8Array(buf);const chunks=[];for(let i=0;i<u8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,u8.subarray(i,i+8192)));
      setTfB64(btoa(chunks.join("")));
      if(e==="pdf"){
        parseFields(buf.slice(0),f.name);
      }else if(e==="docx"||e==="doc"){
        parseDocxFields(buf.slice(0),f.name);
      }else{
        setFields([]);setParsing(false);
      }
    }catch(bufErr){console.error("File buffer read:",bufErr);setErr("Could not read file. Try again.");}
  };

  // Use a saved template — loads fields without re-parsing, but still needs the actual file uploaded
  // Job-specific locked fields become editable so user can enter new values for the new job
  const JOB_SPECIFIC_FIELDS=["project name","project no","project number","owner","client","district","dsa file","dsa file #","dsa app","dsa app #","contractor","architect","engineer","inspector","ior","project inspector","project manager","address","location","jurisdiction"];
  const useSavedTemplate=async(tpl)=>{
    const raw=tpl.field_config||[];
    // Extract filename convention if embedded (from admin provisioning)
    const convEntry=raw.find(f=>f._type==="filenameConvention");
    const fieldEntries=raw.filter(f=>!f._type);
    if(convEntry){const{_type,...conv}=convEntry;setFnConvention(conv);}
    // Convert job-specific locked fields to editable with cleared values
    const adjusted=fieldEntries.map(f=>{
      if(f.mode==="lock"){
        const nameLC=(f.name||"").toLowerCase().trim();
        const isJobSpecific=JOB_SPECIFIC_FIELDS.some(js=>nameLC===js||nameLC.includes(js));
        if(isJobSpecific)return{...f,mode:"edit",value:"",lockAfterCreate:true};
      }
      return{...f};
    });
    setFields(adjusted);
    setUsedSavedId(tpl.id);
    setReportTitle(tpl.original_filename?tpl.original_filename.replace(/\.[^.]+$/,""):(tpl.name||""));
    setTplSaved(true);
    setShowSaved(false);
    setErr("");
    // If admin-provisioned template has a storage_path, auto-download the file
    if(tpl.storage_path){
      try{
        const resp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tpl.storage_path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}});
        if(resp.ok){
          const blob=await resp.blob();
          const ext=tpl.file_type||tpl.original_filename?.split(".").pop().toLowerCase()||"pdf";
          const file=new File([blob],tpl.original_filename||`template.${ext}`,{type:blob.type});
          setTf(file);
          // Store as base64
          const u8=new Uint8Array(await blob.arrayBuffer());
          const chunks=[];for(let i=0;i<u8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,u8.subarray(i,i+8192)));
          setTfB64(btoa(chunks.join("")));
        }
      }catch(dlErr){console.error("Auto-download template:",dlErr);/* User can still upload manually */}
    }
  };

  // When file is uploaded after selecting a saved template, skip parsing
  const doFileWithSaved=async(f)=>{
    const e=f.name.split(".").pop().toLowerCase();
    if(!ALLOWED_EXTS.includes(e)){setErr("Accepted formats: PDF, DOCX, JPG, PNG");return;}
    setTf(f);setErr("");
    try{const buf=await f.arrayBuffer();const u8=new Uint8Array(buf);const chunks=[];for(let i=0;i<u8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,u8.subarray(i,i+8192)));setTfB64(btoa(chunks.join("")));}catch(bufErr){console.error("File buffer read:",bufErr);setErr("Could not read file. Try again.");}
    // Fields already loaded from saved template — no parsing needed
  };

  // Save current parsed fields as a reusable template
  const saveAsTemplate=async()=>{
    if(!fields.length||!tf)return;
    setSavingTpl(true);
    try{
      await db.saveParsedTemplate({
        user_id:user.id,
        name:tf.name.replace(/\.[^.]+$/,""),
        original_filename:tf.name,
        file_type:tf.name.split(".").pop().toLowerCase(),
        field_config:fields,
        storage_path:null // file stays with the job, this just saves the field mapping
      });
      setTplSaved(true);
      // Refresh the list
      const updated=await db.getSavedTemplates(user.id);
      setSavedTpls(updated);
    }catch(e){setErr("Could not save template: "+e.message);}
    finally{setSavingTpl(false);}
  };

  // Field management
  const setFieldMode=(name,mode)=>{setFields(p=>p.map(f=>f.name===name?{...f,mode}:f));};
  const setFieldValue=(name,val)=>{setFields(p=>p.map(f=>f.name===name?{...f,value:val}:f));};

  // Mode button style helper
  const modeBtn=(fieldName,mode,label,color)=>{
    const active=fields.find(f=>f.name===fieldName)?.mode===mode;
    return(
      <button onClick={()=>setFieldMode(fieldName,mode)} style={{
        padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:4,cursor:"pointer",
        background:active?color:"transparent",
        border:`1px solid ${active?color:C.brd}`,
        color:active?"#fff":(color===C.brd?C.mut:color),
        whiteSpace:"nowrap"
      }}>{label}</button>
    );
  };

  const ok=jn.trim();

  const create=async()=>{
    if(!ok){setErr("Job name is required.");return;}setSaving(true);setErr("");
    try{
      const es=effSch();
      // Use edited report title as the pattern — user can tweak what AI detected
      const filePattern=reportTitle.trim()||(tf?tf.name.replace(/\.[^.]+$/,""):"");
      // Store the AI-detected convention (dateFormat, numberPadding) alongside the pattern
      const convention=fnConvention?{pattern:filePattern,dateFormat:fnConvention.dateFormat||"",numberPadding:fnConvention.numberPadding||0}:{pattern:filePattern,dateFormat:"",numberPadding:0};
      const coords=(f)=>({page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline});
      // Fields marked lockAfterCreate (from saved template reuse) go back to locked with the user's new values
      const editFields=fields.filter(f=>f.mode==="edit"&&!f.lockAfterCreate).map(f=>({name:f.name,value:"",originalValue:f.value||"",voiceEnabled:true,...coords(f)}));
      const lockFields=[...fields.filter(f=>f.mode==="lock"),...fields.filter(f=>f.mode==="edit"&&f.lockAfterCreate)].map(f=>({name:f.name,value:f.value,...coords(f)}));
      const autoFields=fields.filter(f=>f.mode==="auto-date"||f.mode==="auto-num").map(f=>({name:f.name,value:f.value,originalValue:f.value||"",autoFill:f.mode==="auto-date"?"date":"increment",...coords(f)}));
      const fc={editable:[...editFields,...autoFields],locked:lockFields,filenameConvention:convention};
      const job=await db.mkJob({user_id:user.id,name:jn.trim(),site_address:addr.trim()||null,job_type:jobType,report_filename_pattern:filePattern,schedule:es,schedule_days:es==="custom"?days:[],reminder_enabled:remOn,reminder_time:remOn?remT:null,reminder_hours_before:remOn?remH:null,scheduling_enabled:schedOn,field_config:fc});
      if(tf&&job?.id){
        try{
          const ext=tf.name.split(".").pop().toLowerCase();
          // Convert from base64 string back to Blob for upload
          if(!tfB64)throw new Error("Template file data was lost. Please go back and re-upload the file.");
          const raw=atob(tfB64);const u8=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)u8[i]=raw.charCodeAt(i);
          const fileBuf=u8.buffer;
          const fileBlob=new Blob([u8],{type:tf.type||"application/octet-stream"});
          const sp=await db.ulTpl(user.id,job.id,fileBlob,ext);
          let pagePaths=[];
          // Render PDF pages to images for preview cache (non-blocking)
          if(ext==="pdf"&&window.pdfjsLib){
            try{
              const renderBuf=fileBuf.slice(0);
              const pjDoc=await window.pdfjsLib.getDocument({data:renderBuf}).promise;
              const imgs=[];
              for(let i=1;i<=pjDoc.numPages;i++){
                const pg=await pjDoc.getPage(i);
                const vp=pg.getViewport({scale:1.5});
                const cvs=document.createElement("canvas");cvs.width=vp.width;cvs.height=vp.height;
                await pg.render({canvasContext:cvs.getContext("2d"),viewport:vp}).promise;
                imgs.push(cvs.toDataURL("image/jpeg",0.85));
                cvs.width=0;cvs.height=0;
              }
              pagePaths=await db.saveTemplatePages(user.id,job.id,imgs);
            }catch(pgErr){console.error("Template page render:",pgErr);}
          }
          const tplData={user_id:user.id,job_id:job.id,name:tf.name,original_filename:tf.name,file_type:ext,storage_path:sp,field_config:fields.length?fields:[]};
          if(pagePaths.length>0)tplData.structure_map={page_images:pagePaths};
          await db.mkTpl(tplData);
        }catch(tplErr){
          // Template upload failed — clean up the orphan job so no ghost card appears
          try{await db.deleteJob(job.id);}catch(delErr){console.error("Cleanup failed:",delErr);}
          throw tplErr;
        }
      }
      onCreated();
    }catch(e){setErr(e.message||"Something went wrong. Please try again.");}finally{setSaving(false);}
  };

  // Toggle box component
  const ToggleBox=({icon,label,desc,on,setOn,children})=>(
    <div style={{marginBottom:12,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{icon}</span>
          <span style={{fontSize:14,fontWeight:600,color:C.lt}}>{label}</span>
        </div>
        <button onClick={()=>setOn(!on)} style={{width:48,height:28,borderRadius:14,border:"none",cursor:"pointer",background:on?C.org:C.brd,position:"relative"}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:on?23:3,transition:"left 0.2s"}}/>
        </button>
      </div>
      {on&&<div style={{padding:"0 16px 16px",borderTop:`1px solid ${C.brd}`}}>{desc&&<div style={{fontSize:12,color:C.mut,marginTop:12,marginBottom:12}}>{desc}</div>}{children}</div>}
    </div>
  );

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const ls={display:"block",color:C.lt,fontSize:13,fontWeight:600,marginBottom:6};

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <span style={{fontWeight:700,fontSize:17}}>New Job</span>
      </div>
      <div style={{maxWidth:500,margin:"0 auto",padding:"24px 20px"}}>
        {err&&<div style={{background:"#2d1214",border:"1px solid #5c2023",borderRadius:8,padding:"10px 14px",marginBottom:16,color:C.err,fontSize:13}}>{err}</div>}

        {/* Job Name — required */}
        <div style={{marginBottom:20}}><label style={ls}>Job Name *</label><input type="text" value={jn} onChange={e=>setJn(e.target.value)} style={fs}/></div>

        {/* Site Address — optional */}
        <div style={{marginBottom:20}}><label style={ls}>Site Address</label><input type="text" value={addr} onChange={e=>setAddr(e.target.value)} style={fs}/></div>

        {/* Job Type Toggle */}
        <div style={{marginBottom:20}}>
          <label style={ls}>Report Type</label>
          <div style={{display:"flex",background:C.inp,borderRadius:10,padding:3}}>
            <button onClick={()=>setJobType("template")} style={{flex:1,padding:"12px 0",background:jobType==="template"?C.card:"transparent",border:"none",borderRadius:8,color:jobType==="template"?C.txt:C.mut,fontSize:14,fontWeight:700,cursor:"pointer"}}>
              📄 Template
            </button>
            <button onClick={()=>setJobType("worklog")} style={{flex:1,padding:"12px 0",background:jobType==="worklog"?C.card:"transparent",border:"none",borderRadius:8,color:jobType==="worklog"?C.txt:C.mut,fontSize:14,fontWeight:700,cursor:"pointer"}}>
              👷 Work Log
            </button>
          </div>
          <div style={{fontSize:11,color:C.mut,marginTop:6}}>
            {jobType==="template"?"Upload a PDF/DOCX template — AI detects fields, you fill them daily.":"Track contractors, hours, and work descriptions. Generates a detailed report."}
          </div>
        </div>

        {/* Work Log Template — optional branded PDF as background */}
        {jobType==="worklog"&&(
          <div style={{marginBottom:20}}>
            <label style={ls}>Report Template (Optional)</label>
            <div style={{fontSize:11,color:C.mut,marginBottom:8,lineHeight:1.4}}>Upload a branded PDF to use as the background for your work log reports. The first page will be used as a header with your logo and styling.</div>
            {!tf?(
              <div onClick={()=>document.getElementById("fi").click()}
                style={{border:`2px dashed ${C.brd}`,borderRadius:12,padding:"24px 20px",textAlign:"center",cursor:"pointer",background:C.inp}}>
                <div style={{fontSize:28,marginBottom:6}}>📄</div>
                <p style={{color:C.lt,fontSize:13,fontWeight:600,marginBottom:4}}>Tap to upload a branded template</p>
                <p style={{color:C.mut,fontSize:11}}>PDF only • Used as report background</p>
                <input id="fi" type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(!e.target.files[0])return;const f=e.target.files[0];setTf(f);const r=new FileReader();r.onload=()=>setTfB64(r.result.split(",")[1]);r.readAsDataURL(f);}}/>
              </div>
            ):(
              <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{fontSize:24}}>📄</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{tf.name}</div>
                    <div style={{fontSize:12,color:C.ok}}>Template uploaded — will be used as report background</div>
                  </div>
                  <button onClick={()=>{setTf(null);setTfB64(null);}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18}}>✕</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* Template Section — only for template jobs */}
        {jobType==="template"&&(<>
        <div style={{marginBottom:20}}>
          <label style={ls}>Template</label>

          {/* Saved Templates picker */}
          {!tf&&savedTpls.length>0&&(
            <div style={{marginBottom:12}}>
              <button onClick={()=>setShowSaved(!showSaved)} style={{width:"100%",padding:"14px 18px",background:showSaved?C.blu+"18":C.card,border:`2px solid ${C.blu}`,borderRadius:12,color:C.blu,fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>📋 Use a Saved Template ({savedTpls.length})</span>
                <span style={{fontSize:14}}>{showSaved?"▲":"▼"}</span>
              </button>
              {showSaved&&(
                <div style={{marginTop:8,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,overflow:"hidden",maxHeight:250,overflowY:"auto"}}>
                  {savedTpls.map(t=>(
                    <div key={t.id} style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,display:"flex",alignItems:"center",gap:10}}>
                      <div onClick={()=>useSavedTemplate(t)} style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer"}}>
                        <span style={{fontSize:18}}>📋</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:C.txt}}>{t.name}</div>
                          <div style={{fontSize:11,color:C.mut}}>{(t.field_config||[]).length} fields — {t.file_type?.toUpperCase()}</div>
                        </div>
                        <span style={{color:C.blu,fontSize:12,fontWeight:600}}>Use</span>
                      </div>
                      <button onClick={async(e)=>{e.stopPropagation();if(!confirm("Delete this saved template?"))return;try{await db.deleteSavedTemplate(t.id);setSavedTpls(p=>p.filter(x=>x.id!==t.id));}catch(err){alert("Delete failed: "+err.message);}}} style={{background:"none",border:"none",color:C.err,fontSize:14,cursor:"pointer",padding:"4px 6px",flexShrink:0}}>🗑️</button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{textAlign:"center",color:C.mut,fontSize:12,margin:"10px 0"}}>— or upload a new one —</div>
            </div>
          )}

          {/* Upload area */}
          {!tf?(
            <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files.length)(usedSavedId?doFileWithSaved:doFile)(e.dataTransfer.files[0]);}} onClick={()=>document.getElementById("fi").click()}
              style={{border:`2px dashed ${drag?C.org:C.brd}`,borderRadius:12,padding:"32px 20px",textAlign:"center",cursor:"pointer",background:drag?"#1f1a14":C.inp}}>
              <div style={{fontSize:32,marginBottom:8}}>{usedSavedId?"📋":"📄"}</div>
              <p style={{color:C.lt,fontSize:14,fontWeight:600,marginBottom:4}}>{usedSavedId?"Now upload the actual file (parsing will be skipped)":"Drop your template here"}</p>
              <p style={{color:C.mut,fontSize:12}}>{usedSavedId?"Fields already loaded from saved template":"or tap to browse • PDF, DOCX, JPG, PNG"}</p>
              {!usedSavedId&&<p style={{color:C.mut,fontSize:11,marginTop:8,lineHeight:1.4,fontStyle:"italic"}}>Tip: Download the file to your phone first, then upload from your files. Uploading directly from email or cloud viewers may change the filename.</p>}
              <input id="fi" type="file" accept=".pdf,.docx,.doc,.jpg,.jpeg,.png" style={{display:"none"}} onChange={e=>e.target.files[0]&&(usedSavedId?doFileWithSaved:doFile)(e.target.files[0])}/>
            </div>
          ):(
            <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:24}}>{usedSavedId?"📋":"📄"}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{tf.name}</div>
                  <div style={{fontSize:12,color:C.mut}}>{usedSavedId?"Using saved template — no parsing needed":"New upload"}</div>
                </div>
                <button onClick={()=>{setTf(null);setTfB64(null);setFields([]);setUsedSavedId(null);setReportTitle("");setFnConvention(null);setTplSaved(false);}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18}}>✕</button>
              </div>
            </div>
          )}
        </div>

        {/* Report Naming Convention — uses the uploaded filename directly */}
        {reportTitle&&(
          <div style={{marginBottom:20}}>
            <label style={ls}>Report Naming Convention</label>
            <input type="text" value={reportTitle} onChange={e=>{setReportTitle(e.target.value);setFnConvention(prev=>prev?{...prev,pattern:e.target.value}:prev);}} style={fs}/>
          </div>
        )}

        {/* AI Parsing indicator with spinner */}
        {parsing&&(
          <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,padding:"24px",marginBottom:20,textAlign:"center"}}>
            <div style={{width:40,height:40,border:`3px solid ${C.brd}`,borderTop:`3px solid ${C.org}`,borderRadius:"50%",margin:"0 auto 12px",animation:"spin 1s linear infinite"}}/>
            <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
            <p style={{color:C.lt,fontSize:14,fontWeight:600,margin:"0 0 4px"}}>Analyzing template fields...</p>
            <p style={{color:C.mut,fontSize:12,margin:0}}>AI is detecting fillable fields in your document. This may take 10-20 seconds.</p>
          </div>
        )}


        {/* ── Unified Field List ── */}
        {!parsing&&fields.length>0&&(
          <div style={{marginBottom:20}}>
            <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden"}}>
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:"rgba(232,116,42,0.06)"}}>
                <div style={{fontWeight:700,fontSize:14,color:C.org}}>Template Fields ({fields.length})</div>
                <div style={{fontSize:11,color:C.mut,marginTop:3}}>Set each field to Edit, Lock, or Auto-Date. Locked fields keep the same value every report.</div>
              </div>
              <div style={{padding:8}}>
                {fields.map(f=>(
                  <div key={f.name} style={{padding:"10px 12px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:8,marginBottom:6}}>
                    {/* Row 1: Field name + mode buttons */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{fontSize:13,fontWeight:700,color:C.txt,flex:1,marginRight:8}}>{f.name}</span>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        {modeBtn(f.name,"edit","Edit",C.org)}
                        {modeBtn(f.name,"lock","Lock",C.mut)}
                        {modeBtn(f.name,"auto-date","Auto-Date",C.blu)}
                        {modeBtn(f.name,"auto-num","Auto-#",C.blu)}
                      </div>
                    </div>
                    {/* Row 2: Value input — always visible */}
                    {f.mode!=="auto-date"&&f.mode!=="auto-num"&&(
                      <>
                        <input
                          type="text"
                          value={f.value}
                          onChange={e=>setFieldValue(f.name,e.target.value)}
                          placeholder={f.lockAfterCreate?"Enter value for this job...":f.mode==="lock"?"Set locked value...":"Default value (optional)"}
                          style={{width:"100%",padding:"8px 10px",background:f.lockAfterCreate?"rgba(232,116,42,0.06)":C.bg,border:`1px solid ${f.lockAfterCreate?C.org:C.brd}`,borderRadius:6,color:C.txt,fontSize:13}}
                        />
                        {f.lockAfterCreate&&<div style={{fontSize:10,color:C.org,marginTop:4,fontStyle:"italic"}}>🔒 Will lock after job is created</div>}
                      </>
                    )}
                    {f.mode==="auto-date"&&(
                      <div style={{fontSize:11,color:C.blu,fontStyle:"italic",padding:"4px 0"}}>Will auto-fill today's date on each report</div>
                    )}
                    {f.mode==="auto-num"&&(
                      <div style={{fontSize:11,color:C.blu,fontStyle:"italic",padding:"4px 0"}}>Will auto-increment (1, 2, 3...) on each report</div>
                    )}
                  </div>
                ))}
              </div>
            </div>
            {/* Save as Reusable Template — after fields so users review first */}
            {!tplSaved&&!usedSavedId&&(
              <div style={{background:C.card,border:`2px solid ${C.blu}`,borderRadius:12,padding:"16px 18px",marginTop:16,textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:6}}>💾</div>
                <div style={{fontSize:14,fontWeight:700,color:C.lt,marginBottom:4}}>Save This Template</div>
                <div style={{fontSize:12,color:C.mut,marginBottom:12,lineHeight:1.4}}>Reuse these parsed fields on other jobs without re-parsing. Saves time and API costs.</div>
                <button onClick={saveAsTemplate} disabled={savingTpl} style={{width:"100%",padding:"12px 0",background:C.blu,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:savingTpl?"default":"pointer",opacity:savingTpl?0.6:1}}>
                  {savingTpl?"Saving...":"Save as Reusable Template"}
                </button>
              </div>
            )}
            {tplSaved&&!usedSavedId&&(
              <div style={{background:"rgba(34,197,94,0.08)",border:`1px solid ${C.ok}`,borderRadius:10,padding:"12px 16px",marginTop:16,textAlign:"center"}}>
                <span style={{fontSize:14,color:C.ok,fontWeight:700}}>✓ Template saved — available on all future jobs</span>
              </div>
            )}
          </div>
        )}
        </>)}

        {/* ── Three Toggle Boxes ── */}

        {/* 1. Jobsite Scheduling */}
        <ToggleBox icon="📅" label="Jobsite Scheduling" on={schedOn} setOn={setSchedOn}>
          <div style={{background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,padding:"12px 14px",marginTop:12}}>
            <p style={{fontSize:13,color:C.lt,lineHeight:1.5}}>Let your GC and subs request site visits through a shared calendar.</p>
            <p style={{fontSize:12,color:C.blu,marginTop:8,fontWeight:600}}>You'll set up the calendar link and team contacts on the job dashboard after creating this job.</p>
          </div>
        </ToggleBox>

        {/* 2. Report Frequency */}
        <ToggleBox icon="📊" label="Report Frequency" on={freqOn} setOn={v=>{setFreqOn(v);if(!v)setRemOn(false);}} desc="Set how often you'll file reports for this job">
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {DS.map(d=>{const a=days.includes(d);return<button key={d} onClick={()=>togDay(d)} style={{width:42,height:42,borderRadius:"50%",border:a?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:a?C.org:"transparent",color:a?"#fff":C.mut,fontWeight:600,fontSize:11,cursor:"pointer"}}>{d}</button>;})}
          </div>
          <div style={{display:"flex",gap:8}}>
            {[{k:"weekly",l:"Weekly"},{k:"as_needed",l:"As Needed"}].map(({k,l})=><button key={k} onClick={()=>preset(k)} style={{padding:"8px 14px",borderRadius:8,border:sched===k?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:sched===k?C.org:"transparent",color:sched===k?"#fff":C.mut,fontWeight:600,fontSize:12,cursor:"pointer"}}>{l}</button>)}
          </div>
        </ToggleBox>

        {/* 3. Reminders — only visible when Report Frequency is on */}
        {freqOn&&(
          <ToggleBox icon="🔔" label="Reminders" on={remOn} setOn={setRemOn} desc="Get reminded before your report is due">
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Submit by</label><select value={remT} onChange={e=>setRemT(e.target.value)} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{TS.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
              <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Remind me</label><select value={remH} onChange={e=>setRemH(Number(e.target.value))} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{[1,2,3,4,6].map(h=><option key={h} value={h}>{h} hr{h>1?"s":""} before</option>)}</select></div>
            </div>
          </ToggleBox>
        )}

        {/* Create Button — only requires job name */}
        <button className="btn-o" onClick={create} disabled={!ok||saving} style={{width:"100%",padding:"14px 0",background:ok?C.org:C.brd,border:ok?`1px solid ${C.blu}`:`1px solid ${C.brd}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:ok&&!saving?"pointer":"default",opacity:saving?0.7:1,marginTop:8}}>{saving?"Creating...":"Create Job"}</button>
      </div>
    </div>
  );
}

/* ── Archived Jobs ── */
function ArchivedJobs({jobs, onBack, onSelect}){
  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <span style={{fontWeight:700,fontSize:17}}>Archived Jobs</span>
        <span style={{fontSize:13,color:C.mut,marginLeft:"auto"}}>{jobs.length} job{jobs.length!==1?"s":""}</span>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"20px"}}>
        {jobs.length===0&&(<div style={{textAlign:"center",padding:"60px 20px",color:C.mut}}><div style={{fontSize:48,marginBottom:16}}>📁</div><p style={{fontSize:16,fontWeight:600,color:C.lt,marginBottom:6}}>No archived jobs</p><p style={{fontSize:14}}>Completed projects will appear here</p></div>)}
        {jobs.map(j=>(
          <button key={j.id} onClick={()=>onSelect(j)} style={{width:"100%",textAlign:"left",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:"16px 18px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:20}}>📁</div>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:16,color:C.txt,marginBottom:4}}>{j.name}</div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,fontWeight:600,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:6,padding:"2px 8px",color:C.mut}}>{SL[j.schedule]||j.schedule}</span>{j.site_address&&<span style={{fontSize:12,color:C.mut}}>{j.site_address}</span>}</div></div>
            <span style={{color:C.mut,fontSize:18}}>›</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ── Work Log Editor ── */
function WorkLogEditor({job, user, onBack, reportDate}){
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const todayISO=reportDate||new Date().toLocaleDateString("en-CA",{timeZone:tz});
  const [contractors,setContractors]=useState([]); // [{id,name,description,hours,quantity,photos:[]}]
  const [activeId,setActiveId]=useState(null); // expanded contractor id
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState("");
  const [saving,setSaving]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const [viewingPreview,setViewingPreview]=useState(null); // array of page data URLs for preview
  const [viewLoading,setViewLoading]=useState(false);
  const [draftId,setDraftId]=useState(null);
  const [generalNotes,setGeneralNotes]=useState("");
  const [safetyNotes,setSafetyNotes]=useState("");
  const [weatherEnabled,setWeatherEnabled]=useState(false); // opt-in weather display
  const [weatherAM,setWeatherAM]=useState("");
  const [weatherMid,setWeatherMid]=useState("");
  const [weatherPM,setWeatherPM]=useState("");
  const photoRef=useRef(null);
  const [photoTarget,setPhotoTarget]=useState(null); // contractor id for photo upload
  const [weatherLoading,setWeatherLoading]=useState(false);

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};

  // WMO weather code → human-readable description
  const wmoDesc=(code)=>{
    const m={0:"Clear",1:"Mostly Clear",2:"Partly Cloudy",3:"Overcast",45:"Foggy",48:"Fog (Rime)",51:"Light Drizzle",53:"Drizzle",55:"Heavy Drizzle",56:"Light Freezing Drizzle",57:"Freezing Drizzle",61:"Light Rain",63:"Rain",65:"Heavy Rain",66:"Light Freezing Rain",67:"Freezing Rain",71:"Light Snow",73:"Snow",75:"Heavy Snow",77:"Snow Grains",80:"Light Showers",81:"Showers",82:"Heavy Showers",85:"Light Snow Showers",86:"Snow Showers",95:"Thunderstorm",96:"Thunderstorm + Hail",99:"Thunderstorm + Heavy Hail"};
    return m[code]||"Unknown";
  };

  // Toggle weather on — requires site address
  const toggleWeather=(on)=>{
    if(on&&!job.site_address){
      alert("To enable weather, add a site address in Job Settings (tap the gear icon from the job dashboard).");
      return;
    }
    setWeatherEnabled(on);
    if(on&&!weatherAM)fetchWeather();
  };

  // Fetch weather from Open-Meteo (free, no API key)
  const fetchWeather=async()=>{
    if(!job.site_address){alert("Add a site address in Job Settings to fetch weather.");return;}
    setWeatherLoading(true);
    try{
      let lat,lng;
      // Geocode the job's site address
      try{
        const geoR=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(job.site_address)}&count=1&language=en&format=json`);
        const geoD=await geoR.json();
        if(geoD.results&&geoD.results.length>0){lat=geoD.results[0].latitude;lng=geoD.results[0].longitude;}
      }catch(e){console.log("Geocode failed");}
      if(!lat||!lng){
        alert("Could not find location for \""+job.site_address+"\". Check the site address in Job Settings.");
        setWeatherLoading(false);return;
      }
      // Fetch hourly weather for today
      const wxR=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,precipitation&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&forecast_days=1`);
      const wxD=await wxR.json();
      if(!wxD.hourly||!wxD.hourly.time)throw new Error("No weather data");
      const h=wxD.hourly;
      // Pick representative hours: 7am (morning), 12pm (midday), 4pm (afternoon)
      const fmt=(idx)=>{
        if(idx<0||idx>=h.time.length)return"";
        const temp=Math.round(h.temperature_2m[idx]);
        const desc=wmoDesc(h.weather_code[idx]);
        const wind=Math.round(h.wind_speed_10m[idx]);
        const hum=Math.round(h.relative_humidity_2m[idx]);
        const precip=h.precipitation[idx];
        let s=`${temp}°F ${desc}, Wind ${wind} mph, ${hum}% humidity`;
        if(precip>0)s+=`, ${precip}" precip`;
        return s;
      };
      setWeatherAM(fmt(7));   // 7:00 AM
      setWeatherMid(fmt(12)); // 12:00 PM
      setWeatherPM(fmt(16));  // 4:00 PM
    }catch(e){console.error("Weather fetch:",e);alert("Weather fetch failed: "+e.message);}
    finally{setWeatherLoading(false);}
  };

  // Load existing report on mount
  useEffect(()=>{
    (async()=>{
      try{
        const rpt=await db.getReport(job.id,todayISO);
        if(rpt){
          setDraftId(rpt.id);
          if(rpt.content){
            const c=typeof rpt.content==="string"?JSON.parse(rpt.content):rpt.content;
            if(c.contractors)setContractors(c.contractors);
            if(c.generalNotes)setGeneralNotes(c.generalNotes);
            if(c.safetyNotes)setSafetyNotes(c.safetyNotes);
            if(c.weatherEnabled)setWeatherEnabled(true);
            if(c.weatherAM)setWeatherAM(c.weatherAM);
            if(c.weatherMid)setWeatherMid(c.weatherMid);
            if(c.weatherPM)setWeatherPM(c.weatherPM);
          }
        }
      }catch(e){console.error(e);}
    })();
  },[]);

  const addContractor=()=>{
    if(!newName.trim())return;
    const c={id:Date.now().toString(),name:newName.trim(),description:"",hours:"",quantity:"1",photos:[]};
    setContractors(p=>[...p,c]);
    setActiveId(c.id);
    setNewName("");
    setShowAdd(false);
  };

  const updateContractor=(id,field,val)=>{
    setContractors(p=>p.map(c=>c.id===id?{...c,[field]:val}:c));
  };

  const removeContractor=(id)=>{
    if(!confirm("Remove this contractor?"))return;
    setContractors(p=>p.filter(c=>c.id!==id));
    if(activeId===id)setActiveId(null);
  };

  const handlePhotoUpload=(e)=>{
    const file=e.target.files[0];
    if(!file||!photoTarget)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      setContractors(p=>p.map(c=>{
        if(c.id!==photoTarget)return c;
        return{...c,photos:[...(c.photos||[]),{data:ev.target.result,name:file.name,ts:Date.now()}]};
      }));
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };

  const removePhoto=(contractorId,photoIdx)=>{
    setContractors(p=>p.map(c=>{
      if(c.id!==contractorId)return c;
      const ph=[...(c.photos||[])];
      ph.splice(photoIdx,1);
      return{...c,photos:ph};
    }));
  };

  const [submitSuccess,setSubmitSuccess]=useState(null); // {pdfBlob,pdfFilename,pdfBase64,emailHtml,...}
  const [emailing,setEmailing]=useState(false);
  const [toast,setToast]=useState("");
  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(""),3000);};

  const buildContent=()=>({
    contractors,generalNotes,safetyNotes,
    weatherEnabled,weatherAM,weatherMid,weatherPM,
    reportType:"worklog"
  });

  // ── Generate Work Log PDF with pdf-lib ──
  const generateWorkLogPdf=async()=>{
    const {PDFDocument,rgb,StandardFonts}=PDFLib;
    const doc=await PDFDocument.create();
    const font=await doc.embedFont(StandardFonts.Helvetica);
    const fontB=await doc.embedFont(StandardFonts.HelveticaBold);
    const W=612,H=792; // letter size
    const M=40; // margin
    const CW=W-2*M; // content width

    const todayDisplay2=new Date(todayISO+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric",timeZone:tz});
    const userName=window._mdrUserName||user?.user_metadata?.full_name||"";

    let page;
    let y=H-M;
    let pageNum=1;
    const totalPagesRef={val:1}; // will update after building
    let hasTemplate=false;

    // ── Check for uploaded template to use as background ──
    try{
      const tpl=await db.getTemplate(job.id);
      if(tpl&&tpl.storage_path){
        let tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tpl.storage_path}`,{
          headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}
        });
        if(tplResp.ok){
          const tplBytes=await tplResp.arrayBuffer();
          const tplDoc=await PDFDocument.load(tplBytes);
          const [copiedPage]=await doc.copyPages(tplDoc,[0]);
          doc.addPage(copiedPage);
          page=doc.getPages()[0];
          hasTemplate=true;
          // Start content below the template — leave top portion for branding
          // Use extractPdfTextStructure to find where the template content ends
          try{
            const textItems=await extractPdfTextStructure(new Uint8Array(tplBytes));
            if(textItems.length>0){
              // Find the lowest text item (highest y in top-left coords = lowest on page)
              const maxY=Math.max(...textItems.map(t=>t.y+t.h));
              y=H-maxY-30; // start 30pt below the last text
            }else{
              y=H-200; // default: start at 200pt from top if no text found
            }
          }catch(e){
            y=H-200; // fallback
          }
          // Overlay date on the template — draw in top-right area
          page.drawText(todayDisplay2,{x:W-M-font.widthOfTextAtSize(todayDisplay2,10),y:H-30,size:10,font:fontB,color:rgb(.2,.2,.2)});
          page.drawText("Prepared By: "+(userName||"—"),{x:W-M-font.widthOfTextAtSize("Prepared By: "+(userName||"—"),9),y:H-44,size:9,font,color:rgb(.4,.4,.4)});
        }
      }
    }catch(e){console.log("No template found, using default header");}

    // ── Default header (only if no template uploaded) ──
    if(!hasTemplate){
      page=doc.addPage([W,H]);
      // Header bar (dark gray)
      page.drawRectangle({x:0,y:H-80,width:W,height:80,color:rgb(.3,.3,.3)});
      page.drawText(job.name||"Daily Work Log",{x:M,y:H-40,size:22,font:fontB,color:rgb(1,1,1)});
      if(job.site_address)page.drawText(job.site_address,{x:M,y:H-58,size:10,font,color:rgb(.85,.85,.85)});
      y=H-90;
      // Info row
      page.drawRectangle({x:M,y:y-28,width:CW,height:28,color:rgb(.92,.57,.17)});
      const infoPairs=[["Date",todayDisplay2],["Prepared By",userName]];
      let ix=M+8;
      infoPairs.forEach(([lbl,val])=>{
        page.drawText(lbl+":",{x:ix,y:y-12,size:9,font:fontB,color:rgb(1,1,1)});
        const lw=fontB.widthOfTextAtSize(lbl+":",9);
        page.drawText(val||"—",{x:ix+lw+6,y:y-12,size:9,font,color:rgb(1,1,1)});
        ix+=lw+6+font.widthOfTextAtSize(val||"—",9)+30;
      });
      y-=38;
    }

    const ensureSpace=(needed)=>{
      if(y-needed<M+30){
        page=doc.addPage([W,H]);y=H-M;pageNum++;totalPagesRef.val=pageNum;
        drawFooter(page);
      }
    };

    const drawFooter=(pg)=>{
      pg.drawText(job.name||"Work Log",{x:M,y:20,size:8,font,color:rgb(.5,.5,.5)});
    };

    // ── Weather section ──
    if(weatherEnabled&&(weatherAM||weatherMid||weatherPM)){
      page.drawRectangle({x:M,y:y-24,width:CW,height:24,color:rgb(.3,.3,.3)});
      page.drawText("WEATHER",{x:M+8,y:y-16,size:11,font:fontB,color:rgb(1,1,1)});
      y-=30;

      const wxSlots=[{label:"Morning (7 AM)",val:weatherAM},{label:"Midday (12 PM)",val:weatherMid},{label:"Afternoon (4 PM)",val:weatherPM}];
      const slotW=CW/3;
      wxSlots.forEach((wx,i)=>{
        const sx=M+i*slotW;
        page.drawRectangle({x:sx,y:y-50,width:slotW,height:50,color:rgb(.97,.97,.97),borderColor:rgb(.85,.85,.85),borderWidth:.5});
        page.drawText(wx.label,{x:sx+6,y:y-14,size:8,font:fontB,color:rgb(.4,.4,.4)});
        // Wrap weather text
        const val=wx.val||"—";
        const lines=[];let cur="";
        val.split(",").forEach((part,pi)=>{
          const test=cur?(cur+","+part):part;
          if(font.widthOfTextAtSize(test.trim(),8)>slotW-14&&cur){lines.push(cur.trim());cur=part;}
          else cur=test;
        });
        if(cur)lines.push(cur.trim());
        lines.slice(0,3).forEach((ln,li)=>{page.drawText(ln,{x:sx+6,y:y-28-li*10,size:8,font,color:rgb(.2,.2,.2)});});
      });
      y-=58;
    }

    // ── Work Logs Table ──
    page.drawRectangle({x:M,y:y-24,width:CW,height:24,color:rgb(.3,.3,.3)});
    page.drawText("WORK LOGS",{x:M+8,y:y-16,size:11,font:fontB,color:rgb(1,1,1)});
    y-=28;

    // Table header
    const cols=[{label:"Name",w:120},{label:"Description",w:CW-120-60-70},{label:"Qty",w:60},{label:"Hours",w:70}];
    let cx=M;
    page.drawRectangle({x:M,y:y-20,width:CW,height:20,color:rgb(.95,.95,.95)});
    cols.forEach(c=>{page.drawText(c.label,{x:cx+4,y:y-14,size:9,font:fontB,color:rgb(.3,.3,.3)});cx+=c.w;});
    y-=22;

    let totalHrs=0;
    contractors.forEach((c,ri)=>{
      const hrs=parseFloat(c.hours)||0;
      const qty=parseInt(c.quantity)||1;
      totalHrs+=hrs*qty;

      // Wrap description text
      const descLines=[];
      if(c.description){
        const words=c.description.split(" ");
        let line="";
        const maxW=cols[1].w-10;
        words.forEach(w=>{
          const test=line?line+" "+w:w;
          if(font.widthOfTextAtSize(test,9)>maxW&&line){descLines.push(line);line=w;}
          else line=test;
        });
        if(line)descLines.push(line);
      }
      if(descLines.length===0)descLines.push("—");

      const rowH=Math.max(18,descLines.length*12+6);
      ensureSpace(rowH);

      // Alternating row background
      if(ri%2===0)page.drawRectangle({x:M,y:y-rowH,width:CW,height:rowH,color:rgb(.98,.98,.98)});
      // Bottom border
      page.drawLine({start:{x:M,y:y-rowH},end:{x:M+CW,y:y-rowH},thickness:.5,color:rgb(.88,.88,.88)});

      let rx=M;
      page.drawText(c.name||"—",{x:rx+4,y:y-13,size:9,font:fontB,color:rgb(.2,.2,.2)});
      rx+=cols[0].w;
      descLines.forEach((ln,li)=>{page.drawText(ln,{x:rx+4,y:y-13-li*12,size:9,font,color:rgb(.3,.3,.3)});});
      rx+=cols[1].w;
      page.drawText(String(qty),{x:rx+4,y:y-13,size:9,font,color:rgb(.3,.3,.3)});
      rx+=cols[2].w;
      page.drawText(hrs?String(hrs):"—",{x:rx+4,y:y-13,size:9,font,color:rgb(.3,.3,.3)});

      y-=rowH;
    });

    // Totals row
    ensureSpace(22);
    page.drawRectangle({x:M,y:y-22,width:CW,height:22,color:rgb(.92,.92,.92)});
    page.drawText("TOTAL",{x:M+4,y:y-15,size:9,font:fontB,color:rgb(.2,.2,.2)});
    page.drawText(String(contractors.length)+" contractor"+(contractors.length!==1?"s":""),{x:M+cols[0].w+4,y:y-15,size:9,font,color:rgb(.4,.4,.4)});
    page.drawText(String(totalHrs),{x:M+cols[0].w+cols[1].w+cols[2].w+4,y:y-15,size:9,font:fontB,color:rgb(.2,.2,.2)});
    y-=30;

    // ── General Notes ──
    if(generalNotes){
      ensureSpace(60);
      page.drawRectangle({x:M,y:y-24,width:CW,height:24,color:rgb(.3,.3,.3)});
      page.drawText("GENERAL NOTES",{x:M+8,y:y-16,size:11,font:fontB,color:rgb(1,1,1)});
      y-=30;
      const noteLines=[];const noteWords=generalNotes.split(" ");let nl="";
      noteWords.forEach(w=>{const t=nl?nl+" "+w:w;if(font.widthOfTextAtSize(t,10)>CW-20&&nl){noteLines.push(nl);nl=w;}else nl=t;});
      if(nl)noteLines.push(nl);
      noteLines.forEach(ln=>{ensureSpace(14);page.drawText(ln,{x:M+8,y:y-12,size:10,font,color:rgb(.2,.2,.2)});y-=14;});
      y-=10;
    }

    // ── Safety Notes ──
    if(safetyNotes){
      ensureSpace(60);
      page.drawRectangle({x:M,y:y-24,width:CW,height:24,color:rgb(.3,.3,.3)});
      page.drawText("SITE SAFETY OBSERVATIONS",{x:M+8,y:y-16,size:11,font:fontB,color:rgb(1,1,1)});
      y-=30;
      const safeLines=[];const safeWords=safetyNotes.split(" ");let sl="";
      safeWords.forEach(w=>{const t=sl?sl+" "+w:w;if(font.widthOfTextAtSize(t,10)>CW-20&&sl){safeLines.push(sl);sl=w;}else sl=t;});
      if(sl)safeLines.push(sl);
      safeLines.forEach(ln=>{ensureSpace(14);page.drawText(ln,{x:M+8,y:y-12,size:10,font,color:rgb(.2,.2,.2)});y-=14;});
      y-=10;
    }

    // ── Photo Pages (grouped by contractor) ──
    const contractorsWithPhotos=contractors.filter(c=>(c.photos||[]).length>0);
    for(const c of contractorsWithPhotos){
      for(const ph of c.photos){
        try{
          const imgBytes=Uint8Array.from(atob(ph.data.split(",")[1]||""),c=>c.charCodeAt(0));
          let img;
          if(ph.data.includes("image/png"))img=await doc.embedPng(imgBytes);
          else img=await doc.embedJpg(imgBytes);
          const photoPage=doc.addPage([W,H]);pageNum++;totalPagesRef.val=pageNum;
          // Header
          photoPage.drawRectangle({x:0,y:H-50,width:W,height:50,color:rgb(.3,.3,.3)});
          photoPage.drawText(job.name||"Work Log",{x:M,y:H-30,size:14,font:fontB,color:rgb(1,1,1)});
          photoPage.drawText("Photo — "+c.name,{x:M,y:H-44,size:10,font,color:rgb(.8,.8,.8)});
          // Scale photo to fit
          const maxW2=W-2*M,maxH2=H-120;
          const scale2=Math.min(maxW2/img.width,maxH2/img.height,1);
          const pw=img.width*scale2,ph2=img.height*scale2;
          photoPage.drawImage(img,{x:(W-pw)/2,y:H-60-ph2,width:pw,height:ph2});
          drawFooter(photoPage);
        }catch(e){console.error("Photo embed error:",e);}
      }
    }

    // Add footers to all pages
    const pages=doc.getPages();
    pages.forEach((pg,i)=>{
      pg.drawText(`${i+1} of ${pages.length}`,{x:W-M-40,y:20,size:8,font,color:rgb(.5,.5,.5)});
    });

    return await doc.save();
  };

  // ── View/Preview: generate PDF and render pages as images ──
  const viewWorkLog=async()=>{
    if(contractors.length===0){showToast("Add at least one contractor first.");return;}
    setViewLoading(true);
    try{
      const pdfBytes=await generateWorkLogPdf();
      if(!window.pdfjsLib)throw new Error("PDF viewer not loaded.");
      const pjDoc=await window.pdfjsLib.getDocument({data:pdfBytes}).promise;
      const pages=[];
      const scale=2;
      for(let pi=1;pi<=pjDoc.numPages;pi++){
        const pg=await pjDoc.getPage(pi);
        const vp=pg.getViewport({scale});
        const cvs=document.createElement("canvas");cvs.width=vp.width;cvs.height=vp.height;
        const ctx=cvs.getContext("2d");
        await pg.render({canvasContext:ctx,viewport:vp}).promise;
        pages.push(cvs.toDataURL("image/jpeg",0.92));
        cvs.width=0;cvs.height=0;
      }
      setViewingPreview(pages);
    }catch(e){
      console.error("Preview error:",e);
      showToast("Preview failed: "+e.message);
    }finally{setViewLoading(false);}
  };

  // ── Submit: generate PDF, upload, save ──
  const submitWorkLog=async()=>{
    setSubmitting(true);
    try{
      const submitDate=reportDate||new Date().toLocaleDateString("en-CA",{timeZone:tz});
      showToast("Generating PDF...");
      const pdfBytes=await generateWorkLogPdf();
      const pdfBlob=new Blob([pdfBytes],{type:"application/pdf"});
      const pdfFilename=`${(job.name||"WorkLog").replace(/[^a-zA-Z0-9_ -]/g,"")}_${submitDate}.pdf`;

      // Upload PDF to storage
      const storagePath=`${user.id}/${job.id}/submitted/${submitDate}_worklog.pdf`;
      let upR=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
        method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/pdf"},body:pdfBlob
      });
      if(!upR.ok){upR=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
        method:"PUT",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/pdf"},body:pdfBlob
      });}

      // Convert to base64 for email
      const reader=new FileReader();
      const pdfBase64=await new Promise((resolve)=>{reader.onload=()=>resolve(reader.result.split(",")[1]);reader.readAsDataURL(pdfBlob);});

      // Save report data
      await db.saveReport({
        job_id:job.id,user_id:user.id,report_date:submitDate,status:"submitted",
        content:buildContent()
      });

      // Build email
      const todayDisp=new Date(todayISO+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric",timeZone:tz});
      const uName=window._mdrUserName||user?.user_metadata?.full_name||user.email?.split("@")[0]||"";
      const contractorSummary=contractors.map(c=>`<tr><td style="padding:3px 12px 3px 0;color:#888;font-size:13px;">${c.name}</td><td style="padding:3px 0;color:#333;font-size:13px;">${c.hours||0} hrs × ${c.quantity||1}</td></tr>`).join("");
      const emailHtml=`<div style="font-family:-apple-system,sans-serif;max-width:600px;margin:0 auto;"><div style="background:#e8742a;padding:20px 24px;border-radius:8px 8px 0 0;"><h1 style="color:#fff;margin:0;font-size:20px;">My Daily Reports</h1></div><div style="background:#f9f9f9;padding:24px;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px;"><p style="color:#333;font-size:16px;margin:0 0 8px;">Hi,</p><p style="color:#333;font-size:15px;line-height:1.6;margin:0 0 16px;">${uName} has submitted the daily work log for <strong>${job.name}</strong> on ${todayDisp}.</p><p style="color:#555;font-size:14px;margin:0 0 8px;"><strong>${contractors.length}</strong> contractor${contractors.length!==1?"s":""} — <strong>${totalHours}</strong> total hours</p>${contractorSummary?`<table style="margin:8px 0 16px;border-collapse:collapse;">${contractorSummary}</table>`:""}<p style="color:#555;font-size:14px;margin:16px 0 0;">The full PDF report is attached to this email.</p></div><p style="color:#999;font-size:11px;text-align:center;margin-top:16px;">Sent via My Daily Reports</p></div>`;

      const rawTeam=job.team_emails||[];
      const teamEmails=rawTeam.map(m=>typeof m==="string"?m:m.email).filter(Boolean);
      setSubmitSuccess({pdfBlob,pdfFilename,pdfBase64,emailHtml,teamEmails,jobName:job.name,todayDisplay:todayDisp,userName:uName});
      showToast("Report submitted!");
    }catch(e){
      console.error("Submit error:",e);
      showToast("Submit failed: "+e.message);
    }finally{setSubmitting(false);}
  };

  // Download PDF
  const downloadPdf=async()=>{
    if(!submitSuccess)return;
    const file=new File([submitSuccess.pdfBlob],submitSuccess.pdfFilename,{type:"application/pdf"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:submitSuccess.pdfFilename});showToast("PDF shared!");return;}catch(e){if(e.name==="AbortError")return;}
    }
    const url=URL.createObjectURL(submitSuccess.pdfBlob);
    const a=document.createElement("a");a.href=url;a.download=submitSuccess.pdfFilename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);showToast("PDF saved!");
  };

  // Email to team
  const emailToTeam=async()=>{
    if(!submitSuccess)return;
    setEmailing(true);
    try{
      const userEmail=user.email;
      const recipients=[...new Set([userEmail,...submitSuccess.teamEmails])].filter(Boolean);
      if(recipients.length===0){showToast("No team emails configured. Add them in Job Settings.");setEmailing(false);return;}
      let senderName="My Daily Reports";
      try{const prof=await db.getProfile(user.id);if(prof?.company_name)senderName=prof.company_name;}catch(e){}
      const r=await fetch(`${SB_URL}/functions/v1/send-report`,{
        method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,apikey:SB_KEY},
        body:JSON.stringify({to:recipients,subject:`${submitSuccess.jobName} — Daily Work Log ${submitSuccess.todayDisplay}`,html_body:submitSuccess.emailHtml,pdf_base64:submitSuccess.pdfBase64,pdf_filename:submitSuccess.pdfFilename,sender_name:senderName})
      });
      if(!r.ok){const errBody=await r.json().catch(()=>({}));throw new Error(errBody.error||`Email send failed (${r.status})`);}
      showToast("Report emailed to "+recipients.length+" recipient"+(recipients.length>1?"s":"")+"!");
    }catch(e){
      console.error("Email error:",e);
      showToast("Email failed: "+e.message);
    }finally{setEmailing(false);}
  };

  const saveWorking=async()=>{
    setSaving(true);
    try{
      const saveDate=reportDate||new Date().toLocaleDateString("en-CA",{timeZone:tz});
      await db.saveReport({
        job_id:job.id,user_id:user.id,report_date:saveDate,status:"working_copy",
        content:buildContent()
      });
    }catch(e){console.error("Save failed:",e);}
    finally{setSaving(false);}
  };

  // Auto-save every 30 seconds if there are contractors
  useEffect(()=>{
    if(contractors.length===0)return;
    const t=setInterval(()=>saveWorking(),30000);
    return()=>clearInterval(t);
  },[contractors,generalNotes,safetyNotes,weatherEnabled,weatherAM,weatherMid,weatherPM]);

  const totalHours=contractors.reduce((sum,c)=>{
    const h=parseFloat(c.hours)||0;
    const q=parseInt(c.quantity)||1;
    return sum+h*q;
  },0);

  const active=contractors.find(c=>c.id===activeId);

  // ── Preview Screen ──
  if(viewingPreview){
    return(
      <div style={{minHeight:"100vh",background:C.bg,color:C.txt,display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
          <button onClick={()=>setViewingPreview(null)} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <MDRLogo size={28}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:17}}>Report Preview</div>
            <div style={{fontSize:12,color:C.mut}}>{viewingPreview.length} page{viewingPreview.length>1?"s":""}</div>
          </div>
        </div>
        <div style={{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch",padding:"12px 16px"}}>
          {viewingPreview.map((dataUrl,i)=>(
            <div key={i} style={{marginBottom:12,borderRadius:4,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.4)"}}>
              <img src={dataUrl} style={{width:"100%",display:"block"}} alt={"Page "+(i+1)}/>
            </div>
          ))}
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"14px 20px",borderTop:`1px solid ${C.brd}`,background:C.card,zIndex:100,display:"flex",gap:10}}>
          <button onClick={()=>setViewingPreview(null)} style={{flex:1,padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15,fontWeight:700,cursor:"pointer"}}>
            Back to Editing
          </button>
          <button onClick={()=>{setViewingPreview(null);submitWorkLog();}} disabled={submitting} style={{flex:1,padding:"14px 0",background:C.org,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:submitting?"default":"pointer",opacity:submitting?0.7:1}}>
            Submit Report
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={()=>{saveWorking();onBack();}} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:16}}>{job.name}</div>
          <div style={{fontSize:12,color:C.mut}}>Work Log — {new Date(todayISO+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",timeZone:tz})}</div>
        </div>
        <button onClick={saveWorking} disabled={saving} style={{padding:"8px 14px",background:C.blu,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:600,cursor:saving?"default":"pointer",opacity:saving?0.7:1}}>
          {saving?"Saving...":"Save"}
        </button>
      </div>

      <div style={{maxWidth:560,margin:"0 auto",padding:"20px 16px 120px"}}>

        {/* Weather Toggle */}
        <div style={{background:C.card,border:`1px solid ${weatherEnabled?C.org:C.brd}`,borderRadius:12,overflow:"hidden",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",padding:16}}>
            <span style={{fontSize:18,marginRight:10}}>🌤</span>
            <div style={{flex:1}}>
              <span style={{fontWeight:700,fontSize:15}}>Weather</span>
              {!weatherEnabled&&<div style={{fontSize:11,color:C.mut,marginTop:2}}>Include weather conditions on this report</div>}
            </div>
            <button onClick={()=>toggleWeather(!weatherEnabled)} style={{width:48,height:28,borderRadius:14,border:"none",cursor:"pointer",background:weatherEnabled?C.org:C.brd,position:"relative"}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:weatherEnabled?23:3,transition:"left 0.2s"}}/>
            </button>
          </div>
          {weatherEnabled&&(
            <div style={{padding:"0 16px 16px",borderTop:`1px solid ${C.brd}`}}>
              {weatherLoading&&!weatherAM?(
                <div style={{textAlign:"center",padding:"16px 0",color:C.mut,fontSize:13}}>
                  <div style={{width:24,height:24,border:`2px solid ${C.brd}`,borderTop:`2px solid ${C.org}`,borderRadius:"50%",margin:"0 auto 8px",animation:"spin 1s linear infinite"}}/>
                  Fetching weather for {job.site_address}...
                </div>
              ):(
                <>
                  <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:12}}>
                    {[{label:"Morning (7 AM)",val:weatherAM,set:setWeatherAM,icon:"🌅"},
                      {label:"Midday (12 PM)",val:weatherMid,set:setWeatherMid,icon:"☀️"},
                      {label:"Afternoon (4 PM)",val:weatherPM,set:setWeatherPM,icon:"🌇"}
                    ].map(w=>(
                      <div key={w.label} style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:16,flexShrink:0}}>{w.icon}</span>
                        <div style={{flex:1}}>
                          <label style={{display:"block",fontSize:10,color:C.mut,marginBottom:2}}>{w.label}</label>
                          <input type="text" value={w.val} onChange={e=>w.set(e.target.value)} placeholder="72°F Sunny, Wind 5 mph, 45% humidity" style={{...fs,padding:"8px 10px",fontSize:12}}/>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={fetchWeather} disabled={weatherLoading} style={{width:"100%",marginTop:10,padding:"8px 0",background:C.blu+"12",border:`1px solid ${C.blu}33`,borderRadius:8,color:C.blu,fontSize:12,fontWeight:600,cursor:weatherLoading?"default":"pointer",opacity:weatherLoading?0.6:1}}>
                    {weatherLoading?"Fetching...":"Refresh Weather Data"}
                  </button>
                </>
              )}
            </div>
          )}
        </div>

        {/* Contractor Cards */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>👷</span>
            <span style={{fontWeight:700,fontSize:15}}>Contractors</span>
            <span style={{fontSize:12,color:C.mut,fontWeight:600}}>({contractors.length})</span>
          </div>
          {totalHours>0&&(
            <span style={{fontSize:12,fontWeight:700,color:C.org}}>{totalHours} total hrs</span>
          )}
        </div>

        {contractors.map(c=>(
          <div key={c.id} style={{background:C.card,border:`1px solid ${activeId===c.id?C.org:C.brd}`,borderRadius:12,marginBottom:10,overflow:"hidden",transition:"border-color 0.2s"}}>
            {/* Contractor name bar — tap to expand/collapse */}
            <button onClick={()=>setActiveId(activeId===c.id?null:c.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
              <div style={{width:36,height:36,borderRadius:10,background:C.org+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👷</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                <div style={{fontSize:11,color:C.mut}}>
                  {c.hours?`${c.hours} hrs`:"No hours"} · {c.quantity||1} {parseInt(c.quantity||1)===1?"person":"people"}
                  {(c.photos||[]).length>0&&` · ${c.photos.length} photo${c.photos.length>1?"s":""}`}
                </div>
              </div>
              <span style={{color:C.mut,fontSize:14,transform:activeId===c.id?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
            </button>

            {/* Expanded entry area */}
            {activeId===c.id&&(
              <div style={{padding:"0 16px 16px",borderTop:`1px solid ${C.brd}`}}>
                <div style={{marginTop:14,marginBottom:14}}>
                  <label style={{display:"block",fontSize:12,color:C.lt,fontWeight:600,marginBottom:4}}>Work Description</label>
                  <textarea value={c.description} onChange={e=>updateContractor(c.id,"description",e.target.value)} placeholder="Tap here and use your keyboard mic to dictate..." rows={3} style={{...fs,resize:"vertical",minHeight:70,lineHeight:1.5}}/>
                </div>
                <div style={{display:"flex",gap:10,marginBottom:14}}>
                  <div style={{flex:1}}>
                    <label style={{display:"block",fontSize:12,color:C.lt,fontWeight:600,marginBottom:4}}>Total Hours</label>
                    <input type="number" inputMode="decimal" value={c.hours} onChange={e=>updateContractor(c.id,"hours",e.target.value)} placeholder="8" style={fs}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={{display:"block",fontSize:12,color:C.lt,fontWeight:600,marginBottom:4}}>Quantity (Men)</label>
                    <input type="number" inputMode="numeric" value={c.quantity} onChange={e=>updateContractor(c.id,"quantity",e.target.value)} placeholder="1" style={fs}/>
                  </div>
                </div>

                {/* Photos for this contractor */}
                <div style={{marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <label style={{fontSize:12,color:C.lt,fontWeight:600}}>Photos ({(c.photos||[]).length})</label>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>{setPhotoTarget(c.id);setTimeout(()=>{photoRef.current?.setAttribute("capture","environment");photoRef.current?.click();},100);}} style={{padding:"6px 10px",background:C.org,border:"none",borderRadius:6,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>📷 Photo</button>
                      <button onClick={()=>{setPhotoTarget(c.id);setTimeout(()=>{photoRef.current?.removeAttribute("capture");photoRef.current?.click();},100);}} style={{padding:"6px 10px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:6,color:C.lt,fontSize:12,fontWeight:600,cursor:"pointer"}}>🖼️ Library</button>
                    </div>
                  </div>
                  {(c.photos||[]).length>0&&(
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {c.photos.map((ph,i)=>(
                        <div key={i} style={{width:72,height:72,borderRadius:8,overflow:"hidden",position:"relative",border:`1px solid ${C.brd}`}}>
                          <img src={ph.data} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                          <button onClick={()=>removePhoto(c.id,i)} style={{position:"absolute",top:2,right:2,width:20,height:20,borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <button onClick={()=>removeContractor(c.id)} style={{width:"100%",padding:"10px 0",background:"transparent",border:`1px solid ${C.err}33`,borderRadius:8,color:C.err,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                  Remove Contractor
                </button>
              </div>
            )}
          </div>
        ))}

        {/* Add Contractor */}
        {showAdd?(
          <div style={{background:C.card,border:`2px solid ${C.org}`,borderRadius:12,padding:16,marginBottom:16}}>
            <label style={{display:"block",fontSize:13,color:C.lt,fontWeight:600,marginBottom:6}}>Contractor Name</label>
            <div style={{display:"flex",gap:8}}>
              <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addContractor();}} placeholder="e.g. ABC Electric" autoFocus style={{...fs,flex:1}}/>
              <button onClick={addContractor} disabled={!newName.trim()} style={{padding:"12px 20px",background:newName.trim()?C.org:C.brd,border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,cursor:newName.trim()?"pointer":"default"}}>Add</button>
            </div>
            <button onClick={()=>{setShowAdd(false);setNewName("");}} style={{width:"100%",marginTop:8,padding:"8px 0",background:"transparent",border:"none",color:C.mut,fontSize:13,cursor:"pointer"}}>Cancel</button>
          </div>
        ):(
          <button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:"14px 0",background:C.card,border:`2px dashed ${C.brd}`,borderRadius:12,color:C.org,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:16}}>
            + Add Contractor
          </button>
        )}

        {/* General Notes */}

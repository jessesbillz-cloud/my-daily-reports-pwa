/* ── Click-to-Place Template Field Editor ── */
function TemplateFieldEditor({pdfBase64,initialFields,onDone,onCancel}){
  const canvasRef=useRef(null);
  const overlayRef=useRef(null);
  const [pdfDoc,setPdfDoc]=useState(null);
  const [pageNum,setPageNum]=useState(1);
  const [numPages,setNumPages]=useState(1);
  const [fields,setFields]=useState(initialFields||[]);
  const [scale,setScale]=useState(1); // canvas px / PDF pt
  const [pageW,setPageW]=useState(612);
  const [pageH,setPageH]=useState(792);
  const [modal,setModal]=useState(null); // {idx} or {x,y,w,h,page} for new
  const [modalName,setModalName]=useState("");
  const [modalType,setModalType]=useState("text");
  const [modalMode,setModalMode]=useState("edit");
  const [dragging,setDragging]=useState(null); // {idx,startX,startY,origX,origY}
  const [resizing,setResizing]=useState(null); // {idx,startX,startY,origW,origH}
  const [loading,setLoading]=useState(true);
  const [nearbyText,setNearbyText]=useState(""); // text near click for auto-suggest
  const [textItems,setTextItems]=useState([]); // extracted text items for name suggestions
  const FIELD_PRESETS=["Date","Weather","Crew Size","Notes","Signature","Inspector","Project Name","Project No"];

  // Load PDF
  useEffect(()=>{
    if(!pdfBase64||!window.pdfjsLib)return;
    (async()=>{
      try{
        const raw=atob(pdfBase64);const u8=new Uint8Array(raw.length);
        for(let i=0;i<raw.length;i++)u8[i]=raw.charCodeAt(i);
        const doc=await window.pdfjsLib.getDocument({data:u8}).promise;
        setPdfDoc(doc);setNumPages(doc.numPages);
        // Extract text items for nearby-text suggestions
        try{
          const items=await extractPdfTextStructure(u8);
          setTextItems(items);
        }catch(e){console.error("Text extraction for suggestions:",e);}
      }catch(e){console.error("PDF load error:",e);}
      finally{setLoading(false);}
    })();
  },[pdfBase64]);

  // Render current page — handles rotation, high-DPI, and explicit CSS sizing
  useEffect(()=>{
    if(!pdfDoc||!canvasRef.current)return;
    (async()=>{
      const page=await pdfDoc.getPage(pageNum);
      // Account for PDF rotation metadata
      const vp=page.getViewport({scale:1,rotation:page.rotate||0});
      // Scale to fit container width (max ~360px on mobile)
      const container=canvasRef.current.parentElement;
      const maxW=container?container.clientWidth-8:360;
      const s=maxW/vp.width;
      setScale(s);setPageW(vp.width);setPageH(vp.height);
      const svp=page.getViewport({scale:s,rotation:page.rotate||0});
      const cvs=canvasRef.current;
      const dpr=window.devicePixelRatio||1;
      // Set internal resolution for high-DPI (iPhone retina)
      cvs.width=Math.round(svp.width*dpr);
      cvs.height=Math.round(svp.height*dpr);
      // Set CSS display size to match logical pixels exactly — prevents double-scaling
      cvs.style.width=Math.round(svp.width)+"px";
      cvs.style.height=Math.round(svp.height)+"px";
      const ctx=cvs.getContext("2d");
      ctx.scale(dpr,dpr);
      await page.render({canvasContext:ctx,viewport:svp}).promise;
    })();
  },[pdfDoc,pageNum]);

  // Find nearby text for auto-suggest field name
  const findNearbyText=(clickX,clickY,pg)=>{
    // clickX/clickY are in PDF points
    let best="";let bestDist=Infinity;
    textItems.filter(t=>t.page===pg).forEach(t=>{
      const cx=t.x+t.w/2;const cy=t.y+t.h/2;
      const dist=Math.sqrt((cx-clickX)**2+(cy-clickY)**2);
      if(dist<bestDist&&dist<80){bestDist=dist;best=t.str;}
    });
    return best;
  };

  // Handle tap on overlay to place a new field
  const handlePointerDown=(e)=>{
    if(dragging||resizing)return;
    const rect=overlayRef.current.getBoundingClientRect();
    const px=e.clientX-rect.left;
    const py=e.clientY-rect.top;
    // Check if tapping on existing field (handled by field's own handler)
    // Convert to PDF coords
    const pdfX=px/scale;
    const pdfY=py/scale;
    // Default field size in PDF points (small — user resizes to fit)
    const defW=100,defH=16;
    const nearby=findNearbyText(pdfX,pdfY,pageNum);
    // Clean up nearby text to make a good field name suggestion
    let suggestion=nearby.replace(/[:_\-\.]+$/,"").trim();
    // If it looks like a label (short, no numbers), use it
    if(suggestion.length>30||/^\d+$/.test(suggestion))suggestion="";
    setNearbyText(suggestion);
    setModalName(suggestion);
    setModalType(suggestion.toLowerCase().includes("note")||suggestion.toLowerCase().includes("comment")?"textarea":"text");
    setModalMode(suggestion.toLowerCase().includes("date")?"auto-date":"edit");
    setModal({x:pdfX,y:pdfY,w:defW,h:defH,page:pageNum,isNew:true});
  };

  // Save field from modal
  const saveField=()=>{
    if(!modalName.trim())return;
    const entry={
      id:modal.isNew?(typeof crypto!=="undefined"&&crypto.randomUUID?crypto.randomUUID():"fld_"+Date.now()+"_"+Math.random().toString(36).slice(2,6)):modal.id||undefined,
      name:modalName.trim(),
      value:"",
      mode:modalMode,
      page:modal.page||pageNum,
      x:snap(Math.round(modal.x*100)/100),
      y:snap(Math.round(modal.y*100)/100),
      w:snap(Math.round((modal.w||100)*100)/100),
      h:snap(Math.round((modal.h||(modalType==="textarea"?60:16))*100)/100),
      fontSize:modalType==="textarea"?10:12,
      multiline:modalType==="textarea",
      voiceEnabled:modalType!=="signature",
      fieldType:modalType
    };
    if(modal.isNew){
      setFields(prev=>[...prev,entry]);
    }else{
      // Editing existing field
      setFields(prev=>prev.map((f,i)=>i===modal.idx?{...f,...entry}:f));
    }
    setModal(null);setModalName("");
  };

  // Delete field
  const deleteField=(idx)=>{
    setFields(prev=>prev.filter((_,i)=>i!==idx));
    setModal(null);
  };

  // Field drag handler
  const startDrag=(e,idx)=>{
    e.stopPropagation();e.preventDefault();
    const rect=overlayRef.current.getBoundingClientRect();
    setDragging({idx,startX:e.clientX-rect.left,startY:e.clientY-rect.top,origX:fields[idx].x,origY:fields[idx].y});
  };
  const onPointerMove=(e)=>{
    if(!overlayRef.current)return;
    const rect=overlayRef.current.getBoundingClientRect();
    const px=e.clientX-rect.left;const py=e.clientY-rect.top;
    if(dragging){
      const dx=(px-dragging.startX)/scale;
      const dy=(py-dragging.startY)/scale;
      setFields(prev=>prev.map((f,i)=>i===dragging.idx?{...f,x:snap(Math.max(0,dragging.origX+dx)),y:snap(Math.max(0,dragging.origY+dy))}:f));
    }
    if(resizing){
      const dx=(px-resizing.startX)/scale;
      const dy=(py-resizing.startY)/scale;
      setFields(prev=>prev.map((f,i)=>i===resizing.idx?{...f,w:snap(Math.max(40,resizing.origW+dx)),h:snap(Math.max(16,resizing.origH+dy))}:f));
    }
  };
  const onPointerUp=()=>{setDragging(null);setResizing(null);};

  // Snap to 4px grid in PDF pts
  const snap=(v)=>Math.round(v/4)*4;

  const pageFields=fields.filter(f=>f.page===pageNum);

  if(loading)return(
    <div style={{padding:40,textAlign:"center"}}>
      <div style={{width:36,height:36,border:`3px solid ${C.brd}`,borderTop:`3px solid ${C.org}`,borderRadius:"50%",margin:"0 auto 12px",animation:"spin 1s linear infinite"}}/>
      <p style={{color:C.mut,fontSize:14}}>Loading template preview...</p>
    </div>
  );

  return(
    <div style={{background:C.bg,color:C.txt}}>
      {/* Header */}
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:C.card,display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onCancel} style={{background:"none",border:"none",color:C.blu,fontSize:24,cursor:"pointer",padding:"6px 10px",lineHeight:1}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15}}>Place Fields</div>
          <div style={{fontSize:11,color:C.mut}}>Tap where each field should go • {fields.length} field{fields.length!==1?"s":""} placed</div>
        </div>
        <button onClick={()=>onDone(fields)} disabled={fields.length===0} style={{padding:"8px 16px",background:fields.length?C.org:C.brd,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:fields.length?"pointer":"default",opacity:fields.length?1:0.5}}>Done</button>
      </div>

      {/* Quick preset buttons */}
      <div style={{padding:"8px 16px",display:"flex",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch",borderBottom:`1px solid ${C.brd}`}}>
        {FIELD_PRESETS.map(p=>(
          <button key={p} onClick={()=>{setModalName(p);setModalType(p==="Notes"?"textarea":p==="Signature"?"signature":"text");setModalMode(p==="Date"?"auto-date":["Project Name","Project No","Inspector"].includes(p)?"lock":"edit");setModal({x:pageW/2-50,y:pageH/2-8,w:100,h:p==="Notes"?60:p==="Signature"?28:16,page:pageNum,isNew:true});}}
            style={{padding:"6px 12px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:16,color:C.lt,fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
            + {p}
          </button>
        ))}
      </div>

      {/* Page navigation */}
      {numPages>1&&(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,padding:"8px 0",borderBottom:`1px solid ${C.brd}`}}>
          <button onClick={()=>setPageNum(p=>Math.max(1,p-1))} disabled={pageNum<=1} style={{background:"none",border:"none",color:pageNum>1?C.blu:C.brd,fontSize:20,cursor:pageNum>1?"pointer":"default"}}>‹</button>
          <span style={{fontSize:13,color:C.lt,fontWeight:600}}>Page {pageNum} of {numPages}</span>
          <button onClick={()=>setPageNum(p=>Math.min(numPages,p+1))} disabled={pageNum>=numPages} style={{background:"none",border:"none",color:pageNum<numPages?C.blu:C.brd,fontSize:20,cursor:pageNum<numPages?"pointer":"default"}}>›</button>
        </div>
      )}

      {/* Canvas + overlay */}
      <div style={{padding:"8px",overflow:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{position:"relative",display:"inline-block",boxShadow:"0 2px 12px rgba(0,0,0,0.5)",borderRadius:4,overflow:"hidden"}}>
          <canvas ref={canvasRef} style={{display:"block"}}/>
          {/* Clickable overlay */}
          <div ref={overlayRef}
            onPointerDown={handlePointerDown}
            onPointerMove={onPointerMove}
            onPointerUp={onPointerUp}
            style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",cursor:"crosshair",touchAction:"none"}}>
            {/* Rendered field boxes */}
            {pageFields.map((f,i)=>{
              const realIdx=fields.indexOf(f);
              const isActive=modal&&!modal.isNew&&modal.idx===realIdx;
              return(
                <div key={realIdx}
                  onPointerDown={(e)=>startDrag(e,realIdx)}
                  onClick={(e)=>{e.stopPropagation();setModalName(f.name);setModalType(f.fieldType||"text");setModalMode(f.mode);setModal({...f,idx:realIdx,isNew:false});}}
                  style={{position:"absolute",left:f.x*scale,top:f.y*scale,width:f.w*scale,height:f.h*scale,
                    background:isActive?"rgba(232,116,42,0.12)":"rgba(232,116,42,0.05)",
                    border:isActive?`2px solid ${C.org}`:"1px dashed rgba(232,116,42,0.5)",
                    borderRadius:2,cursor:"move",touchAction:"none",
                    display:"flex",alignItems:"center",padding:"0 3px",boxSizing:"border-box"}}>
                  <span style={{fontSize:Math.max(7,Math.min(10,f.h*scale*0.45)),color:"rgba(232,116,42,0.7)",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",pointerEvents:"none",userSelect:"none"}}>{f.name}</span>
                  {/* Resize handle */}
                  <div onPointerDown={(e)=>{e.stopPropagation();e.preventDefault();const rect=overlayRef.current.getBoundingClientRect();setResizing({idx:realIdx,startX:e.clientX-rect.left,startY:e.clientY-rect.top,origW:f.w,origH:f.h});}}
                    style={{position:"absolute",right:-3,bottom:-3,width:12,height:12,background:"rgba(232,116,42,0.6)",borderRadius:"50%",cursor:"nwse-resize",touchAction:"none",border:"1px solid #fff"}}/>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Field list summary */}
      {fields.length>0&&(
        <div style={{padding:"12px 16px",borderTop:`1px solid ${C.brd}`}}>
          <div style={{fontSize:12,fontWeight:700,color:C.lt,marginBottom:8}}>Fields ({fields.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {fields.map((f,i)=>(
              <span key={i} onClick={()=>{if(f.page!==pageNum)setPageNum(f.page);setModalName(f.name);setModalType(f.fieldType||"text");setModalMode(f.mode);setModal({...f,idx:i,isNew:false});}}
                style={{padding:"4px 10px",background:f.mode==="lock"?C.inp:f.mode==="auto-date"?"rgba(90,143,192,0.15)":"rgba(232,116,42,0.1)",border:`1px solid ${f.mode==="lock"?C.brd:f.mode==="auto-date"?C.blu:C.org}`,borderRadius:12,fontSize:11,color:f.mode==="lock"?C.mut:f.mode==="auto-date"?C.blu:C.org,fontWeight:600,cursor:"pointer"}}>
                {f.name}{f.page>1?` (p${f.page})`:""}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* Field Editor Modal */}
      {modal&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
          onClick={()=>setModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:420,background:C.card,borderRadius:"16px 16px 0 0",padding:"20px",paddingBottom:"calc(20px + env(safe-area-inset-bottom))"}}>
            <div style={{fontSize:16,fontWeight:700,color:C.txt,marginBottom:16}}>{modal.isNew?"Add Field":"Edit Field"}</div>

            {/* Field name */}
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,color:C.lt,fontWeight:600,display:"block",marginBottom:4}}>Field Name</label>
              <input type="text" value={modalName} onChange={e=>setModalName(e.target.value)}
                placeholder="e.g. Date, Weather, Notes..."
                autoFocus
                style={{width:"100%",padding:"10px 12px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:15,boxSizing:"border-box"}}/>
              {nearbyText&&modal.isNew&&modalName!==nearbyText&&(
                <button onClick={()=>setModalName(nearbyText)} style={{marginTop:4,padding:"3px 8px",background:"rgba(232,116,42,0.1)",border:`1px solid ${C.org}`,borderRadius:6,color:C.org,fontSize:11,cursor:"pointer"}}>
                  Use: "{nearbyText}"
                </button>
              )}
            </div>

            {/* Field type */}
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,color:C.lt,fontWeight:600,display:"block",marginBottom:6}}>Type</label>
              <div style={{display:"flex",gap:6}}>
                {[{k:"text",l:"Text"},{k:"textarea",l:"Notes"},{k:"signature",l:"Signature"}].map(t=>(
                  <button key={t.k} onClick={()=>{setModalType(t.k);if(t.k==="textarea")setFields(prev=>modal.isNew?prev:prev.map((f,i)=>i===modal.idx?{...f,h:Math.max(f.h,80)}:f));}}
                    style={{flex:1,padding:"8px 0",background:modalType===t.k?C.org:"transparent",border:`1px solid ${modalType===t.k?C.org:C.brd}`,borderRadius:8,color:modalType===t.k?"#fff":C.mut,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                    {t.l}
                  </button>
                ))}
              </div>
            </div>

            {/* Mode */}
            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,color:C.lt,fontWeight:600,display:"block",marginBottom:6}}>Behavior</label>
              <div style={{display:"flex",gap:6}}>
                {[{k:"edit",l:"Edit Daily",c:C.org},{k:"lock",l:"Lock",c:C.mut},{k:"auto-date",l:"Auto-Date",c:C.blu},{k:"auto-num",l:"Auto-#",c:C.blu}].map(m=>(
                  <button key={m.k} onClick={()=>setModalMode(m.k)}
                    style={{flex:1,padding:"7px 0",background:modalMode===m.k?m.c:"transparent",border:`1px solid ${modalMode===m.k?m.c:C.brd}`,borderRadius:8,color:modalMode===m.k?"#fff":C.mut,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                    {m.l}
                  </button>
                ))}
              </div>
              <div style={{fontSize:10,color:C.mut,marginTop:4}}>
                {modalMode==="edit"?"You fill this field each report":modalMode==="lock"?"Same value every report (set once)":modalMode==="auto-date"?"Auto-fills today's date":"Auto-increments (1, 2, 3...)"}
              </div>
            </div>

            {/* Actions */}
            <div style={{display:"flex",gap:10}}>
              {!modal.isNew&&(
                <button onClick={()=>deleteField(modal.idx)} style={{padding:"12px 16px",background:"transparent",border:`1px solid ${C.err}`,borderRadius:10,color:C.err,fontSize:14,fontWeight:700,cursor:"pointer"}}>Delete</button>
              )}
              <button onClick={()=>setModal(null)} style={{flex:1,padding:"12px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={saveField} disabled={!modalName.trim()} style={{flex:1,padding:"12px 0",background:modalName.trim()?C.org:C.brd,border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,cursor:modalName.trim()?"pointer":"default"}}>
                {modal.isNew?"Add":"Save"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Create Job ── */
function CreateJob({user, onBack, onCreated}){
  const [cjToast,setCjToast]=useState("");
  const showToast=(m)=>{setCjToast(m);setTimeout(()=>setCjToast(""),3000);};
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const [jn,setJn]=useState("");
  const [addr,setAddr]=useState("");
  const [tf,setTf]=useState(null);
  const [tfB64,setTfB64]=useState(null); // cached base64 string of template file (survives iOS Safari GC)
  const [freqOn,setFreqOn]=useState(false);
  const [sched,setSched]=useState("");
  const [days,setDays]=useState([]);
  const [remOn,setRemOn]=useState(false);
  const [remT,setRemT]=useState("5:00 PM");
  const [remH,setRemH]=useState(2);
  const [schedOn,setSchedOn]=useState(false);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [drag,setDrag]=useState(false);
  const [parsing,setParsing]=useState(false);
  const [fields,setFields]=useState([]); // unified field list: {name, value, mode: "edit"|"lock"|"auto-date"|"auto-num"}
  const [savedTpls,setSavedTpls]=useState([]); // user's saved/reusable templates
  const [loadingSaved,setLoadingSaved]=useState(true);
  const [showSaved,setShowSaved]=useState(false);
  const [usedSavedId,setUsedSavedId]=useState(null); // id of saved template being used
  const [reportTitle,setReportTitle]=useState(""); // editable report title (for saved template reuse)
  const [fnConvention,setFnConvention]=useState(null); // AI-detected: {pattern, dateFormat, numberPadding}
  const [savingTpl,setSavingTpl]=useState(false);
  const [tplSaved,setTplSaved]=useState(false); // whether current parse was saved
  const [showFieldEditor,setShowFieldEditor]=useState(false); // click-to-place editor
  const [jobType,setJobType]=useState("template"); // "template" or "worklog"
  // Company autocomplete for job-level company (whose template we use)
  const [jobCompanyName,setJobCompanyName]=useState("");
  const [jobCompanyMatches,setJobCompanyMatches]=useState([]);
  const [jobSelectedCompany,setJobSelectedCompany]=useState(null); // {id,name}
  const [jobCompanyTemplates,setJobCompanyTemplates]=useState([]);
  const [showCompanyTpls,setShowCompanyTpls]=useState(true);
  const jobCompanyDebounce=useRef(null);
  const trackParseAttempt=()=>{};
  // Job-level logo
  const [jobLogoFile,setJobLogoFile]=useState(null);
  const [jobLogoPreview,setJobLogoPreview]=useState(null);
  const jobLogoRef=useRef(null);

  // Load saved templates on mount
  useEffect(()=>{
    db.getSavedTemplates(user.id).then(t=>{setSavedTpls(t);setLoadingSaved(false);}).catch(()=>setLoadingSaved(false));
  },[user.id]);

  // Company name search — debounced lookup as user types
  const handleJobCompanyChange=(val)=>{
    setJobCompanyName(val);
    setJobSelectedCompany(null);
    setJobCompanyTemplates([]);
    if(jobCompanyDebounce.current)clearTimeout(jobCompanyDebounce.current);
    if(val.trim().length<2){setJobCompanyMatches([]);return;}
    jobCompanyDebounce.current=setTimeout(async()=>{
      try{
        const matches=await db.searchCompanies(val.trim());
        setJobCompanyMatches(matches);
      }catch(e){setJobCompanyMatches([]);}
    },400);
  };

  const selectJobCompany=async(company)=>{
    setJobSelectedCompany(company);
    setJobCompanyName(company.name);
    setJobCompanyMatches([]);
    // Fetch company templates and copy to user's saved templates
    try{
      const tpls=await db.getCompanyTemplates(company.id);
      setJobCompanyTemplates(tpls);
      if(tpls.length){
        try{await db.copyCompanyTemplatesDB(user.id,company.id);}catch(e){
          try{await db.copyCompanyTemplatesToUser(tpls,user.id);}catch(e2){console.error("Template copy fallback:",e2);}
        }
        // Refresh saved templates list so they appear immediately
        try{const updated=await db.getSavedTemplates(user.id);setSavedTpls(updated);}catch(e){}
      }
    }catch(e){setJobCompanyTemplates([]);}
  };

  const clearJobCompany=()=>{
    setJobSelectedCompany(null);
    setJobCompanyName("");
    setJobCompanyTemplates([]);
  };

  const DS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const TS=["12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM","9:00 PM"];

  const togDay=(d)=>{setSched("custom");setDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);};
  const preset=(p)=>{setSched(p);setDays([]);if(p==="as_needed")setRemOn(false);};
  const effSch=()=>{if(!freqOn)return"as_needed";if(sched==="weekly"||sched==="as_needed")return sched;if(days.length===5&&["Mon","Tue","Wed","Thu","Fri"].every(d=>days.includes(d))&&!days.includes("Sat")&&!days.includes("Sun"))return"daily_mf";if(days.length===7)return"daily_7";if(days.length>0)return"custom";return sched||"as_needed";};

  const readFileAsBase64=async(f)=>{return new Promise((res)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(f);});};

  const parseFields=async(buf,fileName)=>{
    setParsing(true);setErr("");setFields([]);
    trackParseAttempt(fileName);
    try{
      // Step 0: Try AcroForm fields first (fillable PDFs)
      console.log("[parseFields] Step 0: checking for AcroForm fields...");
      const acroFields=await readAcroFormFields(new Uint8Array(buf));
      if(acroFields&&acroFields.length>0){
        console.log("[parseFields] Found",acroFields.length,"AcroForm fields — using direct field names");
        // Group date segment fields (e.g., "Date Recd", "Date Recd-0", "Date Recd-1" → single date field)
        const dateGroups={};const usedInGroup=new Set();
        acroFields.forEach(f=>{
          const m=f.pdfFieldName.match(/^(.+)-(\d+)$/);
          if(m){
            const base=m[1];const idx=parseInt(m[2]);
            if(!dateGroups[base])dateGroups[base]={base,parts:[]};
            dateGroups[base].parts.push({idx,pdfFieldName:f.pdfFieldName});
            usedInGroup.add(f.pdfFieldName);
          }
        });
        // Also check if the base name exists as its own field (the "0" part)
        acroFields.forEach(f=>{
          if(dateGroups[f.pdfFieldName]&&!usedInGroup.has(f.pdfFieldName)){
            dateGroups[f.pdfFieldName].parts.push({idx:-1,pdfFieldName:f.pdfFieldName});
            usedInGroup.add(f.pdfFieldName);
          }
        });
        const all=[];const seenNames=new Set();
        acroFields.forEach(f=>{
          if(usedInGroup.has(f.pdfFieldName)){
            // If this is the base name (no suffix), create a grouped date field
            const group=dateGroups[f.pdfFieldName];
            if(group&&!seenNames.has(f.pdfFieldName.toLowerCase())){
              seenNames.add(f.pdfFieldName.toLowerCase());
              const parts=[f.pdfFieldName,...group.parts.sort((a,b)=>a.idx-b.idx).map(p=>p.pdfFieldName)];
              const uniqueParts=[...new Set(parts)];
              let mode="edit";
              if(f.autoFill==="date")mode="auto-date";
              else if(f.autoFill)mode="lock";
              all.push({name:f.displayName,pdfFieldName:f.pdfFieldName,pdfDateParts:uniqueParts,value:f.value||"",mode,type:f.type,autoFill:f.autoFill||"date",multiline:false,voiceEnabled:false,source:"acroform",fontSize:f.fontSize||null});
            }
            return; // skip individual parts
          }
          const key=f.pdfFieldName.toLowerCase().trim();
          if(seenNames.has(key))return;
          seenNames.add(key);
          let mode="edit";
          if(f.category==="signature")mode="signature";
          else if(f.autoFill==="date")mode="auto-date";
          else if(f.autoFill==="ir_number")mode="auto-num";
          else if(f.autoFill)mode="lock"; // auto-filled fields start locked
          all.push({name:f.displayName,pdfFieldName:f.pdfFieldName,value:f.value||"",mode,type:f.type,autoFill:f.autoFill,multiline:f.multiline,voiceEnabled:f.multiline,source:"acroform",fontSize:f.fontSize||null});
        });
        setFields(all);
        return; // skip AI detection
      }
      // Step 1: Extract real text positions client-side with pdf.js (flat PDF fallback)
      console.log("[parseFields] No AcroForm fields — falling back to text extraction + AI...");
      const textItems=await extractPdfTextStructure(new Uint8Array(buf));
      console.log("[parseFields] Extracted",textItems.length,"text items");
      // Step 2: Send text items (not base64 PDF) to edge function for semantic mapping
      const payload={text_items:textItems,file_name:fileName};
      console.log("[parseFields] Step 2: calling edge function, payload size:",JSON.stringify(payload).length);
      let resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+(AUTH_TOKEN||SB_KEY),"apikey":SB_KEY},
        body:JSON.stringify(payload)
      });
      // Auto-retry with refreshed token on 401
      if(resp.status===401){console.log("[parseFields] 401 — refreshing token and retrying");await refreshAuthToken();resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+(AUTH_TOKEN||SB_KEY),"apikey":SB_KEY},body:JSON.stringify(payload)});}
      console.log("[parseFields] Edge function responded:",resp.status);
      if(!resp.ok){const errText=await resp.text();console.error("[parseFields] Error body:",errText);throw new Error("Parse API "+resp.status+": "+errText);}
      const parsed=await resp.json();
      console.log("[parseFields] Parsed result keys:",Object.keys(parsed));
      if(parsed.error)throw new Error(parsed.error);
      // Merge editable + locked into one unified list (preserve coords for PDF fill)
      const all=[];const seenNames=new Set();
      const NOTES_KW=["notes","observations","comments"];
      const isNotesField=(n)=>NOTES_KW.some(k=>(n||"").toLowerCase().includes(k));
      let notesAdded=false;
      const addUnique=(f,mode)=>{
        const key=(f.name||"").toLowerCase().trim();
        if(seenNames.has(key))return;
        // Only allow ONE notes-like field (first one wins)
        if(isNotesField(f.name)){if(notesAdded)return;notesAdded=true;}
        seenNames.add(key);
        all.push({name:f.name,value:f.value||"",mode,page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline,voiceEnabled:f.voiceEnabled});
      };
      (parsed.editable||[]).forEach(f=>{
        let mode="edit";
        if(f.autoFill==="date")mode="auto-date";
        else if(f.autoFill==="increment")mode="auto-num";
        addUnique(f,mode);
      });
      (parsed.locked||[]).forEach(f=>{addUnique(f,"lock");});
      setFields(all);
      // Store AI-detected filename convention (dateFormat, numberPadding) for auto-numbering
      if(parsed.filenameConvention){
        setFnConvention(parsed.filenameConvention);
        // Use AI pattern with {date}/{report_number} tokens as the display title
        if(parsed.filenameConvention.pattern)setReportTitle(parsed.filenameConvention.pattern);
      }
    }catch(e){
      console.error("Parse error:",e);
      setErr("Could not parse template fields: "+(e.message||e)+". You can still create the job and configure fields later.");
    }finally{setParsing(false);}
  };

  // Parse DOCX template — sends raw file to edge function for XML extraction + AI analysis
  const parseDocxFields=async(buf,fileName)=>{
    setParsing(true);setErr("");setFields([]);
    trackParseAttempt(fileName);
    try{
      // Convert ArrayBuffer to base64
      const bytes=new Uint8Array(buf);
      let binary="";for(let i=0;i<bytes.length;i++)binary+=String.fromCharCode(bytes[i]);
      const b64=btoa(binary);
      let resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+(AUTH_TOKEN||SB_KEY),"apikey":SB_KEY},
        body:JSON.stringify({docx_base64:b64,file_name:fileName})
      });
      if(resp.status===401){await refreshAuthToken();resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+(AUTH_TOKEN||SB_KEY),"apikey":SB_KEY},body:JSON.stringify({docx_base64:b64,file_name:fileName})});}
      if(!resp.ok){const errText=await resp.text();throw new Error("Parse API "+resp.status+": "+errText);}
      const parsed=await resp.json();
      if(parsed.error)throw new Error(parsed.error);
      // Same merge logic as PDF path
      const all=[];const seenNames=new Set();
      const NOTES_KW=["notes","observations","comments"];
      const isNotesField=(n)=>NOTES_KW.some(k=>(n||"").toLowerCase().includes(k));
      let notesAdded=false;
      const addUnique=(f,mode)=>{
        const key=(f.name||"").toLowerCase().trim();
        if(seenNames.has(key))return;
        if(isNotesField(f.name)){if(notesAdded)return;notesAdded=true;}
        seenNames.add(key);
        all.push({name:f.name,value:f.value||"",mode,page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline,voiceEnabled:f.voiceEnabled});
      };
      (parsed.editable||[]).forEach(f=>{
        let mode="edit";
        if(f.autoFill==="date")mode="auto-date";
        else if(f.autoFill==="increment")mode="auto-num";
        addUnique(f,mode);
      });
      (parsed.locked||[]).forEach(f=>{addUnique(f,"lock");});
      setFields(all);
      if(parsed.filenameConvention){
        setFnConvention(parsed.filenameConvention);
        if(parsed.filenameConvention.pattern)setReportTitle(parsed.filenameConvention.pattern);
      }
    }catch(e){
      console.error("DOCX parse error:",e);
      setErr("Could not parse DOCX fields: "+e.message);
    }finally{setParsing(false);}
  };

  const ALLOWED_EXTS=["pdf","docx","doc","jpg","jpeg","png"];
  const doFile=async(f)=>{
    const e=f.name.split(".").pop().toLowerCase();
    if(!ALLOWED_EXTS.includes(e)){setErr("Accepted formats: PDF, DOCX, JPG, PNG");return;}
    setTf(f);setErr("");setUsedSavedId(null);setReportTitle(f.name.replace(/\.[^.]+$/,""));setFnConvention(null);setTplSaved(false);
    try{
      const buf=await f.arrayBuffer();
      // Store as base64 string — immune to iOS Safari releasing the file buffer
      const u8=new Uint8Array(buf);const chunks=[];for(let i=0;i<u8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,u8.subarray(i,i+8192)));
      setTfB64(btoa(chunks.join("")));
      // Auto-detect fields via Edge Function
      if(e==="pdf"){
        parseFields(buf.slice(0),f.name);
      }else if(e==="docx"||e==="doc"){
        parseDocxFields(buf.slice(0),f.name);
      }else{
        setFields([]);setParsing(false);
      }
    }catch(bufErr){console.error("File buffer read:",bufErr);setErr("Could not read file. Try again.");}
  };

  // Use a saved template — loads fields without re-parsing, but still needs the actual file uploaded
  // Job-specific locked fields become editable so user can enter new values for the new job
  const JOB_SPECIFIC_FIELDS=["project name","project no","project number","owner","client","district","dsa file","dsa file #","dsa app","dsa app #","contractor","architect","engineer","inspector","ior","project inspector","project manager","address","location","jurisdiction"];
  const [loadingTpl,setLoadingTpl]=useState(false);
  const useSavedTemplate=async(tpl)=>{
    setLoadingTpl(true);setErr("");
    try{
    let raw=tpl.field_config||[];
    // Validate field_config — must be an array; if it's the new {editable,locked} schema, normalize
    if(raw&&!Array.isArray(raw)){
      if(raw.editable||raw.locked){raw=[...(raw.editable||[]).map(f=>({...f,mode:f.mode||"edit"})),...(raw.locked||[]).map(f=>({...f,mode:f.mode||"lock"}))];}
      else{console.warn("Invalid field_config format, resetting");raw=[];}
    }
    // Extract filename convention if embedded (from admin provisioning)
    const convEntry=raw.find(f=>f._type==="filenameConvention");
    const fieldEntries=raw.filter(f=>!f._type);
    if(convEntry){const{_type,...conv}=convEntry;setFnConvention(conv);}
    // Convert job-specific locked fields to editable with cleared values
    const adjusted=fieldEntries.map(f=>{
      if(f.mode==="lock"){
        const nameLC=(f.name||"").toLowerCase().trim();
        const isJobSpecific=JOB_SPECIFIC_FIELDS.some(js=>nameLC===js||nameLC.startsWith(js+" ")||nameLC.endsWith(" "+js)||nameLC.includes(" "+js+" "));
        if(isJobSpecific)return{...f,mode:"edit",value:"",lockAfterCreate:true};
      }
      return{...f};
    });
    if(adjusted.length>0)setFields(adjusted);
    setUsedSavedId(tpl.id);
    // Use stored AI pattern with {date} tokens if available, otherwise raw filename
    const storedPattern=convEntry?.pattern;
    setReportTitle(storedPattern||tpl.original_filename?.replace(/\.[^.]+$/,"")||tpl.name||"");
    setTplSaved(adjusted.length>0);
    setShowSaved(false);
    // Download the template file — check company-templates bucket first, then report-source-docs
    if(tpl.storage_path){
        const isCompanyBucket=tpl.storage_path.startsWith("company-templates/");
        const bucket=isCompanyBucket?"company-templates":"report-source-docs";
        const path=isCompanyBucket?tpl.storage_path.replace("company-templates/",""):tpl.storage_path;
        const token=AUTH_TOKEN||SB_KEY;
        console.log("[useSavedTemplate] Downloading from",bucket,"/",path,"public:",isCompanyBucket);
        const resp=isCompanyBucket
          ?await fetch(`${SB_URL}/storage/v1/object/public/${bucket}/${path}`)
          :await fetch(`${SB_URL}/storage/v1/object/${bucket}/${path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${token}`}});
        console.log("[useSavedTemplate] Download status:",resp.status);
        if(resp.ok){
          const blob=await resp.blob();
          const ext=tpl.file_type||tpl.original_filename?.split(".").pop().toLowerCase()||"pdf";
          const file=new File([blob],tpl.original_filename||tpl.file_name||`template.${ext}`,{type:blob.type});
          setTf(file);
          const u8=new Uint8Array(await blob.arrayBuffer());
          const chunks=[];for(let i=0;i<u8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,u8.subarray(i,i+8192)));
          setTfB64(btoa(chunks.join("")));
          // If no fields were loaded (company template without field_config), auto-parse the file
          if(adjusted.length===0&&ext==="pdf"){
            const buf=await blob.arrayBuffer();
            await parseFields(buf,file.name);
          }
        }else{
          const errBody=await resp.text().catch(()=>"");
          console.error("[useSavedTemplate] Download failed:",resp.status,errBody);
          setErr("Could not load template file ("+resp.status+"). Try uploading manually.");
        }
    }else if(adjusted.length===0){
      setErr("This template doesn't have a file yet. Upload a PDF to get started.");
    }
    }catch(dlErr){console.error("[useSavedTemplate] Error:",dlErr);setErr("Template loading failed: "+dlErr.message);}
    finally{setLoadingTpl(false);}
  };

  // When file is uploaded after selecting a saved template, skip parsing
  const doFileWithSaved=async(f)=>{
    const e=f.name.split(".").pop().toLowerCase();
    if(!ALLOWED_EXTS.includes(e)){setErr("Accepted formats: PDF, DOCX, JPG, PNG");return;}
    setTf(f);setErr("");
    try{const buf=await f.arrayBuffer();const u8=new Uint8Array(buf);const chunks=[];for(let i=0;i<u8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,u8.subarray(i,i+8192)));setTfB64(btoa(chunks.join("")));}catch(bufErr){console.error("File buffer read:",bufErr);setErr("Could not read file. Try again.");}
    // Fields already loaded from saved template — no parsing needed
  };

  // Save current parsed fields as a reusable template
  const saveAsTemplate=async()=>{

  const setFieldMode=(name,mode)=>{setFields(p=>p.map(f=>f.name===name?{...f,mode}:f));};

  const modeBtn=(fieldName,mode,label,color)=>{

  const ok=jn.trim();

  const create=async()=>{

    try{

      // Use edited report title as the pattern — user can tweak what AI detected
      const filePattern=reportTitle.trim()||(tf?tf.name.replace(/\.[^.]+$/,""):"");
      // Store the AI-detected convention (dateFormat, numberPadding) alongside the pattern
      const convention=fnConvention?{pattern:filePattern,dateFormat:fnConvention.dateFormat||"",numberPadding:fnConvention.numberPadding||0}:{pattern:filePattern,dateFormat:"",numberPadding:0};
      const isAcroForm=fields.some(f=>f.source==="acroform");
      const coords=(f)=>({page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline});
      const acroProps=(f)=>isAcroForm?{pdfFieldName:f.pdfFieldName,type:f.type,autoFill:f.autoFill}:{};
      // Fields marked lockAfterCreate (from saved template reuse) go back to locked with the user's new values
      const editFields=fields.filter(f=>f.mode==="edit"&&!f.lockAfterCreate).map(f=>({name:f.name,value:"",originalValue:f.value||"",voiceEnabled:true,...coords(f),...acroProps(f)}));

      const sigFields=isAcroForm?fields.filter(f=>f.mode==="signature").map(f=>({name:f.name,value:"",pdfFieldName:f.pdfFieldName,type:"signature"})):[];
      const fc={editable:[...editFields,...autoFields],locked:lockFields,signatures:sigFields,filenameConvention:convention,source:isAcroForm?"acroform":"ai_detected"};
      const job=await db.mkJob({user_id:user.id,name:jn.trim(),site_address:addr.trim()||null,company_id:jobSelectedCompany?.id||null,job_type:jobType,report_filename_pattern:filePattern,schedule:es,schedule_days:es==="custom"?days:[],reminder_enabled:remOn,reminder_time:remOn?remT:null,reminder_hours_before:remOn?remH:null,scheduling_enabled:schedOn,field_config:fc});
      if(tf&&job?.id){
        try{
          const ext=tf.name.split(".").pop().toLowerCase();
          // Convert from base64 string back to Blob for upload
          if(!tfB64)throw new Error("Template file data was lost. Please go back and re-upload the file.");
          const raw=atob(tfB64);const u8=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)u8[i]=raw.charCodeAt(i);
          const fileBuf=u8.buffer;
          const fileBlob=new Blob([u8],{type:tf.type||"application/octet-stream"});
          const sp=await db.ulTpl(user.id,job.id,fileBlob,ext);
          const tplData={user_id:user.id,job_id:job.id,name:tf.name,original_filename:tf.name,file_type:ext,storage_path:sp,field_config:fields.length?fields:[]};
          await db.mkTpl(tplData);
          // Render PDF pages to images for preview cache — fire-and-forget (don't block job creation)
          if(ext==="pdf"&&window.pdfjsLib){
            (async()=>{try{
              const renderBuf=fileBuf.slice(0);

              const imgs=[];
              for(let i=1;i<=pjDoc.numPages;i++){
                const pg=await pjDoc.getPage(i);
                const vp=pg.getViewport({scale:1.5});
                const cvs=document.createElement("canvas");cvs.width=vp.width;cvs.height=vp.height;
                await pg.render({canvasContext:cvs.getContext("2d"),viewport:vp}).promise;
                imgs.push(cvs.toDataURL("image/jpeg",0.85));

              }
            }catch(pgErr){console.error("Template page render:",pgErr);}})();

                      <div style={{fontSize:11,color:C.blu,fontStyle:"italic",padding:"4px 0"}}>Will auto-fill today's date on each report</div>

            </div>
            {/* Save as Reusable Template — after fields so users review first */}
            {!tplSaved&&!usedSavedId&&(
              <div style={{background:C.card,border:`2px solid ${C.blu}`,borderRadius:12,padding:"16px 18px",marginTop:16,textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:6}}>—</div>
                <div style={{fontSize:14,fontWeight:700,color:C.lt,marginBottom:4}}>Save to My Templates</div>
                <div style={{fontSize:12,color:C.mut,marginBottom:12,lineHeight:1.4}}>Save these fields to your account for reuse on future jobs. Only visible to you.</div>
                <button onClick={saveAsTemplate} disabled={savingTpl} style={{width:"100%",padding:"12px 0",background:C.blu,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:savingTpl?"default":"pointer",opacity:savingTpl?0.6:1}}>

              <div style={{background:"rgba(34,197,94,0.08)",border:`1px solid ${C.ok}`,borderRadius:10,padding:"12px 16px",marginTop:16,textAlign:"center"}}>

        {/* ── Three Toggle Boxes ── */}

        {/* 1. Jobsite Scheduling */}
        <ToggleBox icon="📅" label="Jobsite Scheduling" on={schedOn} setOn={setSchedOn}>
          <div style={{background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,padding:"12px 14px",marginTop:12}}>

        <ToggleBox icon="—" label="Report Frequency" on={freqOn} setOn={v=>{setFreqOn(v);if(!v)setRemOn(false);}} desc="Set how often you'll file reports for this job">
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {DS.map(d=>{const a=days.includes(d);return<button key={d} onClick={()=>togDay(d)} style={{width:42,height:42,borderRadius:"50%",border:a?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:a?C.org:"transparent",color:a?"#fff":C.mut,fontWeight:600,fontSize:11,cursor:"pointer"}}>{d}</button>;})}
          </div>
          <div style={{display:"flex",gap:8}}>
            {[{k:"weekly",l:"Weekly"},{k:"as_needed",l:"As Needed"}].map(({k,l})=><button key={k} onClick={()=>preset(k)} style={{padding:"8px 14px",borderRadius:8,border:sched===k?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:sched===k?C.org:"transparent",color:sched===k?"#fff":C.mut,fontWeight:600,fontSize:12,cursor:"pointer"}}>{l}</button>)}
          </div>

        {/* 3. Reminders — only visible when Report Frequency is on */}
        {freqOn&&(
          <ToggleBox icon="🔔" label="Reminders" on={remOn} setOn={setRemOn} desc="Get reminded before your report is due">
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Submit by</label><select value={remT} onChange={e=>setRemT(e.target.value)} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{TS.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
              <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Remind me</label><select value={remH} onChange={e=>setRemH(Number(e.target.value))} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{[1,2,3,4,6].map(h=><option key={h} value={h}>{h} hr{h>1?"s":""} before</option>)}</select></div>
            </div>

        )}

        {/* Create Button — only requires job name */}
        <button className="btn-o" onClick={create} disabled={!ok||saving} style={{width:"100%",padding:"14px 0",background:ok?C.org:C.brd,border:ok?`1px solid ${C.blu}`:`1px solid ${C.brd}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:ok&&!saving?"pointer":"default",opacity:saving?0.7:1,marginTop:8}}>{saving?"Creating...":"Create Job"}</button>
      </div>
    </div>
  );
}

// ── Global: AI photo description daily limit (per job, per day) ──
const AI_DESCRIBE_DAILY_LIMIT=25;
const _aiUsage={};
function getAiUsageKey(jobId){
  const d=new Date().toLocaleDateString("en-CA",{timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone});
  return jobId+"_"+d;
}
function checkAiLimit(jobId){
  const key=getAiUsageKey(jobId);
  return(_aiUsage[key]||0)<AI_DESCRIBE_DAILY_LIMIT;
}
function getAiUsageCount(jobId){return _aiUsage[getAiUsageKey(jobId)]||0;}
function incrementAiUsage(jobId){
  const key=getAiUsageKey(jobId);
  _aiUsage[key]=(_aiUsage[key]||0)+1;
  // Persist to localStorage so refreshes don't reset the counter
  try{localStorage.setItem("mdr_ai_usage",JSON.stringify(_aiUsage));}catch(e){}
}
// Restore from localStorage on load
try{const stored=localStorage.getItem("mdr_ai_usage");if(stored)Object.assign(_aiUsage,JSON.parse(stored));}catch(e){}

/* ── Work Log Editor ── */
function WorkLogEditor({job, user, onBack, reportDate}){
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const todayISO=reportDate||new Date().toLocaleDateString("en-CA",{timeZone:tz});
  const [contractors,setContractors]=useState([]); // [{id,name,description,hours,quantity,photos:[]}]
  const [activeId,setActiveId]=useState(null); // expanded contractor id
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState("");
  const [fieldMode,setFieldMode]=useState(false);
  const [fieldAddName,setFieldAddName]=useState("");
  const [saving,setSaving]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const [wlSubmitStep,setWlSubmitStep]=useState("");
  const [viewingPreview,setViewingPreview]=useState(null); // array of page data URLs for preview
  const [viewLoading,setViewLoading]=useState(false);
  const [draftId,setDraftId]=useState(null);
  const [wlReportStatus,setWlReportStatus]=useState(null);
  const [generalNotes,setGeneralNotes]=useState("");
  const [safetyNotes,setSafetyNotes]=useState("");
  const [materials,setMaterials]=useState("");
  const [equipment,setEquipment]=useState("");
  const [qualityControl,setQualityControl]=useState("");
  const [customCategories,setCustomCategories]=useState([]); // [{title:"",value:""}]
  const [survey,setSurvey]=useState([
    {q:"Any accidents on site today?",answer:"",desc:""},
    {q:"Any schedule delays occur?",answer:"",desc:""},
    {q:"Did weather cause any delays?",answer:"",desc:""},
    {q:"Any visitors on site?",answer:"",desc:""},
    {q:"Any areas that can't be worked on?",answer:"",desc:""},
    {q:"Any equipment rented on site?",answer:"",desc:""}
  ]);
  const [expandedSections,setExpandedSections]=useState({});
  const toggleSection=(key)=>setExpandedSections(p=>({...p,[key]:!p[key]}));
  const [weatherEnabled,setWeatherEnabled]=useState(false); // opt-in weather display
  const [weatherAM,setWeatherAM]=useState("");
  const [weatherMid,setWeatherMid]=useState("");
  const [weatherPM,setWeatherPM]=useState("");
  const photoRef=useRef(null);
  const [photoTarget,setPhotoTarget]=useState(null); // contractor id for photo upload
  const [photoMode,setPhotoMode]=useState(null); // "camera" or "library"
  const [sectionPhotos,setSectionPhotos]=useState({}); // {materials:[{data,name,ts}], ...}
  const [sectionCarry,setSectionCarry]=useState({}); // {materials:true, equipment:false, ...} — carry over toggle per section
  const sectionPhotoRef=useRef(null);
  const sectionLibraryRef=useRef(null);
  const [sectionPhotoTarget,setSectionPhotoTarget]=useState(null); // section key
  const [sectionPhotoMode,setSectionPhotoMode]=useState(null); // "camera" or "library"
  // Trigger file input after state updates (replaces fragile setTimeout)
  useEffect(()=>{if(photoTarget&&photoMode==="camera")cameraRef.current?.click();if(photoTarget&&photoMode==="library")libraryRef.current?.click();},[photoTarget,photoMode]);
  useEffect(()=>{if(sectionPhotoTarget&&sectionPhotoMode==="camera")sectionPhotoRef.current?.click();if(sectionPhotoTarget&&sectionPhotoMode==="library")sectionLibraryRef.current?.click();},[sectionPhotoTarget,sectionPhotoMode]);
  const handleSectionPhoto=(e)=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length||!sectionPhotoTarget)return;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=async(ev)=>{
        const compressed=await compressPhoto(ev.target.result);
        setSectionPhotos(p=>({...p,[sectionPhotoTarget]:[...(p[sectionPhotoTarget]||[]),{data:compressed,name:file.name,ts:Date.now()}]}));
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
    setSectionPhotoTarget(null);
    setSectionPhotoMode(null);
  };
  const removeSectionPhoto=(secKey,idx)=>{
    setSectionPhotos(p=>{const arr=[...(p[secKey]||[])];arr.splice(idx,1);return{...p,[secKey]:arr};});
  };
  const [weatherLoading,setWeatherLoading]=useState(false);

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};

  // WMO weather code → human-readable description
  const wmoDesc=(code)=>{
    const m={0:"Clear",1:"Mostly Clear",2:"Partly Cloudy",3:"Overcast",45:"Foggy",48:"Fog (Rime)",51:"Light Drizzle",53:"Drizzle",55:"Heavy Drizzle",56:"Light Freezing Drizzle",57:"Freezing Drizzle",61:"Light Rain",63:"Rain",65:"Heavy Rain",66:"Light Freezing Rain",67:"Freezing Rain",71:"Light Snow",73:"Snow",75:"Heavy Snow",77:"Snow Grains",80:"Light Showers",81:"Showers",82:"Heavy Showers",85:"Light Snow Showers",86:"Snow Showers",95:"Thunderstorm",96:"Thunderstorm + Hail",99:"Thunderstorm + Heavy Hail"};
    return m[code]||"Unknown";
  };

  // Toggle weather on — requires site address
  const toggleWeather=(on)=>{
    if(on&&!job.site_address){
      showToast("Add a site address in Job Settings to enable weather");
      return;
    }
    setWeatherEnabled(on);
    if(on&&!weatherAM)fetchWeather();
  };

  // Fetch weather from Open-Meteo (free, no API key)
  const fetchWeather=async()=>{
    if(!job.site_address){showToast("Add a site address in Job Settings to fetch weather");return;}
    setWeatherLoading(true);
    try{
      let lat,lng;
      // Geocode the job's site address using OpenStreetMap Nominatim (handles full addresses)
      try{
        const geoR=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(job.site_address)}&format=json&limit=1`,{headers:{"User-Agent":"MyDailyReports/1.0"}});
        const geoD=await geoR.json();
        if(geoD&&geoD.length>0){lat=parseFloat(geoD[0].lat);lng=parseFloat(geoD[0].lon);}
      }catch(e){console.log("Geocode failed:",e);}
      // Fallback: try Open-Meteo geocoding with just city name
      if(!lat||!lng){
        try{
          const cityMatch=job.site_address.match(/,\s*([^,]+),?\s*[A-Z]{2}/);
          const searchName=cityMatch?cityMatch[1].trim():job.site_address;
          const geoR2=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(searchName)}&count=1&language=en&format=json`);
          const geoD2=await geoR2.json();
          if(geoD2.results&&geoD2.results.length>0){lat=geoD2.results[0].latitude;lng=geoD2.results[0].longitude;}
        }catch(e){console.log("Fallback geocode failed:",e);}
      }
      if(!lat||!lng){
        showToast("Could not find location — check the site address in Job Settings");
        setWeatherLoading(false);return;
      }
      // Fetch hourly weather for today
      const wxR=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,precipitation&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&forecast_days=1`);
      const wxD=await wxR.json();
      if(!wxD.hourly||!wxD.hourly.time)throw new Error("No weather data");
      const h=wxD.hourly;
      // Pick representative hours: 7am (morning), 12pm (midday), 4pm (afternoon)
      const fmt=(idx)=>{
        if(idx<0||idx>=h.time.length)return"";
        const temp=Math.round(h.temperature_2m[idx]);
        const desc=wmoDesc(h.weather_code[idx]);
        const wind=Math.round(h.wind_speed_10m[idx]);
        const hum=Math.round(h.relative_humidity_2m[idx]);
        const precip=h.precipitation[idx];
        let s=`${temp}°F ${desc}, Wind ${wind} mph, ${hum}% humidity`;
        if(precip>0)s+=`, ${precip}" precip`;
        return s;
      };
      setWeatherAM(fmt(7));   // 7:00 AM
      setWeatherMid(fmt(12)); // 12:00 PM
      setWeatherPM(fmt(16));  // 4:00 PM
    }catch(e){console.error("Weather fetch:",e);showToast("Weather fetch failed — try again later");}
    finally{setWeatherLoading(false);}
  };

  // Load existing report on mount — or carry over contractors from most recent report
  useEffect(()=>{
    (async()=>{
      try{
        const rpt=await db.getReport(job.id,todayISO);
        let needsCarryOver=false;
        if(rpt){
          setDraftId(rpt.id);
          setWlReportStatus(rpt.status);
          if(rpt.content){
            let c;try{c=typeof rpt.content==="string"?JSON.parse(rpt.content):rpt.content;}catch(pe){console.error("Corrupt report content:",pe);c={};}
            if(c.contractors&&c.contractors.length>0)setContractors(c.contractors);
            else needsCarryOver=true; // today's report exists but has no contractors — try carry-over
            if(c.generalNotes)setGeneralNotes(c.generalNotes);
            if(c.safetyNotes)setSafetyNotes(c.safetyNotes);
            if(c.materials)setMaterials(c.materials);
            if(c.equipment)setEquipment(c.equipment);
            if(c.qualityControl)setQualityControl(c.qualityControl);
            if(c.customCategories)setCustomCategories(c.customCategories);
            if(c.survey)setSurvey(c.survey);
            if(c.weatherEnabled)setWeatherEnabled(true);
            if(c.weatherAM)setWeatherAM(c.weatherAM);
            if(c.weatherMid)setWeatherMid(c.weatherMid);
            if(c.weatherPM)setWeatherPM(c.weatherPM);
            if(c.sectionPhotos)setSectionPhotos(c.sectionPhotos);
            if(c.sectionCarry)setSectionCarry(c.sectionCarry);
          }else{needsCarryOver=true;} // today's report has no content yet
        } else {
          needsCarryOver=true;
        }
        // Carry over from most recent previous report (when today has no contractors)
        if(needsCarryOver){
          try{
            const prev=await db.getLatestReport(job.id,todayISO);
            console.log("[carry-over] prev report:",prev?.report_date,prev?.status,"has content:",!!prev?.content);
            if(prev&&prev.content){
              const pc=typeof prev.content==="string"?JSON.parse(prev.content):prev.content;
              console.log("[carry-over] prev contractors:",pc.contractors?.length,"locked:",pc.contractors?.filter(ct=>ct.locked)?.length);
              // Carry over locked contractors — clear daily data (photos, hours)
              if(pc.contractors&&pc.contractors.length>0){
                const locked=pc.contractors.filter(ct=>ct.locked);
                if(locked.length>0){
                  const carried=locked.map(ct=>({
                    id:Date.now().toString()+Math.random().toString(36).slice(2,6),
                    name:ct.name||"",
                    description:ct.carryDesc===false?"":ct.description||"",
                    hours:"",
                    quantity:ct.quantity||"1",
                    photos:[],
                    locked:true,
                    carryDesc:ct.carryDesc!==undefined?ct.carryDesc:true
                  }));
                  setContractors(carried);
                  console.log("[carry-over] carried",carried.length,"contractors");
                }
              }
              // Carry over section values only if carry-over toggled on (clear photos, keep text)
              const sc=pc.sectionCarry||{};
              if(pc.materials&&sc.materials)setMaterials(pc.materials);
              if(pc.equipment&&sc.equipment)setEquipment(pc.equipment);
              if(pc.qualityControl&&sc.qualityControl)setQualityControl(pc.qualityControl);
              if(pc.customCategories)setCustomCategories(pc.customCategories);
              if(sc)setSectionCarry(sc);
            }
          }catch(pe){console.error("Carry-over:",pe);}
        }
      }catch(e){console.error(e);}
    })();
  },[]);

  const addContractor=()=>{
    if(!newName.trim())return;
    const c={id:Date.now().toString(),name:newName.trim(),description:"",hours:"",quantity:"1",photos:[],locked:false,active:true};
    setContractors(p=>[...p,c]);
    setActiveId(c.id);
    setNewName("");
    setShowAdd(false);
  };

  const updateContractor=(id,field,val)=>{
    setContractors(p=>p.map(c=>c.id===id?{...c,[field]:val}:c));
  };

  const removeContractor=(id)=>{
    if(!confirm("Remove this contractor?"))return;
    setContractors(p=>p.filter(c=>c.id!==id));
    if(activeId===id)setActiveId(null);
  };

  // Compress photo to max 1600px, JPEG quality 0.7 (~150KB vs 4MB raw)
  const compressPhoto=(dataUrl)=>new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1600;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
      const cvs=document.createElement("canvas");cvs.width=w;cvs.height=h;
      cvs.getContext("2d").drawImage(img,0,0,w,h);
      resolve(cvs.toDataURL("image/jpeg",0.7));
    };
    img.onerror=()=>resolve(dataUrl); // fallback to original
    img.src=dataUrl;
  });

  // Downscale image for AI vision — 800px max, lower quality (description doesn't need full-res)
  const downscaleForAI=(dataUrl)=>new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.width,h=img.height;
      if(w<=MAX&&h<=MAX){resolve(dataUrl);return;}
      const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);
      const cvs=document.createElement("canvas");cvs.width=w;cvs.height=h;
      cvs.getContext("2d").drawImage(img,0,0,w,h);
      resolve(cvs.toDataURL("image/jpeg",0.5));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });

  // AI photo description — calls describe-photo edge function
  const [aiDescribing,setAiDescribing]=useState({}); // keyed by uniqueId e.g. "contractor-{cid}-{photoIdx}"
  const [aiUsageCount,setAiUsageCount]=useState(getAiUsageCount(job?.id));
  const aiLimitReached=aiUsageCount>=AI_DESCRIBE_DAILY_LIMIT;
  const describePhoto=async(imageDataUrl,context,uniqueId)=>{
    if(!checkAiLimit(job?.id)){showToast(`AI limit reached (${AI_DESCRIBE_DAILY_LIMIT}/day). Resets tomorrow.`);return null;}
    setAiDescribing(p=>({...p,[uniqueId]:true}));
    try{
      // Downscale for AI vision (800px vs 1600px stored), then strip prefix
      const aiImg=await downscaleForAI(imageDataUrl);
      const b64=aiImg.includes(",")?aiImg.split(",")[1]:aiImg;
      const r=await fetch(`${SB_URL}/functions/v1/describe-photo`,{
        method:"POST",
        headers:{"Content-Type":"application/json",apikey:SB_KEY},
        body:JSON.stringify({image_base64:b64,context})
      });
      const data=await r.json();
      if(!r.ok)throw new Error(data.error||"AI request failed");
      incrementAiUsage(job?.id);
      setAiUsageCount(getAiUsageCount(job?.id));
      return data.description||"";
    }catch(e){
      console.error("[AI describe]",e);
      showToast("AI describe failed — try again");
      return null;
    }finally{
      setAiDescribing(p=>({...p,[uniqueId]:false}));
    }
  };

  const handlePhotoUpload=(e)=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length||!photoTarget)return;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=async(ev)=>{
        const compressed=await compressPhoto(ev.target.result);
        setContractors(p=>p.map(c=>{
          if(c.id!==photoTarget)return c;
          return{...c,photos:[...(c.photos||[]),{data:compressed,name:file.name,ts:Date.now()}]};
        }));
      };
      reader.readAsDataURL(file);
    });
    e.target.value="";
    setPhotoTarget(null);setPhotoMode(null);
  };
  const cameraRef=useRef(null);
  const libraryRef=useRef(null);

  const removePhoto=(contractorId,photoIdx)=>{
    setContractors(p=>p.map(c=>{
      if(c.id!==contractorId)return c;
      const ph=[...(c.photos||[])];
      ph.splice(photoIdx,1);
      return{...c,photos:ph};
    }));
  };

  const [submitSuccess,setSubmitSuccess]=useState(null); // {pdfBlob,pdfFilename,pdfBase64,emailHtml,...}
  const [emailing,setEmailing]=useState(false);
  const [toast,setToast]=useState("");
  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(""),3000);};

  const buildContent=()=>({
    contractors,generalNotes,safetyNotes,materials,equipment,qualityControl,customCategories,survey,
    weatherEnabled,weatherAM,weatherMid,weatherPM,sectionPhotos,sectionCarry,
    reportType:"worklog"
  });

  // ── Generate Work Log PDF with pdf-lib ──
  const generateWorkLogPdf=async()=>{
    const {PDFDocument,rgb,StandardFonts}=PDFLib;
    const doc=await PDFDocument.create();
    const font=await doc.embedFont(StandardFonts.TimesRoman);
    const fontB=await doc.embedFont(StandardFonts.TimesRomanBold);
    const W=612,H=792; // letter size
    const M=40; // margin
    const CW=W-2*M; // content width

    const todayDisplay2=new Date(todayISO+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric",timeZone:tz});
    const userName=window._mdrUserName||user?.user_metadata?.full_name||"";

    let page;
    let y=H-M;
    let pageNum=1;
    const totalPagesRef={val:1}; // will update after building
    // ── Page 1 Header — light grey bar, title LEFT, logo RIGHT ──
    page=doc.addPage([W,H]);
    const headerH=90;
    const hdrPad=10; // inner padding

    // Light grey header bar with margins
    page.drawRectangle({x:M,y:H-headerH,width:CW,height:headerH,color:rgb(.85,.85,.85)});

    // Embed logo — job logo → company logo → profile company logo
    let logoImg=null;
    let logoDrawW=0,logoDrawH=0;
    try{
      let logoBytes=null;let isJpg=true;
      // Logo fallback chain: 1) Job logo → 2) Company logo → 3) Profile company logo
      const fetchLogoBytes=async(url)=>{
        if(!url)return null;
        try{
          if(url.startsWith("data:image")){
            const b64=url.split(",")[1];const bin=atob(b64);
            const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
            isJpg=!url.includes("image/png");return arr;
          }else{
            const resp=await fetch(url);
            if(resp.ok){isJpg=url.toLowerCase().endsWith(".jpg")||url.toLowerCase().endsWith(".jpeg")||resp.headers.get("content-type")?.includes("jpeg");return new Uint8Array(await resp.arrayBuffer());}
          }
        }catch(e){console.error("Logo decode:",e);}
        return null;
      };
      // 1. Try job-level logo
      const jobLogoUrl=await db.getJobLogoUrl(job.id);
      if(jobLogoUrl)logoBytes=await fetchLogoBytes(jobLogoUrl);
      // 2. Try company logos (job's company, then profile's company)
      if(!logoBytes){
        const companyIds=[job.company_id];
        try{const prof=await db.getProfile(user.id);if(prof?.company_id&&prof.company_id!==job.company_id)companyIds.push(prof.company_id);}catch(e){}
        for(const cid of companyIds){
          if(!cid||logoBytes)continue;
          const cLogoUrl=await db.getCompanyLogoUrl(cid);
          if(cLogoUrl)logoBytes=await fetchLogoBytes(cLogoUrl);
        }
      }
      if(logoBytes){
        logoImg=isJpg?await doc.embedJpg(logoBytes):await doc.embedPng(logoBytes);
        const logoMaxH=headerH-2*hdrPad;
        const logoMaxW=140;
        const scl=Math.min(logoMaxW/logoImg.width,logoMaxH/logoImg.height);
        logoDrawW=logoImg.width*scl;
        logoDrawH=logoImg.height*scl;
        // Logo on RIGHT side, vertically centered
        const logoX=W-M-hdrPad-logoDrawW;
        const logoY2=H-headerH+(headerH-logoDrawH)/2;
        page.drawImage(logoImg,{x:logoX,y:logoY2,width:logoDrawW,height:logoDrawH});
      }
    }catch(e){console.error("Logo embed:",e);}

    // Job title — large, dark text, LEFT side
    const jobTitle=job.name||"Daily Work Log";
    const titleStartX=M+hdrPad;
    const maxTitleW=CW-logoDrawW-3*hdrPad; // leave room for logo
    let titleSize=jobTitle.length>30?16:jobTitle.length>20?18:22;
    while(titleSize>10&&fontB.widthOfTextAtSize(jobTitle,titleSize)>maxTitleW)titleSize-=1;
    if(fontB.widthOfTextAtSize(jobTitle,titleSize)>maxTitleW){
      const words=jobTitle.split(" ");let l1="",l2="";
      for(const w of words){const t=l1?l1+" "+w:w;if(fontB.widthOfTextAtSize(t,titleSize)>maxTitleW&&l1){l2=words.slice(words.indexOf(w)).join(" ");break;}else l1=t;}
      page.drawText(l1,{x:titleStartX,y:H-36,size:titleSize,font:fontB,color:rgb(.15,.15,.15)});
      if(l2)page.drawText(l2,{x:titleStartX,y:H-50,size:titleSize,font:fontB,color:rgb(.15,.15,.15)});
    }else{
      page.drawText(jobTitle,{x:titleStartX,y:H-40,size:titleSize,font:fontB,color:rgb(.15,.15,.15)});
    }
    // Site address below title
    if(job.site_address)page.drawText(job.site_address,{x:titleStartX,y:H-58,size:10,font,color:rgb(.35,.35,.35)});

    // Info bar below header (dark, with Date / Job # / Prepared By)
    const infoBarH=26;
    const infoBarY=H-headerH-infoBarH;
    page.drawRectangle({x:M,y:infoBarY,width:CW,height:infoBarH,color:rgb(.22,.22,.22)});
    const dateStr=new Date(todayISO+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"2-digit",day:"2-digit",year:"numeric",timeZone:tz});
    const infoTextY=infoBarY+8;
    // Date
    page.drawText("Date",{x:M+8,y:infoTextY,size:8,font:fontB,color:rgb(.55,.55,.55)});
    page.drawText(dateStr,{x:M+36,y:infoTextY,size:9,font:fontB,color:rgb(1,1,1)});
    // Job #
    const jobNum=job.job_number||job.name||"";
    const jx=W*0.38;
    page.drawText("Job #",{x:jx,y:infoTextY,size:8,font:fontB,color:rgb(.55,.55,.55)});
    page.drawText(jobNum,{x:jx+34,y:infoTextY,size:9,font:fontB,color:rgb(1,1,1)});
    // Prepared By
    const px=W*0.62;
    page.drawText("Prepared By",{x:px,y:infoTextY,size:8,font:fontB,color:rgb(.55,.55,.55)});
    page.drawText(userName||"—",{x:px+66,y:infoTextY,size:9,font:fontB,color:rgb(1,1,1)});

    y=infoBarY-10; // start dynamic content below info bar

    const ensureSpace=(needed)=>{
      if(y-needed<M+30){
        page=doc.addPage([W,H]);y=H-M;pageNum++;totalPagesRef.val=pageNum;
        drawFooter(page);
      }
    };

    const drawFooter=(pg)=>{}; // footers added in bulk at end

    // ── Weather section — MDR-style: 3 time slots with big temp, condition, details ──
    if(weatherEnabled&&(weatherAM||weatherMid||weatherPM)){
      // Parse weather string like "78°F Clear, Wind 19 mph, 14% humidity, 0.1" precip"
      const parseWx=(str)=>{
        if(!str)return{temp:"—",cond:"",wind:"",precip:"0\"",humidity:""};
        const m=str.match(/^(\d+)°F\s+([^,]+)/);
        const temp=m?m[1]+"°":"—";
        const cond=m?m[2].trim():"";
        const windM=str.match(/Wind\s+(\d+)\s*mph/i);
        const wind=windM?windM[1]+" MPH":"0 MPH";
        const humM=str.match(/(\d+)%\s*humidity/i);
        const humidity=humM?humM[1]+"%":"";
        const precM=str.match(/([\d.]+)"\s*precip/i);
        const precip=precM?precM[1]+"\"":"0\"";
        return{temp,cond,wind,precip,humidity};
      };

      // Section header bar
      ensureSpace(140);
      page.drawRectangle({x:M,y:y-30,width:CW,height:30,color:rgb(.45,.45,.45)});
      page.drawText("Weather",{x:M+(CW-fontB.widthOfTextAtSize("Weather",16))/2,y:y-22,size:16,font:fontB,color:rgb(.92,.57,.17)});
      y-=36;

      const wxSlots=[
        {label:"6:00 AM",val:weatherAM},
        {label:"12:00 PM",val:weatherMid},
        {label:"4:00 PM",val:weatherPM}
      ];
      const slotW=CW/3;
      const slotH=100; // height of each weather box
      ensureSpace(slotH+20);

      wxSlots.forEach((wx,i)=>{
        const sx=M+i*slotW;
        const px=parseWx(wx.val);
        // Box with light border
        page.drawRectangle({x:sx,y:y-slotH,width:slotW,height:slotH,color:rgb(1,1,1),borderColor:rgb(.88,.88,.88),borderWidth:.5});
        // Time label centered at top
        const labelW=fontB.widthOfTextAtSize(wx.label,9);
        page.drawText(wx.label,{x:sx+(slotW-labelW)/2,y:y-14,size:9,font:fontB,color:rgb(.35,.35,.35)});
        // Big temperature number centered
        const tempStr=px.temp;
        const tempW=fontB.widthOfTextAtSize(tempStr,28);
        page.drawText(tempStr,{x:sx+(slotW-tempW)/2,y:y-46,size:28,font:fontB,color:rgb(.15,.15,.15)});
        // Condition name centered below temp
        if(px.cond){
          const condW=font.widthOfTextAtSize(px.cond,10);
          page.drawText(px.cond,{x:sx+(slotW-condW)/2,y:y-60,size:10,font,color:rgb(.3,.3,.3)});
        }
        // Details row: Wind | Precipitation | Humidity
        const detY=y-slotH+12;
        const detFontSz=7;
        const sep=" | ";
        const detParts=[];
        if(px.wind)detParts.push("Wind: "+px.wind);
        detParts.push("Precipitation: "+px.precip);
        if(px.humidity)detParts.push("Humidity: "+px.humidity);
        const detStr=detParts.join("  "+sep+"  ");
        const detW=font.widthOfTextAtSize(detStr,detFontSz);
        page.drawText(detStr,{x:sx+(slotW-detW)/2,y:detY,size:detFontSz,font,color:rgb(.45,.45,.45)});
      });
      y-=(slotH+8);
    }

    // ── Work Logs — MDR-style table ──
    // Section header bar
    ensureSpace(40);
    page.drawRectangle({x:M,y:y-30,width:CW,height:30,color:rgb(.45,.45,.45)});
    page.drawText("Work Logs",{x:M+(CW-fontB.widthOfTextAtSize("Work Logs",16))/2,y:y-22,size:16,font:fontB,color:rgb(.92,.57,.17)});
    y-=36;

    // Column header row
    const nameW=130,qtyW=65,hrsW=80;
    const descW=CW-nameW-qtyW-hrsW;
    page.drawRectangle({x:M,y:y-22,width:CW,height:22,color:rgb(.97,.97,.97)});
    page.drawLine({start:{x:M,y:y-22},end:{x:M+CW,y:y-22},thickness:.5,color:rgb(.85,.85,.85)});
    page.drawText("Name",{x:M+10,y:y-15,size:10,font:fontB,color:rgb(.3,.3,.3)});
    page.drawText("Description",{x:M+nameW+10,y:y-15,size:10,font:fontB,color:rgb(.3,.3,.3)});
    page.drawText("Quantity",{x:M+nameW+descW+8,y:y-15,size:10,font:fontB,color:rgb(.3,.3,.3)});
    page.drawText("Total Hours",{x:M+nameW+descW+qtyW+6,y:y-15,size:10,font:fontB,color:rgb(.3,.3,.3)});
    y-=24;

    let totalHrs=0;
    const lineH=17; // line height for description text — generous like MDR
    const descFontSz=11;
    const nameFontSz=11;
    const attrSz=8; // attribution line size
    const rowPadTop=16; // top padding inside row
    const rowPadBot=16; // bottom padding inside row
    const attrGap=10; // gap between last desc line and attribution

    contractors.filter(c=>c.active!==false).forEach((c,ri)=>{
      const hrs=parseFloat(c.hours)||0;
      const qty=parseInt(c.quantity)||1;
      totalHrs+=hrs*qty;

      // Wrap description text — split on newlines first, then wrap each paragraph
      const descLines=[];
      if(c.description){
        c.description.split("\n").forEach(paragraph=>{
          if(!paragraph.trim()){descLines.push("");return;}
          const words=paragraph.split(" ");
          let line="";
          const maxW=descW-20;
          words.forEach(w=>{
            const test=line?line+" "+w:w;
            if(font.widthOfTextAtSize(test,descFontSz)>maxW&&line){descLines.push(line);line=w;}
            else line=test;
          });
          if(line)descLines.push(line);
        });
      }
      if(descLines.length===0)descLines.push("—");

      // Wrap name if long
      const nameLines=[];
      const nameWords=(c.name||"—").split(" ");
      let nl2="";
      nameWords.forEach(w=>{const t=nl2?nl2+" "+w:w;if(fontB.widthOfTextAtSize(t,nameFontSz)>(nameW-20)&&nl2){nameLines.push(nl2);nl2=w;}else nl2=t;});
      if(nl2)nameLines.push(nl2);

      // Attribution line: "UserName | date, time"
      const now=new Date();
      const attrText=(userName||"Inspector")+" | "+new Date(todayISO+"T12:00:00").toLocaleDateString("en-US",{month:"numeric",day:"numeric",year:"2-digit",timeZone:tz})+", "+now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:tz});

      // Calculate content height: desc lines + attribution
      const descH=descLines.reduce((h,ln)=>h+(ln===""?lineH*0.6:lineH),0);
      const nameH=nameLines.length*16;
      const contentH=Math.max(nameH, descH + attrGap + 12); // 12 for attribution line
      const rowH=Math.max(60, rowPadTop + contentH + rowPadBot);
      ensureSpace(rowH);

      // Row background + border
      page.drawRectangle({x:M,y:y-rowH,width:CW,height:rowH,borderColor:rgb(.85,.85,.85),borderWidth:.5,color:ri%2===0?rgb(.99,.99,.99):rgb(1,1,1)});
      // Bottom border line
      page.drawLine({start:{x:M,y:y-rowH},end:{x:M+CW,y:y-rowH},thickness:.5,color:rgb(.8,.8,.8)});

      // Name — top-aligned with padding
      nameLines.forEach((ln,li)=>{
        page.drawText(ln,{x:M+10,y:y-rowPadTop-12-li*16,size:nameFontSz,font:fontB,color:rgb(.15,.15,.15)});
      });

      // Description — top-aligned with padding
      let dy=y-rowPadTop-12;
      descLines.forEach(ln=>{
        if(ln===""){dy-=lineH*0.6;return;}
        page.drawText(ln,{x:M+nameW+10,y:dy,size:descFontSz,font,color:rgb(.25,.25,.25)});
        dy-=lineH;
      });

      // Attribution line below description
      dy-=attrGap;
      page.drawText(attrText,{x:M+nameW+10,y:dy,size:attrSz,font,color:rgb(.6,.6,.6)});

      // Quantity — top-aligned matching first desc line
      page.drawText(String(qty),{x:M+nameW+descW+(qtyW-font.widthOfTextAtSize(String(qty),descFontSz))/2,y:y-rowPadTop-12,size:descFontSz,font,color:rgb(.2,.2,.2)});

      // Total Hours — top-aligned
      const hrsStr=hrs?String(hrs):"0";
      page.drawText(hrsStr,{x:M+nameW+descW+qtyW+(hrsW-font.widthOfTextAtSize(hrsStr,descFontSz))/2,y:y-rowPadTop-12,size:descFontSz,font,color:rgb(.2,.2,.2)});

      y-=rowH;
    });

    // Totals row (dark background like MDR)
    ensureSpace(28);
    page.drawRectangle({x:M,y:y-28,width:CW,height:28,color:rgb(.35,.35,.35)});
    page.drawText("Total",{x:M+10,y:y-19,size:12,font:fontB,color:rgb(1,1,1)});
    const totalQty=contractors.reduce((s,c)=>s+(parseInt(c.quantity)||1),0);
    page.drawText(String(totalQty),{x:M+nameW+descW+(qtyW-fontB.widthOfTextAtSize(String(totalQty),12))/2,y:y-19,size:12,font:fontB,color:rgb(1,1,1)});
    page.drawText(String(totalHrs),{x:M+nameW+descW+qtyW+(hrsW-fontB.widthOfTextAtSize(String(totalHrs),12))/2,y:y-19,size:12,font:fontB,color:rgb(1,1,1)});
    y-=36;

    // ── Helper: draw a MDR-style text section ──
    const drawTextSection=(title,text)=>{
      if(!text||!text.trim()){return;}
      // Split into lines, each non-empty line becomes a bullet
      const rawLines=text.split("\n").filter(l=>l.trim());
      const fontSize=11;
      const lineHeight=16; // spacing within a wrapped bullet
      const bulletGap=18; // double-space between separate bullets
      const bulletChar="•";
      const bulletIndent=24; // left indent for bullet character
      const textIndent=36; // left indent for text (after bullet)
      const bulletW=font.widthOfTextAtSize(bulletChar,fontSize);
      const contentW=CW-textIndent-12; // text indent + right pad
      // Build wrapped lines with bullet markers and gap markers
      const wrapLines=[]; // {text, bullet:bool, gapBefore:bool}
      rawLines.forEach((line,idx)=>{
        const clean=line.replace(/^[\-\•\*]\s*/,"").trim();
        if(!clean)return;
        const words=clean.split(" ");let wl="";let first=true;
        words.forEach(w=>{const t=wl?wl+" "+w:w;if(font.widthOfTextAtSize(t,fontSize)>contentW&&wl){wrapLines.push({text:wl,bullet:first,gapBefore:first&&wrapLines.length>0});first=false;wl=w;}else wl=t;});
        if(wl)wrapLines.push({text:wl,bullet:first,gapBefore:first&&wrapLines.length>0});
      });
      // Calculate box height: each line + bullet gaps
      let boxH=16; // top+bottom padding
      wrapLines.forEach(ln=>{boxH+=lineHeight;if(ln.gapBefore)boxH+=bulletGap;});
      const totalNeeded=36+boxH+6;
      ensureSpace(Math.min(totalNeeded,H-M-30));
      page.drawRectangle({x:M,y:y-30,width:CW,height:30,color:rgb(.45,.45,.45)});
      page.drawText(title,{x:M+(CW-fontB.widthOfTextAtSize(title,14))/2,y:y-22,size:14,font:fontB,color:rgb(.92,.57,.17)});
      y-=36;
      ensureSpace(boxH);
      page.drawRectangle({x:M,y:y-boxH,width:CW,height:boxH,borderColor:rgb(.85,.85,.85),borderWidth:.5,color:rgb(1,1,1)});
      let ty=y-14;
      wrapLines.forEach(ln=>{
        if(ln.gapBefore)ty-=bulletGap;
        if(ln.bullet)page.drawText(bulletChar,{x:M+bulletIndent,y:ty,size:fontSize,font,color:rgb(.2,.2,.2)});
        page.drawText(ln.text,{x:M+textIndent,y:ty,size:fontSize,font,color:rgb(.2,.2,.2)});
        ty-=lineHeight;
      });
      y-=boxH+6;
    };

    // ── Work Log Photos — right after work logs, before text sections ──
    const contractorsWithPhotos=contractors.filter(c=>c.active!==false&&(c.photos||[]).length>0);
    if(contractorsWithPhotos.length>0){
      ensureSpace(50);
      page.drawRectangle({x:M,y:y-30,width:CW,height:30,color:rgb(.45,.45,.45)});

    // ── Materials ──
    drawTextSection("Materials",materials);

    // ── Custom Categories ──
    if(customCategories&&customCategories.length>0){

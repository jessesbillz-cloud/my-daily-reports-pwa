// Extract real text positions from PDF using pdf.js getTextContent()
// Returns array of {str, x, y, w, h, page, fontSize} in top-left origin coordinates
async function extractPdfTextStructure(pdfData){
  if(!window.pdfjsLib)throw new Error("pdf.js not loaded");
  // Always work on a copy so the caller's buffer isn't detached
  const safeCopy=new Uint8Array(pdfData instanceof ArrayBuffer?new Uint8Array(pdfData):pdfData);
  const doc=await window.pdfjsLib.getDocument({data:safeCopy}).promise;
  const allItems=[];
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const vp=page.getViewport({scale:1});
    const pageH=vp.height;
    const tc=await page.getTextContent();
    tc.items.forEach(item=>{
      if(!item.str||!item.str.trim())return;
      const tx=item.transform;
      const x=tx[4];
      const yBottom=tx[5];
      const fontSize=Math.round(Math.max(Math.abs(tx[0]),Math.abs(tx[3]))*10)/10||10;
      const y=pageH-yBottom-fontSize; // top-left origin, top of text
      const w=item.width||(item.str.length*fontSize*0.6); // estimate if missing
      const h=item.height||fontSize;
      allItems.push({str:item.str.trim(),x:Math.round(x*100)/100,y:Math.round(y*100)/100,w:Math.round(w*100)/100,h:Math.round(h*100)/100,page:p,fontSize:Math.round(fontSize*10)/10});
    });
  }
  return allItems;
}

// Auth helper — check for existing session (refresh token in Supabase cookie/localStorage)
async function authGetSession(){
  const stored=localStorage.getItem("mdr_session");
  if(!stored)return null;
  try{
    const session=JSON.parse(stored);
    // Try to refresh the token
    const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`,{
      method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
      body:JSON.stringify({refresh_token:session.refresh_token})
    });
    const d=await r.json();
    if(d.access_token){
      AUTH_TOKEN=d.access_token;
      localStorage.setItem("mdr_session",JSON.stringify({refresh_token:d.refresh_token}));
      return {id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{}};
    }
  }catch(e){}
  localStorage.removeItem("mdr_session");
  return null;
}

// Save session for persistence
function authSaveSession(refreshToken){
  if(refreshToken)localStorage.setItem("mdr_session",JSON.stringify({refresh_token:refreshToken}));
}

// Sign in and save session
async function authSignInAndSave(email,password){
  const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
    method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
    body:JSON.stringify({email,password})
  });
  const d=await r.json();
  if(d.access_token){
    AUTH_TOKEN=d.access_token;
    authSaveSession(d.refresh_token);
    return {id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{}};
  }
  throw new Error(d.error_description||d.msg||d.error||"Invalid email or password");
}

// Sign up and save session
async function authSignUpAndSave(email,password,fullName){
  const r=await fetch(`${SB_URL}/auth/v1/signup`,{
    method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
    body:JSON.stringify({email,password,data:{full_name:fullName}})
  });
  const d=await r.json();
  if(d.access_token){
    AUTH_TOKEN=d.access_token;
    authSaveSession(d.refresh_token);
    return {id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{full_name:fullName}};
  }
  if(d.id&&!d.access_token){
    throw new Error("CHECK_EMAIL");
  }
  throw new Error(d.error_description||d.msg||d.error||"Signup failed");
}

function authLogout(){
  AUTH_TOKEN=null;
  localStorage.removeItem("mdr_session");
}

}

/* ── Create Job ── */
function CreateJob({user, onBack, onCreated}){
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const [jn,setJn]=useState("");
  const [addr,setAddr]=useState("");
  const [tf,setTf]=useState(null);
  const [tfB64,setTfB64]=useState(null); // cached base64 string of template file (survives iOS Safari GC)
  const [freqOn,setFreqOn]=useState(false);
  const [sched,setSched]=useState("");
  const [days,setDays]=useState([]);
  const [remOn,setRemOn]=useState(false);
  const [remT,setRemT]=useState("5:00 PM");
  const [remH,setRemH]=useState(2);
  const [schedOn,setSchedOn]=useState(false);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [drag,setDrag]=useState(false);
  const [parsing,setParsing]=useState(false);
  const [fields,setFields]=useState([]); // unified field list: {name, value, mode: "edit"|"lock"|"auto-date"|"auto-num"}
  const [savedTpls,setSavedTpls]=useState([]); // user's saved/reusable templates
  const [loadingSaved,setLoadingSaved]=useState(true);
  const [showSaved,setShowSaved]=useState(false);
  const [usedSavedId,setUsedSavedId]=useState(null); // id of saved template being used
  const [reportTitle,setReportTitle]=useState(""); // editable report title (for saved template reuse)
  const [fnConvention,setFnConvention]=useState(null); // AI-detected: {pattern, dateFormat, numberPadding}
  const [savingTpl,setSavingTpl]=useState(false);
  const [tplSaved,setTplSaved]=useState(false); // whether current parse was saved
  const [showCleanupTips,setShowCleanupTips]=useState(false);
  const trackParseAttempt=(fileName)=>{
    const key="mdr_parse_"+fileName.toLowerCase().replace(/\.[^.]+$/,"").replace(/\s+/g,"_");
    const count=parseInt(localStorage.getItem(key)||"0")+1;
    localStorage.setItem(key,String(count));
    if(count>=3)setShowCleanupTips(true);
  };

  // Load saved templates on mount
  useEffect(()=>{
    db.getSavedTemplates(user.id).then(t=>{setSavedTpls(t);setLoadingSaved(false);}).catch(()=>setLoadingSaved(false));
  },[user.id]);

  const DS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const TS=["12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","7:00 PM","8:00 PM","9:00 PM"];

  const togDay=(d)=>{setSched("custom");setDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);};
  const preset=(p)=>{setSched(p);setDays([]);if(p==="as_needed")setRemOn(false);};
  const effSch=()=>{if(!freqOn)return"as_needed";if(sched==="weekly"||sched==="as_needed")return sched;if(days.length===5&&["Mon","Tue","Wed","Thu","Fri"].every(d=>days.includes(d))&&!days.includes("Sat")&&!days.includes("Sun"))return"daily_mf";if(days.length===7)return"daily_7";if(days.length>0)return"custom";return sched||"as_needed";};

  const readFileAsBase64=async(f)=>{return new Promise((res)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(f);});};

  const parseFields=async(buf,fileName)=>{
    setParsing(true);setErr("");setFields([]);
    trackParseAttempt(fileName);
    try{
      // Step 1: Extract real text positions client-side with pdf.js
      const textItems=await extractPdfTextStructure(new Uint8Array(buf));
      // Step 2: Send text items (not base64 PDF) to edge function for semantic mapping
      const payload={text_items:textItems,file_name:fileName};
      const resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY},
        body:JSON.stringify(payload)
      });
      if(!resp.ok){const errText=await resp.text();throw new Error("Parse API "+resp.status+": "+errText);}
      const parsed=await resp.json();
      if(parsed.error)throw new Error(parsed.error);
      // Merge editable + locked into one unified list (preserve coords for PDF fill)
      const all=[];const seenNames=new Set();
      const NOTES_KW=["notes","observations","comments"];
      const isNotesField=(n)=>NOTES_KW.some(k=>(n||"").toLowerCase().includes(k));
      let notesAdded=false;
      const addUnique=(f,mode)=>{
        const key=(f.name||"").toLowerCase().trim();
        if(seenNames.has(key))return;
        // Only allow ONE notes-like field (first one wins)
        if(isNotesField(f.name)){if(notesAdded)return;notesAdded=true;}
        seenNames.add(key);
        all.push({name:f.name,value:f.value||"",mode,page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline,voiceEnabled:f.voiceEnabled});
      };
      (parsed.editable||[]).forEach(f=>{
        let mode="edit";
        if(f.autoFill==="date")mode="auto-date";
        else if(f.autoFill==="increment")mode="auto-num";
        addUnique(f,mode);
      });
      (parsed.locked||[]).forEach(f=>{addUnique(f,"lock");});
      setFields(all);
      // Store AI-detected filename convention (dateFormat, numberPadding) for auto-numbering
      if(parsed.filenameConvention)setFnConvention(parsed.filenameConvention);
    }catch(e){
      console.error("Parse error:",e);
      setErr("Could not parse template fields. You can still create the job and configure fields later.");
    }finally{setParsing(false);}
  };

  // Parse DOCX template — sends raw file to edge function for XML extraction + AI analysis
  const parseDocxFields=async(buf,fileName)=>{
    setParsing(true);setErr("");setFields([]);
    trackParseAttempt(fileName);
    try{
      // Convert ArrayBuffer to base64
      const bytes=new Uint8Array(buf);
      let binary="";for(let i=0;i<bytes.length;i++)binary+=String.fromCharCode(bytes[i]);
      const b64=btoa(binary);
      const resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY},
        body:JSON.stringify({docx_base64:b64,file_name:fileName})
      });
      if(!resp.ok){const errText=await resp.text();throw new Error("Parse API "+resp.status+": "+errText);}
      const parsed=await resp.json();
      if(parsed.error)throw new Error(parsed.error);
      // Same merge logic as PDF path
      const all=[];const seenNames=new Set();
      const NOTES_KW=["notes","observations","comments"];
      const isNotesField=(n)=>NOTES_KW.some(k=>(n||"").toLowerCase().includes(k));
      let notesAdded=false;
      const addUnique=(f,mode)=>{
        const key=(f.name||"").toLowerCase().trim();
        if(seenNames.has(key))return;
        if(isNotesField(f.name)){if(notesAdded)return;notesAdded=true;}
        seenNames.add(key);
        all.push({name:f.name,value:f.value||"",mode,page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline,voiceEnabled:f.voiceEnabled});
      };
      (parsed.editable||[]).forEach(f=>{
        let mode="edit";
        if(f.autoFill==="date")mode="auto-date";
        else if(f.autoFill==="increment")mode="auto-num";
        addUnique(f,mode);
      });
      (parsed.locked||[]).forEach(f=>{addUnique(f,"lock");});
      setFields(all);
      if(parsed.filenameConvention)setFnConvention(parsed.filenameConvention);
    }catch(e){
      console.error("DOCX parse error:",e);
      setErr("Could not parse DOCX fields: "+e.message);
    }finally{setParsing(false);}
  };

  const ALLOWED_EXTS=["pdf","docx","doc","jpg","jpeg","png"];
  const doFile=async(f)=>{
    const e=f.name.split(".").pop().toLowerCase();
    if(!ALLOWED_EXTS.includes(e)){setErr("Accepted formats: PDF, DOCX, JPG, PNG");return;}
    setTf(f);setErr("");setUsedSavedId(null);setReportTitle(f.name.replace(/\.[^.]+$/,""));setFnConvention(null);setTplSaved(false);
    try{
      const buf=await f.arrayBuffer();
      // Store as base64 string — immune to iOS Safari releasing the file buffer
      const u8=new Uint8Array(buf);const chunks=[];for(let i=0;i<u8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,u8.subarray(i,i+8192)));
      setTfB64(btoa(chunks.join("")));
      if(e==="pdf"){
        parseFields(buf.slice(0),f.name);
      }else if(e==="docx"||e==="doc"){
        parseDocxFields(buf.slice(0),f.name);
      }else{
        setFields([]);setParsing(false);
      }
    }catch(bufErr){console.error("File buffer read:",bufErr);setErr("Could not read file. Try again.");}
  };

  // Use a saved template — loads fields without re-parsing, but still needs the actual file uploaded
  // Job-specific locked fields become editable so user can enter new values for the new job
  const JOB_SPECIFIC_FIELDS=["project name","project no","project number","owner","client","district","dsa file","dsa file #","dsa app","dsa app #","contractor","architect","engineer","inspector","ior","project inspector","project manager","address","location","jurisdiction"];
  const useSavedTemplate=(tpl)=>{
    const raw=tpl.field_config||[];
    // Convert job-specific locked fields to editable with cleared values
    const adjusted=raw.map(f=>{
      if(f.mode==="lock"){
        const nameLC=(f.name||"").toLowerCase().trim();
        const isJobSpecific=JOB_SPECIFIC_FIELDS.some(js=>nameLC===js||nameLC.includes(js));
        if(isJobSpecific)return{...f,mode:"edit",value:"",lockAfterCreate:true};
      }
      return{...f};
    });
    setFields(adjusted);
    setUsedSavedId(tpl.id);
    setReportTitle(tpl.original_filename?tpl.original_filename.replace(/\.[^.]+$/,""):(tpl.name||""));
    setTplSaved(true);
    setShowSaved(false);
    setErr("");
    // Don't set tf — user still needs to upload the actual file, but parsing is skipped
  };

  // When file is uploaded after selecting a saved template, skip parsing
  const doFileWithSaved=async(f)=>{
    const e=f.name.split(".").pop().toLowerCase();
    if(!ALLOWED_EXTS.includes(e)){setErr("Accepted formats: PDF, DOCX, JPG, PNG");return;}
    setTf(f);setErr("");
    try{const buf=await f.arrayBuffer();const u8=new Uint8Array(buf);const chunks=[];for(let i=0;i<u8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,u8.subarray(i,i+8192)));setTfB64(btoa(chunks.join("")));}catch(bufErr){console.error("File buffer read:",bufErr);setErr("Could not read file. Try again.");}
    // Fields already loaded from saved template — no parsing needed
  };

  // Save current parsed fields as a reusable template
  const saveAsTemplate=async()=>{
    if(!fields.length||!tf)return;
    setSavingTpl(true);
    try{
      await db.saveParsedTemplate({
        user_id:user.id,
        name:tf.name.replace(/\.[^.]+$/,""),
        original_filename:tf.name,
        file_type:tf.name.split(".").pop().toLowerCase(),
        field_config:fields,
        storage_path:null // file stays with the job, this just saves the field mapping
      });
      setTplSaved(true);
      // Refresh the list
      const updated=await db.getSavedTemplates(user.id);
      setSavedTpls(updated);
    }catch(e){setErr("Could not save template: "+e.message);}
    finally{setSavingTpl(false);}
  };

  // Field management
  const setFieldMode=(name,mode)=>{setFields(p=>p.map(f=>f.name===name?{...f,mode}:f));};
  const setFieldValue=(name,val)=>{setFields(p=>p.map(f=>f.name===name?{...f,value:val}:f));};

  // Mode button style helper
  const modeBtn=(fieldName,mode,label,color)=>{
    const active=fields.find(f=>f.name===fieldName)?.mode===mode;
    return(
      <button onClick={()=>setFieldMode(fieldName,mode)} style={{
        padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:4,cursor:"pointer",
        background:active?color:"transparent",
        border:`1px solid ${active?color:C.brd}`,
        color:active?"#fff":(color===C.brd?C.mut:color),
        whiteSpace:"nowrap"
      }}>{label}</button>
    );
  };

  const ok=jn.trim();

  const create=async()=>{
    if(!ok){setErr("Job name is required.");return;}setSaving(true);setErr("");
    try{
      const es=effSch();
      // Use edited report title as the pattern — user can tweak what AI detected
      const filePattern=reportTitle.trim()||(tf?tf.name.replace(/\.[^.]+$/,""):"");
      // Store the AI-detected convention (dateFormat, numberPadding) alongside the pattern
      const convention=fnConvention?{pattern:filePattern,dateFormat:fnConvention.dateFormat||"",numberPadding:fnConvention.numberPadding||0}:{pattern:filePattern,dateFormat:"",numberPadding:0};
      const coords=(f)=>({page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline});
      // Fields marked lockAfterCreate (from saved template reuse) go back to locked with the user's new values
      const editFields=fields.filter(f=>f.mode==="edit"&&!f.lockAfterCreate).map(f=>({name:f.name,value:"",originalValue:f.value||"",voiceEnabled:true,...coords(f)}));
      const lockFields=[...fields.filter(f=>f.mode==="lock"),...fields.filter(f=>f.mode==="edit"&&f.lockAfterCreate)].map(f=>({name:f.name,value:f.value,...coords(f)}));
      const autoFields=fields.filter(f=>f.mode==="auto-date"||f.mode==="auto-num").map(f=>({name:f.name,value:f.value,originalValue:f.value||"",autoFill:f.mode==="auto-date"?"date":"increment",...coords(f)}));
      const fc={editable:[...editFields,...autoFields],locked:lockFields,filenameConvention:convention};
      const job=await db.mkJob({user_id:user.id,name:jn.trim(),site_address:addr.trim()||null,report_filename_pattern:filePattern,schedule:es,schedule_days:es==="custom"?days:[],reminder_enabled:remOn,reminder_time:remOn?remT:null,reminder_hours_before:remOn?remH:null,scheduling_enabled:schedOn,field_config:fc});
      if(tf&&job?.id){
        try{
          const ext=tf.name.split(".").pop().toLowerCase();
          // Convert from base64 string back to Blob for upload
          if(!tfB64)throw new Error("Template file data was lost. Please go back and re-upload the file.");
          const raw=atob(tfB64);const u8=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)u8[i]=raw.charCodeAt(i);
          const fileBuf=u8.buffer;
          const fileBlob=new Blob([u8],{type:tf.type||"application/octet-stream"});
          const sp=await db.ulTpl(user.id,job.id,fileBlob,ext);
          let pagePaths=[];
          // Render PDF pages to images for preview cache (non-blocking)
          if(ext==="pdf"&&window.pdfjsLib){
            try{
              const renderBuf=fileBuf.slice(0);
              const pjDoc=await window.pdfjsLib.getDocument({data:renderBuf}).promise;
              const imgs=[];
              for(let i=1;i<=pjDoc.numPages;i++){
                const pg=await pjDoc.getPage(i);
                const vp=pg.getViewport({scale:1.5});
                const cvs=document.createElement("canvas");cvs.width=vp.width;cvs.height=vp.height;
                await pg.render({canvasContext:cvs.getContext("2d"),viewport:vp}).promise;
                imgs.push(cvs.toDataURL("image/jpeg",0.85));
                cvs.width=0;cvs.height=0;
              }
              pagePaths=await db.saveTemplatePages(user.id,job.id,imgs);
            }catch(pgErr){console.error("Template page render:",pgErr);}
          }
          const tplData={user_id:user.id,job_id:job.id,name:tf.name,original_filename:tf.name,file_type:ext,storage_path:sp,field_config:fields.length?fields:[]};
          if(pagePaths.length>0)tplData.structure_map={page_images:pagePaths};
          await db.mkTpl(tplData);
        }catch(tplErr){
          // Template upload failed — clean up the orphan job so no ghost card appears
          try{await db.deleteJob(job.id);}catch(delErr){console.error("Cleanup failed:",delErr);}
          throw tplErr;
        }
      }
      onCreated();
    }catch(e){setErr(e.message||"Something went wrong. Please try again.");}finally{setSaving(false);}
  };

  // Toggle box component
  const ToggleBox=({icon,label,desc,on,setOn,children})=>(
    <div style={{marginBottom:12,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{icon}</span>
          <span style={{fontSize:14,fontWeight:600,color:C.lt}}>{label}</span>
        </div>
        <button onClick={()=>setOn(!on)} style={{width:48,height:28,borderRadius:14,border:"none",cursor:"pointer",background:on?C.org:C.brd,position:"relative"}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:on?23:3,transition:"left 0.2s"}}/>
        </button>
      </div>
      {on&&<div style={{padding:"0 16px 16px",borderTop:`1px solid ${C.brd}`}}>{desc&&<div style={{fontSize:12,color:C.mut,marginTop:12,marginBottom:12}}>{desc}</div>}{children}</div>}
    </div>
  );

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const ls={display:"block",color:C.lt,fontSize:13,fontWeight:600,marginBottom:6};

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <span style={{fontWeight:700,fontSize:17}}>New Job</span>
      </div>
      <div style={{maxWidth:500,margin:"0 auto",padding:"24px 20px"}}>
        {err&&<div style={{background:"#2d1214",border:"1px solid #5c2023",borderRadius:8,padding:"10px 14px",marginBottom:16,color:C.err,fontSize:13}}>{err}</div>}

        {/* Job Name — required */}
        <div style={{marginBottom:20}}><label style={ls}>Job Name *</label><input type="text" value={jn} onChange={e=>setJn(e.target.value)} style={fs}/></div>

        {/* Site Address — optional */}
        <div style={{marginBottom:20}}><label style={ls}>Site Address</label><input type="text" value={addr} onChange={e=>setAddr(e.target.value)} style={fs}/></div>

        {/* Template Section */}
        <div style={{marginBottom:20}}>
          <label style={ls}>Template</label>

          {/* Saved Templates picker */}
          {!tf&&savedTpls.length>0&&(
            <div style={{marginBottom:12}}>
              <button onClick={()=>setShowSaved(!showSaved)} style={{width:"100%",padding:"14px 18px",background:showSaved?C.blu+"18":C.card,border:`2px solid ${C.blu}`,borderRadius:12,color:C.blu,fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>📋 Use a Saved Template ({savedTpls.length})</span>
                <span style={{fontSize:14}}>{showSaved?"▲":"▼"}</span>
              </button>
              {showSaved&&(
                <div style={{marginTop:8,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,overflow:"hidden",maxHeight:250,overflowY:"auto"}}>
                  {savedTpls.map(t=>(
                    <div key={t.id} style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,display:"flex",alignItems:"center",gap:10}}>
                      <div onClick={()=>useSavedTemplate(t)} style={{display:"flex",alignItems:"center",gap:10,flex:1,cursor:"pointer"}}>
                        <span style={{fontSize:18}}>📋</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:600,color:C.txt}}>{t.name}</div>
                          <div style={{fontSize:11,color:C.mut}}>{(t.field_config||[]).length} fields — {t.file_type?.toUpperCase()}</div>
                        </div>
                        <span style={{color:C.blu,fontSize:12,fontWeight:600}}>Use</span>
                      </div>
                      <button onClick={async(e)=>{e.stopPropagation();if(!confirm("Delete this saved template?"))return;try{await db.deleteSavedTemplate(t.id);setSavedTpls(p=>p.filter(x=>x.id!==t.id));}catch(err){alert("Delete failed: "+err.message);}}} style={{background:"none",border:"none",color:C.err,fontSize:14,cursor:"pointer",padding:"4px 6px",flexShrink:0}}>🗑️</button>
                    </div>
                  ))}
                </div>
              )}

            </div>

          {/* Upload area */}

              style={{border:`2px dashed ${drag?C.org:C.brd}`,borderRadius:12,padding:"32px 20px",textAlign:"center",cursor:"pointer",background:drag?"#1f1a14":C.inp}}>

                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        {modeBtn(f.name,"edit","Edit",C.org)}

                        {modeBtn(f.name,"auto-date","Auto-Date",C.blu)}
                        {modeBtn(f.name,"auto-num","Auto-#",C.blu)}
                      </div>
                    </div>
                    {/* Row 2: Value input — always visible */}
                    {f.mode!=="auto-date"&&f.mode!=="auto-num"&&(
                      <>
                        <input
                          type="text"
                          value={f.value}

                          placeholder={f.lockAfterCreate?"Enter value for this job...":f.mode==="lock"?"Set locked value...":"Default value (optional)"}
                          style={{width:"100%",padding:"8px 10px",background:f.lockAfterCreate?"rgba(232,116,42,0.06)":C.bg,border:`1px solid ${f.lockAfterCreate?C.org:C.brd}`,borderRadius:6,color:C.txt,fontSize:13}}
                        />
                        {f.lockAfterCreate&&<div style={{fontSize:10,color:C.org,marginTop:4,fontStyle:"italic"}}>🔒 Will lock after job is created</div>}

                      <div style={{fontSize:11,color:C.blu,fontStyle:"italic",padding:"4px 0"}}>Will auto-fill today's date on each report</div>

                      <div style={{fontSize:11,color:C.blu,fontStyle:"italic",padding:"4px 0"}}>Will auto-increment (1, 2, 3...) on each report</div>
                    )}
                  </div>
                ))}
              </div>
            </div>
            {/* Save as Reusable Template — after fields so users review first */}
            {!tplSaved&&!usedSavedId&&(
              <div style={{background:C.card,border:`2px solid ${C.blu}`,borderRadius:12,padding:"16px 18px",marginTop:16,textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:6}}>💾</div>
                <div style={{fontSize:14,fontWeight:700,color:C.lt,marginBottom:4}}>Save This Template</div>
                <div style={{fontSize:12,color:C.mut,marginBottom:12,lineHeight:1.4}}>Reuse these parsed fields on other jobs without re-parsing. Saves time and API costs.</div>
                <button onClick={saveAsTemplate} disabled={savingTpl} style={{width:"100%",padding:"12px 0",background:C.blu,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:savingTpl?"default":"pointer",opacity:savingTpl?0.6:1}}>
                  {savingTpl?"Saving...":"Save as Reusable Template"}
                </button>
              </div>
            )}
            {tplSaved&&!usedSavedId&&(
              <div style={{background:"rgba(34,197,94,0.08)",border:`1px solid ${C.ok}`,borderRadius:10,padding:"12px 16px",marginTop:16,textAlign:"center"}}>
                <span style={{fontSize:14,color:C.ok,fontWeight:700}}>✓ Template saved — available on all future jobs</span>
              </div>
            )}
          </div>
        )}

        {/* ── Three Toggle Boxes ── */}

        {/* 1. Jobsite Scheduling */}
        <ToggleBox icon="📅" label="Jobsite Scheduling" on={schedOn} setOn={setSchedOn}>
          <div style={{background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,padding:"12px 14px",marginTop:12}}>
            <p style={{fontSize:13,color:C.lt,lineHeight:1.5}}>Let your GC and subs request site visits through a shared calendar.</p>
            <p style={{fontSize:12,color:C.blu,marginTop:8,fontWeight:600}}>You'll set up the calendar link and team contacts on the job dashboard after creating this job.</p>
          </div>
        </ToggleBox>

        {/* 2. Report Frequency */}
        <ToggleBox icon="📊" label="Report Frequency" on={freqOn} setOn={v=>{setFreqOn(v);if(!v)setRemOn(false);}} desc="Set how often you'll file reports for this job">
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {DS.map(d=>{const a=days.includes(d);return<button key={d} onClick={()=>togDay(d)} style={{width:42,height:42,borderRadius:"50%",border:a?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:a?C.org:"transparent",color:a?"#fff":C.mut,fontWeight:600,fontSize:11,cursor:"pointer"}}>{d}</button>;})}
          </div>
          <div style={{display:"flex",gap:8}}>
            {[{k:"weekly",l:"Weekly"},{k:"as_needed",l:"As Needed"}].map(({k,l})=><button key={k} onClick={()=>preset(k)} style={{padding:"8px 14px",borderRadius:8,border:sched===k?`2px solid ${C.org}`:`1px solid ${C.brd}`,background:sched===k?C.org:"transparent",color:sched===k?"#fff":C.mut,fontWeight:600,fontSize:12,cursor:"pointer"}}>{l}</button>)}
          </div>
        </ToggleBox>

        {/* 3. Reminders — only visible when Report Frequency is on */}
        {freqOn&&(
          <ToggleBox icon="🔔" label="Reminders" on={remOn} setOn={setRemOn} desc="Get reminded before your report is due">
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Submit by</label><select value={remT} onChange={e=>setRemT(e.target.value)} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{TS.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
              <div style={{flex:1}}><label style={{display:"block",color:C.mut,fontSize:11,marginBottom:4}}>Remind me</label><select value={remH} onChange={e=>setRemH(Number(e.target.value))} style={{width:"100%",padding:"8px 10px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}>{[1,2,3,4,6].map(h=><option key={h} value={h}>{h} hr{h>1?"s":""} before</option>)}</select></div>
            </div>
          </ToggleBox>
        )}

        {/* Create Button — only requires job name */}
        <button className="btn-o" onClick={create} disabled={!ok||saving} style={{width:"100%",padding:"14px 0",background:ok?C.org:C.brd,border:ok?`1px solid ${C.blu}`:`1px solid ${C.brd}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:ok&&!saving?"pointer":"default",opacity:saving?0.7:1,marginTop:8}}>{saving?"Creating...":"Create Job"}</button>
      </div>
    </div>
  );
}

/* ── Report Editor ── */
function ReportEditor({job, user, onBack, reportDate}){
  const fc=job.field_config||{editable:[],locked:[]};
  // Deduplicate notes-like fields from existing configs (fix for old jobs with duplicates)
  const NOTES_KW=["notes","observations","comments"];
  const isNotes=(n)=>NOTES_KW.some(k=>(n||"").toLowerCase().includes(k));
  const dedupNotes=(arr)=>{let found=false;return(arr||[]).filter(f=>{if(!isNotes(f.name))return true;if(found)return false;found=true;return true;});};
  const rawEdit=dedupNotes([...(fc.editable||[])]);
  const editHasNotes=rawEdit.some(f=>isNotes(f.name));
  const initEdit=rawEdit;
  // If editable already has a notes field, remove any notes from locked too
  const initLock=editHasNotes?[...(fc.locked||[])].filter(f=>!isNotes(f.name)):dedupNotes([...(fc.locked||[])]);
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const todayISO=reportDate||new Date().toLocaleDateString("en-CA",{timeZone:tz});
  const todayDisplay=new Date(todayISO+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric",timeZone:tz});

  // Mutable field lists — locked fields can be unlocked/relocked
  const [lockFields,setLockFields]=useState(initLock);
  const [editFields,setEditFields]=useState(initEdit);
  const [showLocked,setShowLocked]=useState(false);
  const [lockEditing,setLockEditing]=useState(false);
  const [lockVals,setLockVals]=useState(()=>{const v={};initLock.forEach(f=>{v[f.name]=f.value||"";});return v;});
  const [loadingDraft,setLoadingDraft]=useState(true);
  const [draftId,setDraftId]=useState(null);

  // Smart date formatter — matches the format from the original template value
  const formatAutoDate=(originalVal)=>{
    const now=new Date();
    const orig=(originalVal||"").trim();
    // "04 February 2026" or "4 February 2026" → day month year (long)
    if(/^\d{1,2}\s+[A-Za-z]+\s+\d{4}$/.test(orig)){
      const padDay=orig.startsWith("0");
      return now.toLocaleDateString("en-US",{day:padDay?"2-digit":"numeric",month:"long",year:"numeric",timeZone:tz}).replace(/^(\w+)\s(\d+),\s(\d+)$/,(_,m,d,y)=>`${padDay?d.padStart(2,"0"):d} ${m} ${y}`);
    }
    // "February 04, 2026" → month day, year
    if(/^[A-Za-z]+\s+\d{1,2},?\s+\d{4}$/.test(orig))return now.toLocaleDateString("en-US",{month:"long",day:"2-digit",year:"numeric",timeZone:tz});
    // "Feb 04, 2026" → short month
    if(/^[A-Za-z]{3}\s+\d{1,2},?\s+\d{4}$/.test(orig))return now.toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric",timeZone:tz});
    // "2026-02-04" → ISO
    if(/^\d{4}-\d{2}-\d{2}$/.test(orig))return now.toLocaleDateString("en-CA",{timeZone:tz});
    // Default: "3/7/2026" US short
    return now.toLocaleDateString("en-US",{timeZone:tz});
  };

  // Editable field values
  const [vals,setVals]=useState(()=>{
    const v={};
    initEdit.forEach(f=>{
      if(f.autoFill==="date")v[f.name]=formatAutoDate(f.originalValue||f.value);
      else if(f.autoFill==="increment")v[f.name]="";
      else v[f.name]=f.value||"";
    });
    return v;
  });
  const [saving,setSaving]=useState(false);

  // Photo state
  const [photos,setPhotos]=useState([]);
  const [photoLayout,setPhotoLayout]=useState("2"); // "1","2","4"
  const photoRef=useRef(null);

  const [reportStatus,setReportStatus]=useState(null);
  // Load existing report on mount (works for both working_copy and submitted)
  useEffect(()=>{
    (async()=>{
      try{
        const rpt=await db.getReport(job.id,todayISO);
        if(rpt){
          setReportStatus(rpt.status);
          setDraftId(rpt.id);
          if(rpt.content){
            const c=typeof rpt.content==="string"?JSON.parse(rpt.content):rpt.content;
            if(c.vals){
              // Merge saved values but re-apply today's date for auto-date fields (matching original format)
              const merged={...c.vals};
              initEdit.forEach(f=>{if(f.autoFill==="date")merged[f.name]=formatAutoDate(f.originalValue||f.value);});
              setVals(p=>({...p,...merged}));
            }
            if(c.lockVals)setLockVals(p=>({...p,...c.lockVals}));
            if(c.photos)setPhotos(c.photos);
            if(c.photoLayout)setPhotoLayout(c.photoLayout);
            // Apply notes dedup to restored fields (fixes old drafts saved with duplicates)
            if(c.lockFields){const editHasN=(c.editFields||initEdit).some(f=>isNotes(f.name));setLockFields(editHasN?c.lockFields.filter(f=>!isNotes(f.name)):dedupNotes(c.lockFields));}
            if(c.editFields)setEditFields(dedupNotes(c.editFields));
          }
        }
      }catch(e){console.error("Load report error:",e);}
      finally{setLoadingDraft(false);}
    })();
  },[]);

  const setVal=(name,val)=>setVals(p=>({...p,[name]:val}));
  const setLockVal=(name,val)=>setLockVals(p=>({...p,[name]:val}));

  // Permanently unlock a locked field — moves it to editable
  const unlockField=(name)=>{
    const f=lockFields.find(x=>x.name===name);
    if(!f)return;
    const newLock=lockFields.filter(x=>x.name!==name);
    const newEdit=[...editFields,{name:f.name,value:lockVals[name]||f.value||"",voiceEnabled:false,wasUnlocked:true}];
    setLockFields(newLock);
    setEditFields(newEdit);
    setVals(p=>({...p,[name]:lockVals[name]||f.value||""}));
    // Persist field config change to Supabase
    db.updateJobFieldConfig(job.id,{locked:newLock,editable:newEdit}).then(()=>{
      job.field_config={locked:newLock,editable:newEdit};
    }).catch(e=>console.error("Field config update error:",e));
  };

  // Re-lock an editable field that was previously unlocked
  const relockField=(name)=>{
    const f=editFields.find(x=>x.name===name);
    if(!f)return;
    const val=vals[name]||f.value||"";
    const newEdit=editFields.filter(x=>x.name!==name);
    const restored={name:f.name,value:val};
    const newLock=[...lockFields,restored];
    setEditFields(newEdit);
    setLockFields(newLock);
    setLockVals(p=>({...p,[name]:val}));
    // Remove from editable vals
    setVals(p=>{const n={...p};delete n[name];return n;});
    // Persist field config change to Supabase
    db.updateJobFieldConfig(job.id,{locked:newLock,editable:newEdit}).then(()=>{
      job.field_config={locked:newLock,editable:newEdit};
    }).catch(e=>console.error("Field config update error:",e));
  };

  // Save locked field value changes back to job config
  const saveLockEdits=()=>{

    setLockFields(updated);
    setLockEditing(false);
    // Persist lock value changes to Supabase

    db.updateJobFieldConfig(job.id,newConfig).then(()=>{
      job.field_config=newConfig;
    }).catch(e=>console.error("Field config update error:",e));
  };

  const handlePhoto=(e)=>{
    const files=Array.from(e.target.files||[]);
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=(ev)=>{setPhotos(p=>[...p,{id:Date.now()+Math.random(),src:ev.target.result,name:file.name}]);};

  const saveWorking=async()=>{

  const [submitting,setSubmitting]=useState(false);
  const [viewLoading,setViewLoading]=useState(false);
  const [viewingReport,setViewingReport]=useState(null); // array of page image data URLs
  const [submitSuccess,setSubmitSuccess]=useState(null); // {pdfBlob, pdfFilename, teamEmails} after submit
  const [toast,setToast]=useState("");

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  // Shared: build editable field values only — locked fields are already on the template
  const buildEditableFields=()=>editFields.map(f=>({...f,val:vals[f.name]||""}));

  // Shared: draw fields onto a canvas context (for View Report preview)
  const drawFieldsOnCanvas=(ctx,fields,pageNum,scale,pageH)=>{
    fields.filter(f=>(f.page||1)===pageNum&&f.val&&f.x!=null&&f.y!=null).forEach(f=>{
      const isAutoField=f.autoFill==="date"||f.autoFill==="increment";
      if(!isAutoField&&f.originalValue&&f.val===f.originalValue)return;
      const sz=(f.fontSize||10)*scale;
      ctx.font=sz+"px Helvetica, Arial, sans-serif";
      const drawX=f.x*scale;
      const drawY=f.y*scale+sz;
      ctx.fillStyle="#000000";
      if(f.multiline&&f.w){
        const maxW=f.w*scale;
        const bullet="\u2022 ";
        const bulletW=ctx.measureText(bullet).width;
        // Split on newlines first, then word-wrap each line
        const rawLines=f.val.split(/\n/).filter(l=>l.trim());
        const lines=[];
        rawLines.forEach(rl=>{
          const hasBullet=rawLines.length>1;
          const prefix=hasBullet?bullet:"";
          const indent=hasBullet?bulletW:0;
          const lineMaxW=maxW-indent;
          const words=rl.trim().split(" ");let cur=prefix;
          words.forEach(w=>{const test=cur?cur+(cur===prefix?"":" ")+w:prefix+w;if(ctx.measureText(test).width>maxW&&cur!==prefix){lines.push(cur);cur=new Array(Math.ceil(indent/ctx.measureText(" ").width)+1).join(" ")+w;}else cur=test;});
          if(cur)lines.push(cur);
        });
        lines.forEach((ln,li)=>{ctx.fillText(ln,drawX,drawY+(li*sz*1.3));});
      }else{
        ctx.fillText(String(f.val),drawX,drawY);
      }
    });
  };

  // View Report — renders original template with pdf.js, overlays field values + notes on canvas
  const viewReport=async()=>{
    setViewLoading(true);
    try{
      const tplRecord=await db.getTemplate(job.id);
      // No template or non-PDF — show a text-based field preview
      if(!tplRecord||!tplRecord.storage_path||
        (tplRecord.file_type&&tplRecord.file_type!=="pdf")){
        const allFields=buildEditableFields();
        const cvs=document.createElement("canvas");cvs.width=612*2;cvs.height=792*2;
        const ctx=cvs.getContext("2d");ctx.fillStyle="#ffffff";ctx.fillRect(0,0,cvs.width,cvs.height);
        ctx.fillStyle="#333";ctx.font="bold 28px Helvetica, Arial, sans-serif";
        ctx.fillText(job.name,72,80);
        ctx.font="20px Helvetica, Arial, sans-serif";
        let ty=130;
        allFields.forEach(f=>{
          if(ty>1500)return;
          ctx.fillStyle="#888";ctx.fillText(f.name+":",72,ty);
          ctx.fillStyle="#333";ctx.fillText(f.val||"—",300,ty);
          ty+=36;
        });
        setViewingReport([cvs.toDataURL("image/jpeg",0.92)]);
        cvs.width=0;cvs.height=0;
        setViewLoading(false);
        return;
      }
      let tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{
        headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}
      });
      // If auth fails, try refreshing the session and retry once
      if(tplResp.status===401||tplResp.status===403){
        const refreshed=await authGetSession();
        if(refreshed){tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}});}
      }
      if(!tplResp.ok)throw new Error("Could not download template ("+tplResp.status+"). Try signing out and back in.");
      const tplBytes=await tplResp.arrayBuffer();
      // Validate PDF magic bytes
      const header=new Uint8Array(tplBytes.slice(0,5));
      const headerStr=String.fromCharCode(...header);
      if(!headerStr.startsWith("%PDF")){
        throw new Error("Template file is not a valid PDF. Please re-upload a PDF template.");
      }
      if(!window.pdfjsLib)throw new Error("PDF viewer not loaded.");
      const allFields=buildEditableFields();
      const pjDoc=await window.pdfjsLib.getDocument({data:tplBytes}).promise;
      const previewPages=[];
      const scale=2;
      for(let pi=1;pi<=pjDoc.numPages;pi++){
        const pg=await pjDoc.getPage(pi);
        const vp=pg.getViewport({scale});
        const cvs=document.createElement("canvas");cvs.width=vp.width;cvs.height=vp.height;
        const ctx=cvs.getContext("2d");
        await pg.render({canvasContext:ctx,viewport:vp}).promise;
        // Draw field values on this page
        const pageH=pg.getViewport({scale:1}).height;
        drawFieldsOnCanvas(ctx,allFields,pi,scale,pageH);
        previewPages.push(cvs.toDataURL("image/jpeg",0.92));
        cvs.width=0;cvs.height=0;
      }
      // Render photos as additional preview pages — paginate to match PDF output
      if(photos.length>0){
        // photoLayout: "1"=1 per page, "2"=2 per page (1 col, 2 rows), "4"=4 per page (2 cols, 2 rows)
        const cols=photoLayout==="4"?2:1;
        const perPage=photoLayout==="1"?1:photoLayout==="2"?2:4;
        const rows=Math.ceil(perPage/cols);
        const pgW=612*scale;const pgH=792*scale;
        const maxSlotW=(photoLayout==="1"?Math.min((612-72)/cols,380):(612-72-(cols-1)*12)/cols)*scale;
        const maxSlotH=photoLayout==="1"?(pgH-100*scale):(pgH-80*scale-(rows-1)*12*scale)/rows;
        // Pre-load all images to get real dimensions
        const loaded=[];
        for(let i=0;i<photos.length;i++){
          try{
            const src=photos[i].src||photos[i];
            const im=new Image();
            await new Promise((res,rej)=>{im.onload=res;im.onerror=rej;im.src=src;});
            loaded.push(im);
          }catch(e){loaded.push(null);}
        }
        let cvs=null,ctx=null,onPage=0;
        for(let i=0;i<loaded.length;i++){
          const im=loaded[i];if(!im)continue;
          // Start a new page when needed
          if(i%perPage===0){
            if(cvs&&onPage>0)previewPages.push(cvs.toDataURL("image/jpeg",0.92));
            cvs=document.createElement("canvas");cvs.width=pgW;cvs.height=pgH;
            ctx=cvs.getContext("2d");
            ctx.fillStyle="#ffffff";ctx.fillRect(0,0,pgW,pgH);
            ctx.fillStyle="#666666";ctx.font=(12*scale)+"px Helvetica, Arial, sans-serif";
            ctx.fillText("Photos — "+job.name,36*scale,40*scale);
            onPage=0;
          }
          // Auto-size: fit photo within slot preserving real aspect ratio
          const ratio=im.naturalWidth/im.naturalHeight;
          let imgW,imgH;
          if(ratio>=1){imgW=Math.min(maxSlotW,maxSlotH*ratio);imgH=imgW/ratio;}
          else{imgH=Math.min(maxSlotH,maxSlotW/ratio);imgW=imgH*ratio;}
          const idxOnPage=i%perPage;
          const slot=idxOnPage%cols;const row=Math.floor(idxOnPage/cols);
          // Center photo in its slot
          const slotX=photoLayout==="1"?0:(36*scale+slot*(maxSlotW+12*scale));
          const slotY=60*scale+(row*(maxSlotH+12*scale));
          const xPos=photoLayout==="1"?((pgW-imgW)/2):(slotX+(maxSlotW-imgW)/2);
          const yPos=photoLayout==="1"?(slotY+(maxSlotH-imgH)/2):(slotY+(maxSlotH-imgH)/2);
          ctx.drawImage(im,xPos,yPos,imgW,imgH);
          onPage++;
        }
        if(cvs&&onPage>0){previewPages.push(cvs.toDataURL("image/jpeg",0.92));cvs.width=0;cvs.height=0;}
      }
      setViewingReport(previewPages);
    }catch(e){
      console.error("View report error:",e);
      showToast("Error: "+e.message);
    }finally{setViewLoading(false);}
  };

  // Submit Report — generates filled PDF with pdf-lib, uploads, emails, all in one step
  const submitReport=async()=>{
    setSubmitting(true);
    try{
      const {PDFDocument,rgb,StandardFonts}=PDFLib;

      // ── 1. Look up template ──
      const tplRecord=await db.getTemplate(job.id);
      if(!tplRecord||!tplRecord.storage_path)throw new Error("No template found. Upload a template in Job Settings first.");
      let tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{
        headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}
      });
      if(tplResp.status===401||tplResp.status===403){
        const refreshed=await authGetSession();
        if(refreshed){tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tplRecord.storage_path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}});}
      }
      if(!tplResp.ok)throw new Error("Could not download template ("+tplResp.status+"). Try signing out and back in.");
      const tplBytes=await tplResp.arrayBuffer();
      const isPdfTemplate=tplRecord.file_type==="pdf";
      const isDocxTemplate=tplRecord.file_type==="docx"||tplRecord.file_type==="doc";

      // ── DOCX path: send to edge function for XML editing ──
      if(isDocxTemplate){
        const allFields=buildEditableFields();
        const fieldValues={};
        allFields.forEach(f=>{if(f.val)fieldValues[f.name]=f.val;});
        // Convert template to base64
        const tplUint8=new Uint8Array(tplBytes);
        const tplChunks=[];for(let i=0;i<tplUint8.length;i+=8192)tplChunks.push(String.fromCharCode.apply(null,tplUint8.subarray(i,i+8192)));
        const tplB64=btoa(tplChunks.join(""));
        // Call generate-docx edge function
        const genResp=await fetch(`${SB_URL}/functions/v1/generate-docx`,{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+SB_KEY,"apikey":SB_KEY},
          body:JSON.stringify({docx_base64:tplB64,field_values:fieldValues})
        });
        if(!genResp.ok)throw new Error("Generate DOCX failed: "+(await genResp.text()));
        const genData=await genResp.json();
        if(genData.error)throw new Error(genData.error);
        // Decode the returned filled DOCX
        const filledBytes=Uint8Array.from(atob(genData.docx_base64),c=>c.charCodeAt(0));
        const docxBlob=new Blob([filledBytes],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
        const chunks=[];for(let i=0;i<filledBytes.length;i+=8192)chunks.push(String.fromCharCode.apply(null,filledBytes.subarray(i,i+8192)));
        const docxBase64=btoa(chunks.join(""));
        // Build filename (same logic as PDF path)
        let rptNumber=1;
        try{const cntR=await fetch(`${SB_URL}/rest/v1/reports?select=report_number&job_id=eq.${job.id}&order=report_number.desc&limit=1`,{headers:db._h()});const topR=cntR.ok?await cntR.json():[];if(topR[0]?.report_number){rptNumber=topR[0].report_number+1;}else{const countR=await fetch(`${SB_URL}/rest/v1/reports?select=id&job_id=eq.${job.id}&limit=0`,{headers:{...db._h(),Prefer:"count=exact"}});const total=parseInt(countR.headers.get("content-range")?.split("/")[1]||"0");rptNumber=total+1;}}catch(e){}
        if(draftId){try{const exR=await fetch(`${SB_URL}/rest/v1/reports?select=report_number&id=eq.${draftId}`,{headers:db._h()});const exD=exR.ok?await exR.json():[];if(exD[0]?.report_number)rptNumber=exD[0].report_number;}catch(e){}}
        const conv=job.field_config?.filenameConvention||{};
        const padding=conv.numberPadding||0;
        const rptNum=padding>0?String(rptNumber).padStart(padding,"0"):String(rptNumber);
        const now=new Date();
        const fmtMM=now.toLocaleDateString("en-US",{month:"2-digit",timeZone:tz});
        const fmtDD=now.toLocaleDateString("en-US",{day:"2-digit",timeZone:tz});
        const fmtYYYY=now.toLocaleDateString("en-US",{year:"numeric",timeZone:tz});
        const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
        const monNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        const monthIdx=now.toLocaleDateString("en-US",{month:"numeric",timeZone:tz})-1;
        const formatDate=(fmt)=>{if(!fmt)return"";return fmt.replace(/YYYY/g,fmtYYYY).replace(/MM/g,fmtMM).replace(/DD/g,fmtDD).replace(/Month/g,monthNames[monthIdx]||"").replace(/Mon/g,monNames[monthIdx]||"");};
        const fnPattern=conv.pattern||job.report_filename_pattern||job.name||"Report";
        let baseName=fnPattern.replace(/\.[^.]+$/,"");
        baseName=baseName.replace(/\{report_number\}/g,rptNum);
        baseName=baseName.replace(/\{date\}/g,formatDate(conv.dateFormat));
        baseName=baseName.replace(/\{year\}/g,fmtYYYY);
        const docxFilename=baseName+".docx";
        // Save report
        const vals={};const lockVals={};
        allFields.forEach(f=>{if(f.autoFill||f.mode==="edit")vals[f.name]=f.val;else lockVals[f.name]=f.val;});
        const reportContent={vals,lockVals,photos:[],photoLayout:"1",lockFields:[],editFields:allFields};
        await db.saveReport({job_id:job.id,user_id:user.id,report_date:todayISO,status:"submitted",content:JSON.stringify(reportContent),updated_at:new Date().toISOString()});
        const storagePath=`${user.id}/${job.id}/reports/${docxFilename}`;
        let upR=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
          method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/octet-stream"},body:docxBlob
        });
        if(!upR.ok){await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
          method:"PUT",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/octet-stream"},body:docxBlob
        });}
        const userName=user.user_metadata?.full_name||user.email?.split("@")[0]||"Inspector";
        const emailHtml=`<div style="font-family:-apple-system,sans-serif;max-width:600px;"><div style="background:#e8742a;padding:20px 24px;border-radius:8px 8px 0 0;"><h1 style="color:#fff;margin:0;font-size:20px;">My Daily Reports</h1></div><div style="background:#f9f9f9;padding:24px;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px;"><p style="color:#333;font-size:16px;">${userName} has submitted the daily report for <strong>${job.name}</strong> on ${todayDisplay}.</p><p style="color:#555;font-size:14px;">The filled DOCX report is attached.</p></div></div>`;
        const rawTeam=job.team_emails||[];
        const teamEmails=rawTeam.map(m=>typeof m==="string"?m:m.email).filter(Boolean);
        setSubmitSuccess({pdfBlob:docxBlob,pdfFilename:docxFilename,pdfBase64:docxBase64,emailHtml,teamEmails,jobName:job.name,todayDisplay,userName});
        setSubmitting(false);
        return;
      }

      // ── 2. Load template — use copyPages to preserve original visual content ──
      let pdfDoc;let srcDoc=null;
      if(isPdfTemplate){
        srcDoc=await PDFDocument.load(tplBytes,{ignoreEncryption:true});
        pdfDoc=await PDFDocument.create();
        const copiedPages=await pdfDoc.copyPages(srcDoc,srcDoc.getPageIndices());
        copiedPages.forEach(p=>pdfDoc.addPage(p));
      }else{
        pdfDoc=await PDFDocument.create();pdfDoc.addPage([612,792]);
      }
      const font=await pdfDoc.embedFont(StandardFonts.Helvetica);
      const pages=pdfDoc.getPages();

      // ── 3. Build field values ──
      const allFields=buildEditableFields();

      // ── 4. Draw field values onto template ──
      // Skip drawing any value that matches the original template value — copyPages already has it
      allFields.forEach(f=>{
        if(f.x==null||f.y==null||!f.val)return;
        // If value hasn't changed from what's already baked into the PDF, don't redraw it
        // Always redraw auto-date and auto-increment fields (they change every report)
        const isAutoField=f.autoFill==="date"||f.autoFill==="increment";
        if(!isAutoField&&f.originalValue&&f.val===f.originalValue)return;
        const pageIdx=(f.page||1)-1;
        if(pageIdx<0||pageIdx>=pages.length)return;
        const page=pages[pageIdx];const pageH=page.getHeight();
        const sz=f.fontSize||10;const pdfY=pageH-f.y-sz;
        if(f.multiline&&f.w){
          const maxW=f.w;
          const bullet="\u2022 ";
          const bulletW=font.widthOfTextAtSize(bullet,sz);
          // Split on newlines first, then word-wrap each line with bullets
          const rawLines=f.val.split(/\n/).filter(l=>l.trim());
          const lines=[];
          rawLines.forEach(rl=>{
            const hasBullet=rawLines.length>1;
            const prefix=hasBullet?bullet:"";
            const indent=hasBullet?bulletW:0;
            const words=rl.trim().split(" ");let cur=prefix;
            words.forEach(w=>{const test=cur?cur+(cur===prefix?"":" ")+w:prefix+w;const tw=font.widthOfTextAtSize(test,sz);if(tw>maxW&&cur!==prefix){lines.push(cur);cur=" ".repeat(Math.ceil(indent/font.widthOfTextAtSize(" ",sz)))+w;}else cur=test;});
            if(cur)lines.push(cur);
          });
          lines.forEach((ln,i)=>{const ly=pdfY-(i*sz*1.3);if(ly>0)page.drawText(ln,{x:f.x,y:ly,size:sz,font,color:rgb(0,0,0)});});
        }else{
          page.drawText(String(f.val),{x:f.x,y:pdfY,size:sz,font,color:rgb(0,0,0)});
        }
      });

      // ── 5. Remove empty trailing pages (no fields reference them) before adding photos ──
      if(photos.length>0&&srcDoc&&pdfDoc.getPageCount()>1){
        const maxFieldPage=Math.max(...allFields.map(f=>f.page||1),1);
        for(let p=pdfDoc.getPageCount();p>maxFieldPage;p--){pdfDoc.removePage(p-1);}
      }

      // ── 6. Photos on new pages — embed header/footer clips from template onto blank pages ──
      // photoLayout: "1"=1 per page, "2"=2 per page (1 col, 2 rows), "4"=4 per page (2 cols, 2 rows)
      if(photos.length>0){
        const pageW=pages.length>0?pages[0].getWidth():612;
        const pageH=pages.length>0?pages[0].getHeight():792;
        // Determine where header ends and footer starts from field positions (top-left coords)
        const p1Fields=allFields.filter(f=>f.y!=null&&(f.page||1)===1);
        let headerBottomTL=80,footerTopTL=pageH-40; // defaults in top-left coords
        if(p1Fields.length>0){
          headerBottomTL=Math.max(Math.min(...p1Fields.map(f=>f.y))-5,0);
          footerTopTL=Math.min(Math.max(...p1Fields.map(f=>f.y+(f.h||12)))+5,pageH);
        }
        // Convert to PDF coords (bottom-left origin)
        const headerBottomPDF=pageH-headerBottomTL; // PDF y where header ends
        const footerTopPDF=pageH-footerTopTL; // PDF y where footer starts

        // Embed header and footer as clipped regions from the template's first page
        let headerEmbed=null,footerEmbed=null;
        const headerH=pageH-headerBottomPDF>10?(pageH-headerBottomPDF):0;
        const footerH=footerTopPDF>10?footerTopPDF:0;
        if(srcDoc&&headerH>0){
          const srcPage=srcDoc.getPage(0);
          headerEmbed=await pdfDoc.embedPage(srcPage,{left:0,right:pageW,bottom:headerBottomPDF,top:pageH});
        }
        if(srcDoc&&footerH>0){
          const srcPage=srcDoc.getPage(0);
          footerEmbed=await pdfDoc.embedPage(srcPage,{left:0,right:pageW,bottom:0,top:footerTopPDF});
        }

        // Photo area = between header and footer
        const photoAreaTop=headerBottomPDF-5;
        const photoAreaBottom=footerTopPDF+5;
        const usableH=photoAreaTop-photoAreaBottom;

        const cols=photoLayout==="4"?2:1;
        const perPage=photoLayout==="1"?1:photoLayout==="2"?2:4;
        const rows=Math.ceil(perPage/cols);
        const bodyW=pageW-72;
        const maxSlotW=photoLayout==="1"?Math.min(bodyW/cols,380):(bodyW-(cols-1)*12)/cols;
        const maxSlotH=photoLayout==="1"?(usableH-20):(usableH-20-(rows-1)*12)/rows;
        for(let i=0;i<photos.length;i++){
          try{
            const imgData=photos[i].src||photos[i];
            let img;
            if(typeof imgData==="string"&&imgData.startsWith("data:image/png"))img=await pdfDoc.embedPng(imgData);
            else if(typeof imgData==="string")img=await pdfDoc.embedJpg(imgData);
            if(!img)continue;
            if(i%perPage===0){
              // Fresh blank page, same size as template
              const newPage=pdfDoc.addPage([pageW,pageH]);
              // Draw header clip at the top
              if(headerEmbed)newPage.drawPage(headerEmbed,{x:0,y:headerBottomPDF,width:pageW,height:headerH});
              // Draw footer clip at the bottom
              if(footerEmbed)newPage.drawPage(footerEmbed,{x:0,y:0,width:pageW,height:footerTopPDF});
            }
            const pg=pdfDoc.getPages()[pdfDoc.getPageCount()-1];
            const ratio=img.width/img.height;
            let imgW,imgH;
            if(ratio>=1){imgW=Math.min(maxSlotW,maxSlotH*ratio);imgH=imgW/ratio;}
            else{imgH=Math.min(maxSlotH,maxSlotW/ratio);imgW=imgH*ratio;}
            const idxOnPage=i%perPage;
            const slot=idxOnPage%cols;const row=Math.floor(idxOnPage/cols);
            const slotX=36+slot*(maxSlotW+12);
            const rowTop=photoAreaTop-10-(row*(maxSlotH+12));
            const xPos=photoLayout==="1"?((pageW-imgW)/2):(slotX+(maxSlotW-imgW)/2);
            const yPos=rowTop-imgH+(maxSlotH-imgH)/2;
            pg.drawImage(img,{x:xPos,y:Math.max(yPos,photoAreaBottom),width:imgW,height:imgH});
          }catch(imgErr){console.error("Photo embed error:",imgErr);}
        }
      }

      // ── 6. Serialize filled PDF ──
      const filledPdfBytes=await pdfDoc.save();
      const pdfBlob=new Blob([filledPdfBytes],{type:"application/pdf"});
      const uint8=new Uint8Array(filledPdfBytes);
      const chunks=[];for(let i=0;i<uint8.length;i+=8192)chunks.push(String.fromCharCode.apply(null,uint8.subarray(i,i+8192)));
      const pdfBase64=btoa(chunks.join(""));

      // ── 7. Build filename using AI-detected convention ──
      let rptNumber=1;
      try{const cntR=await fetch(`${SB_URL}/rest/v1/reports?select=report_number&job_id=eq.${job.id}&order=report_number.desc&limit=1`,{headers:db._h()});const topR=cntR.ok?await cntR.json():[];if(topR[0]?.report_number){rptNumber=topR[0].report_number+1;}else{const countR=await fetch(`${SB_URL}/rest/v1/reports?select=id&job_id=eq.${job.id}&limit=0`,{headers:{...db._h(),Prefer:"count=exact"}});const total=parseInt(countR.headers.get("content-range")?.split("/")[1]||"0");rptNumber=total+1;}}catch(e){}
      if(draftId){try{const exR=await fetch(`${SB_URL}/rest/v1/reports?select=report_number&id=eq.${draftId}`,{headers:db._h()});const exD=exR.ok?await exR.json():[];if(exD[0]?.report_number)rptNumber=exD[0].report_number;}catch(e){}}
      const conv=job.field_config?.filenameConvention||{};
      const padding=conv.numberPadding||0;
      const rptNum=padding>0?String(rptNumber).padStart(padding,"0"):String(rptNumber);
      // Format today's date according to the AI-detected format
      const now=new Date();
      const fmtMM=now.toLocaleDateString("en-US",{month:"2-digit",timeZone:tz});
      const fmtDD=now.toLocaleDateString("en-US",{day:"2-digit",timeZone:tz});
      const fmtYYYY=now.toLocaleDateString("en-US",{year:"numeric",timeZone:tz});
      const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
      const monNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const monthIdx=now.toLocaleDateString("en-US",{month:"numeric",timeZone:tz})-1;
      const fmtMonth=monthNames[monthIdx]||"";
      const fmtMon=monNames[monthIdx]||"";
      const fmtDay=String(parseInt(fmtDD));
      const formatDate=(fmt)=>{
        if(!fmt)return"";
        return fmt.replace(/YYYY/g,fmtYYYY).replace(/MM/g,fmtMM).replace(/DD/g,fmtDD).replace(/Month/g,fmtMonth).replace(/Mon/g,fmtMon);
      };
      // Build filename from the stored pattern (which the user may have edited)
      const pattern=conv.pattern||job.report_filename_pattern||job.name||"Report";
      let baseName=pattern.replace(/\.[^.]+$/,"");
      baseName=baseName.replace(/\{report_number\}/g,rptNum);
      const dateStr=formatDate(conv.dateFormat);
      baseName=baseName.replace(/\{date\}/g,dateStr);
      baseName=baseName.replace(/\{year\}/g,fmtYYYY);
      const pdfFilename=baseName+".pdf";

      // ── 8. Save report, upload PDF, send email — all at once ──
      const reportContent={vals,lockVals,photos,photoLayout,lockFields,editFields};
      await db.saveReport({
        job_id:job.id,user_id:user.id,report_date:todayISO,status:"submitted",
        content:JSON.stringify(reportContent),updated_at:new Date().toISOString()
      });

      const storagePath=`${user.id}/${job.id}/reports/${pdfFilename}`;
      let upR=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
        method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/pdf"},body:pdfBlob
      });
      if(!upR.ok){await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`,{
        method:"PUT",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":"application/pdf"},body:pdfBlob
      });}

      const userName=user.user_metadata?.full_name||user.email?.split("@")[0]||"Inspector";
      const photoNote=photos.length>0?`<p style="color:#555;font-size:14px;margin:12px 0 0;">${photos.length} site photo${photos.length>1?"s":""} included in the attached PDF.</p>`:"";
      const fieldSummary=editFields.filter(f=>vals[f.name]).map(f=>`<tr><td style="padding:4px 12px 4px 0;color:#888;font-size:13px;white-space:nowrap;">${f.name}</td><td style="padding:4px 0;color:#333;font-size:13px;">${vals[f.name]}</td></tr>`).join("");
      const summaryTable=fieldSummary?`<table style="margin:16px 0;border-collapse:collapse;">${fieldSummary}</table>`:"";
      const emailHtml=`<div style="font-family:-apple-system,sans-serif;max-width:600px;margin:0 auto;"><div style="background:#e8742a;padding:20px 24px;border-radius:8px 8px 0 0;"><h1 style="color:#fff;margin:0;font-size:20px;">My Daily Reports</h1></div><div style="background:#f9f9f9;padding:24px;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px;"><p style="color:#333;font-size:16px;line-height:1.6;margin:0 0 8px;">Hi,</p><p style="color:#333;font-size:15px;line-height:1.6;margin:0 0 16px;">${userName} has submitted the daily field report for <strong>${job.name}</strong> on ${todayDisplay}.</p>${summaryTable}<p style="color:#555;font-size:14px;margin:16px 0 0;">The full PDF report is attached to this email.${photoNote?"":" No site photos were included."}</p>${photoNote}</div><p style="color:#999;font-size:11px;text-align:center;margin-top:16px;">Sent via My Daily Reports &bull; mydailyreports.com</p></div>`;

      // Store PDF info and show post-submit options instead of auto-emailing
      const rawTeam=job.team_emails||[];
      const teamEmails=rawTeam.map(m=>typeof m==="string"?m:m.email).filter(Boolean);
      setSubmitSuccess({pdfBlob,pdfFilename,pdfBase64,emailHtml,teamEmails,jobName:job.name,todayDisplay,userName});
      showToast("Report submitted!");
    }catch(e){
      console.error("Submit error:",e);
      showToast("Submit failed: "+e.message);
    }finally{setSubmitting(false);}
  };

  // Post-submit: Download/save PDF to device
  const downloadPdf=async()=>{
    if(!submitSuccess)return;
    const file=new File([submitSuccess.pdfBlob],submitSuccess.pdfFilename,{type:"application/pdf"});
    // Use Web Share API if available (iOS/Android "Save to Files" or share sheet)
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:submitSuccess.pdfFilename});showToast("PDF shared!");return;}catch(e){if(e.name==="AbortError")return;}
    }
    // Fallback: trigger download
    const url=URL.createObjectURL(submitSuccess.pdfBlob);
    const a=document.createElement("a");a.href=url;a.download=submitSuccess.pdfFilename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("PDF saved!");
  };

  // Post-submit: Email to project team
  const [emailing,setEmailing]=useState(false);
  const emailToTeam=async()=>{
    if(!submitSuccess)return;
    setEmailing(true);
    try{
      const userEmail=user.email;
      const recipients=[...new Set([userEmail,...submitSuccess.teamEmails])].filter(Boolean);
      if(recipients.length===0){showToast("No team emails configured. Add them in Job Settings.");setEmailing(false);return;}
      const r=await fetch(`${SB_URL}/functions/v1/send-report`,{
        method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,apikey:SB_KEY},
        body:JSON.stringify({to:recipients,subject:`${submitSuccess.jobName} — Daily Report ${submitSuccess.todayDisplay}`,html_body:submitSuccess.emailHtml,pdf_base64:submitSuccess.pdfBase64,pdf_filename:submitSuccess.pdfFilename})
      });
      if(!r.ok){const errBody=await r.json().catch(()=>({}));throw new Error(errBody.error||`Email send failed (${r.status})`);}
      showToast("Report emailed to "+recipients.length+" recipient"+(recipients.length>1?"s":"")+"!");
    }catch(e){
      console.error("Email error:",e);
      const msg=e.message||"Unknown error";
      if(msg.includes("RESEND_API_KEY"))showToast("Email not configured: Set RESEND_API_KEY in Supabase Edge Function secrets.");
      else if(msg.includes("404")||msg.includes("FunctionNotFound"))showToast("Email function not deployed. Run: npx supabase functions deploy send-report");
      else if(msg.includes("validation_error")||msg.includes("not verified"))showToast("Email domain not verified in Resend. Verify your sending domain at resend.com.");
      else showToast("Email failed: "+msg);
    }finally{setEmailing(false);}
  };

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const layouts=[{k:"1",l:"1 per page"},{k:"2",l:"2 side-by-side"},{k:"4",l:"4 per page"}];

  if(loadingDraft)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{color:C.mut}}>Loading report...</p></div>);

  // ── View Report Screen (canvas-rendered preview of template + field values) ──
  if(viewingReport){
    return(
      <div style={{minHeight:"100vh",background:C.bg,color:C.txt,display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
          <button onClick={()=>setViewingReport(null)} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <MDRLogo size={28}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:17}}>Report Preview</div>
            <div style={{fontSize:12,color:C.mut}}>This is how your report will look</div>
          </div>
        </div>
        <div style={{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch",padding:"12px 16px"}}>
          {viewingReport.map((dataUrl,i)=>(
            <div key={i} style={{marginBottom:12,borderRadius:4,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.4)"}}>
              <img src={dataUrl} style={{width:"100%",display:"block"}} alt={"Page "+(i+1)}/>
            </div>
          ))}
        </div>
        <div style={{position:"fixed",bottom:0,left:0,right:0,padding:"14px 20px",borderTop:`1px solid ${C.brd}`,background:C.card,zIndex:100}}>
          <button onClick={()=>setViewingReport(null)} style={{width:"100%",padding:"14px 0",background:C.blu,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            Back to Editing
          </button>
        </div>
      </div>
    );
  }

  // ── Post-Submit Success Screen — Download or Email options ──
  if(submitSuccess){
    const teamCount=submitSuccess.teamEmails.length;
    const hasTeam=teamCount>0||user.email;
    return(
      <div style={{minHeight:"100vh",background:C.bg,color:C.txt,display:"flex",flexDirection:"column"}}>
        {toast&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:C.card,border:`1px solid ${C.ok}`,borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600,color:C.ok,zIndex:9999}}>{toast}</div>}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
          <MDRLogo size={28}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:17}}>Report Submitted</div>
            <div style={{fontSize:12,color:C.mut}}>{submitSuccess.pdfFilename}</div>
          </div>
        </div>
        <div style={{flex:1,padding:"24px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:C.ok+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>✓</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Report Saved Successfully</div>
            <div style={{fontSize:14,color:C.mut}}>Choose how to deliver your report</div>
          </div>

          <div style={{width:"100%",maxWidth:400,display:"flex",flexDirection:"column",gap:12}}>
            {/* Download to device */}
            <button onClick={downloadPdf} style={{width:"100%",padding:"16px 20px",background:C.blu,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:22}}>⬇</span>
              <div style={{textAlign:"left"}}>
                <div>Download PDF</div>
                <div style={{fontSize:11,fontWeight:400,opacity:0.8}}>Save to your device</div>
              </div>
            </button>

            {/* Email to team */}
            <button onClick={emailToTeam} disabled={emailing} style={{width:"100%",padding:"16px 20px",background:C.org,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:emailing?"default":"pointer",opacity:emailing?0.7:1,display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:22}}>✉</span>
              <div style={{textAlign:"left"}}>
                <div>{emailing?"Sending...":"Email to Project Team"}</div>
                <div style={{fontSize:11,fontWeight:400,opacity:0.8}}>
                  {teamCount>0
                    ?`Send to ${teamCount+1} recipient${teamCount+1>1?"s":""} (you + ${teamCount} team)`
                    :user.email?"Send to "+user.email:"No team emails configured"}
                </div>
              </div>
            </button>

          </div>

          <div style={{width:"100%",maxWidth:400,borderTop:`1px solid ${C.brd}`,paddingTop:16,marginTop:8}}>
            <button onClick={()=>{setSubmitSuccess(null);onBack();}} style={{width:"100%",padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.mut,fontSize:14,fontWeight:600,cursor:"pointer"}}>
              Done — Back to Job
            </button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      {/* Toast */}
      {toast&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:C.card,border:`1px solid ${C.ok}`,borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600,color:C.ok,zIndex:9999}}>{toast}</div>}
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:17}}>{reportStatus==="submitted"?"Submitted Report":"Today's Report"}</div>
          <div style={{fontSize:12,color:C.mut}}>{job.name}</div>
        </div>
        {reportStatus==="submitted"&&<span style={{padding:"4px 10px",fontSize:11,fontWeight:700,borderRadius:6,background:C.ok+"22",color:C.ok}}>Submitted</span>}
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"20px"}}>
        <div style={{fontSize:14,color:C.mut,marginBottom:6,textAlign:"center"}}>{todayDisplay}</div>
        <div style={{fontSize:11,color:C.mut,textAlign:"center",marginBottom:20}}>Editable anytime • {tz.split("/").pop().replace(/_/g," ")}</div>

        {/* ── Locked Fields (collapsible) ── */}
        {lockFields.length>0&&(
          <div style={{marginBottom:16}}>
            <button onClick={()=>setShowLocked(!showLocked)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 16px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:showLocked?"12px 12px 0 0":12,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:16}}>🔒</span>
              <span style={{flex:1,fontWeight:700,fontSize:14,color:C.mut}}>Locked Fields</span>
              <span style={{fontSize:12,color:C.mut,background:C.inp,borderRadius:10,padding:"2px 10px",marginRight:6}}>{lockFields.length}</span>
              <span style={{color:C.mut,fontSize:12,transform:showLocked?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
            </button>
            {showLocked&&(
              <div style={{background:C.card,border:`1px solid ${C.brd}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"8px 16px 14px"}}>
                {/* Edit toggle */}
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
                  {!lockEditing?(
                    <button onClick={()=>setLockEditing(true)} style={{padding:"4px 12px",fontSize:12,fontWeight:700,borderRadius:6,border:`1px solid ${C.brd}`,background:"transparent",color:C.org,cursor:"pointer"}}>Edit</button>
                  ):(
                    <button onClick={saveLockEdits} style={{padding:"4px 12px",fontSize:12,fontWeight:700,borderRadius:6,border:`1px solid ${C.ok}`,background:C.ok,color:"#fff",cursor:"pointer"}}>Done</button>
                  )}
                </div>
                {lockFields.map((f,i)=>(
                  <div key={f.name} style={{padding:"8px 0",borderBottom:i<lockFields.length-1?`1px solid ${C.brd}`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:lockEditing?8:0}}>
                      <span style={{fontSize:13,color:C.mut}}>{f.name}</span>
                      {!lockEditing&&<span style={{fontSize:13,fontWeight:600,color:C.lt}}>{lockVals[f.name]||f.value||"—"}</span>}
                    </div>
                    {lockEditing&&(
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <input type="text" value={lockVals[f.name]||""} onChange={e=>setLockVal(f.name,e.target.value)} style={{...fs,flex:1,padding:"8px 10px",fontSize:13}}/>
                        <button onClick={()=>unlockField(f.name)} title="Permanently unlock this field" style={{padding:"6px 10px",fontSize:10,fontWeight:700,borderRadius:6,border:`1px solid ${C.org}`,background:"transparent",color:C.org,cursor:"pointer",whiteSpace:"nowrap"}}>Unlock</button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── Editable fields ── */}
        {editFields.length>0&&(
          <div style={{marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:700,color:C.org,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Fill In Today</div>
            {editFields.map(f=>{
              const isAuto=f.autoFill==="date"||f.autoFill==="increment";
              return(
                <div key={f.name} style={{marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <label style={{fontSize:13,fontWeight:600,color:C.lt}}>{f.name}</label>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      {f.autoFill==="date"&&<span style={{fontSize:10,fontWeight:700,color:C.blu,background:C.blu+"22",padding:"2px 8px",borderRadius:4}}>AUTO-DATE</span>}
                      {f.autoFill==="increment"&&<span style={{fontSize:10,fontWeight:700,color:C.blu,background:C.blu+"22",padding:"2px 8px",borderRadius:4}}>AUTO-#</span>}
                      {f.voiceEnabled&&<span style={{fontSize:10,fontWeight:700,color:C.org,background:C.org+"22",padding:"2px 8px",borderRadius:4}}>VOICE</span>}
                      {f.wasUnlocked&&(
                        <button onClick={()=>relockField(f.name)} title="Re-lock this field" style={{padding:"2px 8px",fontSize:10,fontWeight:700,borderRadius:4,border:`1px solid ${C.brd}`,background:"transparent",color:C.mut,cursor:"pointer"}}>🔒 Lock</button>
                      )}
                    </div>
                  </div>
                  {f.voiceEnabled?(
                    <textarea value={vals[f.name]||""} onChange={e=>setVal(f.name,e.target.value)} placeholder="Tap here and use your keyboard mic to dictate..." rows={4} style={{...fs,resize:"vertical",minHeight:80,lineHeight:1.5}}/>
                  ):(
                    <input type="text" value={vals[f.name]||""} onChange={e=>setVal(f.name,e.target.value)} readOnly={isAuto} placeholder={isAuto?"Auto-filled":"Enter value..."} style={{...fs,opacity:isAuto?0.6:1,cursor:isAuto?"default":"text"}}/>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {editFields.length===0&&lockFields.length===0&&(

// Extract real text positions from PDF using pdf.js getTextContent()
// Returns array of {str, x, y, w, h, page, fontSize} in top-left origin coordinates
async function extractPdfTextStructure(pdfData){
  if(!window.pdfjsLib)throw new Error("pdf.js not loaded");
  // Always work on a copy so the caller's buffer isn't detached
  const safeCopy=new Uint8Array(pdfData instanceof ArrayBuffer?new Uint8Array(pdfData):pdfData);
  const doc=await window.pdfjsLib.getDocument({data:safeCopy}).promise;
  const rawItems=[];
  for(let p=1;p<=doc.numPages;p++){
    const page=await doc.getPage(p);
    const vp=page.getViewport({scale:1});
    const pageH=vp.height;
    const tc=await page.getTextContent();
    tc.items.forEach(item=>{
      if(!item.str||!item.str.trim())return;
      const tx=item.transform;
      const x=tx[4];
      const yBottom=tx[5];
      const fontSize=Math.round(Math.max(Math.abs(tx[0]),Math.abs(tx[3]))*10)/10||10;
      const y=pageH-yBottom-fontSize; // top-left origin, top of text
      const w=item.width||(item.str.length*fontSize*0.6); // estimate if missing
      const h=item.height||fontSize;
      rawItems.push({str:item.str.trim(),x:Math.round(x*100)/100,y:Math.round(y*100)/100,w:Math.round(w*100)/100,h:Math.round(h*100)/100,page:p,fontSize:Math.round(fontSize*10)/10});
    });
  }
  // Merge adjacent text items on the same line — pdf.js splits multi-word labels
  // like "IOR Notes:" into separate items "IOR" and "Notes:" which breaks label matching
  rawItems.sort((a,b)=>a.page-b.page||a.y-b.y||a.x-b.x);
  const merged=[];
  for(let i=0;i<rawItems.length;i++){
    const cur={...rawItems[i]};
    while(i+1<rawItems.length){
      const nxt=rawItems[i+1];
      if(nxt.page!==cur.page)break;
      if(Math.abs(nxt.y-cur.y)>3)break; // different line
      const gap=nxt.x-(cur.x+cur.w);
      if(gap>cur.fontSize*1.2)break; // too far apart — different field/column
      cur.str=cur.str+" "+nxt.str;
      cur.w=Math.round(((nxt.x+nxt.w)-cur.x)*100)/100;
      cur.h=Math.max(cur.h,nxt.h);
      i++;
    }
    cur.str=cur.str.trim();
    if(cur.str)merged.push(cur);
  }
  return merged;
}

// ── Read AcroForm fields from fillable PDFs (client-side with pdf-lib) ──
async function readAcroFormFields(pdfData){
  if(!window.PDFLib)throw new Error("pdf-lib not loaded");
  const bytes=pdfData instanceof ArrayBuffer?new Uint8Array(pdfData):pdfData;
  const pdfDoc=await PDFLib.PDFDocument.load(bytes,{ignoreEncryption:true});
  let form;
  try{form=pdfDoc.getForm();}catch(e){return null;} // no form
  const fields=form.getFields();
  if(!fields||fields.length===0)return null;
  const result=[];
  for(const f of fields){
    const name=f.getName();
    const typeName=f.constructor.name; // PDFTextField, PDFCheckBox, PDFDropdown, PDFRadioGroup, PDFSignature
    let type="text",value="";
    if(typeName==="PDFTextField"||typeName.includes("Text")){
      type="text";
      try{value=f.getText()||"";}catch(e){value="";}
    }else if(typeName==="PDFCheckBox"||typeName.includes("Check")){
      type="checkbox";
      try{value=f.isChecked()?"on":"off";}catch(e){value="off";}
    }else if(typeName==="PDFDropdown"||typeName.includes("Dropdown")){
      type="dropdown";
      try{value=(f.getSelected()||[])[0]||"";}catch(e){value="";}
    }else if(typeName==="PDFRadioGroup"||typeName.includes("Radio")){
      type="radio";
      try{value=f.getSelected()||"";}catch(e){value="";}
    }else if(typeName==="PDFSignature"||typeName.includes("Signature")){
      type="signature";
      value="";
    }
    // Heuristic auto-fill categorization based on field name
    const nl=name.toLowerCase();
    let autoFill=null,multiline=false,category="editable";
    if(/\bdate\b/.test(nl)&&!/re.?inspect/.test(nl))autoFill="date";
    else if(/inspector|prepared.?by|ior\b/.test(nl))autoFill="inspector_name";
    else if(/project.?name|job.?name|site.?name/.test(nl))autoFill="job_name";
    else if(/address|location/.test(nl)&&!/item/.test(nl))autoFill="job_address";
    else if(/general.?contractor/.test(nl))autoFill="general_contractor";
    else if(/subcontractor/.test(nl))autoFill="subcontractor";
    else if(/weather|temp/.test(nl))autoFill="weather";
    else if(/\b(ir|number|no\.?|#)\b/.test(nl)&&!/phone/.test(nl))autoFill="ir_number";
    else if(/duration/.test(nl))autoFill="duration";
    if(/notes|observation|comment|item.*location|description/.test(nl))multiline=true;
    if(type==="signature")category="signature";
    else if(autoFill)category="auto";
    // Extract font size from the field's default appearance (DA) string
    let fontSize=null;
    try{
      const daStr=f.acroField.getDefaultAppearance();
      if(daStr){const szMatch=daStr.match(/(\d+(?:\.\d+)?)\s+Tf/);if(szMatch)fontSize=parseFloat(szMatch[1]);}
    }catch(e){}
    // Get widget rectangle for height-based sizing fallback
    try{
      if(!fontSize){const widgets=f.acroField.getWidgets();if(widgets.length>0){const r=widgets[0].getRectangle();if(r.height>0&&r.height<50)fontSize=Math.min(12,Math.max(8,r.height*0.65));}}
    }catch(e){}
    // Clean display name: strip trailing numbers like "Date Recd-0" → "Date Recd"
    let displayName=name.replace(/-\d+$/,"").replace(/^Textfield-?\d*$/i,"Notes/Description");
    result.push({pdfFieldName:name,displayName,type,value,autoFill,multiline,category,fontSize:fontSize||null});
  }
  return result;
}

}

// Auth helper — check for existing session (refresh token in Supabase cookie/localStorage)
async function authGetSession(){
  const stored=localStorage.getItem("mdr_session");
  if(!stored)return null;
  try{
    const session=JSON.parse(stored);
    // Try to refresh the token
    const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`,{
      method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
      body:JSON.stringify({refresh_token:session.refresh_token})
    });
    if(r.ok){
      const d=await r.json();
      if(d.access_token){
        AUTH_TOKEN=d.access_token;
        const u={id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{}};
        authSaveSession(d.refresh_token,u,d.access_token);
        return u;
      }
    }
    // Only clear session on definitive auth rejection (400/401 = bad refresh token)
    if(r.status===400||r.status===401){
      localStorage.removeItem("mdr_session");
      return null;
    }
    // Network error or server error (5xx) — return cached user so app stays logged in
    if(session.user){
      AUTH_TOKEN=session.access_token||null; // use cached token if available
      return session.user;
    }
  }catch(e){
    // Network failure (offline, timeout) — return cached user if available
    try{
      const session=JSON.parse(stored);
      if(session.user)return session.user;
    }catch(_){}
  }
  return null;
}

// Save session for persistence (includes access_token so it survives page reload)
function authSaveSession(refreshToken,user,accessToken){
  const data={refresh_token:refreshToken};
  if(user)data.user=user;
  if(accessToken)data.access_token=accessToken;
  localStorage.setItem("mdr_session",JSON.stringify(data));
}

// Sign in and save session
async function authSignInAndSave(email,password){
  const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
    method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
    body:JSON.stringify({email,password})
  });
  const d=await r.json();
  if(d.access_token){
    AUTH_TOKEN=d.access_token;
    const u={id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{}};
    authSaveSession(d.refresh_token,u,d.access_token);
    return u;
  }
  throw new Error(d.error_description||d.msg||d.error||"Invalid email or password");
}

// Sign up and save session
async function authSignUpAndSave(email,password,fullName){

    method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
    body:JSON.stringify({email,password,data:{full_name:fullName}})

  if(d.access_token){
    AUTH_TOKEN=d.access_token;
    const u={id:d.user.id,email:d.user.email,user_metadata:d.user.user_metadata||{full_name:fullName}};
    authSaveSession(d.refresh_token,u,d.access_token);
    return u;
  }
  if(d.id&&!d.access_token){
    throw new Error("CHECK_EMAIL");
  }
  throw new Error(d.error_description||d.msg||d.error||"Signup failed");
}

// Google OAuth sign-in
async function authSignInWithGoogle(){
  // Redirect to Supabase Google OAuth — after auth, redirects back with tokens in URL hash
  const redirectTo=window.location.origin+window.location.pathname;
  window.location.href=`${SB_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectTo)}`;
}

// Handle OAuth callback — check URL hash for access_token after redirect
async function authHandleOAuthCallback(){
  const hash=window.location.hash;
  if(!hash||!hash.includes("access_token"))return null;
  const params=new URLSearchParams(hash.substring(1));
  const accessToken=params.get("access_token");
  const refreshToken=params.get("refresh_token");
  if(!accessToken||!refreshToken)return null;
  // Clear hash from URL
  window.history.replaceState(null,"",window.location.pathname+window.location.search);
  // Fetch user info
  AUTH_TOKEN=accessToken;
  try{
    const r=await fetch(`${SB_URL}/auth/v1/user`,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+accessToken}});
    const d=await r.json();
    if(d.id){
      const u={id:d.id,email:d.email,user_metadata:d.user_metadata||{}};
      authSaveSession(refreshToken,u);
      return u;
    }
  }catch(e){console.error("OAuth callback error:",e);}
  return null;
}

/* ── Support Chat Widget ── */
function SupportChat({user}){
  const [scToast,setScToast]=useState("");
  const showToast=(m)=>{setScToast(m);setTimeout(()=>setScToast(""),3000);};
  const [open,setOpen]=useState(false);
  const savedConvId=useMemo(()=>{try{return localStorage.getItem("mdr_support_conv")||null;}catch(e){return null;}},[]);
  const [convId,setConvId]=useState(savedConvId);
  const [msgs,setMsgs]=useState([]);
  const [draft,setDraft]=useState("");
  const [guestName,setGuestName]=useState("");
  const [guestEmail,setGuestEmail]=useState("");
  const [sending,setSending]=useState(false);
  const [started,setStarted]=useState(!!savedConvId);
  const scrollRef=useRef(null);
  const subRef=useRef(null);

  // Resume existing conversation on open
  useEffect(()=>{
    if(open&&convId&&started){
      // Load existing messages and start polling
      const tok=AUTH_TOKEN||(localStorage.getItem("sb_access_token"))||SB_KEY;
      (async()=>{
        try{
          const r=await fetch(`${SB_URL}/rest/v1/support_messages?conversation_id=eq.${convId}&order=created_at.asc`,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+tok}});
          if(r.ok)setMsgs(await r.json());
        }catch(e){}
      })();
      subscribeToMessages(convId);
    }
    return()=>{if(!open&&subRef.current)subRef.current.unsubscribe?.();};
  },[open]);

  // Start or resume conversation
  const startChat=async()=>{
    const tok=AUTH_TOKEN||(localStorage.getItem("sb_access_token"))||SB_KEY;
    const headers={"apikey":SB_KEY,"Content-Type":"application/json","Authorization":"Bearer "+tok,"Prefer":"return=representation"};
    try{
      // Create new conversation
      const body={status:"open"};
      if(user)body.user_id=user.id;
      if(guestName.trim())body.guest_name=guestName.trim();
      if(guestEmail.trim())body.guest_email=guestEmail.trim();
      if(user&&user.user_metadata?.full_name)body.guest_name=user.user_metadata.full_name;
      if(user&&user.email)body.guest_email=user.email;
      const r=await fetch(`${SB_URL}/rest/v1/support_conversations`,{method:"POST",headers,body:JSON.stringify(body)});
      const txt=await r.text();
      if(!r.ok){showToast("Chat error — try again");return;}
      const convArr=JSON.parse(txt);
      if(!convArr||!convArr[0]){showToast("Chat error — try again");return;}
      setConvId(convArr[0].id);
      setStarted(true);
      try{localStorage.setItem("mdr_support_conv",convArr[0].id);}catch(e){}
      subscribeToMessages(convArr[0].id);
    }catch(e){showToast("Chat error — try again");}
  };

  const subscribeToMessages=(cid)=>{
    if(subRef.current)subRef.current.unsubscribe?.();
    // Poll for new messages every 3s (simpler than realtime for PWA)
    const tok=AUTH_TOKEN||(localStorage.getItem("sb_access_token"))||SB_KEY;
    const h={"apikey":SB_KEY,"Authorization":"Bearer "+tok};
    const poll=setInterval(async()=>{
      try{
        const r=await fetch(`${SB_URL}/rest/v1/support_messages?conversation_id=eq.${cid}&order=created_at.asc`,{headers:h});
        if(r.ok){const newMsgs=await r.json();setMsgs(newMsgs);}
      }catch(e){}
    },3000);
    subRef.current={unsubscribe:()=>clearInterval(poll)};
  };

  useEffect(()=>{return()=>{if(subRef.current)subRef.current.unsubscribe?.();};},[]);
  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[msgs]);

  const sendMsg=async()=>{
    if(!draft.trim()||sending||!convId)return;
    setSending(true);
    try{
      const tok=AUTH_TOKEN||(localStorage.getItem("sb_access_token"))||SB_KEY;
      const h={"apikey":SB_KEY,"Authorization":"Bearer "+tok,"Content-Type":"application/json"};
      const pr=await fetch(`${SB_URL}/rest/v1/support_messages`,{method:"POST",headers:h,body:JSON.stringify({conversation_id:convId,sender:"user",body:draft.trim()})});
      if(!pr.ok){showToast("Send failed — try again");setSending(false);return;}
      setDraft("");
      const r=await fetch(`${SB_URL}/rest/v1/support_messages?conversation_id=eq.${convId}&order=created_at.asc`,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+tok}});
      if(r.ok)setMsgs(await r.json());
    }catch(e){showToast("Send failed — try again");}
    finally{setSending(false);}
  };

  if(!open)return(
    <button onClick={()=>setOpen(true)} style={{position:"fixed",bottom:20,right:20,width:56,height:56,borderRadius:"50%",background:C.org,border:"none",color:"#fff",fontSize:24,cursor:"pointer",zIndex:9999,boxShadow:"0 4px 12px rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      💬
    </button>
  );

  return(
    <div style={{position:"fixed",bottom:20,right:20,width:340,maxWidth:"calc(100vw - 40px)",height:460,maxHeight:"calc(100vh - 40px)",background:C.card,border:`1px solid ${C.brd}`,borderRadius:16,zIndex:9999,display:"flex",flexDirection:"column",boxShadow:"0 8px 32px rgba(0,0,0,0.5)",overflow:"hidden"}}>
      {scToast&&<div style={{position:"absolute",top:50,left:"50%",transform:"translateX(-50%)",background:"#333",color:"#fff",padding:"8px 16px",borderRadius:8,fontSize:13,zIndex:10,whiteSpace:"nowrap"}}>{scToast}</div>}
      {/* Header */}
      <div style={{padding:"14px 16px",background:C.org,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{color:"#fff",fontWeight:700,fontSize:15}}>Support Chat</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {started&&<button onClick={()=>{setConvId(null);setMsgs([]);setStarted(false);if(subRef.current)subRef.current.unsubscribe?.();try{localStorage.removeItem("mdr_support_conv");}catch(e){}}} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",padding:"4px 10px",borderRadius:6}}>New Chat</button>}
          <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
      </div>

      {!started?(
        <div style={{flex:1,padding:20,display:"flex",flexDirection:"column",gap:12}}>
          <div style={{fontSize:14,color:C.lt,lineHeight:1.5}}>Have a question or found a bug? Chat with our support team.</div>
          {!user&&(
            <>
              <input type="text" placeholder="Your name (optional)" value={guestName} onChange={e=>setGuestName(e.target.value)} style={{padding:"10px 12px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}/>
              <input type="email" placeholder="Your email (optional)" value={guestEmail} onChange={e=>setGuestEmail(e.target.value)} style={{padding:"10px 12px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}/>
            </>
          )}
          {user&&<div style={{fontSize:12,color:C.mut}}>Chatting as {user.user_metadata?.full_name||user.email}</div>}
          <button onClick={startChat} style={{padding:"14px 0",background:C.org,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:"auto"}}>Start Chat</button>
        </div>
      ):(
        <>
          {/* Messages */}
          <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:8}}>
            {msgs.length===0&&<div style={{textAlign:"center",color:C.mut,fontSize:13,marginTop:20}}>Send a message to get started</div>}
            {msgs.map(m=>(
              <div key={m.id} style={{alignSelf:m.sender==="user"?"flex-end":"flex-start",maxWidth:"80%"}}>
                <div style={{padding:"8px 12px",borderRadius:12,background:m.sender==="user"?C.org:"#333",color:"#fff",fontSize:13,lineHeight:1.5,borderBottomRightRadius:m.sender==="user"?4:12,borderBottomLeftRadius:m.sender==="agent"?4:12}}>
                  {m.body}
                </div>
                <div style={{fontSize:10,color:C.mut,marginTop:2,textAlign:m.sender==="user"?"right":"left"}}>{new Date(m.created_at).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}</div>
              </div>
            ))}
          </div>
          {/* Input */}
          <div style={{padding:10,borderTop:`1px solid ${C.brd}`,display:"flex",gap:8}}>
            <input type="text" value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey)sendMsg();}} placeholder="Type a message..." style={{flex:1,padding:"10px 12px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13}}/>
            <button onClick={sendMsg} disabled={sending||!draft.trim()} style={{padding:"10px 16px",background:C.org,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:sending?"default":"pointer",opacity:sending||!draft.trim()?0.5:1}}>→</button>
          </div>
        </>
      )}
    </div>
  );
}

// Refresh auth token if stale — returns true if refreshed
async function refreshAuthToken(){
  try{
    const stored=localStorage.getItem("mdr_session");
    if(!stored)return false;
    const session=JSON.parse(stored);
    if(!session.refresh_token)return false;
    const r=await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`,{
      method:"POST",headers:{"Content-Type":"application/json",apikey:SB_KEY},
      body:JSON.stringify({refresh_token:session.refresh_token})
    });
    if(r.ok){
      const d=await r.json();
      if(d.access_token){AUTH_TOKEN=d.access_token;authSaveSession(d.refresh_token,session.user,d.access_token);return true;}
    }
  }catch(e){console.error("Token refresh failed:",e);}
  return false;
}

  // Get company record by ID
  async getCompany(companyId){
    const r=await fetch(`${SB_URL}/rest/v1/companies?id=eq.${companyId}&select=id,name,logo_url&limit=1`,{headers:this._h()});
    if(!r.ok)return null;
    const d=await r.json();return d[0]||null;
  },
  // ── Job-level logo methods ──
  async uploadJobLogo(jobId,file){
    if(file.size>2*1024*1024)throw new Error("Logo must be under 2MB");
    if(!file.type.startsWith("image/"))throw new Error("Logo must be an image");
    const ext=file.name.split(".").pop()||"png";
    const storagePath=`jobs/${jobId}/logo.${ext}`;
    let upR=await fetch(`${SB_URL}/storage/v1/object/company-templates/${storagePath}`,{
      method:"POST",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":file.type},body:file
    });
    if(!upR.ok){upR=await fetch(`${SB_URL}/storage/v1/object/company-templates/${storagePath}`,{
      method:"PUT",headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`,"Content-Type":file.type},body:file
    });}
    if(!upR.ok)throw new Error("Logo upload failed ("+upR.status+")");
    const logoUrl=`${SB_URL}/storage/v1/object/public/company-templates/${storagePath}`;
    await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${jobId}`,{method:"PATCH",headers:this._h(),body:JSON.stringify({logo_url:logoUrl})});
    try{localStorage.setItem("mdr_logo_job_"+jobId,logoUrl);}catch(e){}
    return logoUrl;
  },
  async getJobLogoUrl(jobId){
    if(!jobId)return null;
    try{const cached=localStorage.getItem("mdr_logo_job_"+jobId);if(cached)return cached;}catch(e){}
    try{
      const r=await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${jobId}&select=logo_url&limit=1`,{headers:this._h()});
      if(r.ok){const d=await r.json();const url=d[0]?.logo_url;if(url){try{localStorage.setItem("mdr_logo_job_"+jobId,url);}catch(e){}return url;}}
    }catch(e){}
    return null;
  },
  async removeJobLogo(jobId){
    await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${jobId}`,{method:"PATCH",headers:this._h(),body:JSON.stringify({logo_url:null})});
    try{localStorage.removeItem("mdr_logo_job_"+jobId);}catch(e){}
  },
};

/* ── Account Settings Page ── */
function AccountSettings({user, onBack, onLogout}){
  const [showSupport,setShowSupport]=useState(false);
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState("");
  const [msgType,setMsgType]=useState("ok");

  // Form state
  const [fullName,setFullName]=useState(user?.user_metadata?.full_name||"");
  const [companyName,setCompanyName]=useState("");
  const [email,setEmail]=useState(user?.email||"");
  const [timezone,setTimezone]=useState(Intl.DateTimeFormat().resolvedOptions().timeZone);
  const [slug,setSlug]=useState("");
  const [showDelete,setShowDelete]=useState(false);
  const [deleteConfirm,setDeleteConfirm]=useState("");
  const [companyMatches,setCompanyMatches]=useState([]);
  const [selectedCompany,setSelectedCompany]=useState(null);
  const companyDebounce=useRef(null);
  const [companyLogoUrl,setCompanyLogoUrl]=useState(null);
  const [uploadingLogo,setUploadingLogo]=useState(false);
  const logoInputRef=useRef(null);
  const [companyRole,setCompanyRole]=useState("member");
  const [companyTemplates,setCompanyTemplates]=useState([]);
  const [uploadingTpl,setUploadingTpl]=useState(false);
  const tplInputRef=useRef(null);
  const [ntfyTopic,setNtfyTopic]=useState(""); const [pushEnabled,setPushEnabled]=useState(false); const [pushLoading,setPushLoading]=useState(false);
  

  const TZ_OPTIONS = [
    "America/New_York","America/Chicago","America/Denver","America/Phoenix",
    "America/Los_Angeles","America/Anchorage","Pacific/Honolulu"
  ];
  const TZ_LABELS = {
    "America/New_York":"Eastern (ET)","America/Chicago":"Central (CT)",
    "America/Denver":"Mountain (MT)","America/Phoenix":"Arizona (MST)",
    "America/Los_Angeles":"Pacific (PT)","America/Anchorage":"Alaska (AKT)",
    "Pacific/Honolulu":"Hawaii (HT)"
  };

  useEffect(()=>{
    (async()=>{
      try{
        const p=await db.getProfile(user.id);
        if(p){
          setProfile(p);
          if(p.full_name)setFullName(p.full_name);
          if(p.company_name)setCompanyName(p.company_name);
          if(p.company_id){
            setSelectedCompany({id:p.company_id,name:p.company_name||""});
            // Load logo — try localStorage cache first, then fetch from Supabase
            const logoUrl=await db.getCompanyLogoUrl(p.company_id);
            if(logoUrl)setCompanyLogoUrl(logoUrl);
            try{const tpls=await db.getCompanyTemplates(p.company_id);setCompanyTemplates(tpls);}catch(e){}
          }
          if(p.timezone)setTimezone(p.timezone);
          if(p.slug)setSlug(p.slug);
          if(p.company_role)setCompanyRole(p.company_role);
          if(p.ntfy_topic)setNtfyTopic(p.ntfy_topic); if(p.push_subscription)setPushEnabled(true);
        }
        // Load email send counter for current month
        try{
          const mo=new Date().toISOString().slice(0,7);
          const cr=await fetch(`${SB_URL}/rest/v1/email_send_counter?month=eq.${mo}&select=*`,{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+(AUTH_TOKEN||SB_KEY)}});
          const rows=await cr.json();
          if(rows&&rows.length>0)setEmailCount(rows[0]);
          else setEmailCount({month:mo,send_count:0,alert_sent:false});
        }catch(e){console.error("Counter load:",e);}
      }catch(e){console.error(e);}
      finally{setLoading(false);}
    })();
  },[]);

  const flash=(m,t="ok")=>{setMsg(m);setMsgType(t);setTimeout(()=>setMsg(""),3000);};

  const handleCompanySearch=(val)=>{
    setCompanyName(val);
    setSelectedCompany(null);
    if(companyDebounce.current)clearTimeout(companyDebounce.current);
    if(val.trim().length<2){setCompanyMatches([]);return;}
    companyDebounce.current=setTimeout(async()=>{
      try{const matches=await db.searchCompanies(val.trim());setCompanyMatches(matches);}catch(e){setCompanyMatches([]);}
    },400);
  };
  const loadCompanyTemplates=async(companyId)=>{
    try{const tpls=await db.getCompanyTemplates(companyId);setCompanyTemplates(tpls);}catch(e){setCompanyTemplates([]);}
  };
  const selectCompany=async(company)=>{
    setSelectedCompany(company);
    setCompanyName(company.name);
    setCompanyMatches([]);
    // Load logo from Supabase (with localStorage cache)
    const logoUrl=await db.getCompanyLogoUrl(company.id);
    setCompanyLogoUrl(logoUrl);
    loadCompanyTemplates(company.id);
  };
  const clearCompany=()=>{
    setSelectedCompany(null);
    setCompanyName("");
    setCompanyMatches([]);
    setCompanyLogoUrl(null);
    setCompanyTemplates([]);
  };
  const handleLogoUpload=async(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    if(!selectedCompany){flash("Please select or create a company first","err");if(logoInputRef.current)logoInputRef.current.value="";return;}
    if(!file.type.startsWith("image/")){flash("Please select an image file","err");return;}
    if(file.size>2*1024*1024){flash("Logo must be under 2MB","err");return;}
    setUploadingLogo(true);
    try{
      const logoUrl=await db.uploadCompanyLogo(selectedCompany.id,file);
      setCompanyLogoUrl(logoUrl);
      flash("Company logo saved");
    }catch(err){flash("Logo save failed: "+err.message,"err");}
    finally{setUploadingLogo(false);if(logoInputRef.current)logoInputRef.current.value="";}
  };
  const handleTplUpload=async(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    if(!selectedCompany){flash("Select a company first","err");if(tplInputRef.current)tplInputRef.current.value="";return;}
    if(!file.name.toLowerCase().endsWith(".pdf")){flash("Only PDF templates supported","err");if(tplInputRef.current)tplInputRef.current.value="";return;}
    if(file.size>20*1024*1024){flash("File must be under 20MB","err");if(tplInputRef.current)tplInputRef.current.value="";return;}
    setUploadingTpl(true);
    try{
      const saved=await db.uploadCompanyTemplate(selectedCompany.id,file);
      flash("Template uploaded — employees will see it when creating jobs");
      loadCompanyTemplates(selectedCompany.id);
    }catch(err){flash("Upload failed: "+err.message,"err");}
    finally{setUploadingTpl(false);if(tplInputRef.current)tplInputRef.current.value="";}
  };
  const handleDeleteTpl=async(tpl)=>{
    if(!confirm(`Remove "${tpl.template_name}" from company templates?`))return;
    try{
      await db.deleteCompanyTemplate(tpl.id);
      flash("Template removed");
      loadCompanyTemplates(selectedCompany.id);
    }catch(err){flash("Delete failed: "+err.message,"err");}
  };

  const saveProfile=async()=>{
    setSaving(true);
    try{
      const slugVal=slug.trim()||fullName.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
      let companyId=null;
      // If user selected a registered company, assign them
      if(selectedCompany){
        try{
          companyId=await db.assignCompany(user.id,selectedCompany.name);
          // Refresh profile to pick up role set by assign_company
          db._profileCache={};
          const updatedProfile=await db.getProfile(user.id);
          if(updatedProfile?.company_role)setCompanyRole(updatedProfile.company_role);
          // Sync company templates
          if(companyId){try{await db.copyCompanyTemplatesDB(user.id,companyId);}catch(e){console.error("Template sync RPC:",e);try{const cts=await db.getCompanyTemplates(companyId);if(cts.length)await db.copyCompanyTemplatesToUser(cts,user.id);}catch(e2){console.error("Template sync fallback:",e2);}}}
        }catch(e){console.error("Company assign:",e);companyId=selectedCompany.id;}
      }
      const data={
        id:user.id,
        full_name:fullName.trim(),
        company_name:(selectedCompany?.name||companyName).trim()||null,
        company_id:companyId||null,
        timezone,
        slug:slugVal,
        ntfy_topic:ntfyTopic.trim()||("mdr-"+slugVal),
      };
      await db.upsertProfile(data);
      flash("Settings saved successfully");
      setTimeout(()=>onBack(),600);
    }catch(e){
      flash(e.message,"err");
    }finally{setSaving(false);}
  };

  const [deleting,setDeleting]=useState(false);
  const handleDelete=async()=>{
    if(deleteConfirm!=="DELETE MY ACCOUNT"||deleting)return;
    setDeleting(true);
    try{
      await db.deleteAccount(user.id);
      flash("Account deleted — signing out...");
      setTimeout(()=>onLogout(),1500);
    }catch(e){
      flash("Delete failed: "+e.message,"err");
      setDeleting(false);
    }
  };

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const ls={display:"block",color:C.lt,fontSize:13,fontWeight:600,marginBottom:6};

  return(<>
    <div className="page-in" style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      {/* Header */}
      <div style={{borderBottom:`1px solid ${C.brd}`,background:C.card,padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,maxWidth:600,margin:"0 auto"}}>
        <button onClick={onBack} style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:22,cursor:"pointer",lineHeight:1,width:48,height:48,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
        <span style={{fontWeight:700,fontSize:17}}>Account Settings</span>
      </div>
      </div>

      <div style={{maxWidth:500,margin:"0 auto",padding:"24px 20px"}}>
        {/* Status message */}
        {msg&&(
          <div style={{background:msgType==="ok"?"rgba(34,197,94,0.1)":"#2d1214",border:`1px solid ${msgType==="ok"?"rgba(34,197,94,0.3)":"#5c2023"}`,borderRadius:8,padding:"10px 14px",marginBottom:16,color:msgType==="ok"?C.ok:C.err,fontSize:13,fontWeight:600}}>
            {msg}
          </div>
        )}

        {loading?(
          <p style={{textAlign:"center",color:C.mut,padding:40}}>Loading profile...</p>
        ):(
          <>
            {/* Profile Section */}
            <div style={{marginBottom:28}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                <div style={{width:48,height:48,borderRadius:"50%",background:C.org,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:20,color:"#fff",flexShrink:0}}>
                  {fullName?fullName.charAt(0).toUpperCase():"?"}
                </div>
                <div>
                  <div style={{fontWeight:700,fontSize:16,color:C.txt}}>{fullName||"Inspector"}</div>
                  <div style={{fontSize:12,color:C.mut}}>{email}</div>
                </div>
              </div>

              <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:20}}>
                <div style={{fontWeight:700,fontSize:15,color:C.txt,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
                  Profile Information
                </div>

                <div style={{marginBottom:16}}>
                  <label style={ls}>Full Name</label>
                  <input type="text" value={fullName} readOnly style={{...fs,opacity:0.6,cursor:"default"}}/>
                  <div style={{fontSize:11,color:C.mut,marginTop:4}}>Set during sign up</div>
                </div>

                <div style={{marginBottom:16,position:"relative"}}>
                  <label style={ls}>Company</label>
                  {selectedCompany?(
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"rgba(232,116,42,0.08)",border:"1px solid rgba(232,116,42,0.25)",borderRadius:8}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600,color:C.txt}}>{selectedCompany.name}</div>
                        <div style={{fontSize:11,color:C.ok}}>Linked — company templates available</div>
                      </div>
                      <button onClick={clearCompany} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>
                    </div>
                  ):(
                    <input type="text" value={companyName} onChange={e=>handleCompanySearch(e.target.value)} placeholder="Search for your company..." style={fs}/>
                  )}
                  {companyMatches.length>0&&!selectedCompany&&(
                    <div style={{position:"absolute",left:0,right:0,top:"100%",zIndex:50,background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,marginTop:4,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,0.15)"}}>
                      {companyMatches.map(m=>(
                        <button key={m.id} onClick={()=>selectCompany(m)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 14px",background:"transparent",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{m.name}</div>
                            <div style={{fontSize:11,color:C.mut}}>Tap to link your account</div>
                          </div>
                        </button>
                      ))}
                    </div>
                  )}
                  <div style={{fontSize:11,color:C.mut,marginTop:4}}>
                    {selectedCompany?"This company's templates will be available when creating jobs.":"Type to search for a registered company. This also sets your email sender name."}
                  </div>
                  {selectedCompany&&(
                    <div style={{fontSize:11,color:companyRole==="admin"?C.org:C.mut,marginTop:4}}>
                      Role: <strong>{companyRole==="admin"?"Admin":"Member"}</strong>
                    </div>
                  )}
                  <div style={{fontSize:11,color:C.mut,marginTop:2}}>Emails appear as: <strong style={{color:C.txt}}>{companyName||selectedCompany?.name||"Your Company"} &lt;reports@mydailyreports.org&gt;</strong></div>
                </div>

                {selectedCompany&&(
                  <div style={{marginBottom:16}}>
                    <label style={ls}>Company Logo</label>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      {companyLogoUrl?(
                        <img src={companyLogoUrl} alt="Logo" style={{width:56,height:56,borderRadius:8,objectFit:"contain",background:"#fff",border:`1px solid ${C.brd}`}}/>
                      ):(
                        <div style={{width:56,height:56,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",color:C.mut,fontSize:11}}>No logo</div>
                      )}
                      <div style={{flex:1}}>
                        <input ref={logoInputRef} type="file" accept="image/*" onChange={handleLogoUpload} style={{display:"none"}}/>
                        <button onClick={()=>logoInputRef.current?.click()} disabled={uploadingLogo} style={{padding:"8px 16px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                          {uploadingLogo?"Uploading...":companyLogoUrl?"Change Logo":"Upload Logo"}
                        </button>
                        <div style={{fontSize:11,color:C.mut,marginTop:4}}>Appears on work log report headers</div>
                      </div>
                    </div>
                  </div>
                )}

                {selectedCompany&&(
                  <div style={{marginBottom:16}}>
                    <label style={ls}>Company Templates</label>
                    <div style={{fontSize:11,color:C.mut,marginBottom:8}}>Upload PDF templates for all {selectedCompany.name} employees</div>
                    {companyTemplates.length>0&&(
                      <div style={{marginBottom:8}}>
                        {companyTemplates.map(t=>(
                          <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,marginBottom:4}}>
                            <span style={{fontSize:18}}>📄</span>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:600,color:C.txt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.template_name}</div>
                              <div style={{fontSize:11,color:C.mut}}>{t.file_name}</div>
                            </div>
                            <button onClick={()=>handleDeleteTpl(t)} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>✕</button>
                          </div>
                        ))}
                      </div>
                    )}
                    <input ref={tplInputRef} type="file" accept=".pdf" onChange={handleTplUpload} style={{display:"none"}}/>
                    <button onClick={()=>tplInputRef.current?.click()} disabled={uploadingTpl} style={{padding:"8px 16px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                      {uploadingTpl?"Uploading...":"Upload Template PDF"}
                    </button>
                    <div style={{fontSize:11,color:C.mut,marginTop:4}}>Employees see these when they select {selectedCompany.name} on Create Job</div>
                  </div>
                )}

                <div style={{marginBottom:16}}>
                  <label style={ls}>Email</label>
                  <input type="email" value={email} readOnly style={{...fs,opacity:0.6,cursor:"default"}}/>
                  <div style={{fontSize:11,color:C.mut,marginTop:4}}>Set during sign up</div>
                </div>

                <div style={{marginBottom:0}}>
                  <label style={ls}>Calendar Display Name</label>
                  <input type="text" value={slug} onChange={e=>setSlug(e.target.value.toLowerCase().replace(/[^a-z0-9-]/g,""))} placeholder="jesse-saltzman" style={fs}/>
                  <div style={{fontSize:12,color:C.mut,marginTop:6,lineHeight:1.4}}>This is how your name appears at the end of your scheduling URL</div>
                  <div style={{fontSize:12,color:C.blu,marginTop:4,fontWeight:600}}>hub.html?i={slug||"your-name"}</div>
                </div>
              </div>
            </div>

            {/* Timezone Section */}
            <div style={{marginBottom:28}}>
              <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:20}}>
                <div style={{fontWeight:700,fontSize:15,color:C.txt,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
                  Timezone
                </div>
                <div style={{marginBottom:8}}>
                  <label style={ls}>Your Timezone</label>
                  <select value={timezone} onChange={e=>setTimezone(e.target.value)} style={{...fs,cursor:"pointer"}}>
                    {TZ_OPTIONS.map(tz=>(
                      <option key={tz} value={tz}>{TZ_LABELS[tz]||tz}</option>
                    ))}
                  </select>
                </div>
                <div style={{fontSize:12,color:C.mut}}>
                  Current time: {new Date().toLocaleTimeString("en-US",{timeZone:timezone,hour:"numeric",minute:"2-digit",hour12:true})}
                </div>
              </div>
            </div>

            {/* Notifications Section */}
            <div style={{marginBottom:28}}>
              <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:20}}>
                <div style={{fontWeight:700,fontSize:15,color:C.txt,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
                  Notifications
                </div>
                <div style={{fontSize:13,color:C.mut,lineHeight:1.6,marginBottom:14}}>
                  Email reminders are sent based on your per-job reminder settings. Push notifications deliver real-time scheduling alerts directly to your device.
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 0",borderTop:`1px solid ${C.brd}`}}>
                  <div><div style={{fontSize:14,fontWeight:600,color:C.lt}}>Email Reminders</div><div style={{fontSize:11,color:C.mut}}>Configured per-job in job settings</div></div>
                  <div style={{fontSize:12,fontWeight:600,color:C.ok}}>Active</div>
                </div>
                
                <div style={{padding:"14px 0 0",borderTop:`1px solid ${C.brd}`,marginTop:12}}>
                  <div style={{fontSize:14,fontWeight:600,color:C.lt,marginBottom:8}}>Push Notifications</div>
                  <div style={{fontSize:12,color:C.mut,lineHeight:1.6,marginBottom:10}}>
                    Get instant push notifications on your phone when scheduling requests come in. No extra apps needed.
                  </div>

          <div style={{textAlign:"center",padding:"40px 20px",color:C.mut}}>
            <div style={{fontSize:36,marginBottom:12}}>📋</div>
            <p style={{fontSize:15,fontWeight:600,color:C.lt,marginBottom:6}}>No template fields configured</p>
            <p style={{fontSize:13}}>Go back and upload a template in your job settings to get started.</p>
          </div>
        )}

        {/* ── Photos ── */}
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:C.org,textTransform:"uppercase",letterSpacing:1}}>Photos</div>
            <div style={{display:"flex",gap:4}}>
              {layouts.map(({k,l})=>(
                <button key={k} onClick={()=>setPhotoLayout(k)} style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:4,cursor:"pointer",background:photoLayout===k?C.org:"transparent",border:`1px solid ${photoLayout===k?C.org:C.brd}`,color:photoLayout===k?"#fff":C.mut}}>{l}</button>
              ))}
            </div>
          </div>

          {/* Photo grid */}
          {photos.length>0&&(
            <div style={{display:"grid",gridTemplateColumns:photoLayout==="1"?"1fr":photoLayout==="2"?"1fr 1fr":"1fr 1fr",gap:8,marginBottom:12}}>
              {photos.map(p=>(
                <div key={p.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:`1px solid ${C.brd}`,aspectRatio:photoLayout==="1"?"auto":"1"}}>
                  <img src={p.src} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <button onClick={()=>setPhotos(prev=>prev.filter(x=>x.id!==p.id))} style={{position:"absolute",top:4,right:4,width:22,height:22,borderRadius:"50%",background:"rgba(0,0,0,0.7)",border:"none",color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>
              ))}
            </div>
          )}

          {/* Two photo buttons */}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{photoRef.current.setAttribute("capture","environment");photoRef.current.click();}} style={{flex:1,padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span>📷</span> Take Photo
            </button>
            <button onClick={()=>{photoRef.current.removeAttribute("capture");photoRef.current.click();}} style={{flex:1,padding:"14px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span>🖼️</span> Library
            </button>
          </div>
          <input ref={photoRef} type="file" accept="image/*" multiple onChange={handlePhoto} style={{display:"none"}}/>
          <div style={{fontSize:11,color:C.mut,marginTop:8}}>Photos will display as {layouts.find(l=>l.k===photoLayout)?.l} in the final PDF</div>
        </div>

        {/* ── Action buttons ── */}
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
          <div style={{display:"flex",gap:10}}>
            {reportStatus!=="submitted"&&(
              <button onClick={saveWorking} disabled={saving||submitting||viewLoading} className="btn-o" style={{flex:1,padding:"14px 0",background:C.blu,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:saving?"default":"pointer",opacity:saving?0.6:1}}>
                {saving?"Saving...":"Save Working Copy"}
              </button>
            )}
            <button onClick={viewReport} disabled={viewLoading||submitting} style={{flex:1,padding:"14px 0",background:"transparent",border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:15,fontWeight:700,cursor:viewLoading?"default":"pointer",opacity:viewLoading?0.6:1}}>
              {viewLoading?"Loading...":"View Report"}
            </button>
          </div>
          <button onClick={submitReport} disabled={submitting||viewLoading} className="btn-o" style={{width:"100%",padding:"14px 0",background:C.org,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:submitting?"default":"pointer",opacity:submitting?0.6:1}}>
            {submitting?"Submitting...":reportStatus==="submitted"?"Update & Resubmit":"Submit Report"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Job Detail (Job Dashboard) ── */
function JobDetail({job, user, onBack, onDeleted}){
  const [jdToast,setJdToast]=useState("");
  const showToast=(msg)=>{setJdToast(msg);setTimeout(()=>setJdToast(""),3000);};
  const [showDel,setShowDel]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [showJobSet,setShowJobSet]=useState(false);
  const [reparsing,setReparsing]=useState(false);
  const reparseTemplate=async()=>{
    setReparsing(true);
    try{
      const tpl=await db.getTemplate(job.id);
      if(!tpl||!tpl.storage_path){showToast("No template found for this job.");return;}
      const tplResp=await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${tpl.storage_path}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${AUTH_TOKEN||SB_KEY}`}});
      if(!tplResp.ok)throw new Error("Could not download template file.");
      const buf=await tplResp.arrayBuffer();
      // Extract real text positions client-side with pdf.js
      const textItems=await extractPdfTextStructure(new Uint8Array(buf));
      const resp=await fetch(`${SB_URL}/functions/v1/parse-template`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${SB_KEY}`,apikey:SB_KEY},body:JSON.stringify({text_items:textItems,file_name:tpl.original_filename||"template.pdf"})});
      if(!resp.ok)throw new Error("AI parsing failed.");
      const parsed=await resp.json();
      if(parsed.error)throw new Error(parsed.error);
      const coords=(f)=>({page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline});
      const editF=(parsed.editable||[]).map(f=>({name:f.name,value:f.value||"",originalValue:f.value||"",voiceEnabled:f.voiceEnabled||false,autoFill:f.autoFill||null,...coords(f)}));
      const lockF=(parsed.locked||[]).map(f=>({name:f.name,value:f.value||"",...coords(f)}));
      const newConfig={editable:editF,locked:lockF};
      await db.updateJobFieldConfig(job.id,newConfig);
      // Update the job object directly so next ReportEditor open picks up new fields
      job.field_config=newConfig;
      showToast("Template re-parsed with updated field positions! Open a report to see the changes.");
    }catch(e){console.error("Reparse error:",e);showToast("Re-parse failed: "+e.message);}
    finally{setReparsing(false);}
  };
  const [rpts,setRpts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showCompleted,setShowCompleted]=useState(false);
  const [showWorking,setShowWorking]=useState(false);
  const [showPhotos,setShowPhotos]=useState(false);
  const [showEditJob,setShowEditJob]=useState(false);
  const [showReport,setShowReport]=useState(false);
  const [showTeam,setShowTeam]=useState(false);
  const [editName,setEditName]=useState(job.name||"");
  const [editAddr,setEditAddr]=useState(job.site_address||"");
  const [editSaving,setEditSaving]=useState(false);
  const [teamMembers,setTeamMembers]=useState((job.team_emails||[]).map(e=>typeof e==="string"?{name:"",email:e}:e));
  const [newMemberName,setNewMemberName]=useState("");
  const [newMemberEmail,setNewMemberEmail]=useState("");
  const [teamSaving,setTeamSaving]=useState(false);
  const [showSchedSet,setShowSchedSet]=useState(false);
  const [schedEnabled,setSchedEnabled]=useState(!!job.scheduling_enabled);
  const [schedSaving,setSchedSaving]=useState(false);
  const [showFieldEdit,setShowFieldEdit]=useState(false);
  const [fieldEditFields,setFieldEditFields]=useState(null); // null=not loaded
  const [fieldEditSaving,setFieldEditSaving]=useState(false);

  const [tplFilename,setTplFilename]=useState(null);
  const loadReports=useCallback(async()=>{
    try{
      const r=await fetch(`${SB_URL}/rest/v1/reports?select=*&job_id=eq.${job.id}&order=report_date.desc`,{headers:db._h()});
      if(r.ok)setRpts(await r.json());
    }catch(e){console.error(e);}
    finally{setLoading(false);}
  },[job.id]);
  const loadTplFilename=useCallback(async()=>{
    try{const t=await db.getTemplate(job.id);if(t&&t.original_filename)setTplFilename(t.original_filename);}catch(e){}
  },[job.id]);

  useEffect(()=>{loadReports();loadTplFilename();},[loadReports,loadTplFilename]);

  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const today=new Date().toLocaleDateString("en-CA",{timeZone:tz});
  const todayRpt=rpts.find(r=>r.report_date===today);
  const submitted=rpts.filter(r=>r.status==="submitted");
  const working=rpts.filter(r=>r.status!=="submitted");
  const nextNum=submitted.length+working.length+1;


  // Track if user has started today's report this session
  const [reportStarted,setReportStarted]=useState(false);
  // Build display filename using stored AI convention — swap tokens for actual values
  const buildReportName=(num,reportDate)=>{
    const conv=job.field_config?.filenameConvention||{};
    const padding=conv.numberPadding||0;
    const padNum=padding>0?String(num).padStart(padding,"0"):String(num);
    const pattern=conv.pattern||job.report_filename_pattern||job.name||"Report";
    let n=pattern.replace(/\.[^.]+$/,"");
    // Swap tokens
    n=n.replace(/\{report_number\}/g,padNum);
    // Parse the date for this report
    const d=reportDate instanceof Date?reportDate:new Date(typeof reportDate==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(reportDate)?(reportDate+"T12:00:00"):(reportDate+"T12:00:00"));
    const mm=d.toLocaleDateString("en-US",{month:"2-digit",timeZone:tz});
    const dd=d.toLocaleDateString("en-US",{day:"2-digit",timeZone:tz});
    const yyyy=d.toLocaleDateString("en-US",{year:"numeric",timeZone:tz});
    const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const monNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const monthIdx=d.toLocaleDateString("en-US",{month:"numeric",timeZone:tz})-1;
    const formatDate=(fmt)=>{
      if(!fmt)return"";
      return fmt.replace(/YYYY/g,yyyy).replace(/MM/g,mm).replace(/DD/g,dd).replace(/Month/g,monthNames[monthIdx]||"").replace(/Mon/g,monNames[monthIdx]||"");
    };
    const dateStr=formatDate(conv.dateFormat);
    n=n.replace(/\{date\}/g,dateStr);
    n=n.replace(/\{year\}/g,yyyy);
    return n;
  };

  const doDelete=async()=>{
    setDeleting(true);
    try{await db.deleteJob(job.id);onDeleted();}
    catch(e){alert("Delete failed: "+e.message);setDeleting(false);}
  };

  const saveJobEdit=async()=>{
    setEditSaving(true);
    try{
      const r=await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${job.id}`,{method:"PATCH",headers:db._h(),body:JSON.stringify({name:editName.trim(),site_address:editAddr.trim()||null})});
      if(!r.ok)throw new Error("Save failed");
      job.name=editName.trim();job.site_address=editAddr.trim()||null;
      setShowEditJob(false);
    }catch(e){alert(e.message);}
    finally{setEditSaving(false);}
  };

  const [editDate,setEditDate]=useState(null);
  const openReport=(date)=>{setEditDate(date||null);setReportStarted(true);setShowReport(true);};
  const closeReport=()=>{setShowReport(false);setEditDate(null);setLoading(true);loadReports();};

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const ls={display:"block",color:C.lt,fontSize:13,fontWeight:600,marginBottom:6};

  // Collapsible folder
  const Folder=({icon,label,count,color,open,setOpen,children})=>(
    <div style={{marginBottom:12}}>
      <button onClick={()=>setOpen(!open)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"16px 18px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:open?"12px 12px 0 0":12,cursor:"pointer",textAlign:"left"}}>
        <span style={{fontSize:20}}>{icon}</span>
        <span style={{flex:1,fontWeight:700,fontSize:15,color:color||C.txt}}>{label}</span>
        <span style={{fontSize:13,fontWeight:600,color:C.mut,background:C.inp,borderRadius:10,padding:"2px 10px",marginRight:8}}>{count}</span>
        <span style={{color:C.mut,fontSize:14,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>
      </button>
      {open&&<div style={{background:C.card,border:`1px solid ${C.brd}`,borderTop:"none",borderRadius:"0 0 12px 12px",padding:"4px 16px 12px"}}>{children}</div>}
    </div>
  );

  if(showReport)return<ReportEditor key={job.id+"-"+(editDate||"")} job={job} user={user} onBack={closeReport} reportDate={editDate}/>;

  if(loading)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><p style={{color:C.mut}}>Loading...</p></div>);

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      {jdToast&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",background:C.card,border:`1px solid ${C.ok}`,borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:600,color:C.ok,zIndex:9999}}>{jdToast}</div>}
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:17}}>{job.name}</div>
          {job.site_address&&<div style={{fontSize:12,color:C.mut}}>{job.site_address}</div>}
        </div>
        <button onClick={()=>setShowJobSet(!showJobSet)} style={{width:34,height:34,borderRadius:8,background:C.inp,border:`1px solid ${showJobSet?C.org:C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,color:C.mut}}>⚙️</button>
      </div>

      <div style={{maxWidth:600,margin:"0 auto",padding:"20px"}}>

        {/* ── Today's Report ── */}
        <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:20,marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:22}}>📝</span>
              <div>
                <div style={{fontWeight:700,fontSize:16,color:C.txt}}>Today's Report</div>
                <div style={{fontSize:12,color:C.mut}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric",timeZone:tz})}</div>
              </div>
            </div>
            {todayRpt&&(
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:todayRpt.status==="submitted"?C.blu:C.org}}/>
                <span style={{fontSize:12,fontWeight:700,color:todayRpt.status==="submitted"?C.blu:C.org}}>{todayRpt.status==="submitted"?"Submitted":"In Progress"}</span>
              </div>
            )}
          </div>
          {todayRpt?(
            <button onClick={()=>openReport(today)} className="btn-o" style={{width:"100%",padding:"14px 0",background:C.blu,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>
              {todayRpt.status==="submitted"?"Edit Submitted Report":"Continue Editing"}
            </button>
          ):reportStarted?(
            <button onClick={()=>openReport(today)} className="btn-o" style={{width:"100%",padding:"14px 0",background:C.blu,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>
              Continue Editing
            </button>
          ):(
            <button onClick={()=>openReport(today)} className="btn-o" style={{width:"100%",padding:"14px 0",background:C.org,border:`1px solid ${C.blu}`,borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>
              Start Today's Report
            </button>
          )}
        </div>

        {/* ── Photo Gallery ── */}
        <Folder icon="📸" label="Photos" count={0} color={C.blu} open={showPhotos} setOpen={setShowPhotos}>
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:36,marginBottom:8}}>📷</div>
            <p style={{fontSize:14,fontWeight:600,color:C.lt,marginBottom:4}}>Job Photo Gallery</p>
            <p style={{fontSize:12,color:C.mut,marginBottom:14}}>Store photos for this job to use in future reports</p>
            <button className="btn-o" style={{padding:"10px 24px",background:C.org,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>Take or Upload Photo</button>
          </div>
        </Folder>

        {/* ── Working Copies Folder ── */}
        <Folder icon="✏️" label="Working Copies" count={working.length} color={C.org} open={showWorking} setOpen={setShowWorking}>
          {working.length===0?(
            <div style={{textAlign:"center",padding:"16px 0",color:C.mut,fontSize:13}}>No drafts in progress</div>
          ):(
            working.map((r,i)=>{const rptName=buildReportName(r.report_number||1,r.report_date);return(
              <button key={r.id} onClick={()=>openReport(r.report_date)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"transparent",border:"none",borderBottom:i<working.length-1?`1px solid ${C.brd}`:"none",cursor:"pointer",textAlign:"left"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:C.org,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:C.lt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rptName} — {new Date(r.report_date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",timeZone:tz})}</div>
                  <div style={{fontSize:11,color:C.mut}}>Last edited {r.updated_at?new Date(r.updated_at).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:tz}):""}</div>
                </div>
                <div style={{color:C.org,fontSize:20,flexShrink:0}}>›</div>
              </button>);})

          )}
        </Folder>

        {/* ── Completed Reports Folder ── */}
        <Folder icon="✅" label="Completed Reports" count={submitted.length} color={C.ok} open={showCompleted} setOpen={setShowCompleted}>
          {submitted.length===0?(
            <div style={{textAlign:"center",padding:"16px 0",color:C.mut,fontSize:13}}>No submitted reports yet</div>
          ):(
            submitted.map((r,i)=>{
              const rptName=buildReportName(r.report_number||i+1,r.report_date);
              return(
              <button key={r.id} onClick={()=>openReport(r.report_date)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",marginBottom:i<submitted.length-1?0:0,borderBottom:i<submitted.length-1?`1px solid ${C.brd}`:"none",background:"transparent",border:"none",borderBottomWidth:i<submitted.length-1?1:0,borderBottomStyle:"solid",borderBottomColor:C.brd,cursor:"pointer",textAlign:"left"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:C.ok,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:C.lt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rptName}</div>
                  <div style={{fontSize:12,color:C.mut,marginTop:2}}>{new Date(r.report_date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",timeZone:tz})} — Submitted {r.updated_at?new Date(r.updated_at).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit",timeZone:tz}):""}</div>
                </div>
                <div style={{color:C.blu,fontSize:20,flexShrink:0}}>›</div>
              </button>
            );})
          )}
        </Folder>

        {/* ── Edit Job (inline) ── */}
        {showEditJob&&(
          <div style={{background:C.card,border:`1px solid ${C.org}`,borderRadius:12,padding:20,marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:15,color:C.org,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
              <span>✏️</span> Edit Job
            </div>
            <div style={{marginBottom:16}}><label style={ls}>Job Name *</label><input type="text" value={editName} onChange={e=>setEditName(e.target.value)} style={fs}/></div>
            <div style={{marginBottom:16}}><label style={ls}>Site Address</label><input type="text" value={editAddr} onChange={e=>setEditAddr(e.target.value)} style={fs}/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowEditJob(false)} style={{flex:1,padding:"12px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.lt,fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={saveJobEdit} disabled={editSaving||!editName.trim()} className="btn-o" style={{flex:1,padding:"12px 0",background:editName.trim()?C.org:C.brd,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:editName.trim()&&!editSaving?"pointer":"default",opacity:editSaving?0.6:1}}>
                {editSaving?"Saving...":"Save Changes"}
              </button>
            </div>
          </div>
        )}

        {/* ── Project Team (inline) ── */}
        {showTeam&&(
          <div style={{background:C.card,border:`1px solid ${C.blu}`,borderRadius:12,padding:20,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <div style={{fontWeight:700,fontSize:15,color:C.blu,display:"flex",alignItems:"center",gap:8}}>
                <span>👥</span> Project Team
              </div>
              <button onClick={()=>setShowTeam(false)} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:20,padding:"0 4px"}}>✕</button>
            </div>
            <div style={{fontSize:12,color:C.mut,marginBottom:16,lineHeight:1.5}}>These people will receive an email with the report attached when you tap Submit Report.</div>
            {teamMembers.map((m,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<teamMembers.length-1?`1px solid ${C.brd}`:"none"}}>
                <div style={{width:32,height:32,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>👤</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,color:C.lt}}>{m.name||"No name"}</div>
                  <div style={{fontSize:12,color:C.mut,wordBreak:"break-all"}}>{m.email}</div>
                </div>
                <button onClick={()=>{setTeamMembers(p=>p.filter((_,j)=>j!==i));}} style={{background:"none",border:"none",color:C.err,cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>
              </div>
            ))}
            <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:8}}>
              <input type="text" value={newMemberName} onChange={e=>setNewMemberName(e.target.value)} placeholder="Name" style={{padding:"10px 12px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:14}}/>
              <div style={{display:"flex",gap:8}}>
                <input type="email" value={newMemberEmail} onChange={e=>setNewMemberEmail(e.target.value)} placeholder="Email" onKeyDown={e=>{if(e.key==="Enter"&&newMemberEmail.trim()&&newMemberEmail.includes("@")){setTeamMembers(p=>[...p,{name:newMemberName.trim(),email:newMemberEmail.trim()}]);setNewMemberName("");setNewMemberEmail("");}}} style={{flex:1,padding:"10px 12px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.txt,fontSize:14}}/>
                <button onClick={()=>{if(newMemberEmail.trim()&&newMemberEmail.includes("@")){setTeamMembers(p=>[...p,{name:newMemberName.trim(),email:newMemberEmail.trim()}]);setNewMemberName("");setNewMemberEmail("");}}} style={{padding:"10px 16px",background:C.blu,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>
              </div>
            </div>
            <div style={{marginTop:16}}>
              <button onClick={async()=>{setTeamSaving(true);try{await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${job.id}`,{method:"PATCH",headers:db._h(),body:JSON.stringify({team_emails:teamMembers})});job.team_emails=teamMembers;setShowTeam(false);}catch(e){alert("Save failed: "+e.message);}finally{setTeamSaving(false);}}} disabled={teamSaving} className="btn-o" style={{width:"100%",padding:"12px 0",background:C.blu,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:teamSaving?"default":"pointer",opacity:teamSaving?0.6:1}}>
                {teamSaving?"Saving...":"Save Team"}
              </button>
            </div>
          </div>
        )}

        {/* ── Scheduling Settings (inline) ── */}
        {showSchedSet&&(
          <div style={{background:C.card,border:`1px solid ${C.org}`,borderRadius:12,padding:20,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <div style={{fontWeight:700,fontSize:15,color:C.org,display:"flex",alignItems:"center",gap:8}}>
                <span>📅</span> Jobsite Scheduling
              </div>
              <button onClick={()=>setShowSchedSet(false)} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:20,padding:"0 4px"}}>✕</button>
            </div>
            <div style={{fontSize:12,color:C.mut,marginBottom:16,lineHeight:1.5}}>When enabled, this job appears on your shared scheduling calendar so your GC and subs can request site visits.</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,marginBottom:16}}>
              <span style={{fontSize:14,fontWeight:600,color:C.lt}}>Enable Scheduling</span>
              <button onClick={()=>setSchedEnabled(!schedEnabled)} style={{width:48,height:26,borderRadius:13,border:"none",background:schedEnabled?C.ok:C.brd,cursor:"pointer",position:"relative",transition:"background 0.2s"}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:schedEnabled?25:3,transition:"left 0.2s"}}/>
              </button>
            </div>
            {schedEnabled&&(
              <div>
                <div style={{fontSize:12,color:C.ok,lineHeight:1.5,marginBottom:12}}>This job will appear on your shared calendar. Anyone with your calendar link can request visits for this job.</div>
                <div style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,padding:12,marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.blu,marginBottom:6}}>Your Calendar Link</div>
                  <div style={{fontSize:11,color:C.org,wordBreak:"break-all",marginBottom:8,fontWeight:600}}>{`${window.location.origin}${window.location.pathname.replace(/index\.html$/,"").replace(/\/$/,"")}/schedule.html#${slug}`}</div>
                  <button onClick={async()=>{const url=`${window.location.origin}${window.location.pathname.replace(/index\.html$/,"").replace(/\/$/,"")}/schedule.html#${slug}`;try{await navigator.clipboard.writeText(url);alert("Calendar link copied!");}catch(e){alert(url);}}} style={{width:"100%",padding:"8px 0",fontSize:12,fontWeight:700,borderRadius:6,background:C.blu,border:"none",color:"#fff",cursor:"pointer",marginBottom:10}}>Copy Calendar Link</button>
                  <details style={{borderTop:`1px solid ${C.brd}`,paddingTop:8}}>
                    <summary style={{fontSize:12,color:C.blu,fontWeight:600,cursor:"pointer",listStyle:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>Subscribe to Your Own Calendar<span style={{fontSize:14}}>+</span></summary>
                    <div style={{paddingTop:8,fontSize:12,color:C.lt,lineHeight:1.6}}>
                      <div style={{marginBottom:8}}><strong style={{color:C.txt}}>iPhone:</strong> Settings → Calendar → Accounts → Add Account → Other → Add Subscribed Calendar → paste the URL above</div>
                      <div style={{marginBottom:8}}><strong style={{color:C.txt}}>Android / Google:</strong> Open Google Calendar on desktop → click + next to "Other calendars" → From URL → paste the URL above</div>
                      <div style={{marginBottom:8}}><strong style={{color:C.txt}}>Outlook Desktop:</strong> Calendar view → Add Calendar → From Internet → paste the URL above</div>
                      <div><strong style={{color:C.txt}}>Outlook Mobile:</strong> Calendar → Settings → Add Shared Calendar → Add from link → paste the URL above</div>
                    </div>
                  </details>
                </div>
              </div>
            )}
            <button onClick={async()=>{setSchedSaving(true);try{await fetch(`${SB_URL}/rest/v1/jobs?id=eq.${job.id}`,{method:"PATCH",headers:db._h(),body:JSON.stringify({scheduling_enabled:schedEnabled})});job.scheduling_enabled=schedEnabled;setShowSchedSet(false);}catch(e){alert("Save failed: "+e.message);}finally{setSchedSaving(false);}}} disabled={schedSaving} style={{width:"100%",padding:"12px 0",background:C.org,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:schedSaving?"default":"pointer",opacity:schedSaving?0.6:1}}>
              {schedSaving?"Saving...":"Save Scheduling"}
            </button>
          </div>
        )}

        {/* ── Edit Template Fields Panel ── */}
        {showFieldEdit&&fieldEditFields&&(
          <div style={{background:C.card,border:`1px solid ${C.org}`,borderRadius:12,padding:16,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:15,color:C.org}}>📋 Edit Template Fields</div>
              <button onClick={()=>setShowFieldEdit(false)} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:20,padding:"0 4px"}}>✕</button>
            </div>
            <div style={{fontSize:11,color:C.mut,marginBottom:12,lineHeight:1.5}}>Change field modes and values. This affects all future reports for this job.</div>
            <div style={{maxHeight:400,overflowY:"auto",marginBottom:12}}>
              {fieldEditFields.map((f,i)=>{
                const setMode=(m)=>setFieldEditFields(p=>p.map((x,j)=>j===i?{...x,mode:m}:x));
                const setVal=(v)=>setFieldEditFields(p=>p.map((x,j)=>j===i?{...x,value:v}:x));
                const mb=(mode,label,color)=>{const active=f.mode===mode;return(<button key={mode} onClick={()=>setMode(mode)} style={{padding:"3px 8px",fontSize:10,fontWeight:700,borderRadius:4,cursor:"pointer",background:active?color:"transparent",border:`1px solid ${active?color:C.brd}`,color:active?"#fff":color}}>{label}</button>);};
                return(
                  <div key={f.name} style={{padding:"10px 12px",background:C.bg,border:`1px solid ${C.brd}`,borderRadius:8,marginBottom:6}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontSize:13,fontWeight:700,color:C.txt,flex:1,marginRight:8}}>{f.name}</span>
                      <div style={{display:"flex",gap:4,flexShrink:0}}>
                        {mb("edit","Edit",C.org)}
                        {mb("lock","Lock",C.mut)}
                        {mb("auto-date","Auto-Date",C.blu)}
                        {mb("auto-num","Auto-#",C.blu)}
                      </div>
                    </div>
                    {f.mode!=="auto-date"&&f.mode!=="auto-num"&&(
                      <input type="text" value={f.value||""} onChange={e=>setVal(e.target.value)} placeholder={f.mode==="lock"?"Set locked value...":"Default value (optional)"} style={{width:"100%",padding:"8px 10px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:6,color:C.txt,fontSize:13,boxSizing:"border-box"}}/>
                    )}
                    {f.mode==="auto-date"&&<div style={{fontSize:11,color:C.blu,fontStyle:"italic",padding:"4px 0"}}>Auto-fills today's date</div>}
                    {f.mode==="auto-num"&&<div style={{fontSize:11,color:C.blu,fontStyle:"italic",padding:"4px 0"}}>Auto-increments each report</div>}
                  </div>
                );
              })}
            </div>
            <button onClick={async()=>{
              setFieldEditSaving(true);
              try{
                const coords=(f)=>({page:f.page,x:f.x,y:f.y,w:f.w,h:f.h,fontSize:f.fontSize,multiline:f.multiline});
                const editF=fieldEditFields.filter(f=>f.mode==="edit").map(f=>({name:f.name,value:f.value||"",originalValue:f.value||"",voiceEnabled:true,...coords(f)}));
                const lockF=fieldEditFields.filter(f=>f.mode==="lock").map(f=>({name:f.name,value:f.value||"",...coords(f)}));
                const autoF=fieldEditFields.filter(f=>f.mode==="auto-date"||f.mode==="auto-num").map(f=>({name:f.name,value:f.value||"",originalValue:f.value||"",autoFill:f.mode==="auto-date"?"date":"increment",...coords(f)}));
                const newConfig={editable:[...editF,...autoF],locked:lockF};
                await db.updateJobFieldConfig(job.id,newConfig);
                job.field_config=newConfig;
                setShowFieldEdit(false);
                setFieldEditFields(null);
              }catch(e){alert("Save failed: "+e.message);}
              finally{setFieldEditSaving(false);}
            }} disabled={fieldEditSaving} style={{width:"100%",padding:"12px 0",background:C.org,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:fieldEditSaving?"default":"pointer",opacity:fieldEditSaving?0.6:1}}>
              {fieldEditSaving?"Saving...":"Save Field Changes"}
            </button>
          </div>
        )}

        {/* ── Job Settings Panel ── */}
        {showJobSet&&(
          <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden",marginBottom:16}}>
            <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.brd}`,background:"rgba(232,116,42,0.06)"}}>
              <div style={{fontWeight:700,fontSize:15,color:C.org}}>Job Settings</div>
            </div>
            <button onClick={()=>{setShowEditJob(!showEditJob);setEditName(job.name);setEditAddr(job.site_address||"");}} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 18px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:16}}>✏️</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>Edit Job Details</span>
            </button>
            <button onClick={()=>setShowTeam(!showTeam)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"14px 18px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>👥</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>Project Team</span>
              </div>
              <span style={{fontSize:11,color:C.mut,background:C.inp,borderRadius:10,padding:"2px 8px"}}>{teamMembers.length}</span>
            </button>
            <button onClick={()=>{if(!fieldEditFields){const fc=job.field_config||{};const all=[...(fc.editable||[]).map(f=>({...f,mode:f.autoFill==="date"?"auto-date":f.autoFill==="increment"?"auto-num":"edit"})),...(fc.locked||[]).map(f=>({...f,mode:"lock"}))];setFieldEditFields(all);}setShowFieldEdit(!showFieldEdit);}} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 18px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:16}}>📋</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>Edit Template Fields</span>
            </button>
            <button onClick={reparseTemplate} disabled={reparsing} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 18px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:reparsing?"default":"pointer",textAlign:"left",opacity:reparsing?0.6:1}}>
              <span style={{fontSize:16}}>{reparsing?"⏳":"🔄"}</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>{reparsing?"Re-parsing template...":"Re-parse Template Fields"}</span>
            </button>
            <button onClick={()=>{setShowSchedSet(!showSchedSet);setShowTeam(false);}} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"14px 18px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>📅</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>Jobsite Scheduling</span>
              </div>
              <span style={{fontSize:11,color:schedEnabled?C.ok:C.mut,fontWeight:600}}>{schedEnabled?"ON":"OFF"}</span>
            </button>
            <div style={{padding:"14px 18px",borderTop:`1px solid #5c2023`}}>
              {!showDel?(
                <button onClick={()=>setShowDel(true)} style={{width:"100%",padding:"10px 16px",background:"transparent",border:"1px solid #5c2023",borderRadius:8,color:C.err,fontSize:13,fontWeight:600,cursor:"pointer"}}>Delete This Job</button>
              ):(
                <div>
                  <p style={{fontSize:12,color:C.err,lineHeight:1.5,marginBottom:10}}>Permanently delete "{job.name}" and all its reports, templates, and data. Cannot be undone.</p>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setShowDel(false)} style={{flex:1,padding:"10px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.lt,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                    <button onClick={doDelete} disabled={deleting} style={{flex:1,padding:"10px 0",background:"#ef4444",border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:deleting?"default":"pointer",opacity:deleting?0.6:1}}>
                      {deleting?"Deleting...":"Delete Permanently"}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function TrainingCenter({onBack}){
  const [selGuide,setSelGuide]=useState(null);
  const [step,setStep]=useState(0);

  if(selGuide!==null){
    const g=GUIDES[selGuide];
    const s=g.steps[step];
    return(
      <div style={{minHeight:"100vh",background:C.bg,color:C.txt,display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
          <button onClick={()=>{setSelGuide(null);setStep(0);}} style={{background:"none",border:"none",color:C.mut,fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
          <MDRLogo size={28}/>
          <span style={{fontWeight:700,fontSize:17}}>{g.title}</span>
        </div>
        <div style={{display:"flex",gap:4,padding:"16px 20px 8px"}}>
          {g.steps.map((_,i)=>(
            <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?(typeof g.color==="string"?g.color:C.org):C.brd,transition:"background 0.3s"}}/>
          ))}
        </div>
        <div style={{textAlign:"center",fontSize:13,fontWeight:600,color:C.mut,marginBottom:16}}>Step {step+1} of {g.steps.length}</div>
        <div style={{flex:1,overflowY:"auto",padding:"0 24px 24px",maxWidth:600,margin:"0 auto",width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:24}}>
            <div style={{width:90,height:90,borderRadius:"50%",background:(typeof g.color==="string"?g.color:C.org)+"22",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:42}}>{s.icon}</div>
            <div style={{fontSize:26,fontWeight:700,color:C.txt,marginBottom:12}}>{s.title}</div>
          </div>
          <div style={{fontSize:18,color:C.lt,lineHeight:1.8,marginBottom:20}}>{s.body}</div>
          {s.tip&&(
            <div style={{display:"flex",gap:12,padding:16,background:C.inp,border:`1px solid ${C.brd}`,borderRadius:14,marginBottom:20}}>
              <span style={{fontSize:22,flexShrink:0}}>💡</span>
              <div style={{fontSize:16,color:C.mut,lineHeight:1.6}}>{s.tip}</div>
            </div>

          {s.illustration&&s.illustration.type==="compare"&&(

                  <div style={{padding:"10px 12px",flex:1,fontSize:14,color:"#333"}}>{s.illustration.bad.value}</div>
                </div>
                <div style={{fontSize:13,color:"#ef4444",marginTop:6,fontWeight:600}}>↑ {s.illustration.bad.caption}</div>
              </div>
              <div style={{background:"#fff",borderRadius:12,padding:14,border:"2px solid "+C.ok}}>
                <div style={{fontSize:12,fontWeight:700,color:C.ok,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>✓ DO</div>
                <div style={{display:"flex",alignItems:"center",border:"1px solid #ccc",borderRadius:6,overflow:"hidden"}}>
                  <div style={{padding:"10px 12px",background:"#f5f5f5",fontWeight:700,fontSize:14,color:"#333",whiteSpace:"nowrap",borderRight:"1px solid #ccc"}}>{s.illustration.good.label}</div>
                  <div style={{padding:"10px 12px",flex:1,fontSize:14,color:s.illustration.good.value?"#333":"#bbb",fontStyle:s.illustration.good.value?"normal":"italic"}}>{s.illustration.good.value||"(blank)"}</div>
                </div>
                <div style={{fontSize:13,color:C.ok,marginTop:6,fontWeight:600}}>↑ {s.illustration.good.caption}</div>
              </div>
            </div>
          )}
          {s.illustration&&s.illustration.type==="checklist"&&(
            <div style={{background:"#fff",borderRadius:12,padding:16,border:"2px solid "+C.brd,marginBottom:16}}>
              {s.illustration.items.map((item,ii)=>(
                <div key={ii} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:ii<s.illustration.items.length-1?"1px solid #eee":"none"}}>
                  <span style={{fontSize:20,flexShrink:0}}>{item.ok?"✅":"❌"}</span>
                  <span style={{fontSize:15,color:"#333",fontWeight:600}}>{item.text}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:12,padding:"16px 24px 28px",maxWidth:600,margin:"0 auto",width:"100%"}}>
          {step>0&&(
            <button onClick={()=>setStep(step-1)} style={{flex:1,padding:"16px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,color:C.lt,fontSize:17,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              ‹ Previous
            </button>
          )}
          <button onClick={()=>{if(step<g.steps.length-1)setStep(step+1);else{setSelGuide(null);setStep(0);}}} className="btn-o" style={{flex:1,padding:"16px 0",background:typeof g.color==="string"?g.color:C.org,border:"none",borderRadius:12,color:"#fff",fontSize:17,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {step<g.steps.length-1?<>Next ›</>:<>Done ✓</>}
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.blu,fontSize:28,cursor:"pointer",padding:"8px 12px",lineHeight:1,borderRadius:8,minWidth:48,minHeight:48,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <MDRLogo size={28}/>
        <span style={{fontWeight:700,fontSize:17}}>Training Center</span>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:"24px"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:56,marginBottom:12}}>🎓</div>
          <div style={{fontSize:26,fontWeight:700,color:C.txt,marginBottom:8}}>Training Center</div>
          <div style={{fontSize:16,color:C.mut,lineHeight:1.5}}>Guides to help you get the most out of My Daily Reports</div>
        </div>
        {GUIDES.map((g,i)=>(
          <button key={i} onClick={()=>{setSelGuide(i);setStep(0);}} style={{width:"100%",display:"flex",alignItems:"center",gap:16,padding:"18px 20px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:16,marginBottom:12,cursor:"pointer",textAlign:"left"}}>
            <div style={{width:56,height:56,borderRadius:14,background:(typeof g.color==="string"?g.color:C.org)+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{g.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:18,fontWeight:700,color:C.txt,marginBottom:4}}>{g.title}</div>
              <div style={{fontSize:15,color:C.mut,lineHeight:1.4}}>{g.sub}</div>
            </div>
            <span style={{color:C.mut,fontSize:18}}>›</span>
          </button>
        ))}
      </div>
    </div>
  );
}

    // Restore navigation state — reopen the job user was on before closing the app
    if(!navRestored){setNavRestored(true);try{const raw=localStorage.getItem("mdr_nav");if(raw){const nav=JSON.parse(raw);if(nav.jobId&&(Date.now()-nav.ts)<24*60*60*1000){const match=a.find(j=>j.id===nav.jobId);if(match)setSelJob(match);}}}catch(e){}}
  }catch(e){console.error(e);}finally{setLoading(false);}};
  const act=jobs.filter(j=>!j.is_archived);

  const dot=(s)=>{if(s==="none")return null;const c=s==="submitted"?C.ok:s==="working"?C.org:"#ef4444";return<div style={{width:10,height:10,borderRadius:"50%",background:c,flexShrink:0}}/>;};

  const doShare=async()=>{const url=window.location.href;if(navigator.share){try{await navigator.share({title:"My Daily Reports",text:"Voice-to-PDF jobsite reports",url});}catch(e){}}else{try{await navigator.clipboard.writeText(url);alert("Link copied!");}catch(e){alert("Could not copy link.");}}};

  if(showAcct)return<AccountSettings user={user} onBack={()=>setShowAcct(false)} onLogout={onLogout}/>;
  if(showNew)return<CreateJob user={user} onBack={()=>setShowNew(false)} onCreated={()=>{setShowNew(false);load();}}/>;

    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>

          <p style={{marginBottom:14}}>My Daily Reports uses AI-powered document parsing to analyze your uploaded templates and detect fillable fields. Each template upload triggers an API call to process your document. To keep the service fast, reliable, and affordable for all users, the following fair use limits apply:</p>
          <p style={{fontWeight:700,color:C.org,marginBottom:8}}>Job Creation Limits</p>

          <p style={{marginBottom:14}}>Creating jobs for real projects you are actively working on, uploading one template per job, adding your actual project team contacts, and using the calendar for legitimate jobsite scheduling. Normal use of the app as described in the Training Center is always within fair use.</p>
          <p style={{fontWeight:700,color:C.org,marginBottom:8}}>What May Trigger a Review</p>

          <p style={{fontWeight:700,color:C.org,marginBottom:8}}>Enforcement</p>

        </div>
      </div>
    </div>
  );

  if(selJob)return(
    <JobDetail job={selJob} user={user} onBack={()=>{setSelJob(null);saveNav(null);load();}} onDeleted={()=>{setSelJob(null);saveNav(null);load();}}/>

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt,position:"relative"}} onClick={e=>{if(showSet&&!e.target.closest('[data-s]'))setShowSet(false);if(showDD&&!e.target.closest('[data-d]'))setShowDD(false);}}>
      {/* ── Header: Dropdown (left) | Logo (center) | Settings (right) ── */}

            <span style={{color:C.mut,fontSize:11,transform:showDD?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span>

        <div style={{display:"flex",alignItems:"center",gap:8,justifySelf:"center"}}>

        <div style={{justifySelf:"end",display:"flex",alignItems:"center",gap:8}}>
          <button onClick={doShare} style={{width:34,height:34,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,color:C.mut}}>↗</button>
          <button onClick={()=>setShowSet(!showSet)} style={{width:34,height:34,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,color:C.mut}}>⚙️</button>

          {act.length===0&&<div style={{padding:16,textAlign:"center",color:C.mut,fontSize:14}}>No active jobs</div>}
          {act.map(j=>{const s=stat(j.id,j.schedule);return(
            <button key={j.id} onClick={()=>{setSelJob(j);setShowDD(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"none",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
              {dot(s)}<div style={{flex:1}}><div style={{fontSize:15,fontWeight:600,color:C.txt}}>{j.name}</div><span style={{fontSize:11,color:C.mut}}>{SL[j.schedule]||j.schedule}</span></div>

          <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.brd}`}}>

          <button onClick={()=>{setShowSet(false);onLogout();}} style={{width:"100%",padding:"12px 16px",background:"none",border:"none",textAlign:"left",color:"#ef4444",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}><span>🚪</span> Sign Out</button>

          const monthLabel=new Date(calYear,calMonth,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
          const firstDay=new Date(calYear,calMonth,1);
          const lastDay=new Date(calYear,calMonth+1,0);
          const startPad=firstDay.getDay();
          const totalDays=lastDay.getDate();
          const cells=[];
          for(let i=0;i<startPad;i++)cells.push(null);
          for(let d=1;d<=totalDays;d++)cells.push(d);

          // Build lookup: date string → array of requests
          const reqsByDay={};
          calRequests.forEach(rq=>{if(!reqsByDay[rq.requested_date])reqsByDay[rq.requested_date]=[];reqsByDay[rq.requested_date].push(rq);});
          // Requests for selected day
          const selDayReqs=selCalDay?reqsByDay[selCalDay]||[]:[];
          const prevMonth=()=>{const m=calMonth-1;if(m<0){setCalYear(calYear-1);setCalMonth(11);}else setCalMonth(m);setSelCalDay(null);};

          return(
            <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,overflow:"hidden",marginBottom:12}}>

                </div>
                {hasScheduling&&(
                  <button onClick={async()=>{const url=calURL;if(navigator.share){try{await navigator.share({title:"Scheduling Calendar",text:"Request a site visit here:",url});}catch(e){}}else{try{await navigator.clipboard.writeText(url);alert("Calendar link copied!");}catch(e){alert(url);}}}} style={{padding:"6px 12px",fontSize:12,fontWeight:700,borderRadius:6,background:C.blu,border:"none",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                    <span>↗</span> Share Calendar
                  </button>
                )}
              </div>
              {/* Day headers */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
                {dayHeaders.map((d,i)=>(
                  <div key={d} style={{padding:"8px 0",textAlign:"center",fontSize:10,fontWeight:700,color:(i===0||i===6)?C.mut+"88":C.mut,textTransform:"uppercase",borderBottom:`1px solid ${C.brd}`}}>{d}</div>
                ))}
              </div>
              {/* Month grid */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
                {cells.map((day,i)=>{
                  if(day===null)return<div key={i} style={{padding:"6px 4px",textAlign:"center"}}/>;
                  const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                  const isToday=ds===todayStr;
                  const isSel=ds===selCalDay;
                  const isWeekend=i%7===0||i%7===6;
                  const dayReqs=reqsByDay[ds]||[];
                  const hasConfirmed=dayReqs.some(r=>r.status==="confirmed");
                  const hasPending=dayReqs.some(r=>r.status==="pending");
                  return(
                    <div key={i} onClick={()=>setSelCalDay(isSel?null:ds)} style={{padding:"4px 2px",textAlign:"center",background:isSel?C.blu+"22":isToday?C.org+"12":"transparent",cursor:"pointer",borderBottom:isSel?`2px solid ${C.blu}`:"2px solid transparent"}}>
                      <div style={{width:28,height:28,borderRadius:"50%",background:isToday&&!isSel?C.org:isSel?C.blu:"transparent",color:(isToday&&!isSel)||isSel?"#fff":isWeekend?C.mut:C.lt,fontWeight:isToday||isSel?700:500,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto"}}>{day}</div>
                      {/* Dots for requests */}
                      <div style={{display:"flex",justifyContent:"center",gap:3,marginTop:2,minHeight:6}}>
                        {hasConfirmed&&<div style={{width:5,height:5,borderRadius:"50%",background:"#22c55e"}}/>}
                        {hasPending&&<div style={{width:5,height:5,borderRadius:"50%",background:C.org}}/>}
                      </div>
                    </div>
                  );
                })}
              </div>
              {/* Selected day details */}
              {selCalDay&&(
                <div style={{borderTop:`1px solid ${C.brd}`,padding:"12px 16px"}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.txt,marginBottom:8}}>{new Date(selCalDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
                  {selDayReqs.length===0?(
                    <div style={{fontSize:12,color:C.mut}}>No scheduling requests for this day.</div>
                  ):(
                    selDayReqs.map(rq=>(
                      <div key={rq.id} style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,padding:12,marginBottom:8,position:"relative"}}>
                        {rq.status==="confirmed"&&<div style={{position:"absolute",top:8,right:10,fontSize:16}}>✅</div>}
                        <div style={{fontSize:13,fontWeight:700,color:C.txt}}>{rq.jobs?.name||"Job"}</div>
                        <div style={{fontSize:12,color:C.lt,marginTop:2}}>{rq.inspection_type||(rq.inspection_types||[])[0]||"General Visit"}{rq.special_type?` — ${rq.special_type}`:""} — {rq.requester_name||rq.submitted_by||""}</div>
                        {rq.inspection_time&&<div style={{fontSize:11,color:C.blu,marginTop:2}}>{(rq.inspection_time+"").substring(0,5)}{rq.duration?` (${rq.duration>=60?rq.duration/60+"hr":rq.duration+"min"})`:""}</div>}
                        <div style={{fontSize:11,color:C.mut,marginTop:2}}>{rq.requester_email}{rq.requester_company?` · ${rq.requester_company}`:""}</div>
                        {rq.inspection_identifier&&<div style={{fontSize:11,color:C.mut,marginTop:2}}>#{rq.inspection_identifier}</div>}
                        {rq.notes&&<div style={{fontSize:11,color:C.mut,marginTop:4,fontStyle:"italic"}}>{rq.notes}</div>}
                        <div style={{display:"flex",gap:8,marginTop:10}}>
                          {rq.status!=="confirmed"&&(
                            <button onClick={async(e)=>{e.stopPropagation();try{
                              await db.updateRequest(rq.id,{status:"confirmed"});
                              // Send confirmation email to requester
                              if(rq.requester_email){
                                const reqDate=new Date(rq.requested_date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
                                const inspectorName=user?.user_metadata?.full_name||user?.email||"Your inspector";
                                fetch(`${SB_URL}/functions/v1/send-report`,{
                                  method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${SB_KEY}`,apikey:SB_KEY},
                                  body:JSON.stringify({to:[rq.requester_email],subject:`Visit Confirmed — ${rq.jobs?.name||"Job"} on ${reqDate}`,
                                    html_body:`<div style="font-family:-apple-system,sans-serif;max-width:600px;margin:0 auto;"><div style="background:#22c55e;padding:20px 24px;border-radius:8px 8px 0 0;"><h1 style="color:#fff;margin:0;font-size:20px;">Visit Confirmed</h1></div><div style="background:#f9f9f9;padding:24px;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 8px 8px;"><p style="color:#333;font-size:16px;line-height:1.6;margin:0 0 8px;">Hi ${rq.requester_name||"there"},</p><p style="color:#333;font-size:15px;line-height:1.6;margin:0 0 16px;">Your scheduling request for <strong>${rq.jobs?.name||"the job"}</strong> has been confirmed by ${inspectorName} for <strong>${reqDate}</strong>.</p><p style="color:#555;font-size:14px;margin:0;">Type: ${rq.inspection_type||"General Visit"}</p></div><p style="color:#999;font-size:11px;text-align:center;margin-top:16px;">Sent via My Daily Reports &bull; mydailyreports.com</p></div>`
                                  })
                                }).catch(emailErr=>console.error("Confirmation email error:",emailErr));
                              }
                              await loadRequests();
                            }catch(er){alert("Error: "+er.message);}}} style={{flex:1,padding:"7px 0",fontSize:12,fontWeight:700,borderRadius:6,background:"#22c55e",border:"none",color:"#fff",cursor:"pointer"}}>
                              ✓ Scheduled
                            </button>
                          )}
                          {rq.status==="confirmed"&&(
                            <button onClick={async(e)=>{e.stopPropagation();try{await db.updateRequest(rq.id,{status:"pending"});await loadRequests();}catch(er){alert("Error: "+er.message);}}} style={{flex:1,padding:"7px 0",fontSize:12,fontWeight:700,borderRadius:6,background:C.org,border:"none",color:"#fff",cursor:"pointer"}}>
                              Unschedule
                            </button>
                          )}
                          <button onClick={async(e)=>{e.stopPropagation();if(!confirm("Delete this request?"))return;try{await db.deleteRequest(rq.id);await loadRequests();}catch(er){alert("Error: "+er.message);}}} style={{padding:"7px 12px",fontSize:12,fontWeight:700,borderRadius:6,background:"transparent",border:`1px solid #ef4444`,color:"#ef4444",cursor:"pointer"}}>
                            Delete
                          </button>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              )}
              {/* Bottom status */}
              {!selCalDay&&(
                <div style={{padding:"12px 16px",borderTop:`1px solid ${C.brd}`}}>
                  {calRequests.length>0?(
                    <div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:4,marginRight:10}}><span style={{width:6,height:6,borderRadius:"50%",background:C.org,display:"inline-block"}}/> Pending</span>
                      <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/> Scheduled</span>
                      <span style={{marginLeft:10}}>· {calRequests.length} request{calRequests.length!==1?"s":""} this month</span>
                    </div>
                  ):hasScheduling?(
                    <div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>No scheduling requests this month. Calendar active for {act.filter(j=>j.scheduling_enabled).length} job{act.filter(j=>j.scheduling_enabled).length!==1?"s":""}.</div>
                  ):(
                    <div style={{fontSize:12,color:C.mut,lineHeight:1.5}}>Enable Jobsite Scheduling on a job to let your GC and subs request site visits through your shared calendar.</div>
                  )}
                </div>
              )}
            </div>
          );
        })()}

        {/* ── Bottom tiles — two column ── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
          <button onClick={()=>setShowArch(true)} style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:14,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,textAlign:"center"}}>
            <div style={{width:40,height:40,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📁</div>
            <div><div style={{fontWeight:600,fontSize:13,color:C.txt}}>Archived Jobs</div>{arch.length>0&&<div style={{fontSize:11,color:C.mut}}>{arch.length} job{arch.length!==1?"s":""}</div>}</div>
          </button>
          <button onClick={()=>setShowTrain(true)} style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:14,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,textAlign:"center"}}>
            <div style={{width:40,height:40,borderRadius:8,background:C.inp,border:`1px solid ${C.brd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🎓</div>
            <div><div style={{fontWeight:600,fontSize:13,color:C.txt}}>Training Center</div><div style={{fontSize:11,color:C.mut}}>Guides & tips</div></div>
          </button>
        </div>
      </div>

      <div style={{textAlign:"center",padding:"24px 20px 32px",color:C.mut,fontSize:12}}>
        <a href="#" onClick={e=>{e.preventDefault();setShowFairUse(true);}} style={{color:C.mut,textDecoration:"none"}}>Fair Use Agreement</a>
        <br/><br/>
        <span style={{color:C.mut,opacity:0.5,cursor:"default"}}>Terms of Service</span>
        <span style={{margin:"0 8px"}}>•</span>
        <span style={{color:C.mut,opacity:0.5,cursor:"default"}}>Privacy Policy</span>
      </div>
    </div>
  );
}

/* ── Setup Wizard (gates dashboard access for new users) ── */
function SetupWizard({user, onComplete}){
  const [step,setStep]=useState(0);
  const [saving,setSaving]=useState(false);
  const [fullName,setFullName]=useState(user?.user_metadata?.full_name||"");
  const [email,setEmail]=useState(user?.email||"");
  const [timezone,setTimezone]=useState(Intl.DateTimeFormat().resolvedOptions().timeZone);
  const [slug,setSlug]=useState(()=>(user?.user_metadata?.full_name||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,""));
  const [readSections,setReadSections]=useState({});
  const [openSections,setOpenSections]=useState({});
  const SECTION_ORDER=["parsing","cleanDoc","notes","photos","bestPractices"];
  const toggleSection=(key)=>{setReadSections(p=>({...p,[key]:true}));setOpenSections(p=>{const wasOpen=p[key];if(wasOpen){const idx=SECTION_ORDER.indexOf(key);const nextKey=idx>=0&&idx<SECTION_ORDER.length-1?SECTION_ORDER[idx+1]:null;const next={};if(nextKey)next[nextKey]=true;return next;}return{[key]:true};});};

  const TZ_OPTIONS=["America/New_York","America/Chicago","America/Denver","America/Phoenix","America/Los_Angeles","America/Anchorage","Pacific/Honolulu"];
  const TZ_LABELS={"America/New_York":"Eastern (ET)","America/Chicago":"Central (CT)","America/Denver":"Mountain (MT)","America/Phoenix":"Arizona (MST)","America/Los_Angeles":"Pacific (PT)","America/Anchorage":"Alaska (AKT)","Pacific/Honolulu":"Hawaii (HT)"};

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const ls={display:"block",color:C.lt,fontSize:13,fontWeight:600,marginBottom:6};
  const cardS={background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:20,marginBottom:16};
  const tipS={background:"rgba(232,116,42,0.08)",border:`1px solid rgba(232,116,42,0.25)`,borderRadius:8,padding:"12px 14px",marginTop:12,fontSize:13,color:C.lt,lineHeight:1.6};

  const WIZARD_STEPS=[
    {title:"Welcome",icon:"👋"},
    {title:"Your Profile",icon:"👤"},
    {title:"How It Works",icon:"📄"},
    {title:"Template Prep",icon:"🔧"},
    {title:"Subscription",icon:"⭐"},
    {title:"Create Account",icon:"🚀"},
  ];

  const allTemplateRead=readSections.parsing&&readSections.cleanDoc&&readSections.notes&&readSections.photos&&readSections.bestPractices;

  const canAdvance=()=>{
    if(step===1)return fullName.trim().length>0&&email.trim().includes("@")&&slug.trim().length>0;
    if(step===3)return allTemplateRead;
    return true;
  };

  const saveProfileAndFinish=async()=>{
    setSaving(true);
    try{
      let baseSlug=slug.trim()||fullName.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
      let slugVal=baseSlug;
      let attempt=0;
      // Try saving — if slug conflict, append -2, -3, etc.
      while(true){
        try{
          await db.upsertProfile({id:user.id,full_name:fullName.trim(),timezone,slug:slugVal});
          break;
        }catch(e){
          const msg=(e.message||"").toLowerCase();
          if(msg.includes("slug")&&(msg.includes("unique")||msg.includes("duplicate"))){
            attempt++;
            slugVal=baseSlug+"-"+(attempt+1);
            if(attempt>20)throw new Error("Could not generate a unique URL. Try a different display name.");
          }else{
            throw e;
          }
        }
      }
      setSlug(slugVal);
      try{await db.upsertProfile({id:user.id,setup_complete:true,wizard_completed_at:new Date().toISOString()});}catch(_){}
      onComplete();
    }catch(e){alert("Error saving profile: "+e.message);}
    finally{setSaving(false);}
  };

  const next=()=>{if(step<WIZARD_STEPS.length-1)setStep(step+1);};
  const prev=()=>{if(step>0)setStep(step-1);};
  const pct=Math.round((step/(WIZARD_STEPS.length-1))*100);

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <MDRLogo size={30}/>
        <span style={{fontWeight:700,fontSize:16,flex:1}}>Setup Wizard</span>
        <span style={{fontSize:12,color:C.mut,fontWeight:600}}>Step {step+1} of {WIZARD_STEPS.length}</span>
      </div>
      <div style={{height:3,background:C.brd}}><div style={{height:3,background:C.org,width:pct+"%",transition:"width 0.3s ease"}}/></div>

      <div style={{maxWidth:560,margin:"0 auto",padding:"20px 16px 40px"}}>

        {/* ── Step 0: Welcome ── */}
        {step===0&&(
          <div>
            <div style={{textAlign:"center",padding:"30px 0 20px"}}>
              <MDRLogo size={72}/>
              <h1 style={{fontSize:24,fontWeight:800,marginTop:16,marginBottom:8}}>Welcome to My Daily Reports</h1>
              <p style={{fontSize:15,color:C.lt,lineHeight:1.6,maxWidth:400,margin:"0 auto"}}>Give us about 5 minutes to learn how to set up your first report template. Do it once, and you'll never have to do it again.</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {WIZARD_STEPS.slice(1).map((s,i)=>(
                <button key={i} onClick={next} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,cursor:"pointer",textAlign:"left"}}>
                  <span style={{fontSize:20}}>{s.icon}</span>
                  <span style={{fontSize:15,fontWeight:600,color:C.txt,flex:1}}>{s.title}</span>
                  <span style={{color:C.mut,fontSize:14}}>›</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ── Step 1: Profile Setup ── */}
        {step===1&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>👤 Your Profile</h2>
            <div style={cardS}>
              <div style={{marginBottom:18}}>
                <label style={ls}>Full Name</label>
                <input type="text" value={fullName} onChange={e=>setFullName(e.target.value)} placeholder="Jesse Saltzman" style={fs}/>
                <div style={{fontSize:11,color:C.mut,marginTop:4}}>Appears on reports and your scheduling page.</div>
              </div>
              <div style={{marginBottom:18}}>
                <label style={ls}>Email Address</label>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@company.com" style={fs}/>
                <div style={{fontSize:11,color:C.mut,marginTop:4}}>Used for sign-in and report delivery notifications.</div>
              </div>
              <div style={{marginBottom:18}}>
                <label style={ls}>Timezone</label>
                <select value={timezone} onChange={e=>setTimezone(e.target.value)} style={{...fs,cursor:"pointer"}}>
                  {TZ_OPTIONS.map(tz=><option key={tz} value={tz}>{TZ_LABELS[tz]||tz}</option>)}
                </select>
              </div>
              <div>
                <label style={ls}>Calendar Display Name</label>
                <input type="text" value={slug} onChange={e=>setSlug(e.target.value.toLowerCase().replace(/[^a-z0-9-]/g,""))} placeholder="jesse-saltzman" style={fs}/>
                <div style={{fontSize:12,color:C.blu,marginTop:6,fontWeight:600}}>schedule.mydailyreports.org/{slug||"your-name"}</div>
              </div>
            </div>
          </div>
        )}

        {/* ── Step 2: How It Works ── */}
        {step===2&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>📄 How It Works</h2>
            <div style={cardS}>
              <p style={{fontSize:14,color:C.lt,lineHeight:1.6,marginBottom:14}}>Upload your existing report template and our AI detects all the fields. You then mark each field as one of four types:</p>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                {[
                  {icon:"✏️",name:"Edit",desc:"Fill in daily — notes, weather, hours"},
                  {icon:"🔒",name:"Lock",desc:"Never changes — project name, contractor"},
                  {icon:"📅",name:"Auto-Date",desc:"Today's date, auto-filled"},
                  {icon:"🔢",name:"Auto-Number",desc:"Sequential report number"},
                ].map((f,i)=>(
                  <div key={i} style={{display:"flex",gap:10,padding:"10px 12px",background:C.inp,borderRadius:8,border:`1px solid ${C.brd}`}}>
                    <span style={{fontSize:16,flexShrink:0}}>{f.icon}</span>
                    <div><span style={{fontWeight:700,fontSize:13,color:C.txt}}>{f.name}</span> <span style={{fontSize:12,color:C.mut}}>— {f.desc}</span></div>
                  </div>
                ))}
              </div>
              <p style={{fontSize:13,color:C.mut,lineHeight:1.5}}>Set up once per job, then every report auto-fills locked fields and gives you blank editable fields to complete.</p>
            </div>
            <div style={cardS}>
              <div style={{fontSize:14,fontWeight:700,color:C.org,marginBottom:8}}>Report Generation</div>
              <p style={{fontSize:13,color:C.lt,lineHeight:1.6}}>The submit button generates a PDF using your original template with your daily entries overlaid. Notes appear in your notes area. Photos get added on additional pages.</p>
            </div>
            <div style={{fontSize:12,color:C.mut,textAlign:"center",marginTop:4}}>For detailed walkthroughs, visit the Training Center on the dashboard.</div>
          </div>
        )}

        {/* ── Step 3: Template Preparation ── */}
        {step===3&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>🔧 Template Preparation</h2>
            <p style={{fontSize:13,color:C.mut,marginBottom:16}}>Tap each section to review. All 5 required before continuing.</p>

            {[
              {key:"parsing",icon:"🔍",title:"How It Reads Your Template",bullets:[
                "Our AI scans your document and finds each field automatically (Date, Project Name, Notes, etc.)",
                "It figures out which fields change daily (like Date and Notes) and which stay the same (like Project Name)",
                "Your fields will show up in a simple list where you can review and adjust them",
              ]},
              {key:"cleanDoc",icon:"🧹",title:"Preparing Your Template",bullets:[
                "Make sure each field has a clear label like \"Project Name:\" or \"Date:\"",
                "Remove any extra text or overlapping boxes that might confuse the scanner",
                "The cleaner your template, the better the results",
              ]},
              {key:"notes",icon:"📝",title:"Notes Section Setup",bullets:[
                "Label your notes area clearly — \"IOR Notes:\" or \"Observations:\"",
                "Leave the notes area blank in your template so there's room to write",
                "Your notes will appear as bullet points on the final report",
              ]},
              {key:"photos",icon:"📸",title:"Photo System",bullets:[
                "Photos get added on new pages after your main report",
                "Each photo page keeps your company header and footer",
                "Upload a single-page template — remove any blank extra pages first",
              ]},
              {key:"bestPractices",icon:"📐",title:"Best Practices",bullets:[
                "Single-page PDF or Word document recommended",
                "Standard letter size (8.5\" x 11\") works best",
                "Use clear field labels, not just empty boxes",
                "One template per job — reused for every report",
              ]},
            ].map(section=>{
              const wasRead=readSections[section.key];
              const isOpen=openSections[section.key];
              return(
                <div key={section.key} style={{background:C.card,border:`1px solid ${wasRead?C.org+"60":C.brd}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
                  <button onClick={()=>toggleSection(section.key)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:16}}>{section.icon}</span>
                    <span style={{flex:1,fontSize:14,fontWeight:700,color:C.txt}}>{section.title}</span>
                    {wasRead&&!isOpen?<span style={{color:C.ok,fontSize:14,fontWeight:700}}>✓</span>:isOpen?<span style={{color:C.mut,fontSize:12}}>▲</span>:<span style={{color:C.mut,fontSize:12}}>▼</span>}
                  </button>
                  {isOpen&&(
                    <div style={{padding:"0 14px 12px",borderTop:`1px solid ${C.brd}`}}>
                      <div style={{paddingTop:10}}>
                        {section.bullets.map((b,i)=>(
                          <div key={i} style={{display:"flex",gap:8,marginBottom:4,fontSize:13,color:C.lt,lineHeight:1.5}}>
                            <span style={{color:C.org,flexShrink:0}}>•</span><span>{b}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

            {!allTemplateRead&&(
              <div style={{fontSize:12,color:C.mut,textAlign:"center",marginTop:6}}>

        {/* ── Step 4: Subscription ── */}
        {step===4&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>⭐ Subscription</h2>
            <div style={{...cardS,textAlign:"center",padding:"24px 20px"}}>

              </div>
              <p style={{fontSize:13,color:C.lt}}>All features included. No payment required yet.</p>
            </div>
            <div style={{background:"rgba(90,143,192,0.08)",border:`1px solid rgba(90,143,192,0.25)`,borderRadius:10,padding:14}}>
              <div style={{fontSize:13,fontWeight:700,color:C.blu,marginBottom:6}}>Coming Soon — $19.99/mo</div>
              <p style={{fontSize:12,color:C.mut}}>You'll be notified before any charges begin.</p>
            </div>
          </div>
        )}

        {/* ── Step 5: You're Ready ── */}
        {step===5&&(
          <div>
            <div style={{textAlign:"center",padding:"30px 0 20px"}}>
              <div style={{fontSize:56,marginBottom:16}}>🚀</div>
              <h2 style={{fontSize:22,fontWeight:800,marginBottom:8}}>Almost There!</h2>

          )}
          {step<WIZARD_STEPS.length-1?(
            <button onClick={next} disabled={!canAdvance()} className="btn-o" style={{flex:step===0?1:2,padding:"14px 0",background:canAdvance()?C.org:C.inp,border:canAdvance()?`1px solid ${C.org}`:`1px solid ${C.brd}`,borderRadius:10,color:canAdvance()?"#fff":C.mut,fontSize:15,fontWeight:700,cursor:canAdvance()?"pointer":"default",opacity:canAdvance()?1:0.5}}>

            {todayRpt?(todayRpt.status==="submitted"?"Edit Submitted Report":"Continue Editing"):reportStarted?"Continue Editing":"Start Today's Report"}
          </button>
        </div>

        {/* ── Photo Gallery ── */}
        <Folder icon="📷" label="Photos" count={0} color={C.blu} open={showPhotos} setOpen={setShowPhotos}>
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:36,marginBottom:8}}>📷</div>
            <p style={{fontSize:14,fontWeight:600,color:C.lt,marginBottom:4}}>Job Photo Gallery</p>
            <p style={{fontSize:12,color:C.mut,marginBottom:14}}>Store photos for this job to use in future reports</p>
            <button onClick={()=>showToast("Photo gallery coming soon!")} className="btn-o" style={{padding:"10px 24px",background:C.org,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>Take or Upload Photo</button>
          </div>
        </Folder>

        {/* ── Working Copies Folder ── */}
        <Folder icon="📋" label="Working Copies" count={working.length} color={C.org} open={showWorking} setOpen={setShowWorking}>
          {working.length===0?(
            <div style={{textAlign:"center",padding:"16px 0",color:C.mut,fontSize:13}}>No drafts — tap "Start Today's Report" above</div>
          ):(
            working.map((r,i)=>{const rptName=buildReportName(r.report_number||1,r.report_date);return(
              <div key={r.id} style={{display:"flex",alignItems:"center",borderBottom:i<working.length-1?`1px solid ${C.brd}`:"none"}}>
                <button onClick={()=>openReport(r.report_date)} style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:C.org,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:C.lt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rptName}</div>
                    <div style={{fontSize:12,color:C.mut,marginTop:2}}>{new Date(r.report_date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",timeZone:tz})} — Last edited {r.updated_at?new Date(r.updated_at).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:tz}):""}</div>
                  </div>

                const lockF=fieldEditFields.filter(f=>f.mode==="lock").map(f=>({name:f.name,value:f.value||"",...coords(f)}));
                const autoF=fieldEditFields.filter(f=>f.mode==="auto-date"||f.mode==="auto-num").map(f=>({name:f.name,value:f.value||"",originalValue:f.value||"",autoFill:f.mode==="auto-date"?"date":"increment",...coords(f)}));
                const newConfig={editable:[...editF,...autoF],locked:lockF};
                await db.updateJobFieldConfig(job.id,newConfig);
                job.field_config=newConfig;

              }catch(e){showToast("Save failed — try again");}

              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>📦</span><span style={{fontSize:14,fontWeight:600,color:C.lt}}>{job.is_archived?"Restore from Archive":"Archive This Job"}</span>
              </div>
            </button>
            <div style={{padding:"14px 18px",borderTop:`1px solid #5c2023`}}>
              {!showDel?(
                <button onClick={()=>setShowDel(true)} style={{width:"100%",padding:"10px 16px",background:"transparent",border:"1px solid #5c2023",borderRadius:8,color:C.err,fontSize:13,fontWeight:600,cursor:"pointer"}}>Delete This Job</button>
              ):(
                <div>
                  <p style={{fontSize:12,color:C.err,lineHeight:1.5,marginBottom:10}}>Permanently delete "{job.name}" and all its reports, templates, and data. Cannot be undone.</p>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setShowDel(false)} style={{flex:1,padding:"10px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:8,color:C.lt,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                    <button onClick={doDelete} disabled={deleting} style={{flex:1,padding:"10px 0",background:"#ef4444",border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:deleting?"default":"pointer",opacity:deleting?0.6:1}}>
                      {deleting?"Deleting...":"Delete Permanently"}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function TrainingCenter({onBack}){
  const [selGuide,setSelGuide]=useState(null);
  const [step,setStep]=useState(0);

  if(selGuide!==null){
    const g=GUIDES[selGuide];
    const s=g.steps[step];
    return(
      <div style={{minHeight:"100vh",background:C.bg,color:C.txt,display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
          <button onClick={()=>{setSelGuide(null);setStep(0);}} style={{background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:22,cursor:"pointer",lineHeight:1,width:48,height:48,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
          <span style={{fontWeight:700,fontSize:17,flex:1}}>{g.title}</span>
        </div>
        <div style={{display:"flex",gap:4,padding:"16px 20px 8px"}}>
          {g.steps.map((_,i)=>(
            <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?(typeof g.color==="string"?g.color:C.org):C.brd,transition:"background 0.3s"}}/>
          ))}
        </div>
        <div style={{textAlign:"center",fontSize:13,fontWeight:600,color:C.mut,marginBottom:16}}>Step {step+1} of {g.steps.length}</div>
        <div style={{flex:1,overflowY:"auto",padding:"0 24px 24px",maxWidth:600,margin:"0 auto",width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:24}}>
            <div style={{width:90,height:90,borderRadius:"50%",background:(typeof g.color==="string"?g.color:C.org)+"22",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",fontSize:42}}>{s.icon}</div>
            <div style={{fontSize:26,fontWeight:700,color:C.txt,marginBottom:12}}>{s.title}</div>
          </div>
          <div style={{fontSize:18,color:C.lt,lineHeight:1.8,marginBottom:20}}>{s.body}</div>

                  {r.note&&<div style={{fontSize:13,color:C.org,fontWeight:600,paddingLeft:4,display:"flex",alignItems:"center",gap:6}}>↑ {r.note}</div>}

            </div>
          )}
          {s.illustration&&s.illustration.type==="compare"&&(
            <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
              <div style={{background:"#fff",borderRadius:12,padding:14,border:"2px solid #ef4444"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#ef4444",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>✕ DON'T</div>
                <div style={{display:"flex",alignItems:"center",border:"1px solid #ccc",borderRadius:6,overflow:"hidden"}}>
                  <div style={{padding:"10px 12px",background:"#f5f5f5",fontWeight:700,fontSize:14,color:"#333",whiteSpace:"nowrap",borderRight:"1px solid #ccc"}}>{s.illustration.bad.label}</div>
                  <div style={{padding:"10px 12px",flex:1,fontSize:14,color:"#333"}}>{s.illustration.bad.value}</div>
                </div>
                <div style={{fontSize:13,color:"#ef4444",marginTop:6,fontWeight:600}}>↑ {s.illustration.bad.caption}</div>
              </div>
              <div style={{background:"#fff",borderRadius:12,padding:14,border:"2px solid "+C.ok}}>
                <div style={{fontSize:12,fontWeight:700,color:C.ok,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>✓ DO</div>
                <div style={{display:"flex",alignItems:"center",border:"1px solid #ccc",borderRadius:6,overflow:"hidden"}}>
                  <div style={{padding:"10px 12px",background:"#f5f5f5",fontWeight:700,fontSize:14,color:"#333",whiteSpace:"nowrap",borderRight:"1px solid #ccc"}}>{s.illustration.good.label}</div>
                  <div style={{padding:"10px 12px",flex:1,fontSize:14,color:s.illustration.good.value?"#333":"#bbb",fontStyle:s.illustration.good.value?"normal":"italic"}}>{s.illustration.good.value||"(blank)"}</div>
                </div>
                <div style={{fontSize:13,color:C.ok,marginTop:6,fontWeight:600}}>↑ {s.illustration.good.caption}</div>
              </div>
            </div>
          )}
          {s.illustration&&s.illustration.type==="checklist"&&(
            <div style={{background:"#fff",borderRadius:12,padding:16,border:"2px solid "+C.brd,marginBottom:16}}>
              {s.illustration.items.map((item,ii)=>(
                <div key={ii} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:ii<s.illustration.items.length-1?"1px solid #eee":"none"}}>
                  <span style={{fontSize:20,flexShrink:0}}>{item.ok?"✅":"❌"}</span>
                  <span style={{fontSize:15,color:"#333",fontWeight:600}}>{item.text}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:12,padding:"16px 24px 28px",maxWidth:600,margin:"0 auto",width:"100%"}}>
          {step>0&&(
            <button onClick={()=>setStep(step-1)} style={{flex:1,padding:"16px 0",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,color:C.lt,fontSize:17,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              ‹ Previous
            </button>
          )}
          <button onClick={()=>{if(step<g.steps.length-1)setStep(step+1);else{setSelGuide(null);setStep(0);}}} className="btn-o" style={{flex:1,padding:"16px 0",background:typeof g.color==="string"?g.color:C.org,border:"none",borderRadius:12,color:"#fff",fontSize:17,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {step<g.steps.length-1?<>Next ›</>:<>Done ✓</>}
          </button>
        </div>
      </div>
    );
  }

  return(
    <div className="page-in" style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      <div style={{borderBottom:`1px solid ${C.brd}`,background:C.card,padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,maxWidth:600,margin:"0 auto"}}>

          <div style={{fontSize:16,color:C.mut,lineHeight:1.5}}>Guides to help you get the most out of My Daily Reports</div>
        </div>
        {GUIDES.map((g,i)=>(
          <button key={i} onClick={()=>{setSelGuide(i);setStep(0);}} style={{width:"100%",display:"flex",alignItems:"center",gap:16,padding:"18px 20px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:16,marginBottom:12,cursor:"pointer",textAlign:"left"}}>

function Dashboard({user, onLogout}){
  const [dashToast,setDashToast]=useState("");
  const showToast=(m)=>{setDashToast(m);setTimeout(()=>setDashToast(""),3000);};
  const [jobs,setJobs]=useState([]);
  const [rpts,setRpts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selJob,setSelJob]=useState(null);
  const [showSet,setShowSet]=useState(false);
  const [showNew,setShowNew]=useState(false);
  const [showDD,setShowDD]=useState(false);
  const [showArch,setShowArch]=useState(false);
  const [showAcct,setShowAcct]=useState(false);
  const [showTrain,setShowTrain]=useState(false);
  const [showFairUse,setShowFairUse]=useState(false);
  const [showTos,setShowTos]=useState(false);
  const [showPriv,setShowPriv]=useState(false);
  const [profileSlug,setProfileSlug]=useState("");
  const [calRequests,setCalRequests]=useState([]);
  const [selCalDay,setSelCalDay]=useState(null);
  const [calYear,setCalYear]=useState(new Date().getFullYear());
  const [calMonth,setCalMonth]=useState(new Date().getMonth());
  const [editReq,setEditReq]=useState(null);
  const [showSubDash,setShowSubDash]=useState(false);
  const [shareCopied,setShareCopied]=useState(false);
  const [navRestored,setNavRestored]=useState(false);
  const [dashLogoUrl,setDashLogoUrl]=useState(null);
  const [subStatus,setSubStatus]=useState("loading"); // loading, trialing, active, expired, past_due, cancelled, trial_abused
  const [trialEndsAt,setTrialEndsAt]=useState(null);
  const [subPlan,setSubPlan]=useState("");
  const [showPaywall,setShowPaywall]=useState(false);

  // Persist navigation state — saves selected job ID so user returns to where they were
  const saveNav=(jobId)=>{try{localStorage.setItem("mdr_nav",JSON.stringify({jobId:jobId||null,ts:Date.now()}));}catch(e){}};
  // When selJob changes, persist it
  useEffect(()=>{if(navRestored)saveNav(selJob?.id||null);},[selJob,navRestored]);

  useEffect(()=>{load();},[]);
  useEffect(()=>{loadRequests();},[calYear,calMonth]);
  const loadRequests=async()=>{
    try{
      const start=`${calYear}-${String(calMonth+1).padStart(2,"0")}-01`;
      const lastD=new Date(calYear,calMonth+1,0).getDate();
      const end=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(lastD).padStart(2,"0")}`;
      const reqs=await db.getRequests(user.id,start,end);
      setCalRequests(reqs);
    }catch(e){console.error(e);}
  };
  // Quick refresh — only update report statuses (used on back navigation to avoid full reload)
  const refreshStatuses=async()=>{try{const ids=jobs.filter(j=>!j.is_archived).map(j=>j.id);if(ids.length)setRpts(await db.todayRpts(ids));}catch(e){}};
  const load=async()=>{setLoading(true);try{const a=await db.jobs(user.id);setJobs(a);const ids=a.filter(j=>!j.is_archived).map(j=>j.id);if(ids.length)setRpts(await db.todayRpts(ids));const p=await db.getProfile(user.id);if(p?.slug)setProfileSlug(p.slug);if(p?.company_id){db.getCompanyLogoUrl(p.company_id).then(url=>{if(url)setDashLogoUrl(url);}).catch(()=>{});}
    // Check subscription status
    if(p){
      const ss=p.subscription_status||"trialing";
      setSubStatus(ss);
      setSubPlan(p.subscription_plan||"");
      if(p.trial_ends_at)setTrialEndsAt(new Date(p.trial_ends_at));
      // Check if trial has expired
      if(ss==="trialing"&&p.trial_ends_at&&new Date(p.trial_ends_at)<new Date()){
        setSubStatus("expired");
      }
    }
    await loadRequests();
    // Restore navigation state — reopen the job user was on before closing the app
    if(!navRestored){setNavRestored(true);try{const raw=localStorage.getItem("mdr_nav");if(raw){const nav=JSON.parse(raw);if(nav.jobId&&(Date.now()-nav.ts)<24*60*60*1000){const match=a.find(j=>j.id===nav.jobId);if(match)setSelJob(match);}}}catch(e){}}
  }catch(e){console.error(e);}finally{setLoading(false);}};
  const act=jobs.filter(j=>!j.is_archived);
  const arch=jobs.filter(j=>j.is_archived);

  const recentIds=getRecentJobIds();
  const sortedAct=[...act].sort((a,b)=>{const ai=recentIds.indexOf(a.id);const bi=recentIds.indexOf(b.id);if(ai===-1&&bi===-1)return 0;if(ai===-1)return 1;if(bi===-1)return -1;return ai-bi;});
  const visibleJobs=sortedAct.slice(0,4);

/* ── Setup Wizard (gates dashboard access for new users) ── */
function SetupWizard({user, inviteCompany, onComplete}){
  const [swToast,setSwToast]=useState("");
  const showToast=(m)=>{setSwToast(m);setTimeout(()=>setSwToast(""),3000);};
  const [step,setStep]=useState(0);
  const [saving,setSaving]=useState(false);
  const [fullName,setFullName]=useState(user?.user_metadata?.full_name||"");
  const [companyName,setCompanyName]=useState(inviteCompany||"");
  const [email,setEmail]=useState(user?.email||"");
  const [timezone,setTimezone]=useState(Intl.DateTimeFormat().resolvedOptions().timeZone);
  const [slug,setSlug]=useState(()=>(user?.user_metadata?.full_name||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,""));
  const [readSections,setReadSections]=useState({});
  const [openSections,setOpenSections]=useState({});
  // Company detection state
  const [companyMatches,setCompanyMatches]=useState([]);
  const [selectedCompany,setSelectedCompany]=useState(null); // {id,name} if user chose to join
  const [companySearching,setCompanySearching]=useState(false);
  const companyDebounce=useRef(null);
  // Auto-search company if invite link provided
  useEffect(()=>{if(inviteCompany&&inviteCompany.trim().length>=2)handleCompanyNameChange(inviteCompany);},[]);
  const SECTION_ORDER=["parsing","cleanDoc","notes","photos","bestPractices"];
  const toggleSection=(key)=>{setReadSections(p=>({...p,[key]:true}));setOpenSections(p=>{const wasOpen=p[key];if(wasOpen){const idx=SECTION_ORDER.indexOf(key);const nextKey=idx>=0&&idx<SECTION_ORDER.length-1?SECTION_ORDER[idx+1]:null;const next={};if(nextKey)next[nextKey]=true;return next;}return{[key]:true};});};

  // Company name search — debounced lookup as user types
  const handleCompanyNameChange=(val)=>{
    setCompanyName(val);
    setSelectedCompany(null); // reset selection when typing
    if(companyDebounce.current)clearTimeout(companyDebounce.current);
    if(val.trim().length<2){setCompanyMatches([]);return;}
    companyDebounce.current=setTimeout(async()=>{
      setCompanySearching(true);
      try{
        const matches=await db.searchCompanies(val.trim());
        // Don't show the user's own company (shouldn't exist yet for new signup, but safety)
        setCompanyMatches(matches.filter(m=>m.created_by!==user?.id));
      }catch(e){setCompanyMatches([]);}
      finally{setCompanySearching(false);}
    },400);
  };

  const joinCompany=(company)=>{
    setSelectedCompany(company);
    setCompanyName(company.name); // set the input to the exact company name
    setCompanyMatches([]); // close dropdown
  };

  const clearCompanySelection=()=>{
    setSelectedCompany(null);
  };

  const TZ_OPTIONS=["America/New_York","America/Chicago","America/Denver","America/Phoenix","America/Los_Angeles","America/Anchorage","Pacific/Honolulu"];
  const TZ_LABELS={"America/New_York":"Eastern (ET)","America/Chicago":"Central (CT)","America/Denver":"Mountain (MT)","America/Phoenix":"Arizona (MST)","America/Los_Angeles":"Pacific (PT)","America/Anchorage":"Alaska (AKT)","Pacific/Honolulu":"Hawaii (HT)"};

  const fs={width:"100%",padding:"12px 14px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};
  const ls={display:"block",color:C.lt,fontSize:13,fontWeight:600,marginBottom:6};
  const cardS={background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,padding:20,marginBottom:16};
  const tipS={background:"rgba(232,116,42,0.08)",border:`1px solid rgba(232,116,42,0.25)`,borderRadius:8,padding:"12px 14px",marginTop:12,fontSize:13,color:C.lt,lineHeight:1.6};

  const WIZARD_STEPS=[
    {title:"Welcome",icon:"✓"},
    {title:"Your Profile",icon:"—"},
    {title:"How It Works",icon:"—"},
    {title:"Template Prep",icon:"—"},
    {title:"Subscription",icon:"—"},
    {title:"Create Account",icon:"→"},
  ];

  const allTemplateRead=readSections.parsing&&readSections.cleanDoc&&readSections.notes&&readSections.photos&&readSections.bestPractices;

  const canAdvance=()=>{
    if(step===1)return fullName.trim().length>0&&email.trim().includes("@")&&slug.trim().length>0;
    if(step===3)return allTemplateRead;
    return true;
  };

  const saveProfileAndFinish=async()=>{
    setSaving(true);
    try{
      let baseSlug=slug.trim()||fullName.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
      let slugVal=baseSlug;
      let attempt=0;

      // Handle company: use assign_company DB function (lookup → fuzzy match → create)
      let companyId=null;
      if(companyName.trim()){
        try{
          companyId=await db.assignCompany(user.id,companyName.trim());
          // Copy company templates to user's saved templates
          if(companyId){
            try{await db.copyCompanyTemplatesDB(user.id,companyId);}catch(e){
              console.error("Template copy RPC:",e);
              // Fallback: fetch company templates and copy manually
              try{const cts=await db.getCompanyTemplates(companyId);if(cts.length)await db.copyCompanyTemplatesToUser(cts,user.id);}catch(e2){console.error("Template copy fallback:",e2);}
            }
          }
        }catch(e){
          console.error("assign_company:",e);
          // Company is optional — continue without if it fails
        }
      }

      // Try saving — if slug conflict, append -2, -3, etc.
      while(true){
        try{
          await db.upsertProfile({id:user.id,full_name:fullName.trim(),company_name:companyName.trim()||null,company_id:companyId,timezone,slug:slugVal});
          break;
        }catch(e){
          const msg=(e.message||"").toLowerCase();
          if(msg.includes("slug")&&(msg.includes("unique")||msg.includes("duplicate"))){
            attempt++;
            slugVal=baseSlug+"-"+(attempt+1);
            if(attempt>20)throw new Error("Could not generate a unique URL. Try a different display name.");
          }else{
            throw e;
          }
        }
      }
      setSlug(slugVal);

      // Mark wizard complete
      try{await db.upsertProfile({id:user.id,setup_complete:true,wizard_completed_at:new Date().toISOString()});}catch(_){}
      onComplete();
    }catch(e){showToast("Save failed — try again");}
    finally{setSaving(false);}
  };

  const next=()=>{if(step<WIZARD_STEPS.length-1)setStep(step+1);};
  const prev=()=>{if(step>0)setStep(step-1);};
  const pct=Math.round((step/(WIZARD_STEPS.length-1))*100);

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.txt}}>
      {swToast&&<div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:"#333",color:"#fff",padding:"10px 20px",borderRadius:8,fontSize:13,zIndex:99999}}>{swToast}</div>}
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 20px",borderBottom:`1px solid ${C.brd}`,background:C.card}}>
        <MDRLogo size={30}/>
        <span style={{fontWeight:700,fontSize:16,flex:1}}>Setup Wizard</span>
        <span style={{fontSize:12,color:C.mut,fontWeight:600}}>Step {step+1} of {WIZARD_STEPS.length}</span>
      </div>
      <div style={{height:3,background:C.brd}}><div style={{height:3,background:C.org,width:pct+"%",transition:"width 0.3s ease"}}/></div>

      <div style={{maxWidth:560,margin:"0 auto",padding:"20px 16px 40px"}}>

        {/* ── Step 0: Welcome ── */}
        {step===0&&(
          <div>
            <div style={{textAlign:"center",padding:"30px 0 20px"}}>
              <MDRLogo size={72}/>
              <h1 style={{fontSize:24,fontWeight:800,marginTop:16,marginBottom:8}}>Welcome to My Daily Reports</h1>
              <p style={{fontSize:15,color:C.lt,lineHeight:1.6,maxWidth:400,margin:"0 auto"}}>Give us about 5 minutes to learn how to set up your first report template. Do it once, and you'll never have to do it again.</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {WIZARD_STEPS.slice(1).map((s,i)=>(
                <button key={i} onClick={next} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,cursor:"pointer",textAlign:"left"}}>
                  <span style={{fontSize:20}}>{s.icon}</span>
                  <span style={{fontSize:15,fontWeight:600,color:C.txt,flex:1}}>{s.title}</span>
                  <span style={{color:C.mut,fontSize:14}}>›</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ── Step 1: Profile Setup ── */}
        {step===1&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>Your Profile</h2>
            <div style={cardS}>
              <div style={{marginBottom:18}}>
                <label style={ls}>Full Name</label>
                <input type="text" value={fullName} onChange={e=>setFullName(e.target.value)} placeholder="Jesse Saltzman" style={fs}/>
                <div style={{fontSize:11,color:C.mut,marginTop:4}}>Appears on reports and your scheduling page.</div>
              </div>
              <div style={{marginBottom:18,position:"relative"}}>
                <label style={ls}>Company Name</label>
                <input type="text" value={companyName} onChange={e=>handleCompanyNameChange(e.target.value)} placeholder="e.g. ABC Construction" style={fs}/>
                {/* Company match dropdown */}
                {companyMatches.length>0&&!selectedCompany&&(
                  <div style={{position:"absolute",left:0,right:0,top:"100%",zIndex:50,background:C.card,border:`1px solid ${C.brd}`,borderRadius:10,marginTop:4,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,0.15)"}}>
                    <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.brd}`,fontSize:12,color:C.mut,fontWeight:600}}>Existing company found — want to join?</div>
                    {companyMatches.map(m=>(
                      <button key={m.id} onClick={()=>joinCompany(m)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 14px",background:"transparent",border:"none",borderBottom:`1px solid ${C.brd}`,cursor:"pointer",textAlign:"left"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{m.name}</div>
                          <div style={{fontSize:11,color:C.mut}}>Tap to join and access their templates</div>
                        </div>
                        <span style={{color:C.org,fontSize:13,fontWeight:600}}>Join</span>
                      </button>
                    ))}
                    <button onClick={()=>setCompanyMatches([])} style={{width:"100%",padding:"10px 14px",background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:C.mut,textAlign:"center"}}>
                      No, create a new company with this name
                    </button>
                  </div>
                )}
                {/* Selected company badge */}
                {selectedCompany&&(
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,padding:"8px 12px",background:"rgba(232,116,42,0.08)",border:`1px solid rgba(232,116,42,0.25)`,borderRadius:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:C.txt}}>Joining {selectedCompany.name}</div>
                      <div style={{fontSize:11,color:C.mut}}>You'll get access to their report templates</div>
                    </div>
                    <button onClick={clearCompanySelection} style={{background:"none",border:"none",color:C.mut,cursor:"pointer",fontSize:16,padding:"0 4px"}}>✕</button>
                  </div>
                )}
                {!selectedCompany&&<div style={{fontSize:11,color:C.mut,marginTop:4}}>Emails will appear as: <strong style={{color:C.txt}}>{companyName||"Your Company"} &lt;reports@mydailyreports.org&gt;</strong></div>}
                {!selectedCompany&&<div style={{fontSize:11,color:C.mut,marginTop:2}}>Set this once — it's how your name shows in your recipients' inbox.</div>}
              </div>
              <div style={{marginBottom:18}}>
                <label style={ls}>Email Address</label>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@company.com" style={fs}/>
                <div style={{fontSize:11,color:C.mut,marginTop:4}}>Used for sign-in and report delivery notifications.</div>
              </div>
              <div style={{marginBottom:18}}>
                <label style={ls}>Timezone</label>

              </div>

          </div>

        {/* ── Step 2: How It Works ── */}

                    <div><span style={{fontWeight:700,fontSize:13,color:C.txt}}>{f.name}</span> <span style={{fontSize:12,color:C.mut}}>— {f.desc}</span></div>

            <div style={{fontSize:12,color:C.mut,textAlign:"center",marginTop:4}}>For detailed walkthroughs, visit the Training Center on the dashboard.</div>
          </div>
        )}

        {/* ── Step 3: Template Preparation ── */}
        {step===3&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:4}}>Template Preparation</h2>
            <p style={{fontSize:13,color:C.mut,marginBottom:16}}>Tap each section to review. All 5 required before continuing.</p>

            {[
              {key:"parsing",icon:"🔍",title:"What Happens When You Upload",bullets:[
                "We make a copy of your PDF and scan it for fields (Date, Project Name, Notes, etc.)",
                "Fields are detected automatically — fillable PDFs work best",
                "You'll see a list of fields where you can review, adjust, and lock the ones that stay the same every day",
              ]},
              {key:"cleanDoc",icon:"🧹",title:"Preparing Your PDF",bullets:[
                "Your template must be a PDF — fillable PDFs with form fields give the best results",
                "Clear out any old dates, numbers, or sample text before uploading",
                "The cleaner your template, the better the detection",
              ]},
              {key:"notes",icon:"📝",title:"Notes & Observations",bullets:[
                "Label your notes area clearly — \"Notes:\" or \"Observations:\"",
                "Leave the notes area blank so there's room to write each day",
                "Daily entries fill into the same spot on your template every time",
              ]},
              {key:"photos",icon:"📸",title:"Photos",bullets:[
                "Photos get added on new pages after your main report",
                "Your company header and formatting carry through",
                "Upload a single-page template — remove any blank extra pages first",
              ]},
              {key:"bestPractices",icon:"📐",title:"Need Help Creating a Template?",bullets:[
                "Single-page PDF works best, standard letter size (8.5\" x 11\")",
                "Fillable PDFs with form fields give the most accurate results",
                "Don't have a template? Use ChatGPT, Google Gemini, or any AI — just tell it: \"Create a fillable PDF daily inspection report template for [your industry]. Include fields for: Date, Project Name, Inspector Name, Report Number, Weather, Notes/Observations, and a signature line. Single page, 8.5x11, professional layout.\"",
                "If detection doesn't look right, email your template to support@mydailyreports.org and we'll set it up for you",
              ]},
            ].map(section=>{
              const wasRead=readSections[section.key];
              const isOpen=openSections[section.key];
              return(
                <div key={section.key} style={{background:C.card,border:`1px solid ${wasRead?C.org+"60":C.brd}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
                  <button onClick={()=>toggleSection(section.key)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
                    <span style={{fontSize:16}}>{section.icon}</span>
                    <span style={{flex:1,fontSize:14,fontWeight:700,color:C.txt}}>{section.title}</span>

                    <div style={{padding:"0 14px 12px",borderTop:`1px solid ${C.brd}`}}>
                      <div style={{paddingTop:10}}>

                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

            {!allTemplateRead&&(
              <div style={{fontSize:12,color:C.mut,textAlign:"center",marginTop:6}}>
                {5-Object.keys(readSections).filter(k=>["parsing","cleanDoc","notes","photos","bestPractices"].includes(k)).length} section{5-Object.keys(readSections).filter(k=>["parsing","cleanDoc","notes","photos","bestPractices"].includes(k)).length!==1?"s":""} remaining
              </div>
            )}
            <div style={{fontSize:12,color:C.mut,textAlign:"center",marginTop:8}}>For more detail on any topic, visit the Training Center on the dashboard.</div>
          </div>
        )}

        {/* ── Step 4: Subscription ── */}
        {step===4&&(
          <div>
            <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>⭐ Subscription</h2>
            <div style={{...cardS,textAlign:"center",padding:"24px 20px"}}>
              <div style={{display:"inline-block",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:20,padding:"6px 16px",marginBottom:10}}>
                <span style={{fontSize:14,fontWeight:700,color:C.ok}}>FREE During Beta</span>
              </div>
              <p style={{fontSize:13,color:C.lt}}>All features included. No payment required yet.</p>
            </div>
            <div style={{background:"rgba(90,143,192,0.08)",border:`1px solid rgba(90,143,192,0.25)`,borderRadius:10,padding:14}}>
              <div style={{fontSize:13,fontWeight:700,color:C.blu,marginBottom:6}}>Coming Soon — $19.99/mo</div>
              <p style={{fontSize:12,color:C.mut}}>You'll be notified before any charges begin.</p>
            </div>
          </div>
        )}

        {/* ── Step 5: You're Ready ── */}
        {step===5&&(
          <div>
            <div style={{textAlign:"center",padding:"30px 0 20px"}}>
              <div style={{fontSize:56,marginBottom:16,color:C.brd}}>→</div>
              <h2 style={{fontSize:22,fontWeight:800,marginBottom:8}}>Almost There!</h2>
              <p style={{fontSize:15,color:C.lt,lineHeight:1.6,maxWidth:400,margin:"0 auto"}}>Create your account to start building jobs and generating reports.</p>
            </div>
            <div style={cardS}>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center",fontSize:13,color:C.lt}}><span style={{color:C.ok,fontWeight:700}}>✓</span> <strong style={{color:C.txt}}>{fullName}</strong> — {email}</div>
                <div style={{display:"flex",gap:8,alignItems:"center",fontSize:13,color:C.lt}}><span style={{color:C.ok,fontWeight:700}}>✓</span> Calendar: <strong style={{color:C.blu}}>schedule.mydailyreports.org/{slug}</strong></div>
                <div style={{display:"flex",gap:8,alignItems:"center",fontSize:13,color:C.lt}}><span style={{color:C.ok,fontWeight:700}}>✓</span> Template guidelines reviewed</div>
              </div>
            </div>
            <div style={tipS}>
              <strong style={{color:C.org}}>Next:</strong> Tap "Create Account" below, then "+ New Job" to upload your first template. Check the Training Center anytime for detailed guides.
            </div>
          </div>
        )}

        {/* ── Navigation Buttons ── */}
        <div style={{display:"flex",gap:12,marginTop:24}}>
          {step>0&&(
            <button onClick={prev} style={{flex:1,padding:"14px 0",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.lt,fontSize:15,fontWeight:700,cursor:"pointer"}}>Back</button>
          )}
          {step<WIZARD_STEPS.length-1?(
            <button onClick={next} disabled={!canAdvance()} className="btn-o" style={{flex:step===0?1:2,padding:"14px 0",background:canAdvance()?C.org:C.inp,border:canAdvance()?`1px solid ${C.org}`:`1px solid ${C.brd}`,borderRadius:10,color:canAdvance()?"#fff":C.mut,fontSize:15,fontWeight:700,cursor:canAdvance()?"pointer":"default",opacity:canAdvance()?1:0.5}}>
              {step===0?"Let's Get Started":"Continue"}
            </button>
          ):(
            <button onClick={saveProfileAndFinish} disabled={saving} className="btn-o" style={{flex:2,padding:"14px 0",background:C.org,border:`1px solid ${C.org}`,borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>
              {saving?"Creating Account...":"Create Account"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Login / Signup Screen ── */
function LoginScreen({onAuth}){
  const [mode,setMode]=useState("login"); // "login" or "signup"
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [fullName,setFullName]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [checkEmail,setCheckEmail]=useState(false);

  const fs={width:"100%",padding:"14px 16px",background:C.inp,border:`1px solid ${C.brd}`,borderRadius:10,color:C.txt,fontSize:15};

  const handleSubmit=async(e)=>{
    e.preventDefault();
    setErr("");setLoading(true);
    try{
      if(mode==="login"){
        const u=await authSignInAndSave(email.trim(),password);
        onAuth(u);
      }else{
        if(!fullName.trim()){setErr("Full name is required");setLoading(false);return;}
        if(password.length<6){setErr("Password must be at least 6 characters");setLoading(false);return;}
        const u=await authSignUpAndSave(email.trim(),password,fullName.trim());
        onAuth(u);
      }
    }catch(err){
      if(err.message==="CHECK_EMAIL"){
        setCheckEmail(true);
      }else{
        setErr(err.message);
      }
    }finally{setLoading(false);}
  };

  if(checkEmail){
    return(
      <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{maxWidth:380,width:"100%",textAlign:"center"}}>
          <MDRLogo size={72}/>
          <div style={{fontSize:22,fontWeight:800,color:C.txt,marginTop:16}}>Check Your Email</div>
          <div style={{color:C.mut,fontSize:14,marginTop:10,lineHeight:1.5}}>
            We sent a confirmation link to <strong style={{color:C.org}}>{email}</strong>. Tap the link in your email, then come back here and sign in.
          </div>
          <button onClick={()=>{setCheckEmail(false);setMode("login");setPassword("");}} className="btn-o" style={{marginTop:24,width:"100%",padding:"14px 0",background:C.org,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            Back to Sign In
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:380,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <MDRLogo size={72}/>
          <div style={{fontSize:24,fontWeight:800,color:C.txt,marginTop:12}}>My Daily Reports</div>
          <div style={{color:C.mut,fontSize:14,marginTop:4}}>Daily reporting made simple</div>
        </div>

        {/* Toggle */}
        <div style={{display:"flex",background:C.inp,borderRadius:10,padding:3,marginBottom:24}}>
          <button onClick={()=>{setMode("login");setErr("");}} style={{flex:1,padding:"10px 0",background:mode==="login"?C.card:"transparent",border:"none",borderRadius:8,color:mode==="login"?C.txt:C.mut,fontSize:14,fontWeight:700,cursor:"pointer"}}>Sign In</button>
          <button onClick={()=>{setMode("signup");setErr("");}} style={{flex:1,padding:"10px 0",background:mode==="signup"?C.card:"transparent",border:"none",borderRadius:8,color:mode==="signup"?C.txt:C.mut,fontSize:14,fontWeight:700,cursor:"pointer"}}>Create Account</button>
        </div>

        <form onSubmit={handleSubmit} style={{display:"flex",flexDirection:"column",gap:14}}>
          {mode==="signup"&&(
            <input type="text" placeholder="Full Name" value={fullName} onChange={e=>setFullName(e.target.value)} style={fs} required/>
          )}
          <input type="email" placeholder="Email Address" value={email} onChange={e=>setEmail(e.target.value)} style={fs} required/>
          <input type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} style={fs} required minLength={6}/>

          {err&&<div style={{color:C.err,fontSize:13,textAlign:"center"}}>{err}</div>}

          <button type="submit" disabled={loading} className="btn-o" style={{width:"100%",padding:"14px 0",background:C.org,border:"none",borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:loading?"default":"pointer",opacity:loading?0.7:1,marginTop:4}}>
            {loading?(mode==="login"?"Signing In...":"Creating Account..."):(mode==="login"?"Sign In":"Create Account")}
          </button>
        </form>

        <div style={{textAlign:"center",marginTop:20,color:C.mut,fontSize:13}}>
          {mode==="login"?"Don't have an account? ":"Already have an account? "}
          <span onClick={()=>{setMode(mode==="login"?"signup":"login");setErr("");}} style={{color:C.org,cursor:"pointer",fontWeight:600}}>
            {mode==="login"?"Sign up free":"Sign in"}
          </span>
        </div>

        <div style={{textAlign:"center",marginTop:24,color:C.mut,fontSize:11}}>
          14-day free trial — $19.99/month after
        </div>

        {/* Concierge service blurb */}
        <div style={{marginTop:28,padding:"18px 16px",background:"rgba(232,116,42,0.06)",border:"1px solid rgba(232,116,42,0.2)",borderRadius:12,textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700,color:C.txt,marginBottom:6}}>New to digital daily reports?</div>
          <div style={{fontSize:13,color:C.lt,lineHeight:1.6,marginBottom:12}}>Send us your PDF or Word template and we'll set it up for you — configured, tested, and ready for your whole team.</div>
          <a href="mailto:support@mydailyreports.org?subject=Template%20Setup%20Request&body=Hi%2C%20I'd%20like%20help%20setting%20up%20my%20report%20template.%20I've%20attached%20it%20to%20this%20email." style={{display:"inline-block",padding:"10px 20px",background:C.org,color:"#fff",borderRadius:8,fontSize:13,fontWeight:700,textDecoration:"none"}}>
            Send Us Your Template
          </a>
          <div style={{fontSize:11,color:C.mut,marginTop:8}}>support@mydailyreports.org</div>
        </div>
      </div>
    </div>
  );
}

/* ── Install to Home Screen Banner ── */
function InstallBanner(){
  const [show,setShow]=useState(false);
  const [step,setStep]=useState(0); // 0=banner, 1=instructions
  const [platform,setPlatform]=useState("unknown"); // ios, android, desktop

  useEffect(()=>{
    // Don't show if already installed as PWA
    if(window.matchMedia("(display-mode: standalone)").matches)return;
    if(window.navigator.standalone===true)return;
    // Don't show if user dismissed it
    if(localStorage.getItem("mdr_install_dismissed"))return;

    const ua=navigator.userAgent||"";
    if(/iPhone|iPad|iPod/.test(ua))setPlatform("ios");
    else if(/Android/.test(ua))setPlatform("android");
    else setPlatform("desktop");

    // Show after a short delay so it doesn't flash on load
    const t=setTimeout(()=>setShow(true),2000);
    return ()=>clearTimeout(t);
  },[]);

  const dismiss=()=>{
    localStorage.setItem("mdr_install_dismissed","1");
    setShow(false);
  };

  if(!show)return null;

  // Step 1: Instructions screen
  if(step===1){
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:C.card,borderRadius:16,padding:28,maxWidth:360,width:"100%",border:`1px solid ${C.brd}`}}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <MDRLogo size={48}/>
            <div style={{fontSize:18,fontWeight:700,marginTop:10}}>Add to Home Screen</div>
          </div>

          {platform==="ios"&&(
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:C.org,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>1</div>
                <div style={{fontSize:14,color:C.lt,lineHeight:1.5}}>Tap the <strong style={{color:"#fff"}}>Share</strong> button at the bottom of Safari (the square with an arrow pointing up)</div>
              </div>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:C.org,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>2</div>
                <div style={{fontSize:14,color:C.lt,lineHeight:1.5}}>Scroll down and tap <strong style={{color:"#fff"}}>Add to Home Screen</strong></div>
              </div>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:C.org,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>3</div>
                <div style={{fontSize:14,color:C.lt,lineHeight:1.5}}>Tap <strong style={{color:"#fff"}}>Add</strong> in the top right</div>
              </div>
              <div style={{fontSize:12,color:C.mut,textAlign:"center",marginTop:4}}>Must use Safari — Chrome on iPhone won't work</div>
            </div>
          )}

          {platform==="android"&&(
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:C.org,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>1</div>
                <div style={{fontSize:14,color:C.lt,lineHeight:1.5}}>Tap the <strong style={{color:"#fff"}}>three dots</strong> menu in the top right of Chrome</div>
              </div>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:C.org,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>2</div>
                <div style={{fontSize:14,color:C.lt,lineHeight:1.5}}>Tap <strong style={{color:"#fff"}}>Add to Home screen</strong></div>
              </div>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:C.org,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>3</div>
                <div style={{fontSize:14,color:C.lt,lineHeight:1.5}}>Tap <strong style={{color:"#fff"}}>Add</strong></div>
              </div>
            </div>
          )}

          {platform==="desktop"&&(
            <div style={{fontSize:14,color:C.lt,lineHeight:1.6,textAlign:"center"}}>
              Open this page on your <strong style={{color:"#fff"}}>iPhone</strong> or <strong style={{color:"#fff"}}>Android</strong> phone to install it as an app on your home screen.
            </div>
          )}

          <button onClick={dismiss} style={{width:"100%",padding:"14px 0",background:C.org,border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:20}}>Got It</button>
        </div>
      </div>
    );
  }

  // Step 0: Small banner at bottom
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.card,borderTop:`1px solid ${C.brd}`,padding:"14px 16px",zIndex:10000,display:"flex",alignItems:"center",gap:12}}>
      <MDRLogo size={36}/>
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:700,color:C.txt}}>Install the App</div>
        <div style={{fontSize:12,color:C.mut}}>Add to your home screen for the full experience</div>
      </div>
      <button onClick={()=>setStep(1)} style={{padding:"10px 16px",background:C.org,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>Show Me</button>
      <button onClick={dismiss} style={{background:"none",border:"none",color:C.mut,fontSize:20,cursor:"pointer",padding:"4px 8px",lineHeight:1}}>✕</button>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [booting,setBooting]=useState(true);
  const [setupDone,setSetupDone]=useState(null); // null=loading, true/false

  // Read ?company= from URL for invite links (e.g. app.mydailyreports.org?company=VIS)
  const inviteCompany=useMemo(()=>{
    try{const p=new URLSearchParams(window.location.search);return p.get("company")||"";}catch(e){return"";}
  },[]);

  // Clear stale parse attempt counters from localStorage
  useEffect(()=>{try{Object.keys(localStorage).filter(k=>k.startsWith("mdr_parse_")).forEach(k=>localStorage.removeItem(k));}catch(e){}},[]);

  // On mount, try to restore existing session or handle OAuth callback
  useEffect(()=>{
    (async()=>{
      // Check for OAuth callback (Google sign-in redirect)
      const oauthUser=await authHandleOAuthCallback();
      if(oauthUser){
        setUser(oauthUser);
        try{
          const p=await db.getProfile(oauthUser.id);
          setSetupDone(p?.setup_complete===true);
          if(p?.full_name)window._mdrUserName=p.full_name;
        }catch(e){setSetupDone(false);}
        setBooting(false);
        return;
      }
      // Normal session restore
      const u=await authGetSession();
      if(u){
        setUser(u);
        setTimeout(()=>{try{const t=document.createElement("div");t.id="betaToast";t.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;max-width:420px;width:90%";t.innerHTML=`<div style="background:#1a1a1a;border:1px solid #333;border-left:4px solid #e8742a;border-radius:10px;padding:16px 20px;color:#fff;font-family:-apple-system,sans-serif;box-shadow:0 8px 32px rgba(0,0,0,0.5)"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px"><div><div style="font-weight:700;font-size:14px;margin-bottom:6px">Beta Notice</div><div style="font-size:12px;color:#ccc;line-height:1.5">My Daily Reports is actively being developed. You may occasionally experience brief interruptions during updates. If something looks off, close and reopen the app.</div></div><button onclick="this.closest('[id=betaToast]').remove()" style="background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:0;line-height:1">x</button></div></div>`;document.body.appendChild(t);setTimeout(()=>{var el=document.getElementById("betaToast");if(el)el.remove();},8000);}catch(e){}},800);
        try{
          const p=await db.getProfile(u.id);
          setSetupDone(p?.setup_complete===true);
          if(p?.full_name)window._mdrUserName=p.full_name;
        }catch(e){setSetupDone(false);}
      }
      setBooting(false);
    })().catch(()=>setBooting(false));
  },[]);

  // Called after successful login/signup
  const handleAuth=async(u)=>{
    setUser(u);
    if(u?.user_metadata?.full_name)window._mdrUserName=u.user_metadata.full_name;
    try{
      const p=await db.getProfile(u.id);
      setSetupDone(p?.setup_complete===true);
      if(p?.full_name)window._mdrUserName=p.full_name;
    }catch(e){
      setSetupDone(false);
    }
  };

  const handleLogout=()=>{
    authLogout();
    db._tplBytesCache={};
    db._profileCache={};
    db._reportIdCache={};
    setUser(null);
    setSetupDone(null);
  };

  if(booting)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <MDRLogo size={64}/>
      <div style={{color:C.mut,fontSize:14}}>Loading...</div>
    </div>
  );

  // Not logged in — show login screen
  if(!user)return<LoginScreen onAuth={handleAuth}/>;

  // Logged in but setup not complete — show wizard
  if(setupDone===false)return<SetupWizard user={user} inviteCompany={inviteCompany} onComplete={()=>setSetupDone(true)}/>;

  // Fully set up — show dashboard
  return<><Dashboard user={user} onLogout={handleLogout}/><InstallBanner/></>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
// Register service worker + auto-update on new version
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    // Check for updates every 30 minutes
    setInterval(()=>reg.update(),30*60*1000);
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='activated'){
          // New version installed — reload to pick up changes
          window.location.reload();
        }
      });
    });
  }).catch(e=>console.log('SW registration failed:',e));
}
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0f0f0f"/>
  <title>Request a Site Visit — My Daily Reports</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased;}
    button{transition:all 0.2s ease;cursor:pointer;}
    input,select,textarea{transition:all 0.2s ease;}
    input:focus,select:focus,textarea:focus{border-color:#e8742a!important;outline:none;}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const SB_URL="https://wluvkmpncafugdbunlkw.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsdXZrbXBuY2FmdWdkYnVubGt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU1MTUsImV4cCI6MjA4Nzg4MTUxNX0.HZpQ2xVGpf4EQ0BVDmIEuPqW5T_eNG5OqBNAqT03rH8";
const C={bg:"#0f0f0f",card:"#1a1a1a",brd:"#333",inp:"#222",org:"#e8742a",blu:"#5a8fc0",txt:"#fff",mut:"#888",lt:"#ccc",ok:"#22c55e",err:"#ef4444"};
const h=(extra={})=>({"Content-Type":"application/json",apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,...extra});

// Get slug from hash, query param, or path
function getSlug(){
  if(location.hash&&location.hash.length>1)return decodeURIComponent(location.hash.slice(1));
  const p=new URLSearchParams(location.search);
  if(p.get("u"))return p.get("u");
  const parts=location.pathname.split("/").filter(Boolean);
  const idx=parts.findIndex(p=>p.startsWith("schedule"));
  if(idx>=0&&parts[idx+1])return parts[idx+1];
  return null;
}

const app=document.getElementById("app");
const slug=getSlug();

// ── Render helpers ──
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs){Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k==="onclick")e.onclick=v;
    else if(k==="innerHTML")e.innerHTML=v;
    else e.setAttribute(k,v);
  });}
  if(children){(Array.isArray(children)?children:[children]).forEach(c=>{
    if(typeof c==="string")e.appendChild(document.createTextNode(c));
    else if(c)e.appendChild(c);
  });}
  return e;
}

function renderHeader(name){
  const hdr=el("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"16px 20px",borderBottom:"1px solid "+C.brd,background:C.card}});
  const logo=document.createElement("div");
  logo.innerHTML='<svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="48" fill="#5a8fc0" opacity="0.15"/><circle cx="50" cy="50" r="40" fill="#1a1a1a" stroke="#5a8fc0" stroke-width="2"/><circle cx="50" cy="50" r="6" fill="#5a8fc0"/><line x1="50" y1="50" x2="50" y2="28" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="50" y1="50" x2="62" y2="42" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>';
  hdr.appendChild(logo);
  const info=el("div",{style:{flex:"1"}});
  info.appendChild(el("div",{style:{fontWeight:"700",fontSize:"17px",color:C.txt}},name||"Inspector"));
  info.appendChild(el("div",{style:{fontSize:"12px",color:C.mut}},"Jobsite Scheduling"));
  hdr.appendChild(info);
  return hdr;
}

// ── No slug provided ──
if(!slug){
  app.appendChild(renderHeader("My Daily Reports"));
  const body=el("div",{style:{maxWidth:"500px",margin:"0 auto",padding:"60px 20px",textAlign:"center"}});
  body.appendChild(el("div",{style:{fontSize:"48px",marginBottom:"16px"}},"📅"));
  body.appendChild(el("p",{style:{fontSize:"18px",fontWeight:"700",color:C.txt,marginBottom:"8px"}},"No Inspector Selected"));
  body.appendChild(el("p",{style:{fontSize:"14px",color:C.mut,lineHeight:"1.6"}},"This link should include the inspector's scheduling name. Please use the link provided by your inspector."));
  app.appendChild(body);
}else{
  // ── Load inspector profile + their scheduling-enabled jobs ──
  app.appendChild(renderHeader("Loading..."));
  const body=el("div",{style:{maxWidth:"500px",margin:"0 auto",padding:"20px"}});
  body.innerHTML='<p style="text-align:center;color:'+C.mut+';padding:40px 0">Loading scheduling calendar...</p>';
  app.appendChild(body);

  (async()=>{
    try{
      // Fetch profile by slug
      const pr=await fetch(SB_URL+"/rest/v1/profiles?slug=eq."+encodeURIComponent(slug)+"&select=id,full_name,slug",{headers:h()});
      if(!pr.ok)throw new Error("Could not load inspector profile");
      const profiles=await pr.json();
      if(!profiles.length)throw new Error("Inspector not found. Check the link and try again");
      const profile=profiles[0];

      // Fetch scheduling-enabled jobs
      const jr=await fetch(SB_URL+"/rest/v1/jobs?user_id=eq."+profile.id+"&scheduling_enabled=eq.true&select=id,name,site_address",{headers:h()});
      if(!jr.ok)throw new Error("Could not load jobs");
      const jobs=await jr.json();

      // Re-render page
      app.innerHTML="";
      app.appendChild(renderHeader(profile.full_name));
      const main=el("div",{style:{maxWidth:"500px",margin:"0 auto",padding:"20px"}});
      app.appendChild(main);

      if(jobs.length===0){
        main.innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:16px">📅</div><p style="font-size:18px;font-weight:700;color:'+C.txt+';margin-bottom:8px">No Jobs Available</p><p style="font-size:14px;color:'+C.mut+';line-height:1.6">'+profile.full_name+' hasn\'t enabled scheduling for any jobs yet.</p></div>';
        return;
      }

      // ── App state ──
      let selJob=null,selDate=null;
      let vMonth=new Date().getMonth(),vYear=new Date().getFullYear();

      function render(){
        main.innerHTML="";
        const todayStr=new Date().toLocaleDateString("en-CA");

        if(!selJob){
          // ── Job picker ──
          const intro=el("div",{style:{textAlign:"center",marginBottom:"20px"}});
          intro.appendChild(el("div",{style:{fontSize:"36px",marginBottom:"8px"}},"📅"));
          intro.appendChild(el("p",{style:{fontSize:"16px",fontWeight:"700",color:C.txt,marginBottom:"4px"}},"Request a Site Visit"));
          intro.appendChild(el("p",{style:{fontSize:"13px",color:C.mut,lineHeight:"1.5"}},"Select a job to schedule a site visit with "+profile.full_name));
          main.appendChild(intro);

          jobs.forEach(function(j){
            const btn=el("button",{style:{width:"100%",textAlign:"left",background:C.card,border:"1px solid "+C.brd,borderRadius:"12px",padding:"16px 18px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"14px"},onclick:function(){selJob=j;selDate=null;render();}});
            btn.appendChild(el("div",{style:{width:"40px",height:"40px",borderRadius:"8px",background:C.inp,border:"1px solid "+C.brd,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:"0"}},"📋"));
            const info=el("div",{style:{flex:"1"}});
            info.appendChild(el("div",{style:{fontWeight:"700",fontSize:"15px",color:C.txt}},j.name));
            if(j.site_address)info.appendChild(el("div",{style:{fontSize:"12px",color:C.mut,marginTop:"2px"}},j.site_address));
            btn.appendChild(info);
            btn.appendChild(el("span",{style:{color:C.mut,fontSize:"18px"}},"›"));
            main.appendChild(btn);
          });

        }else if(!selDate){
          // ── Month calendar ──
          main.appendChild(el("button",{style:{background:"none",border:"none",color:C.mut,fontSize:"14px",padding:"4px 0",marginBottom:"12px"},onclick:function(){selJob=null;render();}},"← Back to jobs"));

          // Job info bar
          const jbar=el("div",{style:{background:C.card,border:"1px solid "+C.brd,borderRadius:"12px",padding:"14px 16px",marginBottom:"16px",display:"flex",alignItems:"center",gap:"12px"}});
          jbar.appendChild(el("div",{style:{fontSize:"20px"}},"📋"));
          const jd=el("div",{style:{flex:"1"}});
          jd.appendChild(el("div",{style:{fontWeight:"700",fontSize:"15px",color:C.txt}},selJob.name));
          if(selJob.site_address)jd.appendChild(el("div",{style:{fontSize:"12px",color:C.mut}},selJob.site_address));
          jbar.appendChild(jd);
          main.appendChild(jbar);

          main.appendChild(el("p",{style:{fontSize:"13px",color:C.mut,textAlign:"center",marginBottom:"16px"}},"Tap a date to request a site visit"));

          // Fetch confirmed requests for this job to show green checkmarks
          var start=vYear+"-"+String(vMonth+1).padStart(2,"0")+"-01";
          var lastD=new Date(vYear,vMonth+1,0).getDate();
          var end=vYear+"-"+String(vMonth+1).padStart(2,"0")+"-"+String(lastD).padStart(2,"0");
          var confirmedDates={};
          (async function(){
            try{
              var cr=await fetch(SB_URL+"/rest/v1/inspection_requests?job_id=eq."+selJob.id+"&status=eq.confirmed&requested_date=gte."+start+"&requested_date=lte."+end+"&select=requested_date",{headers:h()});
              if(cr.ok){var cd=await cr.json();cd.forEach(function(r){confirmedDates[r.requested_date]=true;});
                // Update dots after fetch
                document.querySelectorAll("[data-confirmed-dot]").forEach(function(dot){
                  if(confirmedDates[dot.dataset.confirmedDot])dot.style.display="block";
                });
              }
            }catch(e){}
          })();

          // Calendar card
          const cal=el("div",{style:{background:C.card,border:"1px solid "+C.brd,borderRadius:"12px",overflow:"hidden"}});

          // Nav row
          const nav=el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid "+C.brd}});
          nav.appendChild(el("button",{style:{background:"none",border:"none",color:C.mut,fontSize:"20px",padding:"4px 10px"},onclick:function(){vMonth--;if(vMonth<0){vMonth=11;vYear--;}render();}},"‹"));
          nav.appendChild(el("span",{style:{fontWeight:"700",fontSize:"15px",color:C.txt}},new Date(vYear,vMonth).toLocaleDateString("en-US",{month:"long",year:"numeric"})));
          nav.appendChild(el("button",{style:{background:"none",border:"none",color:C.mut,fontSize:"20px",padding:"4px 10px"},onclick:function(){vMonth++;if(vMonth>11){vMonth=0;vYear++;}render();}},"›"));
          cal.appendChild(nav);

          // Day headers
          const dh=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}});
          ["S","M","T","W","T","F","S"].forEach(function(d,i){
            dh.appendChild(el("div",{style:{padding:"8px 0",textAlign:"center",fontSize:"11px",fontWeight:"700",color:(i===0||i===6)?C.mut+"88":C.mut,borderBottom:"1px solid "+C.brd}},d));
          });
          cal.appendChild(dh);

          // Days grid
          var firstDay=new Date(vYear,vMonth,1);
          var startPad=firstDay.getDay();
          var totalDays=new Date(vYear,vMonth+1,0).getDate();
          var grid=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"4px 0"}});
          for(var p=0;p<startPad;p++)grid.appendChild(el("div",{style:{padding:"6px 4px"}}));
          for(var d=1;d<=totalDays;d++){
            (function(day){
              var ds=vYear+"-"+String(vMonth+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
              var isToday=ds===todayStr;
              var isPast=ds<todayStr;
              var dow=new Date(vYear,vMonth,day).getDay();
              var isWE=dow===0||dow===6;
              var cell=el("div",{style:{padding:"4px 2px",textAlign:"center"}});
              var btn=el("button",{style:{width:"34px",height:"34px",borderRadius:"50%",border:isToday?"2px solid "+C.org:"1px solid transparent",background:"transparent",color:isPast?C.mut+"44":isWE?C.mut:C.lt,fontWeight:isToday?"700":"500",fontSize:"13px",cursor:isPast?"default":"pointer",opacity:isPast?"0.4":"1",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center"},onclick:isPast?null:function(){selDate=ds;render();}},String(day));
              cell.appendChild(btn);
              // Green dot for confirmed dates (hidden initially, shown after async fetch)
              var dot=el("div",{style:{width:"5px",height:"5px",borderRadius:"50%",background:"#22c55e",margin:"2px auto 0",display:"none"}});
              dot.dataset.confirmedDot=ds;
              cell.appendChild(dot);
              grid.appendChild(cell);
            })(d);
          }
          cal.appendChild(grid);

          // Legend
          var legend=el("div",{style:{padding:"10px 16px",borderTop:"1px solid "+C.brd,fontSize:"11px",color:C.mut,display:"flex",alignItems:"center",gap:"12px"}});
          var gd=el("span",{style:{display:"inline-flex",alignItems:"center",gap:"4px"}});
          gd.appendChild(el("span",{style:{width:"6px",height:"6px",borderRadius:"50%",background:"#22c55e",display:"inline-block"}}));
          gd.appendChild(document.createTextNode(" Scheduled"));
          legend.appendChild(gd);
          cal.appendChild(legend);

          main.appendChild(cal);

        }else{
          // ── Request form ──
          main.appendChild(el("button",{style:{background:"none",border:"none",color:C.mut,fontSize:"14px",padding:"4px 0",marginBottom:"12px"},onclick:function(){selDate=null;render();}},"← Back to calendar"));

          var dateDisplay=new Date(selDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

          // Summary card
          var card=el("div",{style:{background:C.card,border:"1px solid "+C.brd,borderRadius:"12px",padding:"20px",marginBottom:"16px"}});
          card.appendChild(el("div",{style:{fontSize:"14px",color:C.mut,marginBottom:"4px"}},"Requesting site visit for"));
          card.appendChild(el("div",{style:{fontWeight:"700",fontSize:"17px",color:C.txt,marginBottom:"4px"}},selJob.name));
          card.appendChild(el("div",{style:{fontSize:"14px",color:C.org,fontWeight:"600"}},dateDisplay));
          main.appendChild(card);

          // Form
          var form=el("div",{style:{background:C.card,border:"1px solid "+C.brd,borderRadius:"12px",padding:"20px"}});
          var fs="width:100%;padding:12px 14px;background:"+C.inp+";border:1px solid "+C.brd+";border-radius:10px;color:"+C.txt+";font-size:15px;font-family:inherit;";

          form.innerHTML='<label style="display:block;color:'+C.lt+';font-size:13px;font-weight:600;margin-bottom:6px">Your Name *</label>'
            +'<input id="f_name" type="text" placeholder="Full name" style="'+fs+'margin-bottom:14px">'
            +'<label style="display:block;color:'+C.lt+';font-size:13px;font-weight:600;margin-bottom:6px">Your Email *</label>'
            +'<input id="f_email" type="email" placeholder="name@company.com" style="'+fs+'margin-bottom:14px">'
            +'<label style="display:block;color:'+C.lt+';font-size:13px;font-weight:600;margin-bottom:6px">Company / Role</label>'
            +'<input id="f_comp" type="text" placeholder="GC, Subcontractor, etc." style="'+fs+'margin-bottom:14px">'
            +'<label style="display:block;color:'+C.lt+';font-size:13px;font-weight:600;margin-bottom:6px">Visit Type</label>'
            +'<select id="f_type" style="'+fs+'margin-bottom:14px"><option>General Site Visit</option><option>Foundation</option><option>Framing</option><option>Rough-In</option><option>Drywall</option><option>Final</option><option>Other</option></select>'
            +'<label style="display:block;color:'+C.lt+';font-size:13px;font-weight:600;margin-bottom:6px">Notes (optional)</label>'
            +'<textarea id="f_notes" placeholder="Any details about the visit..." rows="3" style="'+fs+'margin-bottom:20px;resize:vertical;line-height:1.5"></textarea>'
            +'<div id="f_err" style="display:none;background:#2d1214;border:1px solid #5c2023;border-radius:8px;padding:10px 14px;margin-bottom:14px;color:'+C.err+';font-size:13px"></div>';

          var submitBtn=el("button",{style:{width:"100%",padding:"14px 0",background:C.org,border:"1px solid "+C.blu,borderRadius:"10px",color:"#fff",fontSize:"16px",fontWeight:"700",cursor:"pointer"},onclick:async function(){
            var name=document.getElementById("f_name").value.trim();
            var email=document.getElementById("f_email").value.trim();
            var errEl=document.getElementById("f_err");
            if(!name||!email||!email.includes("@")){errEl.style.display="block";errEl.textContent="Please enter your name and a valid email.";return;}
            errEl.style.display="none";
            submitBtn.textContent="Submitting...";
            submitBtn.disabled=true;
            submitBtn.style.opacity="0.6";
            try{
              var r=await fetch(SB_URL+"/rest/v1/inspection_requests",{method:"POST",headers:h({Prefer:"return=representation"}),body:JSON.stringify({
                job_id:selJob.id,
                user_id:profile.id,
                requested_date:selDate,
                requester_name:name,
                requester_email:email,
                requester_company:document.getElementById("f_comp").value.trim()||null,
                inspection_type:document.getElementById("f_type").value,
                notes:document.getElementById("f_notes").value.trim()||null,
                status:"pending"
              })});
              if(!r.ok){var e=await r.json();throw new Error(e.message||"Request failed");}
              form.innerHTML='<div style="text-align:center;padding:10px 0"><div style="font-size:36px;margin-bottom:8px">✅</div><div style="font-weight:700;font-size:16px;color:'+C.ok+';margin-bottom:6px">Request Submitted!</div><div style="font-size:13px;color:'+C.mut+';line-height:1.5">Your site visit request for <strong style="color:'+C.lt+'">'+dateDisplay+'</strong> has been sent to '+profile.full_name+'. You\'ll receive a confirmation once it\'s reviewed.</div></div>';
              form.appendChild(el("button",{style:{width:"100%",padding:"12px 0",background:C.card,border:"1px solid "+C.brd,borderRadius:"10px",color:C.lt,fontSize:"14px",fontWeight:"600",cursor:"pointer",marginTop:"14px"},onclick:function(){selJob=null;selDate=null;render();}},"Schedule Another Visit"));
            }catch(ex){
              errEl.style.display="block";
              errEl.textContent="Failed: "+ex.message;
              submitBtn.textContent="Submit Request";
              submitBtn.disabled=false;
              submitBtn.style.opacity="1";
            }
          }},"Submit Request");
          form.appendChild(submitBtn);
          main.appendChild(form);
        }
      }

      render();

    }catch(e){
      body.innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><p style="font-size:18px;font-weight:700;color:'+C.txt+';margin-bottom:8px">Could Not Load Calendar</p><p style="font-size:14px;color:'+C.mut+';line-height:1.6">'+e.message+'</p></div>';
    }
  })();
}
</script>
</body>
</html>

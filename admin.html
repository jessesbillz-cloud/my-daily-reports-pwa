<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDR Admin — Template Provisioning</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 20px; }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 28px; }
  .card { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; margin-bottom: 16px; color: #ccc; }
  label { display: block; font-size: 13px; font-weight: 600; color: #999; margin-bottom: 6px; }
  input[type="text"], input[type="password"] { width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 14px; margin-bottom: 14px; }
  input[type="file"] { margin-bottom: 14px; }
  .hint { font-size: 12px; color: #666; margin-top: -10px; margin-bottom: 14px; }
  button { padding: 12px 24px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
  button:hover { background: #1d4ed8; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .log { background: #0d0d0d; border: 1px solid #222; border-radius: 8px; padding: 14px; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; line-height: 1.6; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
  .log .ok { color: #22c55e; }
  .log .err { color: #ef4444; }
  .log .info { color: #60a5fa; }
  .log .warn { color: #f59e0b; }
  .field-list { margin-top: 12px; }
  .field-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #222; font-size: 13px; }
  .field-item:last-child { border-bottom: none; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
  .badge.edit { background: #1e3a5f; color: #60a5fa; }
  .badge.lock { background: #3b2815; color: #f59e0b; }
  .badge.auto { background: #14332b; color: #22c55e; }
  .user-info { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; }
  .user-info strong { color: #fff; }
</style>
</head>
<body>

<div class="container">
  <h1>MDR Admin — Template Provisioning</h1>
  <p class="subtitle">Parse a template and drop it into a user's saved templates</p>

  <div class="card">
    <h2>1. Auth</h2>
    <label>Supabase Service Role Key</label>
    <input type="password" id="serviceKey" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." />
    <div class="hint">Service role key bypasses RLS. Never share this.</div>
  </div>

  <div class="card">
    <h2>2. Target User</h2>
    <label>User Email</label>
    <input type="text" id="userEmail" placeholder="user@example.com" />
    <button onclick="lookupUser()" id="lookupBtn" style="margin-bottom:12px;background:#333;">Look Up User</button>
    <div id="userInfo" style="display:none;" class="user-info"></div>
    <input type="hidden" id="userId" />
  </div>

  <div class="card">
    <h2>3. Template File</h2>
    <label>Upload PDF or DOCX</label>
    <input type="file" id="templateFile" accept=".pdf,.docx" />
    <label>Template Name (optional — defaults to filename)</label>
    <input type="text" id="templateName" placeholder="Daily Inspection Report" />
  </div>

  <div class="card">
    <h2>4. Provision</h2>
    <button onclick="provision()" id="provisionBtn">Parse & Save to User Account</button>
  </div>

  <div class="card" id="logCard" style="display:none;">
    <h2>Log</h2>
    <div class="log" id="log"></div>
  </div>

  <div class="card" id="fieldsCard" style="display:none;">
    <h2>Detected Fields</h2>
    <div class="field-list" id="fieldList"></div>
  </div>
</div>

<script>
const SB_URL = "https://wluvkmpncafugdbunlkw.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsdXZrbXBuY2FmdWdkYnVubGt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU1MTUsImV4cCI6MjA4Nzg4MTUxNX0.HZpQ2xVGpf4EQ0BVDmIEuPqW5T_eNG5OqBNAqT03rH8";

// Set pdf.js worker
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}

function getServiceKey() {
  return document.getElementById("serviceKey").value.trim();
}

function serviceHeaders() {
  const sk = getServiceKey();
  return {
    "Content-Type": "application/json",
    apikey: SB_KEY,
    Authorization: `Bearer ${sk}`,
    Prefer: "return=representation"
  };
}

function log(msg, cls = "") {
  const el = document.getElementById("log");
  document.getElementById("logCard").style.display = "block";
  const span = document.createElement("span");
  span.className = cls;
  span.textContent = msg + "\n";
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

async function lookupUser() {
  const email = document.getElementById("userEmail").value.trim();
  const sk = getServiceKey();
  if (!sk) { alert("Enter service role key first"); return; }
  if (!email) { alert("Enter a user email"); return; }

  document.getElementById("lookupBtn").disabled = true;
  try {
    // Use auth admin API to find user by email
    const r = await fetch(`${SB_URL}/auth/v1/admin/users?page=1&per_page=50`, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${sk}` }
    });
    if (!r.ok) throw new Error(`Auth API error: ${r.status}`);
    const data = await r.json();
    const users = data.users || data;
    const user = users.find(u => u.email?.toLowerCase() === email.toLowerCase());
    if (!user) throw new Error(`No user found with email: ${email}`);

    document.getElementById("userId").value = user.id;
    const info = document.getElementById("userInfo");
    info.style.display = "block";
    info.innerHTML = `<strong>${user.user_metadata?.full_name || "No name"}</strong> — ${user.email}<br/>ID: <code style="font-size:11px;color:#888;">${user.id}</code>`;
  } catch (e) {
    alert(e.message);
  } finally {
    document.getElementById("lookupBtn").disabled = false;
  }
}

async function provision() {
  const sk = getServiceKey();
  const userId = document.getElementById("userId").value;
  const fileInput = document.getElementById("templateFile");
  const file = fileInput.files?.[0];
  const customName = document.getElementById("templateName").value.trim();

  if (!sk) { alert("Enter service role key"); return; }
  if (!userId) { alert("Look up the target user first"); return; }
  if (!file) { alert("Select a template file"); return; }

  const btn = document.getElementById("provisionBtn");
  btn.disabled = true;
  btn.textContent = "Processing...";
  document.getElementById("log").innerHTML = "";
  document.getElementById("fieldsCard").style.display = "none";

  const ext = file.name.split(".").pop().toLowerCase();
  const templateName = customName || file.name.replace(/\.[^.]+$/, "");

  try {
    // Step 1: Read file
    log("Reading file: " + file.name, "info");
    const arrayBuffer = await file.arrayBuffer();
    const u8 = new Uint8Array(arrayBuffer);

    // Step 2: Extract text items (PDF) or prepare base64 (DOCX)
    let parseBody = { file_name: file.name };

    if (ext === "pdf") {
      log("Extracting text from PDF with pdf.js...", "info");
      const pdfDoc = await pdfjsLib.getDocument({ data: u8.slice() }).promise;
      const textItems = [];
      for (let p = 1; p <= pdfDoc.numPages; p++) {
        const page = await pdfDoc.getPage(p);
        const content = await page.getTextContent();
        const vp = page.getViewport({ scale: 1 });
        content.items.forEach(item => {
          if (!item.str || !item.str.trim()) return;
          const tx = item.transform || [];
          textItems.push({
            str: item.str,
            x: Math.round(tx[4] || 0),
            y: Math.round(vp.height - (tx[5] || 0) - (item.height || 10)),
            w: Math.round(item.width || 0),
            h: Math.round(item.height || 10),
            page: p,
            fontSize: Math.round(tx[0] || 12),
            bold: /bold/i.test(item.fontName || "")
          });
        });
      }
      log(`Extracted ${textItems.length} text items from ${pdfDoc.numPages} pages`, "ok");
      parseBody.text_items = textItems;
    } else {
      log("Preparing DOCX for parsing...", "info");
      // Convert to base64
      const chunks = [];
      for (let i = 0; i < u8.length; i += 8192) {
        chunks.push(String.fromCharCode.apply(null, u8.subarray(i, i + 8192)));
      }
      parseBody.docx_base64 = btoa(chunks.join(""));
      log("DOCX encoded (" + Math.round(u8.length / 1024) + " KB)", "ok");
    }

    // Step 3: Call parse-template edge function
    log("Calling parse-template edge function (AI analysis)...", "info");
    const parseResp = await fetch(`${SB_URL}/functions/v1/parse-template`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        apikey: SB_KEY,
        Authorization: `Bearer ${sk}`
      },
      body: JSON.stringify(parseBody)
    });

    if (!parseResp.ok) {
      const errText = await parseResp.text();
      throw new Error(`parse-template failed (${parseResp.status}): ${errText}`);
    }

    const parsed = await parseResp.json();
    if (parsed.error) throw new Error("Parse error: " + parsed.error);

    const editable = parsed.editable || [];
    const locked = parsed.locked || [];
    const convention = parsed.filenameConvention || null;
    log(`Parsed: ${editable.length} editable + ${locked.length} locked fields`, "ok");
    if (convention) {
      log(`Filename convention: ${convention.pattern} (date: ${convention.dateFormat || "none"}, padding: ${convention.numberPadding || 0})`, "info");
    }

    // Display fields
    const fieldList = document.getElementById("fieldList");
    fieldList.innerHTML = "";
    document.getElementById("fieldsCard").style.display = "block";
    editable.forEach(f => {
      const type = f.autoFill === "date" ? "auto" : f.autoFill === "increment" ? "auto" : "edit";
      const label = f.autoFill ? `auto-${f.autoFill}` : "editable";
      fieldList.innerHTML += `<div class="field-item"><span>${f.name}</span><span class="badge ${type}">${label}</span></div>`;
    });
    locked.forEach(f => {
      fieldList.innerHTML += `<div class="field-item"><span>${f.name}</span><span class="badge lock">locked</span></div>`;
    });

    // Step 4: Upload template file to storage
    const storagePath = `${userId}/saved-templates/${Date.now()}_${file.name}`;
    log(`Uploading to storage: ${storagePath}`, "info");

    const contentType = ext === "pdf" ? "application/pdf" : "application/vnd.openxmlformats-officedocument.wordprocessingml.document";
    let upResp = await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`, {
      method: "POST",
      headers: {
        apikey: SB_KEY,
        Authorization: `Bearer ${sk}`,
        "Content-Type": contentType
      },
      body: new Blob([u8], { type: contentType })
    });
    // If POST fails (object exists), try PUT
    if (!upResp.ok) {
      upResp = await fetch(`${SB_URL}/storage/v1/object/report-source-docs/${storagePath}`, {
        method: "PUT",
        headers: {
          apikey: SB_KEY,
          Authorization: `Bearer ${sk}`,
          "Content-Type": contentType
        },
        body: new Blob([u8], { type: contentType })
      });
    }
    if (!upResp.ok) {
      const errText = await upResp.text();
      throw new Error(`Storage upload failed (${upResp.status}): ${errText}`);
    }
    log("File uploaded to storage", "ok");

    // Step 5: Build field_config as flat array (same format the app uses internally)
    // Each field has: name, value, mode, page, x, y, w, h, fontSize, multiline, voiceEnabled
    const NOTES_KW = ["notes", "observations", "comments"];
    const isNotes = (n) => NOTES_KW.some(k => (n || "").toLowerCase().includes(k));
    const seenNames = new Set();
    let notesAdded = false;
    const flatFields = [];
    const addField = (f, mode) => {
      const key = (f.name || "").toLowerCase().trim();
      if (seenNames.has(key)) return;
      if (isNotes(f.name)) { if (notesAdded) return; notesAdded = true; }
      seenNames.add(key);
      flatFields.push({
        name: f.name, value: f.value || "", mode,
        page: f.page, x: f.x, y: f.y, w: f.w, h: f.h,
        fontSize: f.fontSize, multiline: f.multiline || false,
        voiceEnabled: f.voiceEnabled || false
      });
    };
    editable.forEach(f => {
      let mode = "edit";
      if (f.autoFill === "date") mode = "auto-date";
      else if (f.autoFill === "increment") mode = "auto-num";
      addField(f, mode);
    });
    locked.forEach(f => addField(f, "lock"));

    // Store as object with fields array + convention (matches app's saved template format)
    const fieldConfig = flatFields;
    // Attach convention separately so app can extract it
    const savedConvention = convention || null;

    // Step 6: Insert into saved_templates
    log("Saving to saved_templates...", "info");
    // Attach convention metadata at the end of the fields array as a special entry
    // The app will extract it when loading the saved template
    if (savedConvention) {
      flatFields.push({ _type: "filenameConvention", ...savedConvention });
    }

    const savedData = {
      user_id: userId,
      name: templateName,
      original_filename: file.name,
      file_type: ext,
      field_config: flatFields,
      storage_path: storagePath
    };

    const saveResp = await fetch(`${SB_URL}/rest/v1/saved_templates`, {
      method: "POST",
      headers: serviceHeaders(),
      body: JSON.stringify(savedData)
    });

    if (!saveResp.ok) {
      const errBody = await saveResp.text();
      throw new Error(`saved_templates insert failed (${saveResp.status}): ${errBody}`);
    }

    const savedResult = await saveResp.json();
    const savedId = savedResult?.[0]?.id || "unknown";
    log(`\nSaved template "${templateName}" (ID: ${savedId})`, "ok");
    log(`User can now select this template when creating a new job.`, "ok");
    log("\nDone!", "ok");

  } catch (e) {
    log("\nERROR: " + e.message, "err");
  } finally {
    btn.disabled = false;
    btn.textContent = "Parse & Save to User Account";
  }
}
</script>
</body>
</html>
